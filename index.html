const DATA_111_ADVANCED = {"meta": {"year": 111, "role": "nurse", "subject": "advanced", "subject_name": "進階專科護理", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "關於低血鈉的鑑別診斷與評估，下列何者錯誤？", "options": {"A": "須先測血中滲透壓（plasma osmolality），排除假性低血鈉", "B": "每上升血糖100mg/dL，血鈉會下降1.6~2.4mEq/L", "C": "低體容性低血鈉（hypovolemic hyponatremia）常見於心衰竭和肝硬化病人", "D": "24小時內矯正低血鈉，可能會造成橋腦中央髓鞘溶解症（central pontine demyelination）"}, "answer": "C", "explanation": "低體容性低血鈉（hypovolemic hyponatremia）常見於嘔吐、腹瀉、利尿劑使用等。心衰竭和肝硬化為高體容性低血鈉（hypervolemic），C錯誤。", "category": "physiology", "difficulty": "medium", "source": "111_anesthesia_Q1"}, {"id": 2, "question": "病人的動脈血氣體分析為pH：7.32，PaCO2：34mmHg，PaO2：96mmHg，HCO3-：16mmol/L。其他抽血報告albumin：4.2g/dL、Na+：142mmol/L、K+：4.0mmol/L、Cl-：115mmol/L，下列敘述何者正確？", "options": {"A": "屬於代謝性酸中毒，高陰離子間隙（high anion gap）", "B": "屬於代謝性酸中毒，正常陰離子間隙（normal anion gap）", "C": "屬於代謝性鹼中毒，高陰離子間隙（high anion gap）", "D": "屬於代謝性鹼中毒，正常陰離子間隙（normal anion gap）"}, "answer": "B", "explanation": "pH 7.32為酸中毒；HCO3- 16偏低（原發性代謝性酸中毒）；PaCO2 34有代償性過度換氣。陰離子間隙=Na-(Cl+HCO3)=142-(115+16)=11（正常12±2），為正常AG代謝性酸中毒，B正確。", "category": "physiology", "difficulty": "hard", "source": "111_anesthesia_Q2"}, {"id": 3, "question": "關於嗎啡類藥物的敘述，下列何者錯誤？", "options": {"A": "臨床上使用可能有噁心嘔吐、鎮靜、呼吸抑制及瞳孔變小等副作用", "B": "採取長時間連續輸注fentanyl，會出現藥物代謝速率變慢的情況", "C": "肥胖病人劑量計算，採用總體重比淨體重（lean body mass）合適", "D": "合併NSAIDs或其他作用機轉止痛藥，能提升止痛效果及安全性"}, "answer": "C", "explanation": "肥胖病人opioid劑量應依淨體重（lean body weight）計算，以避免藥物過量，C描述相反，C錯誤。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q3"}, {"id": 4, "question": "關於NSAIDs的敘述，下列何者正確？", "options": {"A": "傳統NSAIDs主要抑制COX-1，抑制prostaglandins的產生，達到止痛的效果", "B": "使用celecoxib，對胃黏膜的保護性較好，可以減少胃腸道出血的副作用", "C": "長期使用celecoxib可以降低心肌梗塞或其他心血管併發症的風險", "D": "在癌症疼痛階段性治療中，可取代嚴重疼痛時強效高劑量嗎啡類藥物止痛的角色"}, "answer": "B", "explanation": "Celecoxib選擇性抑制COX-2，對COX-1（保護胃黏膜）影響小，故胃腸道出血副作用較少，B正確。傳統NSAIDs同時抑制COX-1和COX-2；Celecoxib長期使用有增加心血管風險；NSAIDs無天花板效應但無法取代強效opioid。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q4"}, {"id": 5, "question": "創傷病人氣管內管插管的適應症，下列何者錯誤？", "options": {"A": "頸部血腫併口咽道出血", "B": "嚴重顏面骨折", "C": "純氧治療下仍氧合不足", "D": "腰椎骨折損傷合併下肢無力"}, "answer": "D", "explanation": "腰椎骨折合併下肢無力為脊髓損傷的表現，本身不是插管的直接適應症（除非合併呼吸功能損害）；其餘三項（氣道危及、氧合不足）均為明確插管適應症，D錯誤。", "category": "airway", "difficulty": "medium", "source": "111_anesthesia_Q5"}, {"id": 6, "question": "下列何種細菌導致的管路相關性感染，在不移除管路而僅以藥物治療的成功率最高？", "options": {"A": "金黃色葡萄球菌（staphylococcus aureus）", "B": "綠膿桿菌（pseudomonas aeruginosa）", "C": "寡食單胞菌（stenotrophomonas）", "D": "凝固酶陰性葡萄球菌（coagulase-negative staphylococci，CoNS）"}, "answer": "D", "explanation": "CoNS（凝固酶陰性葡萄球菌）毒性較低，在不移除管路的情況下單純藥物治療成功率最高；金黃色葡萄球菌毒性強，通常需移除管路。", "category": "general_nursing", "difficulty": "hard", "source": "111_anesthesia_Q6"}, {"id": 7, "question": "下列何種退燒藥不會掩蓋發炎的徵象，不會損害血小板的功能，也和雷氏症候群無關，是較優先的選擇？", "options": {"A": "Aspirin®", "B": "Diclofenac®", "C": "Betamethasone®", "D": "Acetaminophen®"}, "answer": "D", "explanation": "Acetaminophen（乙醯氨酚）退燒止痛但無抗發炎作用，不掩蓋發炎徵象，不影響血小板，與雷氏症候群無關，D最適合。", "category": "pharmacology", "difficulty": "easy", "source": "111_anesthesia_Q7"}, {"id": 8, "question": "病房醫療人員出現噁心嘔吐及群聚腹瀉症候群的情形，且糞便細菌培養均為陰性，下列何者為最有可能的病原體？", "options": {"A": "諾羅病毒（norovirus）", "B": "輪狀病毒（rotavirus）", "C": "大腸桿菌（E. coli）", "D": "沙門氏菌（salmonella）"}, "answer": "A", "explanation": "諾羅病毒是醫院群聚腸胃炎最常見原因，細菌培養陰性（病毒感染）、快速蔓延、成人多見，A正確。", "category": "general_nursing", "difficulty": "easy", "source": "111_anesthesia_Q8"}, {"id": 9, "question": "下列何者為梅毒（syphilis）最常見的傳染途徑？", "options": {"A": "性接觸感染", "B": "子宮內感染", "C": "輸血", "D": "器官移植"}, "answer": "A", "explanation": "梅毒最主要傳播途徑為性接觸，A正確。", "category": "general_nursing", "difficulty": "easy", "source": "111_anesthesia_Q9"}, {"id": 10, "question": "懷孕女性應避免食用軟起司，且不要重覆加熱即食食品，主要是為避免何種細菌感染？", "options": {"A": "大腸桿菌（E. coli）", "B": "A型鏈球菌（group A streptococcus）", "C": "B型鏈球菌（group B streptococcus）", "D": "李斯特菌（Listeria）"}, "answer": "D", "explanation": "李斯特菌在冷藏食物（如軟起司、即食食品）中存活，對孕婦危險，D正確。", "category": "general_nursing", "difficulty": "easy", "source": "111_anesthesia_Q10"}, {"id": 11, "question": "在臺灣發生腦膜炎雙球菌群聚感染（meningococcal infections），會以哪一型別的可能性最大？", "options": {"A": "A型", "B": "B型", "C": "C型", "D": "W135型"}, "answer": "B", "explanation": "台灣腦膜炎球菌感染以B型（Neisseria meningitidis serogroup B）最常見，B正確。", "category": "general_nursing", "difficulty": "medium", "source": "111_anesthesia_Q11"}, {"id": 12, "question": "肝癌末期病人目前每四小時注射嗎啡針劑進行疼痛控制，但病人仍頻繁感覺疼痛，且有嚴重便秘及腹脹，不想進食，下列安寧緩和療護措施，何者最為適當？", "options": {"A": "優先放置肛管，以緩解病人腹脹的症狀", "B": "優先增加軟便藥物，以減少嗎啡造成的副作用", "C": "優先增加嗎啡劑量，以緩解疼痛感受", "D": "優先考慮改用NSAIDs，以避免嗎啡成癮的可能"}, "answer": "C", "explanation": "病人仍有疼痛，止痛控制為安寧照護優先目標；便秘雖重要但次於疼痛控制；opioid成癮在末期病人不是主要考量，C正確。", "category": "general_nursing", "difficulty": "medium", "source": "111_anesthesia_Q12"}, {"id": 13, "question": "下列哪一項不是臨終瀕死階段常出現的臨床症狀？", "options": {"A": "腸蠕動增加、滲便", "B": "呼吸不規則、費力", "C": "嘴巴張開無法閉合", "D": "皮膚濕冷、肢體發紺"}, "answer": "A", "explanation": "臨終瀕死期常見：呼吸不規則、皮膚蒼白濕冷、肢體發紺、下頷鬆弛（嘴巴張開）、瀕死嗚咽音等。「腸蠕動增加」不是典型瀕死症狀（腸蠕動通常減少），A不屬於。", "category": "general_nursing", "difficulty": "medium", "source": "111_anesthesia_Q13"}, {"id": 14, "question": "當末期病人出現瀕死前的嘎嘎聲（death rattle）時，下列處置何者錯誤？", "options": {"A": "抬高床頭，協助病人呼吸", "B": "增加抽痰頻率，減少呼吸道分泌物", "C": "向家屬說明病人已進入瀕死階段，請家屬進行死亡準備", "D": "使用抗膽鹼藥物可以減少呼吸道分泌物及雜音"}, "answer": "B", "explanation": "death rattle為臨終分泌物無力清除，增加抽痰頻率對臨終病人造成不適，不符合安寧照護原則，B錯誤。", "category": "general_nursing", "difficulty": "medium", "source": "111_anesthesia_Q14"}, {"id": 15, "question": "有高血壓及高血脂病史病人，清晨突然感到後背劇痛，輻射至胸部及腹部，且冒冷汗，至急診時，病人意識清楚，心肺聽診正常，無腹部壓痛，四肢肌力正常，但無法測出左足背動脈搏動。下列哪一項檢查最能確立診斷？", "options": {"A": "胸腹部電腦斷層檢查", "B": "心電圖檢查", "C": "週邊血管超音波檢查", "D": "腹部超音波檢查"}, "answer": "A", "explanation": "撕裂性主動脈剝離（aortic dissection）的表現：突發後背/胸腹撕裂痛、週邊動脈搏動消失。CT angiography（胸腹部CT）為確診的最佳選擇，A正確。", "category": "crisis", "difficulty": "medium", "source": "111_anesthesia_Q15"}, {"id": 16, "question": "病人急性脇腹部痛（flank pain），往下延伸至腹壁及生殖器，伴隨噁心、嘔吐，疼痛性質為痙攣痛，合併肉眼可見的血尿，下列何者為最可能的診斷？", "options": {"A": "腎臟腫瘤", "B": "輸尿管結石", "C": "前列腺肥大", "D": "腎病症候群"}, "answer": "B", "explanation": "典型輸尿管結石表現：脇腹部痙攣性疼痛向下放射至生殖器、血尿、噁心嘔吐，B正確。", "category": "general_nursing", "difficulty": "easy", "source": "111_anesthesia_Q16"}, {"id": 17, "question": "Chvostek's sign及Trousseau's sign最可能發生在下列何種手術之後？", "options": {"A": "副甲狀腺切除手術", "B": "甲狀腺切除手術", "C": "卵巢切除手術", "D": "胸腺切除手術"}, "answer": "A", "explanation": "副甲狀腺切除後PTH驟降→低血鈣→Chvostek sign（叩臉神經引起顏面肌抽搐）和Trousseau sign（氣囊加壓引起腕足痙攣），A正確。甲狀腺切除可誤傷副甲狀腺也會引起，但副甲狀腺切除直接性更強。", "category": "physiology", "difficulty": "medium", "source": "111_anesthesia_Q17"}, {"id": 18, "question": "高血壓病人平時服用利尿劑控制血壓，突然發生右側大腳趾及足踝關節紅腫劇痛，X光檢查正常，抽血WBC 9500/μL，CRP及ESR皆有上升情形，下列何種檢查可以確立診斷？", "options": {"A": "週邊血管超音波檢查", "B": "血液培養", "C": "關節液檢查", "D": "尿酸檢驗"}, "answer": "C", "explanation": "急性痛風確診需關節液抽吸鏡檢（找到尿酸鈉結晶），C為金標準。X光正常、利尿劑誘發高尿酸，臨床高度懷疑痛風。", "category": "general_nursing", "difficulty": "medium", "source": "111_anesthesia_Q18"}, {"id": 19, "question": "多發性骨髓瘤的常見症狀，下列何者錯誤？", "options": {"A": "骨頭疼痛", "B": "貧血", "C": "反覆感染", "D": "淋巴結腫大"}, "answer": "D", "explanation": "多發性骨髓瘤（CRAB）：高血鈣、腎功能損害、貧血、骨頭病變，常見反覆感染（免疫球蛋白異常）。淋巴結腫大是淋巴瘤特徵，非骨髓瘤，D錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "111_anesthesia_Q19"}, {"id": 20, "question": "肺癌病人因呼吸喘多日後至急診，血壓85/70mmHg，心跳120次/分，身體檢查發現頸靜脈怒張，呼吸音對稱、心音低沉、指甲發紺及四肢無水腫。下列何者為最可能的診斷？", "options": {"A": "肋膜積水", "B": "心臟衰竭", "C": "心包膜填塞", "D": "氣胸"}, "answer": "C", "explanation": "Beck's triad（心包膜填塞）：低血壓、頸靜脈怒張、心音低沉遠。肺癌併發惡性心包積液，C最可能。呼吸音對稱排除氣胸；無水腫排除心衰竭。", "category": "crisis", "difficulty": "medium", "source": "111_anesthesia_Q20"}, {"id": 21, "question": "病人因腹痛、體重減輕及腹瀉就醫，主訴每天腹瀉至少4~5次、大便帶血且有裡急後重感，大腸鏡檢查發現從直腸到整段大腸黏膜皆呈現充血、易碎及發炎性變化，且有許多偽息肉，下列何者為最可能的診斷？", "options": {"A": "潰瘍性大腸炎", "B": "大腸激躁症", "C": "憩室炎", "D": "克隆氏症"}, "answer": "A", "explanation": "潰瘍性大腸炎特徵：從直腸連續向上蔓延至整段大腸、黏液血便、裡急後重、偽息肉，A正確。克隆氏症為跳躍性、全層性，可累及任何部位。", "category": "general_nursing", "difficulty": "medium", "source": "111_anesthesia_Q21"}, {"id": 22, "question": "病人因呼吸急促合併胸悶被送到急診，意識清楚但血壓72/38mmHg，心電圖顯示如下圖（一），下列處置何者錯誤？", "options": {"A": "不優先考慮迷走神經刺激術（vagal maneuver）", "B": "adenosine 6mg IV drip", "C": "同步整流50J（雙相）", "D": "整流時可考慮給予鎮靜劑"}, "answer": "B", "explanation": "血流動力學不穩定（BP 72/38）的快速心律不整，首選「同步電整流」，不應先給adenosine IV drip。adenosine需快速靜脈推注（非drip），且血流動力學不穩定時同步整流優先，B錯誤。", "category": "crisis", "difficulty": "hard", "source": "111_anesthesia_Q22", "image": "111_anesthesia_Q22.png", "image_caption": "圖(一) 心電圖：規則窄 QRS 心搏過速（約 150/分），疑似室上性心搏過速 (SVT)"}, {"id": 23, "question": "使用呼吸器可能造成的併發症及處置，下列何者錯誤？", "options": {"A": "呼吸道壓力過高可能造成barotrauma", "B": "吐氣時間不足可能造成auto-PEEP", "C": "呼吸器相關肺炎常發生於使用呼吸器24小時內", "D": "可用H2-blocker或PPI預防stress-induced peptic ulcer"}, "answer": "C", "explanation": "呼吸器相關肺炎（VAP）通常發生於使用呼吸器48-72小時後（早期VAP），不是24小時內，C錯誤。", "category": "monitoring", "difficulty": "easy", "source": "111_anesthesia_Q23"}, {"id": 24, "question": "關於敗血性休克的處置，下列何者錯誤？", "options": {"A": "輸液復甦（fluid resuscitation）", "B": "及早給予合適的抗生素治療", "C": "維持平均動脈壓（MAP）大於65mmHg", "D": "維持中央靜脈血氧飽和濃度（ScvO2）在50~60%"}, "answer": "D", "explanation": "敗血性休克ScvO2目標≥70%（非50-60%），D錯誤。Surviving Sepsis Campaign建議ScvO2目標≥70%，以確保組織氧合。", "category": "crisis", "difficulty": "medium", "source": "111_anesthesia_Q24"}, {"id": 25, "question": "50歲病人，體重40kg，進行硬脊膜外術後止痛，加藥後病人主訴口、舌頭麻和耳鳴，接著意識不清。下列何種劑量最有可能產生心臟毒性？", "options": {"A": "0.5% lidocaine 10mL", "B": "0.5% bupivacaine 10mL", "C": "0.125% levobupivacaine 10mL", "D": "0.125% ropivacaine 10mL"}, "answer": "B", "explanation": "0.5% bupivacaine 10mL = 50mg，對40kg病人為1.25mg/kg，接近或超過最大劑量，且bupivacaine心臟毒性最強（lipid solubility高、Na channel親和力強），B最可能引起心臟毒性。", "category": "regional", "difficulty": "hard", "source": "111_anesthesia_Q25"}, {"id": 26, "question": "40歲病人接受手術，麻醉後生命跡象穩定，下刀前靜脈滴注cefazolin，三分鐘後發生心跳加速、血壓下降、呼吸道壓力上升、理學檢查發現全身紅疹及眼睛紅腫。下列處置何者不適當？", "options": {"A": "diphenhydramine（Vena®）可以緩解呼吸道壓力上升", "B": "給予epinephrine intravenous 10~100mcg", "C": "立刻停止cefazolin繼續滴注，管路內藥物移除", "D": "腎上腺素反應不佳時，應開始液體復甦"}, "answer": "A", "explanation": "過敏性休克中diphenhydramine（抗組織胺）無法有效緩解嚴重支氣管痙攣（呼吸道壓力上升），不是第一線治療；首選epinephrine，A不適當。", "category": "crisis", "difficulty": "medium", "source": "111_anesthesia_Q26"}, {"id": 27, "question": "40歲男性發生車禍，疑似肝臟破裂出血，安排送血管攝影室止血，心跳110次/分、血壓80/30mmHg，到急診時吐出大量鮮血，預計插管全身麻醉並採用快速誘導（RSI），有關快速誘導藥物，下列何者最適當？", "options": {"A": "propofol 2mg/kg", "B": "etomidate 0.2mg/kg", "C": "cisatracurium 0.1mg/kg", "D": "pancuronium 0.04mg/kg"}, "answer": "B", "explanation": "血流動力學不穩定的RSI，etomidate對心血管抑制最小，為首選誘導藥；propofol會加重低血壓；cisatracurium起效太慢；pancuronium有心搏過速副作用。", "category": "crisis", "difficulty": "medium", "source": "111_anesthesia_Q27"}, {"id": 28, "question": "病人接受甲狀腺手術，術後發生呼吸困難，預計重返開刀房手術，下列敘述何者正確？", "options": {"A": "手術影響上喉神經產生聲帶關閉", "B": "應額外準備清醒插管設備", "C": "不應打開手術縫線，避免傷口流血不止", "D": "氣管內管選擇跟上次手術相同即可"}, "answer": "B", "explanation": "甲狀腺術後呼吸困難可能因血腫壓迫氣道，此為困難氣道情況，應準備清醒插管設備（可能標準插管無法成功），B正確。應打開縫線減壓；管徑可能需更小。", "category": "airway", "difficulty": "hard", "source": "111_anesthesia_Q28"}, {"id": 29, "question": "有關多模止痛使用的藥物，下列敘述何者正確？", "options": {"A": "propacetamol為非類固醇類止痛藥，由腎臟代謝，使用過量會有腎毒性", "B": "nalbuphine hydrochloride對於開車或操作機器不會有影響", "C": "gabapentin作用在GABA receptor，可以減少成人神經痛", "D": "dexamethasone可以減少術後噁心嘔吐"}, "answer": "D", "explanation": "Dexamethasone有效預防術後噁心嘔吐（PONV），D正確。Propacetamol為acetaminophen前驅藥，由肝臟代謝，過量引起肝毒性；Nalbuphine有鎮靜作用，不適合駕駛；Gabapentin作用在電壓門控鈣離子通道（非GABA受器）。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q29"}, {"id": 30, "question": "燒傷病人接受清創手術，術中發現ECG如下圖（二），下列處置何者不適當？", "options": {"A": "靜脈注射胰島素使細胞外鉀離子進入細胞", "B": "給予dantrolene避免鈣離子釋出", "C": "靜脈注射calcium gluconate穩定膜電位", "D": "給予利尿劑，必要時立即洗腎"}, "answer": "B", "explanation": "ECG顯示高鉀血症特徵（高T波、QRS增寬），dantrolene用於惡性高熱（非高血鉀），不適用，B不適當。高血鉀處置：calcium gluconate（穩定心臟膜）、insulin+glucose（鉀移入細胞）、利尿/洗腎（排除鉀）均正確。", "category": "crisis", "difficulty": "hard", "source": "111_anesthesia_Q30", "image": "111_anesthesia_Q30.png", "image_caption": "圖(二) 術中 ECG：QRS 增寬、T 波高尖，疑似高血鉀變化"}, {"id": 31, "question": "用於門診手術麻醉的鴉片類藥物，下列何者半衰期最短？", "options": {"A": "remifentanil", "B": "alfentanil", "C": "fentanyl", "D": "sufentanil"}, "answer": "A", "explanation": "Remifentanil半衰期極短（3-5分鐘），由血漿酯酶水解，不受肝腎功能影響，最適合門診手術，A正確。", "category": "pharmacology", "difficulty": "easy", "source": "111_anesthesia_Q31"}, {"id": 32, "question": "有關術後加速康復（enhanced recovery after surgery，ERAS），下列敘述何者錯誤？", "options": {"A": "麻醉兩個小時之前可喝清澈的液體（clear liquid diet）", "B": "使用短效麻醉劑、維持正常體溫、預防術後噁心和嘔吐以及圍術期血容量正常", "C": "應避免常規使用鼻胃管，但如果使用，盡可能在手術結束時移除鼻胃管", "D": "腹橫肌平面阻斷（TAP block）可能造成腹部手術中滲液，不可術前施打"}, "answer": "D", "explanation": "TAP block是ERAS中重要的區域麻醉止痛技術，可於術前或術中施打，D描述不正確，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q32"}, {"id": 33, "question": "有關二尖瓣逆流（mitral regurgitation），下列何種處置可改善心輸出量？", "options": {"A": "降低心跳和減少後負荷", "B": "降低心跳和增加後負荷", "C": "增加心跳和減少後負荷", "D": "增加心跳和增加後負荷"}, "answer": "C", "explanation": "MR麻醉原則：維持或增加心跳（減少舒張期逆流時間）、降低後負荷（減少逆流分率）、維持前負荷。C（增加心跳+減少後負荷）正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q33"}, {"id": 34, "question": "有關剛接受心導管治療的病人，安排常規非心臟手術，下列敘述何者錯誤？", "options": {"A": "無支架植入氣球血管擴張術病人，應在氣球擴張術14天後施行", "B": "金屬裸冠狀動脈支架（bare metal coronary stents，BMS）的病人，應在放置30天後施行", "C": "塗藥型支架（drug eluting stents，DES）的病人，應在放置7天後施行", "D": "使用雙重抗血小板藥物治療者，施行低出血風險可直接壓迫止血的手術，可持續給予Aspirin®治療"}, "answer": "C", "explanation": "DES支架後需至少12個月（非7天）的雙重抗血小板治療才可考慮停藥手術，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q34"}, {"id": 35, "question": "有關血管內腹主動脈修復術（endovascular abdominal aortic repair，EVAR）之麻醉考量，下列敘述何者錯誤？", "options": {"A": "由於不需要動脈橫斷鉗閉，故術中血液動力學更穩定", "B": "建立大口徑周邊管路（16或14號穿刺針），很少需要中心靜脈管路", "C": "外科醫師在展開支架時，需實行提升血壓，以防止支架移位", "D": "與半身麻醉相比，局部麻醉無法減輕缺血性疼痛，因此需要全身給予止痛劑"}, "answer": "C", "explanation": "EVAR展開支架時需暫時「降低」血壓（低血壓可幫助支架精確定位，避免移位），C描述相反，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q35"}, {"id": 36, "question": "有關麻醉對肺血管阻力的影響，下列敘述何者錯誤？", "options": {"A": "吸入一氧化氮可減少肺血管阻力", "B": "低二氧化碳血症會增加肺血管阻力", "C": "低體溫會增加肺血管阻力", "D": "低血氧會增加肺血管阻力"}, "answer": "B", "explanation": "低CO2血症（過度換氣）會導致肺血管擴張，PVR下降（非增加），B錯誤。低氧、低體溫、高CO2均增加PVR。", "category": "physiology", "difficulty": "hard", "source": "111_anesthesia_Q36"}, {"id": 37, "question": "60歲病人預施行左側全肺切除術，下列何種氣管內管最為適當？", "options": {"A": "一般氣管內管", "B": "右管雙腔氣管內管", "C": "左管雙腔氣管內管", "D": "支氣管阻斷導管"}, "answer": "B", "explanation": "左全肺切除術：左支氣管將被切除，不能放左管雙腔管（管尖在左支氣管，會被切除）；使用右管雙腔管，右肺通氣，B正確。", "category": "airway", "difficulty": "hard", "source": "111_anesthesia_Q37"}, {"id": 38, "question": "病人患有肥厚性心肌症（hypertrophic cardiomyopathy，HCM），預接受闌尾切除手術，下列處置何者會加重左心室出口通道阻塞？", "options": {"A": "增加後負荷", "B": "給予靜脈輸液", "C": "使用吸入性麻醉藥物", "D": "維持病人心跳大於100次/分"}, "answer": "D", "explanation": "HCM麻醉原則：避免心搏過速、低血容、血管擴張。心跳>100/分使舒張充填期縮短，加重流出道梗阻，D會加重阻塞。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q38"}, {"id": 39, "question": "有關小兒先天性心臟病手術，下列敘述何者錯誤？", "options": {"A": "可以用sevoflurane、fentanyl或ketamine做為誘導藥物", "B": "在誘導前一定要先建立動脈導管監測血壓", "C": "需注意肺血管阻力（pulmonary vascular resistance，PVR）和系統性血管阻力（systemic vascular resistance，SVR）的平衡", "D": "視情況有可能需要深低溫體循環（deep hypothermic circulatory arrest，DHCA）降溫至18~20℃"}, "answer": "B", "explanation": "小兒先心病誘導前不一定必須先建立動脈導管（可誘導後建立），尤其在合作度差的小孩，B描述「一定要」過於絕對，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q39"}, {"id": 40, "question": "45歲病人，BMI 40kg/m2，頸圍45cm，患有高血壓，晚上睡覺會打鼾且白天醒來都很嗜睡，預接受腹腔鏡闌尾切除術。有關麻醉考量，下列敘述何者正確？", "options": {"A": "誘導前不需先給氧氣", "B": "全身止痛應優先區域止痛", "C": "病人較易遭遇困難面罩通氣或困難插管", "D": "benzodiazepines和opioids不需要減量"}, "answer": "C", "explanation": "OSA加肥胖（頸圍粗、BMI高）是困難氣道高風險族群，C正確。OSA病人需術前給氧；應盡量減少opioid（多模止痛）；benzodiazepines和opioids均需減量。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q40"}, {"id": 41, "question": "有關氣喘（asthma）病人之全身麻醉考量，下列敘述何者正確？", "options": {"A": "術中呼吸速率設定12~16次/分，使吸氣時間延長", "B": "全身麻醉使用喉頭面罩（LMA）較不刺激", "C": "麻醉誘導使用thiopental比propofol更為合適", "D": "止痛使用morphine比起fentanyl更為合適"}, "answer": "B", "explanation": "LMA比氣管內管對氣道刺激較小，氣喘病人優先考慮，B正確。氣喘設定需延長吐氣時間（非吸氣）；propofol比thiopental（有支氣管痙攣風險）更適合；morphine促組織胺釋放，氣喘應避免，fentanyl較佳。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q41"}, {"id": 42, "question": "患有冠心症病人，欲維持氧的供需平衡，下列處置何者錯誤？", "options": {"A": "維持足夠的血紅色素濃度", "B": "使用beta-blocker避免心搏過速", "C": "可使用利尿劑降低心室前負荷", "D": "避免給予nitrate造成冠狀動脈收縮"}, "answer": "D", "explanation": "Nitrate（硝酸鹽）為冠狀動脈血管擴張劑，能改善心肌血流，D描述「造成冠狀動脈收縮」錯誤，應給予（非避免），D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q42"}, {"id": 43, "question": "有關緊急情況的剖腹產麻醉處置，下列敘述何者正確？", "options": {"A": "如果採用脊髓麻醉，可由麻醉專科護理師執行", "B": "可考慮全身麻醉以達到快速進行手術的目的", "C": "採用脊髓麻醉需要提供第四頸椎以上的感覺阻斷高度", "D": "如果要使用鴉片類藥物，要在嬰兒產出前給予"}, "answer": "B", "explanation": "緊急剖腹產若無法快速完成脊麻，全身麻醉可達到快速手術，B正確。脊麻為麻醉醫師執行；剖腹產脊麻需達T4（非C4）；opioids應在嬰兒產出後給予（避免新生兒呼吸抑制）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q43"}, {"id": 44, "question": "在全身麻醉的手術過程中清醒可能導致嚴重的心理後遺症，對於手術中清醒風險較高的病人，下列預防手術中清醒的方式何者正確？", "options": {"A": "使用笑氣及靜脈麻醉劑較少發生術中清醒", "B": "術前給予失憶的藥物，如：benzodiazepines", "C": "增加肌肉鬆弛劑有預防術中清醒的效果", "D": "提供至少0.3MAC的吸入性麻醉劑"}, "answer": "B", "explanation": "Benzodiazepines具前向性失憶效果（anterograde amnesia），術前給予可降低術中清醒的心理創傷，B正確。笑氣+靜脈麻醉不一定減少術中清醒；肌鬆劑無防止清醒效果；吸入麻醉劑需≥0.5MAC才有效預防。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q44"}, {"id": 45, "question": "殘餘的神經肌肉阻斷劑效果可能使病人在恢復室發生上呼吸道阻塞，下列藥物的使用或生理狀態何者不會造成非去極化神經肌肉阻斷效果延長？", "options": {"A": "使用dantrolene", "B": "使用鈣離子阻斷劑", "C": "低血鎂", "D": "低體溫"}, "answer": "C", "explanation": "低血鎂會減少神經肌肉接合處的鈣離子競爭，增強非去極化肌鬆效果（非縮短）；但「低血鎂」若理解為「低鎂」，鎂離子本身抑制神經傳導，高鎂才延長肌鬆。依公告答案C不會造成延長。低體溫、鈣阻斷劑、dantrolene均可延長肌鬆效果。", "category": "pharmacology", "difficulty": "hard", "source": "111_anesthesia_Q45"}, {"id": 46, "question": "非類固醇類消炎藥（nonsteroidal anti-inflammatory drugs，NSAIDs）可以做為手術後的止痛藥物，但其作用機轉可能在某些病人產生嚴重副作用或併發症，下列病人的病史何者最適合使用NSAIDs做為術後止痛？", "options": {"A": "胃潰瘍", "B": "慢性腎病", "C": "有出血傾向", "D": "憂鬱症"}, "answer": "D", "explanation": "憂鬱症不是NSAIDs的禁忌症；胃潰瘍（COX-1抑制影響胃黏膜）、慢性腎病（腎血流依賴前列腺素）、出血傾向（血小板抑制）均為NSAIDs相對禁忌或高風險，D最適合。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q46"}, {"id": 47, "question": "術後發抖（postoperative shivering）會導致耗氧量及二氧化碳生成量增加，不利於心肺儲備功能有限的病人，有關術後發抖，下列敘述何者正確？", "options": {"A": "只會發生在接受半身麻醉的病人", "B": "經常與大腦的異常放電有關", "C": "許多鴉片類藥物對消除發抖是有效的", "D": "Perdipine®對於消除術後發抖效果最佳"}, "answer": "C", "explanation": "Meperidine（pethidine）是最常用於治療術後發抖的opioid；其他opioids也有效果，C正確。術後發抖可發生於全身和半身麻醉；與異常放電無關；Perdipine為降壓藥。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q47"}, {"id": 48, "question": "接受麻醉後的病人在恢復室用修正過的Aldrete評分，病人受刺激沒有反應，無法照指令移動四肢，血壓與麻醉前相同，呼吸急促，不給氧氣的情況下SpO2為93%，請問此病人的評分應為多少？", "options": {"A": "5", "B": "3", "C": "7", "D": "1"}, "answer": "A", "explanation": "Modified Aldrete計分：意識（受刺激無反應）=0，活動（無法移動）=0，循環（BP=術前）=2，呼吸（急促）=1，血氧（室內空氣93%）=1，但需給氧才能>90%，氧合=1，合計=5分，A正確。", "category": "monitoring", "difficulty": "hard", "source": "111_anesthesia_Q48"}, {"id": 49, "question": "術後噁心嘔吐（postoperative nausea and vomiting，PONV）為恢復室常見問題之一，下列何種藥物不適合用於治療PONV？", "options": {"A": "droperidol", "B": "pancuronium", "C": "ondansetron", "D": "metoclopramide"}, "answer": "B", "explanation": "Pancuronium為非去極化肌肉鬆弛劑，與PONV治療無關，B不適合用於治療PONV。", "category": "pharmacology", "difficulty": "easy", "source": "111_anesthesia_Q49"}, {"id": 50, "question": "創傷病人因顱內出血預計接受緊急開顱手術，下列敘述何者正確？", "options": {"A": "若病人有低血壓、高體溫、低血氧、顱內高壓則暗示預後較差", "B": "為提供腦細胞足夠能量，應給予葡萄糖輸液維持高血糖", "C": "低體溫可降低腦部代謝，應盡量將體溫降至攝氏32度以下", "D": "過度換氣可降低顱內壓，目標是PaCO2：20~25mmHg"}, "answer": "A", "explanation": "顱外傷預後不良因子：低血壓、高體溫（加重腦損傷）、低血氧、顱內高壓，A正確。神經手術應避免含糖輸液（加重腦損傷）；低體溫目標不低於33-35℃；過度換氣僅短暫使用，PaCO2目標35mmHg。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q50"}, {"id": 51, "question": "術後尿滯留（postoperative urinary retention，POUR）是當膀胱內容積超過500~600mL還無法將尿解出時稱之，有關POUR的敘述，下列何者錯誤？", "options": {"A": "女性發生機會比男性高", "B": "較常發生在肛門直腸手術及關節置換手術", "C": "術中使用anticholinergics也可能導致POUR", "D": "診斷可用超音波檢查而得知"}, "answer": "A", "explanation": "男性（尤其前列腺肥大）發生POUR的機會高於女性，A錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q51"}, {"id": 52, "question": "顱後窩腫瘤（posterior fossa tumor）採坐姿以進行腦部腫瘤切除手術，術中發生靜脈空氣栓塞（venous air embolism），下列敘述何者錯誤？", "options": {"A": "此時麻醉監測儀器其潮氣末端二氧化碳濃度（end-tidal CO2 concentration）突然上升，胸前都卜勒超音波（precordial Doppler）出現磨輪樣雜音（mill-wheel）", "B": "當發生靜脈空氣栓塞，應立即通知外科醫師，可使用液體沖洗手術部位防止空氣再進入", "C": "可透過位置放置正確的中央靜脈導管抽吸空氣，並輕柔壓迫內頸靜脈", "D": "若發生低血壓，可將病人採取頭低腳高的仰臥姿勢並補充輸液及藥物支持"}, "answer": "A", "explanation": "靜脈空氣栓塞發生時EtCO2急遽「下降」（肺死腔增加，非上升），precordial Doppler出現mill-wheel雜音正確，但EtCO2描述錯誤，A錯誤。", "category": "monitoring", "difficulty": "hard", "source": "111_anesthesia_Q52"}, {"id": 53, "question": "全膝關節置換（total knee replacement，TKR）手術中經常使用止血帶（tourniquet）以減少手術部位出血，有關止血帶，下列敘述何者正確？", "options": {"A": "止血帶充氣壓力可調至250mmHg，即可防止所有病人手術部位出血的效果", "B": "止血帶放開後，會造成病人代謝性鹼中毒（metabolic alkalosis）", "C": "止血帶放開後，會產生體溫及潮氣末端二氧化碳濃度突然下降", "D": "止血帶充氣時間達2小時，應先將止血帶洩氣15~20分鐘後再次充氣"}, "answer": "D", "explanation": "止血帶持續時間建議不超過2小時，若需更長，應洩氣15-20分鐘讓肢體再灌流後再充氣，D正確。止血帶壓力需個別化設定；放開後代謝性酸中毒（非鹼中毒）；EtCO2放開後升高（缺血代謝產物回流）、體溫短暫下降。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q53"}, {"id": 54, "question": "有關麻醉藥物與眼內壓（intraocular pressure）的相關性，下列敘述何者正確？", "options": {"A": "吸入性麻醉藥物會使眼內壓上升", "B": "ketamine是適合的眼科手術麻醉藥物", "C": "非去極化神經肌肉阻斷劑具降低眼內壓的作用", "D": "succinylcholine注射後1~4分鐘內可降低眼內壓"}, "answer": "C", "explanation": "非去極化肌鬆劑使眼外肌鬆弛，可降低眼內壓，C正確。吸入麻醉劑降低眼內壓（非升高）；ketamine升高眼內壓，不適合眼科；succinylcholine短暫升高眼內壓。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q54"}, {"id": 55, "question": "阻塞性睡眠呼吸中止症（obstructive sleep apnea，OSA）為上呼吸道手術病人麻醉前評估的重要項目之一，進行STOP-Bang問卷調查有助於OSA病人評估，下列哪個評估項目不包含在STOP-Bang問卷中？", "options": {"A": "接受高血脂治療", "B": "身體質量指數（BMI）大於35", "C": "年齡大於50歲", "D": "男性"}, "answer": "A", "explanation": "STOP-Bang：Snore、Tired、Observed apnea、Pressure（高血壓）、BMI>35、Age>50、Neck>40cm、Gender（male）。「接受高血脂治療」不在STOP-Bang中，A不包含。", "category": "clinical_assessment", "difficulty": "easy", "source": "111_anesthesia_Q55"}, {"id": 56, "question": "因子宮肌瘤使用達文西機器手臂執行子宮切除術，術中姿勢擺位照護，下列敘述何者錯誤？", "options": {"A": "頭部放置矽膠頭圈，並保持頸椎平直", "B": "術中常採用頭高腳低的姿勢，容易發生下肢腔室症候群", "C": "生理監測導線及點滴管路，應確認長度適當，並避免病人皮膚壓迫損傷", "D": "在甦醒拔管前，可能因姿勢導致喉頭水腫情形，可先執行氣囊漏氣測試"}, "answer": "B", "explanation": "達文西子宮切除術採頭「低」腳「高」（Trendelenburg）姿勢（非頭高腳低），B描述相反，B錯誤。下肢腔室症候群確實是Trendelenburg長時間手術的風險。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q56"}, {"id": 57, "question": "病人因發生車禍，經頭部電腦斷層顯示顱內出血需緊急進行手術，手術中外科醫師表示病人腦部腫脹，有關麻醉照護處置，下列何者正確？", "options": {"A": "給予類固醇", "B": "減少病人呼吸次數", "C": "增加吸入性麻醉藥物濃度", "D": "採取頭高腳低的姿勢"}, "answer": "D", "explanation": "腦部腫脹（顱內高壓）處置：頭高30度（head-up 30°）以促進靜脈回流降低ICP，D正確。類固醇不用於外傷性腦水腫；減少呼吸次數會升CO2加重ICP；高濃度吸入麻醉藥增加CBF和ICP。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q57"}, {"id": 58, "question": "髖關節骨折常發生於老年人，選擇脊髓麻醉（spinal anesthesia）下執行髖關節骨折手術的好處不包含下列何者？", "options": {"A": "避免插管及過程中使用的藥物", "B": "減少手術中使用全身性藥物的劑量", "C": "降低術後死亡率", "D": "減少血栓形成"}, "answer": "C", "explanation": "目前文獻證據顯示，老年髖關節手術選擇脊麻vs全身麻醉，在術後死亡率上並無顯著差異（C不是確定的好處），C不包含。脊麻確實可避免插管、減少全身用藥、降低血栓風險。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q58"}, {"id": 59, "question": "有關坐姿（sitting position）手術麻醉照護，下列敘述何者正確？", "options": {"A": "雙手自然垂直下放，以減少肩膀肌肉與上肢血管神經拉扯", "B": "雙腳需平行伸直維持平衡，避免造成坐骨神經損傷", "C": "下頷骨與胸骨的距離保持1指寬，以免影響呼吸道", "D": "需要注意手肘尺神經無壓力施壓，以免造成尺神經損傷"}, "answer": "D", "explanation": "坐姿手術需特別注意手肘尺神經保護（避免壓迫），D正確。雙手應適當支撐屈曲，非垂直下放；雙腳微屈；下頷骨與胸骨距離需保持至少兩指寬（避免頸部過度屈曲壓迫頸靜脈）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q59"}, {"id": 60, "question": "有關耳部手術麻醉照護處置，下列敘述何者錯誤？", "options": {"A": "epinephrine常用於耳部顯微手術，以減少出血增加手術視野", "B": "N2O可降低中耳的耳壓，故建議於耳部手術麻醉中使用", "C": "耳部手術，可使用神經肌肉監測器確認周邊神經的train-of-four反應", "D": "中耳手術麻醉後常見術後噁心嘔吐，可預防性給予止吐藥"}, "answer": "B", "explanation": "N2O會擴散進入中耳密閉腔造成壓力升高（非降低），可能導致鼓膜破裂或中耳重建手術失敗，應避免使用，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q60"}, {"id": 61, "question": "有關泌尿外科手術麻醉，下列敘述何者正確？", "options": {"A": "膀胱鏡及輸尿管鏡使用的無菌水沖洗溶液，被身體吸收後不易引起溶血", "B": "經尿道前列腺切除術（TURP），其術中較低的周邊靜脈壓可減少沖洗液被吸收", "C": "截石體位（lithotomy）是膀胱鏡及輸尿管鏡最常見擺位，因架腳可短暫增加心輸出量及肺部順應性", "D": "經尿道膀胱腫瘤切除術使用神經肌肉阻斷劑，是為了避免因刺激閉孔神經而導致的腿部不自主運動"}, "answer": "D", "explanation": "TURBT術中刺激閉孔神經可引起大腿不自主抽動，使用肌肉鬆弛劑或閉孔神經阻斷可避免，D正確。無菌水吸收後造成低張溶血；TURP術中較「高」的靜脈壓增加吸收；截石體位確實短暫增加CO但降低肺順應性。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q61"}, {"id": 62, "question": "有關經尿道前列腺切除術（TURP）症候群，下列敘述何者錯誤？", "options": {"A": "身體吸收大量沖洗液產生的症狀，只在術中早期出現", "B": "中樞神經症狀包含意識模糊、躁動、噁心或視力障礙", "C": "心血管系統的症狀包括心律不整、肺水腫等", "D": "處理原則為儘快中止手術，限制體液輸入和使用利尿劑"}, "answer": "A", "explanation": "TURP syndrome症狀可在術中或術後出現（非只在術中早期），A錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q62"}, {"id": 63, "question": "病人因闌尾發炎施行腹腔鏡闌尾切除術，下列敘述何者正確？", "options": {"A": "為使手術視野顯露，適用於頭高腳低的姿勢", "B": "手術姿勢會使顱內壓（ICP）及中央靜脈壓（CVP）下降", "C": "CO2注入腹腔時，適宜的腹內壓應維持12~15mmHg範圍", "D": "氣腹（pneumoperitoneum）時，功能性肺餘容積（functional residual capacity，FRC）會上升"}, "answer": "C", "explanation": "腹腔鏡手術適宜腹內壓12-15mmHg（不超過15mmHg以減少生理影響），C正確。闌尾切除術採頭低腳高（Trendelenburg）；頭低腳高ICP和CVP升高；氣腹使FRC下降。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q63"}, {"id": 64, "question": "有關達文西機器手臂輔助腹部手術，術中氣腹的生理變化，下列敘述何者正確？", "options": {"A": "肺順應性上升", "B": "胃腸黏膜血流量不受影響", "C": "灌入二氧化碳導致呼吸道壓力下降", "D": "腹內壓上升至25mmHg時，全身血管阻力上升"}, "answer": "D", "explanation": "腹內壓升高→腹主動脈受壓→SVR上升，D正確。氣腹使肺順應性下降；胃腸黏膜血流可能降低（缺血風險）；腹內壓升高使氣道壓升高（非下降）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q64"}, {"id": 65, "question": "20歲病人因巧克力囊腫，預行腹腔鏡手術而至麻前門診評估，自述先前做無痛腸胃鏡檢查後有噁心嘔吐情形，但否認其他系統性疾病及抽煙喝酒過敏史。有關麻醉計畫，下列敘述何者正確？", "options": {"A": "病人為postoperative nausea and vomiting（PONV）低風險病人", "B": "針對PONV問題，在執行全身麻醉時不需要預防性用藥處理", "C": "serotonin拮抗劑不只能用於PONV預防，對於症狀緩解也有效果", "D": "droperidol是預防和治療PONV的第一線用藥，只要給藥後執行complete ECG即可"}, "answer": "C", "explanation": "5-HT3拮抗劑（如ondansetron）既可預防也可治療PONV，C正確。此病人（女性+PONV病史+腹腔鏡）為高風險；需預防性用藥；droperidol需QTc監測，不是第一線。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q65"}, {"id": 66, "question": "有關慢性酒精性肝硬化病人的麻醉照護，下列敘述何者錯誤？", "options": {"A": "心血管系統為低心輸出量、全身阻力上升的循環狀態", "B": "大多採全身麻醉，但凝血功能正常時，也可謹慎考慮區域麻醉", "C": "無手術刺激下，吸入性麻醉藥及區域麻醉皆使肝血流量下降", "D": "腹水或肝性腦病變病人，有較高的誤吸風險，應考慮快速誘導插管"}, "answer": "A", "explanation": "肝硬化血流動力學為「高心輸出量、低全身血管阻力」（hyperdynamic circulation），A描述相反，A錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q66"}, {"id": 67, "question": "有關產科麻醉，下列敘述何者正確？", "options": {"A": "前置胎盤為預防急性出血，需至少一條大管徑靜脈導管且一定要剖腹生產", "B": "產婦吸入高濃度氧氣會增加胎兒視網膜病變的風險", "C": "孕婦接受非產科常規手術，應該延至產後6週再進行，介入性手術治療則在第二孕期", "D": "懷孕後第90~120天是胎兒器官生成最重要的時期，麻醉藥除cocaine外，沒有證據會導致畸胎的風險"}, "answer": "C", "explanation": "非必要常規手術延至產後6週；必要的介入性手術（非急診）在第二孕期最安全（器官分化完成，早產風險較低），C正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q67"}, {"id": 68, "question": "有關術後認知功能障礙（postoperative cognitive dysfunction，POCD）的危險因子，不包含下列何者？", "options": {"A": "全身麻醉", "B": "高齡", "C": "術前有腦血管意外（CVA）病史", "D": "低教育程度"}, "answer": "A", "explanation": "POCD危險因子：高齡、低教育程度、術前認知功能障礙、CVA病史等。全身麻醉vs區域麻醉對POCD的影響目前證據不支持全身麻醉是獨立危險因子，A不包含。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q68"}, {"id": 69, "question": "4歲孩童，體重15kg，預計接受插管全身麻醉手術，下列何種氣管內管尺寸最適當？", "options": {"A": "3.0mm", "B": "4.0mm", "C": "5.0mm", "D": "6.0mm"}, "answer": "C", "explanation": "兒童無氣囊ETT公式：(年齡+16)/4 = (4+16)/4 = 5.0mm，C正確。", "category": "airway", "difficulty": "easy", "source": "111_anesthesia_Q69"}, {"id": 70, "question": "有關COVID-19的描述、臨床徵狀、重症照護，下列敘述何者錯誤？", "options": {"A": "發病前不具傳染性，無症狀感染者也不會散播傳染病源", "B": "致病原為SARS-CoV-2，主要的傳播途徑為飛沫傳染或接觸傳染", "C": "臨床表現可出現發燒、呼吸道症狀、不明原因腹瀉或嗅覺、味覺異常", "D": "進展至呼吸窘迫症候群時，可採俯臥姿勢以改善氧氣飽合度"}, "answer": "A", "explanation": "COVID-19在發病前（潛伏期末）已具傳染性，無症狀感染者也可傳播病毒，A錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "111_anesthesia_Q70"}, {"id": 71, "question": "有關肥胖病人接受麻醉的考量，下列敘述何者錯誤？", "options": {"A": "肺部順應性（compliance）下降，功能性肺餘容積（FRC）下降", "B": "低血氧和高碳酸血症，在肥胖病人中是常見的問題", "C": "肥胖病人併阻塞型睡眠中止症候群，術中輸注dexmedetomidine可以減少嗎啡的使用量", "D": "肥胖病人的藥物劑量，不需要根據除脂體重（lean body weight，LBW）來計算"}, "answer": "D", "explanation": "肥胖病人多數藥物（opioid、非去極化肌鬆等）應依LBW計算，D描述「不需要」錯誤，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q71"}, {"id": 72, "question": "有關麻醉藥物與小兒麻醉，下列敘述何者錯誤？", "options": {"A": "succinylcholine不建議用在小孩身上，除非是為了緊急狀況的呼吸道控制", "B": "congenital hiatal hernia可使用高頻共振換氣（high frequency oscillatory ventilation，HFOV）促進肺部氣體交換", "C": "使用succinylcholine之後，可能心搏過緩甚至停止", "D": "使用succinylcholine可能造成低血鉀和牙關緊閉"}, "answer": "D", "explanation": "Succinylcholine造成「高血鉀」（非低血鉀），以及可能的牙關緊閉（masseter spasm，惡性高熱警兆），D描述低血鉀錯誤，D錯誤。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q72"}, {"id": 73, "question": "有關麻醉中的病人擺位（positioning），下列敘述何者錯誤？", "options": {"A": "俯臥擺位可能造成眼靜脈栓塞、中央眼動脈阻塞或眼角膜擦傷", "B": "平躺姿勢最容易維持血流動力學穩定", "C": "俯臥可改善急性呼吸窘迫的血氧含量", "D": "頭低腳高會增加顱內壓，但會降低中央靜脈壓（CVP）"}, "answer": "D", "explanation": "頭低腳高（Trendelenburg）使靜脈血回流增加，CVP升高（非降低），同時ICP也升高，D描述CVP降低錯誤，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q73"}, {"id": 74, "question": "有關肝臟移植的再灌流生理變化，下列敘述何者錯誤？", "options": {"A": "高血鉀", "B": "代謝性酸中毒", "C": "高體溫", "D": "系統血管阻力下降"}, "answer": "C", "explanation": "新肝再灌流後：高血鉀、代謝性酸中毒、SVR下降（血管擴張）、低體溫（冷的保存液進入循環），「高體溫」不是再灌流的典型表現，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_anesthesia_Q74"}, {"id": 75, "question": "為了降低老年人在手術期間的麻醉風險，有關藥物選擇，下列敘述何者正確？", "options": {"A": "當老年人在手術後發生顫抖（shivering）時，可使用mepivacaine來緩解", "B": "心血管用藥中要特別停用beta-blocker，避免術中心跳過慢", "C": "隨著老化而導致腦實質逐漸萎縮，吸入性麻醉劑的需求量會隨年齡增加", "D": "應由病人照護醫師和外科醫師決定是否繼續服用血小板和抗凝血藥物"}, "answer": "D", "explanation": "血小板藥和抗凝血藥的術前管理應由照護醫師（包含心臟科/血液科）和外科醫師共同決定，D正確。術後shivering用meperidine（非mepivacaine）；beta-blocker需繼續；老年人MAC需求下降（非增加）。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q75"}, {"id": 76, "question": "有關老年人的呼吸道處置，下列敘述何者正確？", "options": {"A": "可能因沒有牙齒，面罩通氣比較容易", "B": "可能因沒有牙齒，使用喉頭鏡（laryngoscopy）插管比較容易", "C": "年齡愈大，咽喉反射（pharyngeal reflexes）愈明顯，發生肺部誤吸胃容物的機率愈高", "D": "不可以使用口咽或鼻咽通氣管（oral or nasopharyngeal airway）維持氣道暢通，避免造成口腔或鼻腔出血受傷"}, "answer": "B", "explanation": "無牙齒的老人因牙槽骨萎縮，喉頭鏡置入時視野反而更好（軟組織更少），B正確。無牙齒面罩通氣反而困難（氣密性差）；老年咽喉反射減弱（誤吸風險升高但反射變差）；口/鼻咽通氣管可謹慎使用。", "category": "airway", "difficulty": "hard", "source": "111_anesthesia_Q76"}, {"id": 77, "question": "有關老年人的麻醉藥物藥理學變化，下列敘述何者正確？", "options": {"A": "由於肝腎功能降低和體脂肪比例增加，麻醉藥物在體內清除時間延長", "B": "老化對藥物動力學和藥效學改變不大，大部分的麻醉藥物劑量不需調整", "C": "發生藥物不良反應的狀況會隨著年齡及使用藥物數量的增加而下降", "D": "因循環系統中的血清蛋白（albumin）濃度降低，使得藥物藥效降低"}, "answer": "A", "explanation": "老年人肝腎功能降低+體脂肪增加（脂溶性藥物分布容積增大）→清除時間延長，A正確。Albumin降低→游離藥物增加→藥效增強（非降低）；需調整劑量；不良反應增加（非下降）。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q77"}, {"id": 78, "question": "有關老年人靜脈麻醉藥物的選擇，下列敘述何者正確？", "options": {"A": "remifentanil藥效短又無活化的代謝物，但要小心呼吸抑制", "B": "dexmedetomidine輸注時不會抑制呼吸，也不受其他安眠藥物影響", "C": "propofol的好處是病人恢復快，對血液動力學影響小", "D": "barbiturates有很好的止痛效果，適合用於老年病人"}, "answer": "A", "explanation": "Remifentanil半衰期極短、無活性代謝物，但有呼吸抑制和胸壁僵硬風險，A正確。Dexmedetomidine與其他藥物有協同作用；Propofol對血壓影響顯著；barbiturates無止痛效果。", "category": "pharmacology", "difficulty": "medium", "source": "111_anesthesia_Q78"}, {"id": 79, "question": "80歲病人因右髖關節骨折進行手術，有關麻醉相關照護，下列敘述何者正確？", "options": {"A": "病人常合併多重疾病，術中應提高警覺並即時處理突發狀況", "B": "目前研究證據指出脊髓麻醉優於全身麻醉", "C": "發生術後認知功能障礙（postoperative cognitive dysfunction，POCD），通常都是單一且容易逆轉的原因", "D": "若發現有急性心肌梗塞，則手術應延後6個月進行"}, "answer": "A", "explanation": "老年髖骨折病人合併症多，術中需高度警覺，A正確。脊麻vs全麻無明確優劣；POCD通常多因素且可能不可逆；急性MI後手術建議延後至少30-60天（非6個月，DES支架例外）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q79"}, {"id": 80, "question": "30歲病人因病態性肥胖及長期高血壓病史，預計進行達文西機器手臂減重手術，下列敘述何者正確？", "options": {"A": "因手術出血量並不多，只需準備一般管徑的靜脈輸液及壓脈帶量測血壓", "B": "身體質量指數（BMI）並不影響功能性肺餘容積（FRC），麻醉誘導時不需要特別注意", "C": "一般術後會降低其它共病或改善症狀，如：高血壓、糖尿病或阻塞性睡眠呼吸中止症", "D": "給予propofol當作麻醉誘導藥物時，劑量應以實際體重（total body weight，TBW）來計算"}, "answer": "C", "explanation": "減重手術（bariatric surgery）術後體重減輕可改善高血壓、T2DM、OSA等共病，C正確。肥胖病人需大管徑靜脈管路；BMI顯著影響FRC；propofol誘導劑量依LBW計算（維持依TBW）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_anesthesia_Q80"}]};
const DATA_111_GENERAL  = {"meta": {"year": 111, "role": "nurse", "subject": "general", "subject_name": "專科護理通論", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "依據「臺灣護理人員法」（民國109年修正），下列何者不屬於專科護理師之執業範疇？", "options": {"A": "麻醉護理與照護", "B": "醫院加護病房照護", "C": "健康促進及衛教", "D": "社區居家在宅接生"}, "answer": "D", "explanation": "依護理人員法，專科護理師執業範疇包含麻醉護理、加護照護、健康促進等，「社區居家在宅接生」屬助產士業務範圍，不在專科護理師範疇內。", "category": "ethics_law", "difficulty": "easy", "source": "111_general_Q1"}, {"id": 2, "question": "肺癌高居臺灣癌症死因第一位，下列何者為2022年國民健康署之肺癌早期偵測計畫，針對肺癌特定風險者的建議？", "options": {"A": "50歲以上民眾，每2年可做1次胸部低劑量電腦斷層攝影檢查", "B": "65歲以上民眾，每年可做1次胸部X光篩檢", "C": "50歲以上民眾，每2年可做1次胸部X光檢查", "D": "40歲以上民眾，每3年可做1次胸部X光篩檢"}, "answer": "A", "explanation": "2022年國健署肺癌早期偵測計畫：50-74歲、具特定風險因子（重度吸菸或二等親罹肺癌等）者，每2年1次低劑量電腦斷層（LDCT）。", "category": "general_nursing", "difficulty": "medium", "source": "111_general_Q2"}, {"id": 3, "question": "醫療品質可從三個構面做指標制定，即結構面指標（structure indicators）、過程面指標（process indicators）、與結果面指標（outcome indicators），下列敘述何者錯誤？", "options": {"A": "具備專科護理師執照者執行業務的比值屬於結果面指標", "B": "醫事人員洗手正確率屬於過程面指標", "C": "手術後傷口感染率屬於結果面指標", "D": "醫事人力與病床的比值屬於結構面指標"}, "answer": "A", "explanation": "「具備專科護理師執照者執行業務的比值」是描述人力結構的指標，屬結構面（非結果面），A錯誤。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q3"}, {"id": 4, "question": "醫療品質管理的手法及工具中，常用的柏拉圖是運用於問題解決流程中哪個步驟？", "options": {"A": "問題確認", "B": "回饋改善", "C": "成果評估", "D": "提出方案"}, "answer": "D", "explanation": "柏拉圖（Pareto chart）依頻率排序問題，用於確認主要問題所在，屬「提出方案」前的問題分析與確認步驟，依公告答案為D。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q4"}, {"id": 5, "question": "品質改善專案常用的特性要因圖（cause and effect diagram），主要是找出問題的根本原因，所以又稱為？", "options": {"A": "魚骨圖", "B": "甘特圖", "C": "管制圖", "D": "流程圖"}, "answer": "A", "explanation": "特性要因圖因形狀似魚骨，又稱魚骨圖（fishbone diagram）或石川圖，用於根本原因分析。", "category": "nursing_mgmt", "difficulty": "easy", "source": "111_general_Q5"}, {"id": 6, "question": "依據「人體器官移植條例」（民國110年修正）對於自活體摘取器官施行移植手術的規定，下列何者正確？", "options": {"A": "捐贈者滿20歲以上，意識清楚，本人簽署同意書即可", "B": "捐贈給配偶時，一定要結婚滿兩年才能捐贈", "C": "受贈者以組織配對合宜性為主，不一定要有親屬關係", "D": "捐贈的案件，要經過醫院醫學倫理委員會審查通過才能捐贈"}, "answer": "D", "explanation": "依人體器官移植條例，活體捐贈須經醫院醫學倫理委員會審查通過，D正確。捐贈給配偶需結婚滿一年（非兩年）；受贈者限特定親屬關係。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q6"}, {"id": 7, "question": "照護品質維護為專科護理師的核心能力之一，在參與急診病人跌倒根本原因分析（root cause analysis，RCA）時，與小組成員運用時序法，列出事件發生時間的先後順序，為根本原因分析的哪一個階段？", "options": {"A": "RCA前的準備", "B": "找出近端原因", "C": "進行危害分析", "D": "確認根本原因"}, "answer": "B", "explanation": "時序法（timeline）列出事件先後順序，目的在釐清事件脈絡、找出與事件直接相關的近端原因，屬「找出近端原因」階段。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q7"}, {"id": 8, "question": "美國醫學研究院（IOM）提出有效改善醫療品質的作法，應該達成滿足服務病人的六大目標，下列何者錯誤？", "options": {"A": "安全性", "B": "即時性", "C": "公平", "D": "尊重"}, "answer": "D", "explanation": "IOM六大品質目標：安全（safe）、有效（effective）、以病人為中心（patient-centered）、即時（timely）、效率（efficient）、公平（equitable）。「尊重」不在六大目標之列，D為不屬於六大目標的選項。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q8"}, {"id": 9, "question": "教育方案設計中，為了解教學成效，下列何者較不適宜？", "options": {"A": "宜採用多元評估策略", "B": "評量技能方法可採用筆試與口頭報告了解學習成效", "C": "依據教學目標擬定教學評量策略", "D": "客觀結構式臨床測驗（OSCE）屬於綜合性評量，可測量學員臨床能力之表現"}, "answer": "B", "explanation": "技能評量應以操作示範、臨床觀察等方式進行，單純筆試與口頭報告無法有效評量操作性技能，B較不適宜。", "category": "communication", "difficulty": "easy", "source": "111_general_Q9"}, {"id": 10, "question": "下列何者不屬於Hamric模式所規劃的專科護理師核心能力？", "options": {"A": "健康政策的倡議與推動能力", "B": "以病人為中心的跨團隊照護能力", "C": "照護過程有臨床實務的品質提升能力", "D": "將新知識轉換到實務中的能力"}, "answer": "A", "explanation": "Hamric模式的專科護理師核心能力包含：直接照護、指導諮詢、實證實務、領導、合作、倫理決策等。「健康政策的倡議與推動」不在Hamric核心能力列表內，A不屬於。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q10"}, {"id": 11, "question": "有效的會談可以收集病人資料，協助病人解決問題，建立良好的治療性人際關係。下列何者不屬於治療性會談的技巧？", "options": {"A": "給予建議性的指示", "B": "鼓勵做比較", "C": "沉默（silence）", "D": "重述（restating）"}, "answer": "A", "explanation": "治療性會談技巧包含沉默、重述、澄清、鼓勵比較等，「給予建議性的指示」屬指導性、評判性溝通，不屬於治療性技巧，A不屬於。", "category": "communication", "difficulty": "easy", "source": "111_general_Q11"}, {"id": 12, "question": "國民健康署為改善老年人生活安全與照護品質，2021年2月發表《老人防跌工作手冊》，若經評估長者的下肢肌力不足或步態及平衡異常，除轉介相關科別醫師診斷外，下列何者不是主要考慮轉介之項目？", "options": {"A": "物理治療師", "B": "職能治療師", "C": "附近可參加之運動團體", "D": "社工師"}, "answer": "D", "explanation": "下肢肌力不足及步態平衡問題主要轉介物理治療師、職能治療師及運動團體。社工師主要處理社會資源連結，非肌力/步態問題的主要轉介對象，D不是主要轉介項目。", "category": "general_nursing", "difficulty": "easy", "source": "111_general_Q12"}, {"id": 13, "question": "專科護理師規劃在職教育課程時，為達到教學成效，第一步工作為何？", "options": {"A": "評估學習者需求", "B": "確認教學方法", "C": "確立教學目標", "D": "擬定教學策略"}, "answer": "A", "explanation": "在職教育課程設計的第一步驟是「需求評估」（needs assessment），了解學習者的現況與需求後，才能確立目標、選擇方法、擬定策略。", "category": "communication", "difficulty": "easy", "source": "111_general_Q13"}, {"id": 14, "question": "王先生表示：「我要不要選擇另一種治療方式呢？」，專科護理師回答：「您認為呢？」，此時專科護理師是使用下列何種會談溝通技巧？", "options": {"A": "強化（post reinforcement）", "B": "澄清（clarification）", "C": "促進（facilitation）", "D": "反映（reflection）"}, "answer": "D", "explanation": "將病人的問題反映（reflection）回給病人，引導其自我探索與思考，屬反映技巧。", "category": "communication", "difficulty": "easy", "source": "111_general_Q14"}, {"id": 15, "question": "病人術後於病房練習走路，跌倒撞到頭部，護理師聯繫正在手術中的主治醫師，主治醫師以電話指示專科護理師，立即進行身體評估、安排電腦斷層，並會診神經內科及向病人與家屬說明病況和處置。有關以上專科護理師之行為，下列敘述何者正確？", "options": {"A": "說明病情不在專科護理師於醫師監督下可執行的業務範圍內，專科護理師應告知家屬，待主治醫師下刀後親自說明", "B": "跌倒為突發事件，不屬於預立特定醫療流程範圍，故專科護理師不應代為開立電腦斷層檢查單及會診單", "C": "執行病人及家屬有關醫學與護理之諮詢及病情說明，本屬專科護理師之執業範圍，行為符合規範", "D": "專科護理師僅可向家屬說明身體評估的結果，而安排電腦斷層與會診神經內科，屬於醫療行為，不應代為說明"}, "answer": "C", "explanation": "依護理人員法及專師辦法，病情說明與諮詢本屬專科護理師執業範圍；在醫師電話指示下執行相關醫療業務亦屬監督下執行，C正確。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q15"}, {"id": 16, "question": "依據醫病共享決策SHARE五步驟，下列順序何者正確？①對決策結果的評值 ②了解病人對疾病的看法、治療期待與偏好 ③幫助病人了解各治療選項及其優缺點 ④尋求病人同意參與決策 ⑤與病人達成共同決策", "options": {"A": "①②③⑤④", "B": "②④①⑤③", "C": "④③②⑤①", "D": "②①④③⑤"}, "answer": "C", "explanation": "SHARE五步驟：S=Seek（尋求參與④）→H=Help（幫助了解③）→A=Assess（評估偏好②）→R=Reach（達成決策⑤）→E=Evaluate（評值①），順序為④③②⑤①，C正確。", "category": "communication", "difficulty": "hard", "source": "111_general_Q16"}, {"id": 17, "question": "在醫療照護團隊中，為傳遞正確醫療訊息，達到以病人為中心的最佳照護成果，身為照護團隊一員的你，會運用醫療團隊資源管理（team resource management，TRM）模組中的哪個模組？", "options": {"A": "情境監測（situation monitoring）", "B": "領導風格（leadership）", "C": "溝通（communication）", "D": "互助支援（mutual support）"}, "answer": "C", "explanation": "傳遞正確醫療訊息以達到最佳照護成果，核心在於有效「溝通（communication）」模組，C正確。", "category": "communication", "difficulty": "easy", "source": "111_general_Q17"}, {"id": 18, "question": "醫療照顧者提供病人衛生教育，協助其獲得健康相關行為改變，達到自我照顧與健康促進，下列敘述何者錯誤？", "options": {"A": "提供病人疾病衛教前，須了解病人對疾病照護認識的程度", "B": "依照醫療照顧人員的業務方便及可近性，選定單一教學方法及衛教工具", "C": "每日評估病人可執行的照顧措施狀況，可激發病人學習參與的動機", "D": "清楚確定病人疾病照顧學習目標"}, "answer": "B", "explanation": "衛教應依病人需求、學習型態選擇多元教學方法，以「業務方便」為由選定單一方法，不以病人為中心，B錯誤。", "category": "communication", "difficulty": "easy", "source": "111_general_Q18"}, {"id": 19, "question": "根據衛生福利部頒定的「專科護理師於醫師監督下執行醫療業務辦法」第4條規定，須成立作業小組，並且明訂專師及訓練專師執行監督下之醫療業務時之標準作業程序，下列敘述何者正確？", "options": {"A": "由護理部主責，定期召開會議", "B": "標準作業程序須訂定每半年更新一次", "C": "須訂定回報病人狀況與處置結果之機制", "D": "經過外部專家審核，方可實施"}, "answer": "C", "explanation": "依辦法第4條，作業小組須建立回報病人狀況與處置結果之機制，C正確。召集人為副院長以上；SOP更新頻率由醫院自訂；不需外部專家審核。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q19"}, {"id": 20, "question": "根據1997年Charles等人建立「醫病共享決策」（shared decision making，SDM）照護模式，下列何者不是決策過程及實踐步驟？", "options": {"A": "資訊交換階段", "B": "實證搜尋階段", "C": "商議階段", "D": "決策階段"}, "answer": "B", "explanation": "Charles等人的SDM三步驟：資訊交換（information exchange）、商議（deliberation）、達成決策（decision）。「實證搜尋」是實踐SDM的工具，不是SDM模式本身的步驟，B不屬於。", "category": "communication", "difficulty": "medium", "source": "111_general_Q20"}, {"id": 21, "question": "「專師及訓練專師執行監督下之醫療業務辦法」第5條，有關預立特定醫療流程訂定內容之規定，下列何者錯誤？", "options": {"A": "使用ICD-10所羅列的疾病來製作照護流程診斷", "B": "包含書寫紀錄及記錄相關處置或措施", "C": "明訂專師及訓練專師應具備之特定訓練標準或要件", "D": "明訂監督之醫師及監督方式"}, "answer": "A", "explanation": "預立特定醫療流程不要求使用ICD-10疾病碼，而是依照護情境訂定，A錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q21"}, {"id": 22, "question": "有關啟動與執行「預立醫療決定」之敘述，下列何者不符合條件標準？", "options": {"A": "臨床失智評估表（clinical dementia rate，CDR）得分3分者", "B": "三個月前車禍致嚴重腦傷，格拉斯哥昏迷指數（GCS）3分者", "C": "腦梗塞後六個月，格拉斯哥昏迷指數（GCS）3分者", "D": "阿茲海默症功能性評估量表（functional assessment staging test，FAST）得分8分者"}, "answer": "B", "explanation": "不可逆昏迷的認定：外傷導致者需意識喪失超過六個月，三個月前的外傷性腦傷尚未達六個月，B不符合條件標準。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q22"}, {"id": 23, "question": "專科護理師下班後，在停車場被病人家屬大聲叫住，無端以言語辱罵，並拉扯頭髮拖拉至路旁，要求跪地道歉。對此暴力事件的敘述，下列何者錯誤？", "options": {"A": "此行為以強暴、脅迫、恐嚇、公然侮辱等方法妨礙醫療業務執行，已違反醫療法", "B": "因未於執行醫療業務期間發生，應以刑法公然侮辱和普通傷害罪認之", "C": "刑法之公然侮辱和普通傷害罪，屬告訴乃論，專科護理師需要主動提出告訴認之", "D": "醫療法於強暴、脅迫、恐嚇等暴力行為的刑責規範，高於刑法規範"}, "answer": "A", "explanation": "醫療法保護範圍限於「執行醫療業務期間」，下班後在停車場不屬於執行醫療業務期間，不能適用醫療法，A錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q23"}, {"id": 24, "question": "目前國民健康署對於健康民眾所提供之癌症篩檢服務，下列族群何者不符合其標準？", "options": {"A": "36歲張先生，已戒食檳榔6年", "B": "55歲李先生，無大腸癌家族病史", "C": "45歲陳小姐，父親罹患肺癌", "D": "42歲王小姐，姑姑5年前罹患乳癌"}, "answer": "送分", "explanation": "本題送分。各選項涉及多項癌篩資格條件，疑義後決定送分。", "category": "general_nursing", "difficulty": "medium", "source": "111_general_Q24"}, {"id": 25, "question": "基於行善原則，下列何種處置屬於去除傷害的範疇？", "options": {"A": "執行技術前確實洗手", "B": "圍上床欄預防跌落", "C": "協助病人執行關節運動，避免攣縮", "D": "即早進行出院準備服務之規劃"}, "answer": "C", "explanation": "「去除傷害（remove harm）」是指去除現有的傷害或功能損失，協助關節運動避免攣縮屬於去除（避免）現有功能喪失的傷害，C符合。洗手和床欄屬預防傷害；出院準備屬促進健康。", "category": "ethics_law", "difficulty": "medium", "source": "111_general_Q25"}, {"id": 26, "question": "病人符合下列臨床條件之一，且有預立醫療決定者，醫療機構或醫師得依其預立醫療決定終止、撤除或不施行維持生命治療或人工營養及流體餵養之全部或一部，下列何者錯誤？", "options": {"A": "由二位與該疾病診斷或治療相關之專科醫師確診之末期病人", "B": "不可逆轉之昏迷狀況，若因外傷所致，其意識超過三個月無恢復跡象", "C": "永久植物人狀態，若因外傷所致，其植物人狀態超過六個月無改善跡象", "D": "極重度失智，臨床失智評估量表（clinical dementia rate，CDR）達三分以上"}, "answer": "AB", "explanation": "疑義後答案為AB。A：末期確診需兩位醫師但不限「相關科別」；B：外傷性不可逆昏迷需超過六個月（非三個月），AB均有誤。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q26"}, {"id": 27, "question": "吸菸是下列癌症的危險因子，其中以何者增加的風險最低？", "options": {"A": "肺癌", "B": "口腔癌", "C": "食道癌", "D": "膀胱癌"}, "answer": "D", "explanation": "吸菸對肺癌、口腔癌、食道癌的風險增加最為顯著；對膀胱癌雖有相關，但相對於前三者風險增加幅度較低，D正確。", "category": "general_nursing", "difficulty": "medium", "source": "111_general_Q27"}, {"id": 28, "question": "下列何者不為肥胖對內分泌與新陳代謝功能的影響？", "options": {"A": "血脂異常", "B": "代謝症候群", "C": "第一型糖尿病", "D": "多囊性卵巢症候群"}, "answer": "C", "explanation": "第一型糖尿病為自體免疫疾病，與肥胖無直接相關；第二型糖尿病才與肥胖密切相關，C不屬於肥胖的代謝影響。", "category": "general_nursing", "difficulty": "easy", "source": "111_general_Q28"}, {"id": 29, "question": "有關GRADE評核系統（grading of recommendation assessment，development and evaluation）之應用，下列敘述何者錯誤？", "options": {"A": "是針對單一臨床研究進行證據等級分級", "B": "最多可納入七個結果指標", "C": "針對不精確性的評估，在臨床指引及系統性文獻回顧的用法不同", "D": "介入措施的證據等級取決於所有結果指標中證據等級較低者"}, "answer": "A", "explanation": "GRADE是針對「臨床問題」的整體證據體（body of evidence）進行分級，非針對單一研究，A錯誤。", "category": "nursing_mgmt", "difficulty": "hard", "source": "111_general_Q29"}, {"id": 30, "question": "在品質改善手法中，目標的設定必須具體可行、能夠量化。有關目標設定依據之敘述，下列何者錯誤？", "options": {"A": "同業或類似工作的實績", "B": "上司的期望及要求", "C": "自我努力的要求", "D": "品管手法熟練度"}, "answer": "D", "explanation": "品質改善目標設定依據應為外部標竿（同業實績）、管理期待（上司要求）、自我評估（努力要求）等客觀依據；「品管手法熟練度」是能力面向，非目標設定的依據，D錯誤。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q30"}, {"id": 31, "question": "下列何者不是應用實證方法提升照護品質的5A步驟？", "options": {"A": "提出問題（ask）", "B": "問題評估（assessment）", "C": "文獻評讀（appraise）", "D": "臨床應用（apply）"}, "answer": "B", "explanation": "實證5A步驟：Ask→Acquire→Appraise→Apply→Audit。「問題評估（assessment）」不在5A之中，B不屬於。", "category": "nursing_mgmt", "difficulty": "easy", "source": "111_general_Q31"}, {"id": 32, "question": "根據考科藍臺灣研究中心2020年更新的《臺灣實證臨床指引發展及更新手冊》，實證臨床指引撰寫完成之後，建議用於外部審查評估指引品質的評讀工具為何？", "options": {"A": "PRISMA", "B": "ROBINS-I", "C": "AGREE II", "D": "GRADE"}, "answer": "C", "explanation": "AGREE II（Appraisal of Guidelines for Research and Evaluation）是評估臨床指引品質的標準工具；PRISMA用於系統性文獻回顧報告；ROBINS-I用於非隨機研究偏差評估；GRADE用於證據等級分級。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q32"}, {"id": 33, "question": "有關醫院推動持續品質改善（CQI）之敘述，下列何者錯誤？", "options": {"A": "以團隊合作方式達成全面品質管理", "B": "尊重每一部門及員工提出的品質改善方案", "C": "運用大數據分析管理進行品質增進計畫", "D": "以領導者為中心建構醫院核心價值與文化"}, "answer": "D", "explanation": "CQI強調全員參與的持續改善文化，非以領導者為中心；應以病人安全與品質為核心建構文化，D錯誤。", "category": "nursing_mgmt", "difficulty": "easy", "source": "111_general_Q33"}, {"id": 34, "question": "有關醫院參加臺灣醫療品質指標系統（TQIS）之敘述，下列何者錯誤？", "options": {"A": "品管中心定期提供報表，可與其他機構比較，及早發現異常趨勢即時改善", "B": "醫療單位僅需依據臨床指引提供照顧，品質指標監測及改善是品管中心的責任", "C": "醫療品質監測指標包括結構、過程與結果三個面向", "D": "臨床指標是品質改善與評鑑查核的工具，故指標高低無法直接解釋醫療品質好壞"}, "answer": "B", "explanation": "品質指標監測及改善是每個醫療單位的共同責任，非僅品管中心，B錯誤。", "category": "nursing_mgmt", "difficulty": "easy", "source": "111_general_Q34"}, {"id": 35, "question": "新冠肺炎疫情間，媒體報導重症病人進行清醒俯臥，但過去在加護病房未曾使用此技能，也不知道其對死亡率之效果，故藉由實證方法尋找最佳研究證據，制定醫院新冠肺炎俯臥的標準，下列何者最不適當？", "options": {"A": "擬定PICO：清醒俯臥是否可降低重症新冠肺炎病人的死亡率", "B": "分析各篇文獻，確認對象與使用情境，擬定適應症、禁忌症以及清醒俯臥的治療流程", "C": "因為新冠肺炎為新興傳染病，故尋找病例對照研究的文獻優於隨機控制試驗文獻", "D": "制定為標準後仍需定期評估照顧成果，運用俯臥對病人的優點，也要避免其他合併症的產生"}, "answer": "C", "explanation": "實證醫學優先尋找最高等級證據（RCT），不因為是新興疾病就以病例對照研究優先，C最不適當。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q35"}, {"id": 36, "question": "有關國民健康署戒菸教戰手冊對訂定戒菸計畫（STAR）之敘述，下列何者錯誤？", "options": {"A": "S（set）：慎重設定戒菸日，跨出戒菸第一步", "B": "T（tell）：暗自告訴自己，我要開始戒菸了", "C": "A（anticipate）：預期戒菸過程可能會遇到的困難，並嘗試安排處理方式", "D": "R（remove）：將菸與相關一切事物從環境中完全拿掉"}, "answer": "B", "explanation": "STAR中T（tell）是「公開告訴家人朋友你要戒菸」（非暗自告訴自己），以獲得社會支持，B錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "111_general_Q36"}, {"id": 37, "question": "有關健康體能的四大要素之敘述，下列何者錯誤？", "options": {"A": "肌耐力就是肌肉力量", "B": "心肺耐力為四大要素中最重要的一項", "C": "柔軟度代表關節可以活動的最大範圍", "D": "身體脂肪百分比是身體組成重要項目"}, "answer": "A", "explanation": "肌耐力（muscular endurance）是肌肉反覆收縮的持久能力，與肌肉力量（muscular strength）是不同概念，A錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "111_general_Q37"}, {"id": 38, "question": "有關我國社區老人健康促進之敘述，下列何者錯誤？", "options": {"A": "公共衛生進步導致高齡化社會的來臨", "B": "促進老人健康可早期預防或減少慢性病及其併發症之發生", "C": "本土化社區老人健康促進工作之推廣模式是以醫院為基礎", "D": "藉由老人間的互動可強化老人健康促進及改善日常生活行為"}, "answer": "C", "explanation": "本土化社區老人健康促進應以「社區為基礎」（community-based），而非以醫院為基礎，C錯誤。", "category": "general_nursing", "difficulty": "medium", "source": "111_general_Q38"}, {"id": 39, "question": "有關檳榔之敘述，下列何者錯誤？", "options": {"A": "檳榔子屬第一類致癌物", "B": "檳榔致癌部位主要在口腔、咽及食道", "C": "嚼不含任何添加物的檳榔子則不會致癌", "D": "其導致之口腔癌為臺灣男性罹患的主要癌症之一"}, "answer": "C", "explanation": "WHO IARC已將檳榔子本身（無添加物）列為第一類致癌物，單純嚼食檳榔子仍有致癌風險，C錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "111_general_Q39"}, {"id": 40, "question": "有關吸菸者行為改變階段模式之敘述，下列何者錯誤？", "options": {"A": "懵懂期指未來六個月中沒有改變行動的意圖", "B": "沉思期指開始覺察到吸菸的問題，但同時有繼續吸菸以及停止吸菸的矛盾心情", "C": "決定期指意圖在未來一個月內行動，通常還未有任何改變", "D": "維持期指戒菸已超過六個月，新行為模式已較穩定"}, "answer": "C", "explanation": "Prochaska行為改變階段：準備期（preparation）才是「意圖一個月內行動」；決定期（determination）通常已有部分行動嘗試，C描述有誤。", "category": "general_nursing", "difficulty": "medium", "source": "111_general_Q40"}, {"id": 41, "question": "依據世界衛生組織（WHO）「長者整合性照護指引（integrated care for older people，ICOPE）」，希望幫助長者及早發現可能導致失能的風險因子，其六大功能指標，不包含下列何者？", "options": {"A": "認知", "B": "營養", "C": "聽力", "D": "失禁"}, "answer": "D", "explanation": "ICOPE六大功能指標：認知、活動力、營養、視力、聽力、憂鬱。「失禁」不在六大指標內，D不包含。", "category": "general_nursing", "difficulty": "medium", "source": "111_general_Q41"}, {"id": 42, "question": "Dicenso等學者（2009）把實證醫學照護資料庫分類為6大類，常用的臨床指引屬下列何種資料？", "options": {"A": "原始研究精要（synopses of studies）", "B": "研究摘要（summaries）", "C": "統合研究資料（syntheses）", "D": "統合研究精要（synopses of syntheses）"}, "answer": "B", "explanation": "Dicenso的6S金字塔：Systems、Summaries（臨床指引屬此層）、Synopses of syntheses、Syntheses、Synopses of studies、Studies。臨床指引屬summaries層，B正確。", "category": "nursing_mgmt", "difficulty": "hard", "source": "111_general_Q42"}, {"id": 43, "question": "有關醫策會臺灣病人安全通報系統（Taiwan Patient-safety Reporting system，TPR）之醫療異常事件通報作業，下列敘述何者錯誤？", "options": {"A": "通報系統的方便性及可近性是重要因素", "B": "通報系統採用具名制，以利事件分析及改善", "C": "成功醫療異常事件通報系統，是以錯誤中學習為原則", "D": "醫療異常通報是病人安全文化的營造"}, "answer": "B", "explanation": "TPR採匿名通報制（非具名），以鼓勵自願通報、減少懲罰恐懼，B錯誤。", "category": "nursing_mgmt", "difficulty": "medium", "source": "111_general_Q43"}, {"id": 44, "question": "依據臨床疾病預防的說明，下列何者錯誤？", "options": {"A": "三級預防（tertiary prevention）是針對反覆再發的疾病，採取合併多種藥物治療，以防止疾病再次復發，例如合併兩種抗血小板藥物以治療冠狀動脈疾病", "B": "次級預防（secondary prevention）是針對已罹病的病人給予治療，以防止疾病再次發生甚至導致死亡，例如給予抗雌激素以降低早期乳癌手術後復發", "C": "初級預防（primary prevention）是針對已出現的疾病危險因子給予介入，以防止疾病發生，例如控制血壓以降低中風發生", "D": "根本預防（primordial prevention）是以根本性的方式防止疾病危險因子出現，例如減少燃煤發電以降低空氣污染，進而降低肺癌發生"}, "answer": "A", "explanation": "三級預防是針對已發生的疾病減少殘障及功能喪失（如復健），A將三級預防描述為「防止疾病再次復發」，更接近次級預防的概念，A錯誤。", "category": "general_nursing", "difficulty": "hard", "source": "111_general_Q44"}, {"id": 45, "question": "下列病人何者最可能是困難氣道？", "options": {"A": "Mallampati氣道分級第一級的學齡期孩童", "B": "張口四指幅且甲頦距離超過三指幅的老年人", "C": "BMI 24kg/m2的男性", "D": "過去病史有類風濕性關節炎的女性"}, "answer": "D", "explanation": "類風濕性關節炎可累及頸椎（寰樞椎不穩定）和顳顎關節（張口受限），大幅增加困難氣道風險，D最可能。", "category": "clinical_assessment", "difficulty": "medium", "source": "111_general_Q45"}, {"id": 46, "question": "有關嬰兒和大人呼吸道的差異，下列敘述何者錯誤？", "options": {"A": "嬰兒的會厭形狀呈現omega型且較軟，成人是U型且較硬", "B": "嬰兒的喉嚨位置相對於成人較高", "C": "嬰兒的舌頭相對比較大，容易阻塞氣道", "D": "成人呼吸道最窄的地方為cricoid ring，嬰兒呼吸道最窄的部份在聲帶"}, "answer": "D", "explanation": "嬰兒呼吸道最窄處為cricoid ring（環狀軟骨，漏斗形），不是聲帶；成人最窄處也是聲帶，D描述相反，錯誤。", "category": "airway", "difficulty": "medium", "source": "111_general_Q46"}, {"id": 47, "question": "有關術前心血管風險評估，下列敘述何者正確？", "options": {"A": "針對低風險手術，建議無症狀的病人常規執行12導程心電圖", "B": "年齡超過70歲病人術前常規接受心臟超音波檢查", "C": "對心血管置放過支架病人，應了解置放時間、種類、位置及適應症", "D": "術前若服用Aspirin®會增加術中出血風險，建議停用3~4天"}, "answer": "C", "explanation": "置放過支架的病人術前必須了解支架種類（BMS/DES）、置放時間（影響停藥決策）、位置及適應症，C正確。低風險手術不需常規心電圖；超音波非常規；Aspirin停藥需7-10天。", "category": "clinical_assessment", "difficulty": "medium", "source": "111_general_Q47"}, {"id": 48, "question": "裝有心臟節律器（pacemaker）的病人預計接受常規手術，下列處置何者錯誤？", "options": {"A": "術前評估應了解當初裝節律器的適應症、廠牌、目前功能以及電池壽命", "B": "需聯絡專家來確定術中pacemaker可以持續的作用與監測它的作用", "C": "請外科醫師使用雙極電燒（bipolar electrosurgical unit）", "D": "術中皆應放置磁鐵在pacemaker上面，使它改變成固定速率pacing的模式"}, "answer": "D", "explanation": "磁鐵不應「術中皆放置」，只在特定情況（如單極電燒且pacemaker依賴型病人）才考慮使用；並非所有手術都需要放磁鐵，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_general_Q48"}, {"id": 49, "question": "50歲女性，有高血壓和糖尿病史，每日規則服藥沒有影響日常功能，此次因腿部多顆脂肪瘤預行切除術，有關其術前評估，下列敘述何者正確？", "options": {"A": "ASA體位分級為第二級", "B": "可輕易爬兩層樓梯，術中一定不會有任何心肺功能不足的問題", "C": "日常規律服用beta-blocker控制血壓，但在手術當日應停止服用", "D": "若是在術前心電圖發現第一度房室阻斷（1°AV block），則應延後手術"}, "answer": "A", "explanation": "有高血壓和糖尿病但規律服藥且日常功能不受影響，屬輕微系統性疾病，ASA II，A正確。爬樓梯只代表METs>4但不能保證術中無問題；beta-blocker應繼續；1°AV block不需延後手術。", "category": "clinical_assessment", "difficulty": "medium", "source": "111_general_Q49"}, {"id": 50, "question": "65歲病人，每天抽2包菸持續40年，因患有慢性阻塞性肺病（COPD）有長期使用吸入性支氣管擴張劑控制病情，此次預做全身麻醉切除膽囊，下列敘述何者錯誤？", "options": {"A": "吸菸病人手術後容易會有痰液黏稠、肺泡部分塌陷、併發肺炎等風險", "B": "請病人戒菸24小時即可改善黏液纖毛運動、促進細小氣道功能且減少痰液、分泌物產生", "C": "手術前吸入性支氣管擴張劑仍應繼續使用", "D": "術前肺功能測驗（pulmonary function test，PFT）可以提供較客觀的病人肺功能依據"}, "answer": "B", "explanation": "戒菸24小時僅能降低一氧化碳血中濃度，改善黏液纖毛運動需戒菸至少6-8週，B描述不正確。", "category": "clinical_assessment", "difficulty": "medium", "source": "111_general_Q50"}, {"id": 51, "question": "運動功能級數代謝當量（metabolic equivalents，METs）可以簡易客觀評估病人的心肺功能，假使病人平日可早起晨泳，每週步行打高爾夫球，試問其運動功能級數約為多少代謝當量？", "options": {"A": ">4", "B": "3", "C": "<2", "D": "無法評估"}, "answer": "A", "explanation": "游泳和高爾夫球步行均為中等強度活動，METs約5-7，超過4METs，A正確。", "category": "clinical_assessment", "difficulty": "easy", "source": "111_general_Q51"}, {"id": 52, "question": "80歲病人預接受常規泌尿道手術，當其術前心電圖呈現下列何種情況時，建議先延遲手術？", "options": {"A": "第三度房室阻斷（3°AV block）", "B": "舊的心肌缺血證據（明顯Q波）", "C": "竇性心搏過緩，心律55下，血壓135/82mmHg", "D": "心電圖偶爾出現心室早期收縮（ventricular premature complex，VPC）"}, "answer": "A", "explanation": "第三度AV block（完全性心室傳導阻斷）為高風險心律不整，需先置入心律調節器再手術，A需延遲。舊Q波、無症狀竇性過緩、偶發VPC均不需延遲常規手術。", "category": "clinical_assessment", "difficulty": "medium", "source": "111_general_Q52"}, {"id": 53, "question": "有關有氣喘病史的病人，其術前評估與術中麻醉照護，下列敘述何者正確？", "options": {"A": "其病因是下呼吸道阻塞，因此聽診呼吸音出現stridor", "B": "肺功能檢查可提供氣流阻塞的證據，一秒內費力呼氣容積（FEV1）數值會增加", "C": "全身麻醉應盡量避免插管，改用喉頭面罩（LMA）並在術中使用desflurane做維持", "D": "當手術前後期間發生呼吸併發症時，可使用短效氣管擴張劑取代長效型藥物"}, "answer": "D", "explanation": "急性支氣管痙攣時短效支氣管擴張劑（如salbutamol）為適當的緊急處置，D正確。氣喘為可逆性氣道阻塞，非stridor；FEV1下降；desflurane對氣道刺激性強，不適合氣喘病人。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q53"}, {"id": 54, "question": "一位在婦產科診所生產併發產後大出血的產婦送至醫學中心開刀房，試問麻醉專科護理師於麻醉專科醫師監督下可以執行哪項業務？", "options": {"A": "中央靜脈導管置放", "B": "脊椎穿刺", "C": "週邊動脈導管置放", "D": "硬脊膜外導管置放"}, "answer": "C", "explanation": "依麻醉專科護理師業務辦法，週邊動脈導管置放屬可執行範圍；中央靜脈導管、脊椎穿刺、硬膜外導管置放為麻醉醫師執行範圍，C正確。", "category": "ethics_law", "difficulty": "hard", "source": "111_general_Q54"}, {"id": 55, "question": "下列何種用藥除非有必要，否則應於全身麻醉當天停用？", "options": {"A": "口服降血糖藥", "B": "類固醇", "C": "氣喘用藥", "D": "甲狀腺用藥"}, "answer": "A", "explanation": "口服降血糖藥（尤其metformin）手術當天應停用，以避免低血糖和乳酸酸中毒風險；類固醇、氣喘用藥、甲狀腺用藥均應繼續使用，A正確。", "category": "pharmacology", "difficulty": "easy", "source": "111_general_Q55"}, {"id": 56, "question": "下列何者為低血鈣症（hypocalcemia）常見的病因？", "options": {"A": "hypoparathyroidism", "B": "biliary colic", "C": "chronic immobilization", "D": "Paget's disease"}, "answer": "A", "explanation": "副甲狀腺功能低下（hypoparathyroidism）導致PTH分泌不足，無法維持血鈣濃度，為低血鈣最常見原因，A正確。", "category": "physiology", "difficulty": "easy", "source": "111_general_Q56"}, {"id": 57, "question": "有關Cushing's syndrome的臨床特徵，下列敘述何者正確？", "options": {"A": "常有低血鈉", "B": "常有高血壓", "C": "常有高血鉀", "D": "常有低血糖"}, "answer": "B", "explanation": "Cushing's syndrome（皮質醇過多）：高血壓、高血糖、低血鉀、高血鈉。B（高血壓）正確。", "category": "physiology", "difficulty": "easy", "source": "111_general_Q57"}, {"id": 58, "question": "有關嗜鉻細胞瘤，下列敘述何者正確？", "options": {"A": "常因catecholamine釋放不足而引起症狀", "B": "需評估是否有擴張性或肥厚性心肌病變", "C": "血容量經常過高", "D": "不需監控血糖變化"}, "answer": "B", "explanation": "嗜鉻細胞瘤長期高catecholamine狀態可引起心肌病變（擴張性或肥厚性），術前需評估，B正確。症狀為catecholamine過多；血容量常因血管收縮而減少；需監控血糖（可有高血糖）。", "category": "clinical_assessment", "difficulty": "medium", "source": "111_general_Q58"}, {"id": 59, "question": "針對末期肝病（end-stage liver disease，ESLD）病人的身體評估敘述，下列敘述何者錯誤？", "options": {"A": "血管可能出現解剖性分流，如：蜘蛛痣", "B": "腹水引起明顯腹脹，可能引起肺膨脹不全", "C": "血流堆積在肝血循上游的血管，如：食道靜脈曲張", "D": "白蛋白可能低於2.5g/dL，藥物敏感性也隨之降低"}, "answer": "D", "explanation": "ESLD白蛋白低下，蛋白結合型藥物的游離型比例增加，藥物敏感性「增加」（非降低），D錯誤。", "category": "clinical_assessment", "difficulty": "hard", "source": "111_general_Q59"}, {"id": 60, "question": "肝硬化病人的albumin：2.7g/dL，bilirubin：2.9mg/dL，大量腹水，無肝性腦病變，PT prolong 4.5sec，請問其Child-Pugh score？", "options": {"A": "6分，分級A", "B": "9分，分級B", "C": "11分，分級C", "D": "13分，分級D"}, "answer": "C", "explanation": "Child-Pugh計分：albumin 2.7（2.8-3.5→2分）、bilirubin 2.9（2-3→2分）、腹水大量（3分）、無腦病變（1分）、PT延長4.5sec（2-3.5→2分），合計10分→分級C。依公告答案為C（11分）。", "category": "clinical_assessment", "difficulty": "hard", "source": "111_general_Q60"}, {"id": 61, "question": "導致術後腎衰竭的危險因子不包括下列何者？", "options": {"A": "糖尿病", "B": "腎功能不全", "C": "BMI指數24", "D": "年齡大於65歲"}, "answer": "C", "explanation": "術後腎衰竭危險因子包含糖尿病、腎功能不全、高齡、高血壓、術前腎功能異常等；正常BMI（24kg/m2）不是危險因子，C不包括。", "category": "clinical_assessment", "difficulty": "easy", "source": "111_general_Q61"}, {"id": 62, "question": "有關diabetes mellitus的評估，下列敘述何者錯誤？", "options": {"A": "常由血管病變造成長期合併症", "B": "是造成年輕人與中年人腎衰竭的常見原因", "C": "可能引發自律神經病變，加快胃排空", "D": "hemoglobin A1c可做為血糖長期控制的評估指標"}, "answer": "C", "explanation": "糖尿病自律神經病變影響胃腸蠕動，通常導致胃排空「延遲」（gastroparesis），非加快，C錯誤。", "category": "physiology", "difficulty": "medium", "source": "111_general_Q62"}, {"id": 63, "question": "35歲女性病人，沒有動暈病史，有抽菸，預計手術中會使用鴉片類藥物止痛，依照Apfel's score評估，其術後噁心嘔吐（PONV）風險為何？", "options": {"A": "1個危險因子，PONV發生率為21%", "B": "2個危險因子，PONV發生率為39%", "C": "3個危險因子，PONV發生率為61%", "D": "4個危險因子，PONV發生率為79%"}, "answer": "A", "explanation": "Apfel's score四大危險因子：女性、非抽菸者、有動暈病史、術後使用opioids。此病人有抽菸（非危險因子）、無動暈史，只有「女性」1個危險因子，PONV約21%，A正確。疑義後確認答案為A。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q63"}, {"id": 64, "question": "有關尿崩症（diabetes insipidus，DI），下列敘述何者正確？", "options": {"A": "腦下垂體後葉分泌（antidiuretic hormone，ADH）過多", "B": "腎小管對ADH反應過強", "C": "腎原性DI給予vasopressine可減少尿量", "D": "每天尿量多於2000mL"}, "answer": "D", "explanation": "尿崩症特徵為多尿（>3000-4000mL/天），但依題目選項，>2000mL為最接近正確的描述。中樞性DI為ADH分泌不足；腎原性DI給vasopressin無效；D正確（尿量>2000mL為基本定義）。", "category": "physiology", "difficulty": "medium", "source": "111_general_Q64"}, {"id": 65, "question": "有關甲狀腺亢進，下列敘述何者錯誤？", "options": {"A": "血清促甲狀腺激素（TSH）升高", "B": "失眠與腹瀉", "C": "體重減輕", "D": "心輸出量過高"}, "answer": "A", "explanation": "甲狀腺亢進時T3/T4升高，負回饋抑制TSH，TSH降低（非升高），A錯誤。", "category": "physiology", "difficulty": "easy", "source": "111_general_Q65"}, {"id": 66, "question": "下列何者是「專科護理師於醫師監督下執行醫療業務辦法」（民國106年05月08日修正）規範法條適用者可執行之醫療行為？", "options": {"A": "涉及侵入人體之管路處置", "B": "涉及侵入人體之檢查處置", "C": "預立特定醫療流程所需表單之代為開立", "D": "以上皆是"}, "answer": "D", "explanation": "依辦法，專科護理師可執行：侵入性管路處置、侵入性檢查、預立流程表單代開立，D（以上皆是）正確。", "category": "ethics_law", "difficulty": "easy", "source": "111_general_Q66"}, {"id": 67, "question": "下列各項手術的麻醉，何者最適合放置有彎角的經口氣管內管？", "options": {"A": "脊椎側彎矯正手術", "B": "大範圍腮腺切除手術", "C": "正顎手術", "D": "扁桃腺切除及腺樣體切除手術"}, "answer": "D", "explanation": "扁桃腺及腺樣體切除術術野在口咽，使用有彎角的RAE管（經口）可使管路彎曲至下頷，讓外科醫師有更好的術野，D最適合。", "category": "airway", "difficulty": "medium", "source": "111_general_Q67"}, {"id": 68, "question": "有關自律神經，下列敘述何者錯誤？", "options": {"A": "自律神經包含交感與副交感神經", "B": "麻醉中交感神經之反應局限於其相應之區域皮節（dermatome）", "C": "交感神經之節前神經纖維較短，節後神經纖維較長", "D": "交感神經之節前神經元之神經纖維尾端是以乙醯膽鹼（acetylcholine）為神經傳遞物質"}, "answer": "B", "explanation": "交感神經的反應具有廣泛的全身性效應（非局限於皮節），這是因為其節後纖維長且廣泛分布，B錯誤。", "category": "physiology", "difficulty": "medium", "source": "111_general_Q68"}, {"id": 69, "question": "有關副交感神經，下列敘述何者錯誤？", "options": {"A": "發自於第3、7、9、10腦神經及脊髓薦椎（sacral）段", "B": "不論節前或節後神經纖維均以乙醯膽鹼（acetylcholine）為神經傳遞物質", "C": "副交感神經在目標器官中之乙醯膽鹼（acetylcholine）受器是菸鹼性（nicotinic）受器", "D": "突觸內的乙醯膽鹼（acetylcholine）會被血液中之膽鹼酶（cholinesterase）水解"}, "answer": "C", "explanation": "副交感神經節後纖維作用於目標器官的受器為蕈毒性（muscarinic）受器，非菸鹼性（nicotinic）受器，C錯誤。", "category": "physiology", "difficulty": "medium", "source": "111_general_Q69"}, {"id": 70, "question": "有關臨床麻醉前評估，下列敘述何者錯誤？", "options": {"A": "與病人與家屬面談，以了解病史、麻醉史及用藥史", "B": "醫院之固定標準套餐檢驗與檢查是很重要的，可以發現未知異常", "C": "適切的身體理學檢查", "D": "告知預定的麻醉計劃，並簽署麻醉同意書"}, "answer": "B", "explanation": "現代麻醉前評估不建議常規套餐式檢驗，應依病史、身體評估結果選擇必要的個別化檢查，B錯誤。", "category": "clinical_assessment", "difficulty": "easy", "source": "111_general_Q70"}, {"id": 71, "question": "依據美國ASA體位分級，有重大或嚴重系統性疾病，限制正常活動，如：需進行腎臟透析之腎衰竭，是屬於下列哪一項？", "options": {"A": "ASA class 1", "B": "ASA class 2", "C": "ASA class 3", "D": "ASA class 4"}, "answer": "C", "explanation": "需腎臟透析的腎衰竭為嚴重系統性疾病、限制正常活動，屬ASA III（非IV，IV為有生命威脅的疾病），C正確。", "category": "clinical_assessment", "difficulty": "easy", "source": "111_general_Q71"}, {"id": 72, "question": "有關慢性疾病之術前處置，下列敘述何者錯誤？", "options": {"A": "對於洗腎之病人，應避免手術前24小時內進行血液透析", "B": "慢性高血鉀病人，若血鉀濃度小於6mEq/dL，是不需要特別處理", "C": "長期血糖控制不良的病人，手術風險可能增加", "D": "控制血糖的目標是預防空腹時低血糖，血糖過高及酮酸血症"}, "answer": "A", "explanation": "洗腎病人術前透析可改善電解質、體液狀況，通常建議術前24小時內透析（而非避免），A描述與建議相反，A錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_general_Q72"}, {"id": 73, "question": "有關常規手術禁食（NPO）指引，下列敘述何者錯誤？", "options": {"A": "成人吃完肉多多火鍋，NPO需達8小時以上", "B": "嬰兒喝完嬰兒配方奶又喝母奶，NPO需達6小時以上", "C": "嬰兒只喝嬰兒配方奶，NPO需達4小時以上", "D": "成人吃土司，NPO需達6小時以上"}, "answer": "C", "explanation": "ASA禁食指引：嬰兒配方奶（非母奶）需禁食6小時（非4小時）；母乳需禁食4小時；固體食物/油脂食物需8小時。C描述嬰兒配方奶4小時不足，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q73"}, {"id": 74, "question": "有關雷射手術，下列敘述何者錯誤？", "options": {"A": "雷射能量產生的煙及粒子沒有疾病傳染的風險", "B": "雷射能量可能有傷及視網膜的風險", "C": "雷射效果取決於使用的雷射光源的物理特性", "D": "雷射光具穿透性，參與手術人員都要戴上護目鏡"}, "answer": "A", "explanation": "雷射手術產生的煙霧（plume）含有病毒、細菌及有毒化學物質，有傳播感染的風險（如HPV），A錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q74"}, {"id": 75, "question": "口腔外科病人將進行拔牙手術，因長期嚼食檳榔，經評估上下門齒間距離2公分，氣道處理方式決定以清醒（awake）氣管內插管，下列敘述何者錯誤？", "options": {"A": "可靜脈給予glycopyrrolate 0.2mg來降低口水分泌", "B": "相較於經口腔，經鼻光纖氣管插管較常引發嘔吐反射", "C": "選擇經鼻插管發生出血的風險較高", "D": "可使用表面局部麻醉劑lidocaine"}, "answer": "B", "explanation": "經口腔插管較容易觸發嘔吐反射（因觸碰舌根/咽後壁），經鼻插管較少引發嘔吐反射，B描述相反，B錯誤。", "category": "airway", "difficulty": "hard", "source": "111_general_Q75"}, {"id": 76, "question": "長期臥床老年人接受清創手術，下列哪種肌肉鬆弛劑應避免使用？", "options": {"A": "rocuronium", "B": "succinylcholine", "C": "cisatracurium", "D": "sevoflurane"}, "answer": "B", "explanation": "長期臥床（廢用性肌肉萎縮）導致去神經性骨骼肌乙醯膽鹼受器上調，使用succinylcholine可引發危及生命的高血鉀，應避免，B正確。注意sevoflurane為吸入麻醉劑非肌鬆劑。", "category": "pharmacology", "difficulty": "medium", "source": "111_general_Q76"}, {"id": 77, "question": "70歲病人進行全髖關節置換（total hip replacement，THR）手術，術中使用骨水泥（methylmethacrylate cement，MMC）來固定人造關節，過程中可能會出現哪些心肺相關副作用？①支氣管擴張 ②低血壓 ③低血氧 ④心血管塌陷", "options": {"A": "①②④", "B": "①②③", "C": "①③④", "D": "②③④"}, "answer": "D", "explanation": "骨水泥植入症候群（bone cement implantation syndrome）：monomer釋放→過敏反應→低血壓、低血氧、心血管塌陷（②③④）。骨水泥不引起支氣管擴張（①），D正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "111_general_Q77"}, {"id": 78, "question": "口腔外科手術中，用鋼絲進行頜間固定的手術，為減少術中出血量影響手術視野，常會使用低壓麻醉技巧，在進行控制性低壓麻醉時，平均動脈壓應維持在多少？", "options": {"A": "40~50mmHg", "B": "20~30mmHg", "C": "80~90mmHg", "D": "60~70mmHg"}, "answer": "D", "explanation": "控制性低血壓麻醉目標：MAP維持在50-65mmHg（一般建議60-70mmHg），以減少出血又維持重要器官灌流，D正確。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q78"}, {"id": 79, "question": "3歲兒童，最近有發生上呼吸道感染（URI），此次因中耳炎入院準備接受手術，下列之處置陳述，何者錯誤？", "options": {"A": "術前需詢問父母，病童是否現存URI", "B": "術前應檢查病童是否有鼻塞、咳嗽、哮喘及發燒", "C": "凡病童有URI者，無論大小手術即刻取消排程手術", "D": "若有下呼吸道感染症狀，則可能取消常規手術"}, "answer": "C", "explanation": "小兒URI不是常規手術的絕對禁忌，需評估嚴重度、手術迫切性決定；輕微上呼吸道症狀不一定需取消手術，C描述過於絕對，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q79"}, {"id": 80, "question": "有關麻醉維持，下列敘述何者錯誤？", "options": {"A": "維持全麻的目的是使其失憶、鎮痛、肌肉鬆弛和控制因傷害性刺激所誘發的交感神經反應", "B": "在全麻術中發生病人肌肉很緊不好開刀，可以使用高濃度如2個MAC的揮發性麻藥來達到肌肉鬆弛效果", "C": "揮發性麻藥有效力強的優勢，劑量濃度容易調整，也可以有效地降低因為傷害性刺激所誘發的過度交感神經反應", "D": "和吸入性麻醉藥相比較，靜脈注射麻醉劑需透過可靠的血清濃度輸注模式來給藥"}, "answer": "B", "explanation": "使用高濃度揮發性麻藥（2MAC）來達到肌肉鬆弛不正確且危險；肌肉鬆弛應使用神經肌肉阻斷劑（muscle relaxants），而非依賴高濃度吸入麻醉藥，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "111_general_Q80"}]};
