const DATA_113_ADVANCED = {"meta": {"year": 113, "role": "nurse", "subject": "advanced", "subject_name": "進階專科護理", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "下列何者為登革熱感染常見之抽血檢查結果？", "options": {"A": "白血球增加", "B": "血小板減少", "C": "血清白蛋白上升", "D": "紅血球沉降速率下降"}, "answer": "B", "explanation": "登革熱典型抽血：白血球減少、血小板減少（出血傾向）、血比容上升。血小板減少為特徵性發現，B正確。", "category": "general_nursing", "difficulty": "easy", "source": "113_anesthesia_Q1"}, {"id": 2, "question": "下列何者最可能是高血鉀病人的心電圖（lead II）？（圖示四種心電圖波形）", "options": {"A": "波形A", "B": "波形B", "C": "波形C", "D": "波形D"}, "answer": "C", "explanation": "高血鉀ECG特徵：高尖T波（peaked T waves）→ PR延長→ QRS增寬→ 正弦波→ VF。圖示C顯示典型高尖T波和QRS增寬特徵，C正確。", "category": "monitoring", "difficulty": "medium", "source": "113_anesthesia_Q2", "image": "113_anesthesia_Q2.png", "image_caption": "圖：高血鉀心電圖（lead II）四個波形選項 A／B／C／D"}, {"id": 3, "question": "低血鈉除了評估病人的體液狀態外，主要還可以用哪3項檢驗數據來協助鑑別診斷？①尿液鈉離子濃度 ②尿液滲透壓 ③血清鉀離子濃度 ④血清滲透壓", "options": {"A": "①②③", "B": "②③④", "C": "①②④", "D": "①③④"}, "answer": "C", "explanation": "低血鈉鑑別診斷三大檢驗：①尿液鈉離子（<20mEq/L為腎外流失）、②尿液滲透壓（高=SIADH）、④血清滲透壓（確認真性低血鈉）。血清鉀離子非主要鑑別工具，C（①②④）正確。", "category": "physiology", "difficulty": "hard", "source": "113_anesthesia_Q3"}, {"id": 4, "question": "35歲男性病人，昨天剛入院，主訴發燒和疲勞已超過4週，體溫多次超過38.3°C，絕對嗜中性白血球數目250/mm3，之前曾看過2次門診，仍無法確認發燒原因，血液培養為陰性。病人最有可能是下列何種不明原因發燒（fever of unknown origin，FUO）？", "options": {"A": "neutropenic FUO", "B": "hospital-associated FUO", "C": "HIV-associated FUO", "D": "viral infection FUO"}, "answer": "A", "explanation": "Neutropenic FUO定義：ANC<500/mm3（此病人250/mm3）、體溫>38.3°C持續、原因未明。A最符合。", "category": "general_nursing", "difficulty": "medium", "source": "113_anesthesia_Q4"}, {"id": 5, "question": "關於體溫過高的敘述，下列何者正確？", "options": {"A": "體溫至39°C可定義為hyperpyrexia", "B": "體溫超過41.5°C常見於中樞神經系統出血病人", "C": "發燒可透過肌肉和腎臟的代謝活動散熱", "D": "acetaminophen可緩解熱急症（heat stroke）之高燒"}, "answer": "B", "explanation": "Hyperpyrexia定義>41°C（或>41.5°C），常見於CNS出血、惡性高熱等，B正確。Heat stroke（熱急症）為非感染性體溫調節失常，acetaminophen無效；發燒主要透過皮膚（流汗、輻射）散熱。", "category": "physiology", "difficulty": "medium", "source": "113_anesthesia_Q5"}, {"id": 6, "question": "65歲男性病人，有慢性胃炎和血小板低下病史，此次因上呼吸道感染引起發燒前來就診，體溫達到38.5°C。下列何種退燒藥物較合適？", "options": {"A": "aspirin", "B": "acetaminophen", "C": "ibuprofen", "D": "naproxen"}, "answer": "B", "explanation": "有慢性胃炎（避免NSAIDs傷胃黏膜）和血小板低下（避免NSAIDs抑制血小板）的病人，acetaminophen為最安全的退燒藥選擇，B正確。", "category": "pharmacology", "difficulty": "easy", "source": "113_anesthesia_Q6"}, {"id": 7, "question": "40歲男性病人，主訴持續性頭痛、發燒及頸部僵硬已持續2天，腦脊髓液檢查結果為外觀混濁、壓力280mmH2O、白血球計數10000/mm3且以多核球為主、葡萄糖20mg/dL、蛋白質180mg/dL、血糖值正常。其最可能的診斷為何？", "options": {"A": "bacterial meningitis", "B": "tuberculous meningitis", "C": "fungal meningitis", "D": "viral meningitis"}, "answer": "A", "explanation": "細菌性腦膜炎典型CSF：混濁、壓力高、WBC高以PMN為主、葡萄糖極低（<40mg/dL）、蛋白質高。此病人全符合，A正確。", "category": "general_nursing", "difficulty": "medium", "source": "113_anesthesia_Q7"}, {"id": 8, "question": "接受副甲狀腺切除術後，出現Chvostek's sign及Trousseau's sign的主要原因為下列何者？", "options": {"A": "低血鉀", "B": "高血鉀", "C": "低血鈣", "D": "高血鈣"}, "answer": "C", "explanation": "Chvostek's sign（叩臉）和Trousseau's sign（壓氣囊引起腕足痙攣）為低血鈣的徵象，副甲狀腺切除後PTH驟降→低血鈣，C正確。", "category": "physiology", "difficulty": "easy", "source": "113_anesthesia_Q8"}, {"id": 9, "question": "23歲女性因嘔吐及呼吸急促被送至急診，到院時初始血壓90/48mmHg、脈搏135次/分、SpO2 97%、血糖585mg/dL、血鈉124mEq/L、血鉀4.6mEq/L、動脈血液氣體分析為pH值7.14、PaCO2 22mmHg、HCO3- 8mmol/L。下列評估或處置何者正確？", "options": {"A": "若病人在一般病房住院治療，應嚴密的監測與追蹤", "B": "若該病人為糖尿病酮酸血症，則其動脈血之anion gap應正常", "C": "此病人的治療應常規給予normal saline、regular insulin及NaHCO3", "D": "當病人血糖經胰島素輸注治療後降到250-300mg/dL時，應立即停止輸注胰島素"}, "answer": "A", "explanation": "此病人為DKA（高血糖、高AG代謝性酸中毒、低血壓）需ICU或高度監測；DKA的AG升高（非正常）；NaHCO3通常不常規給予；血糖降至250mg/dL時應加糖水繼續給胰島素。A（嚴密監測）是正確方向，依公告答案A。", "category": "crisis", "difficulty": "hard", "source": "113_anesthesia_Q9"}, {"id": 10, "question": "癌症病人使用fentanyl貼片，主要透過何種機制產生止痛作用？", "options": {"A": "抑制神經細胞的鈉離子通道，降低神經興奮性", "B": "阻斷神經肌肉接受器的乙醯膽鹼釋放", "C": "刺激GABA受體，增加抑制性神經傳導", "D": "作用於中樞μ-鴉片受體，產生鎮痛效果"}, "answer": "D", "explanation": "Fentanyl為μ-opioid receptor agonist，作用於中樞（大腦、脊髓）的μ受體產生鎮痛效果，D正確。", "category": "pharmacology", "difficulty": "easy", "source": "113_anesthesia_Q10"}, {"id": 11, "question": "為安寧緩和醫療的病人進行身體評估時，下列敘述何者正確？", "options": {"A": "喉頭持續出現「咕嚕」聲，是因喉頭肌肉鬆弛，無法有效吞口水", "B": "以PAIN評估整體痛，「N」指的是non-pharmacological management", "C": "一般情況下，腹水超過300mL才能由超音波檢測出", "D": "陳施氏呼吸型態（Cheyne-Stokes）是呼吸淺快，之後逐漸變慢加深，又逐漸變淺快"}, "answer": "A", "explanation": "Death rattle（咕嚕聲）是因喉頭肌肉鬆弛無法清除分泌物，A正確。PAIN的N為Number of pain medications；超音波可偵測到<100mL腹水；Cheyne-Stokes為漸深漸淺再呼吸暫停的週期型。", "category": "general_nursing", "difficulty": "medium", "source": "113_anesthesia_Q11"}, {"id": 12, "question": "68歲末期癌症病人經常抱怨骨頭痛，夜間出現間歇性疼痛，疼痛指數由4分加劇到8分。下列何種輔助止痛藥物對此病人最合適？", "options": {"A": "三環類抗憂鬱藥（tricyclic antidepressants）", "B": "降鈣素（calcitonin）", "C": "抗癲癇藥（anticonvulsants）", "D": "類固醇（corticosteroids）"}, "answer": "B", "explanation": "骨癌疼痛的輔助止痛：降鈣素（calcitonin）可抑制破骨細胞活性、減少骨痛，對骨轉移性疼痛特別有效，B最合適。", "category": "pharmacology", "difficulty": "hard", "source": "113_anesthesia_Q12"}, {"id": 13, "question": "80歲女性為長期糖尿病、高血壓及中風不良於行之病人，因急性腹痛來急診就醫，其平躺之腹部X光如圖（一），另一張左側躺之腹部X光檢查如圖（二），下列敘述何者正確？", "options": {"A": "推測有腹腔積水，可能為腹腔腫瘤導致", "B": "推測有腹部脹氣，可能為腸阻塞導致", "C": "推測有腹腔積氣，可能為腹腔內中空臟器破裂導致", "D": "為正常腹部影像，只須持續追蹤"}, "answer": "C", "explanation": "左側躺腹部X光若出現膈肌下遊離氣體（free air），高度懷疑腹腔內中空臟器穿孔，C正確。", "category": "crisis", "difficulty": "hard", "source": "113_anesthesia_Q13", "image": "113_anesthesia_Q13.png", "image_caption": "圖（一）平躺位腹部 X 光；圖（二）左側躺位腹部 X 光"}, {"id": 14, "question": "68歲男性肺癌病人化學治療後第2天上午出現劇烈嘔吐，當晚主訴左胸疼痛，胸部X光疑似左側肋膜積液，胸腔穿刺引流液檢查為WBC 1500/mm3（lymphocyte 8%、neutrophil 80%）、LDH 270U/L、glucose 40mg/dL、amylase 380U/L。下列處置何者最適當？", "options": {"A": "給予抗結核藥物治療", "B": "胸水引流與禁食", "C": "給予舌下NTG服用緩解疼痛", "D": "給予利尿劑緩解肋膜積液"}, "answer": "B", "explanation": "嘔吐後左胸痛，胸水含高amylase（380U/L）→食道穿孔（Boerhaave syndrome）或食道破裂，需立即胸水引流（控制感染）和禁食（避免繼續污染），B正確。", "category": "crisis", "difficulty": "hard", "source": "113_anesthesia_Q14"}, {"id": 15, "question": "關於急性冠心症的實驗室檢驗，下列敘述何者最不適當？", "options": {"A": "troponin T對偵測心肌細胞壞死具有高度的敏感度與特異度", "B": "CK-MB是作為初步診斷NSTEMI的良好檢測指標", "C": "在急性冠心症的病人BNP的升高與較差的臨床預後相關", "D": "CK-MB可用於追蹤偵測心肌梗塞後的再發性心肌缺血"}, "answer": "B", "explanation": "CK-MB已逐漸被high-sensitivity troponin取代作為初步診斷指標，CK-MB對NSTEMI敏感度不如troponin，B最不適當。", "category": "general_nursing", "difficulty": "medium", "source": "113_anesthesia_Q15"}, {"id": 16, "question": "圖（三）顯示的心電圖波形是何種心律不整？", "options": {"A": "一度房室傳導阻滯（first degree AV block）", "B": "Morbitz type I二度房室傳導阻滯（second degree AV block）", "C": "Morbitz type II二度房室傳導阻滯（second degree AV block）", "D": "完全房室傳導阻滯（complete AV block）"}, "answer": "D", "explanation": "依公告答案D（complete AV block，第三度房室傳導阻滯）。圖中可見規律寬QRS節律、P波與QRS各自獨立、無傳導關係，符合完全房室傳導阻滯特徵。", "category": "monitoring", "difficulty": "medium", "source": "113_anesthesia_Q16", "image": "113_anesthesia_Q16.png", "image_caption": "圖（三）：完全房室傳導阻滯（complete AV block）心電圖"}, {"id": 17, "question": "28歲女性患有第1型糖尿病，懷孕28週，因為持續嘔吐被送到急診，生命徵象穩定，抽血檢查血糖200mg/dL，動脈血液氣體分析結果為pH值6.9、HCO3- 12mmol/L，血清酮體（ketone body）8mmol/L。下列評估與處置之敘述何者最適當？", "options": {"A": "血糖值小於300mg/dL，可排除是酮酸中毒", "B": "第三產期孕婦糖尿病酮酸中毒應該立刻引產", "C": "孕婦糖尿病酮酸中毒不可矯正pH值", "D": "孕婦糖尿病酮酸中毒的胰島素治療原則與非孕婦無異"}, "answer": "D", "explanation": "孕婦DKA的胰島素治療原則與非孕婦相同；孕婦DKA可在較低血糖（200mg/dL）時發生（eugylcemic DKA）；不必立刻引產；嚴重酸中毒可考慮矯正，D正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q17"}, {"id": 18, "question": "關於肝功能的實驗室檢驗，下列敘述何者正確？①α-fetoprotein是由胚胎肝細胞所產生，對肝細胞癌的敏感度及特異度很高（90%以上）②在溶血性貧血的病人膽色素（bilirubin）升高主要是以直接型（direct）膽色素為主③alkaline phosphatase（ALP）除了在肝臟外，也可在腎臟、腸道及骨頭的組織中偵測到④aspartate aminotransferase（AST）及alanine aminotransferase（ALT）在肝細胞損傷時均會升高，在橫紋肌溶解也可偵測到AST升高", "options": {"A": "①②", "B": "②③", "C": "③④", "D": "①④"}, "answer": "C", "explanation": "③ALP確實存在於肝臟、腎臟、腸道、骨頭；④AST/ALT在肝損傷均升高，且AST在橫紋肌溶解也可升高（非特異性），③④均正確，C正確。①AFP敏感度和特異度並非90%以上；②溶血性貧血以間接型（indirect）膽色素升高為主。", "category": "general_nursing", "difficulty": "hard", "source": "113_anesthesia_Q18"}, {"id": 19, "question": "中年男性心悸入急診，脈搏154次/分、血壓80/50mmHg、呼吸20次/分、意識E3M6V5，心電圖如圖（四），下列處置何者正確？", "options": {"A": "病人心跳過快，應先給予靜脈注射乙型阻斷劑", "B": "心電圖為PSVT，應先給予adenosine 6mg快速靜脈推注", "C": "應先給予強心藥物（inotropic agents）", "D": "應先進行雙向電擊器心臟同步整流120焦耳"}, "answer": "D", "explanation": "血流動力學不穩定（BP 80/50）的快速心律不整，首選「同步電整流」，D正確。血流動力學不穩定不應先嘗試藥物治療，直接電整流。", "category": "crisis", "difficulty": "medium", "source": "113_anesthesia_Q19", "image": "113_anesthesia_Q19.png", "image_caption": "圖（四）：快速規律心律約 154 次／分之心電圖"}, {"id": 20, "question": "年輕男性跳水後頭部撞擊泳池底，意識清醒、前額擦傷、頸部疼痛、乳頭以下麻木無力，血壓70/40mmHg、心跳40次/分、呼吸16次/分，皮膚紅潤。其休克最可能的原因為何？", "options": {"A": "顱內腦幹位置出血抑制心血管系統", "B": "交感神經功能下降引起神經性休克", "C": "胸腔內出血造成低血容休克", "D": "溺水心肌缺氧導致心因性休克"}, "answer": "B", "explanation": "乳頭以下麻木無力（T4以上脊髓損傷）、低血壓、心跳過慢（交感神經切斷）、皮膚紅潤（血管擴張）→典型神經性休克（高位脊髓損傷），B正確。", "category": "crisis", "difficulty": "medium", "source": "113_anesthesia_Q20"}, {"id": 21, "question": "因車禍導致大腿骨開放性骨折而接受手術的病人，當醫師正在縫合傷口時，專科護理師發現病人血壓降到65/40mmHg、CVP 20cmH2O，EKG呈現ST elevation，經測量得心輸出量下降，全身性血管阻力（SVR）上升，其最可能的診斷為何？", "options": {"A": "敗血性休克", "B": "低血容性休克", "C": "心因性休克", "D": "過敏性休克"}, "answer": "C", "explanation": "CO↓+CVP↑+SVR↑+ST elevation→心因性休克（心肌功能障礙，如梗塞）。低血容CVP↓；敗血性SVR↓；過敏性SVR↓，C正確。", "category": "crisis", "difficulty": "hard", "source": "113_anesthesia_Q21"}, {"id": 22, "question": "心臟衰竭合併低血壓病人，使用下列何種升壓劑無法有效增加心輸出量？", "options": {"A": "vasopressin", "B": "dobutamine", "C": "norepinephrine", "D": "dopamine"}, "answer": "A", "explanation": "Vasopressin（血管加壓素）主要為純血管收縮劑，增加SVR但不增加心肌收縮力，對心因性休克的心輸出量無正面效益，A無法有效增加CO。", "category": "pharmacology", "difficulty": "medium", "source": "113_anesthesia_Q22"}, {"id": 23, "question": "疑似肺動脈栓塞病人，呼吸喘及胸悶且有休克現象，下列評估或處置之敘述何者正確？", "options": {"A": "使用血管加壓藥物是絕對禁忌症", "B": "不適合大量輸液，要謹慎評估體液情況", "C": "最可能是大面積肺栓塞造成的分佈性休克", "D": "血栓溶解劑及手術取栓都是可行的治療方式"}, "answer": "D", "explanation": "大面積PE（massive PE）伴休克的治療選項包括溶栓（如tPA）和外科取栓，D正確。血管加壓藥不是絕對禁忌；PE伴右心衰時輸液需謹慎但非不適合；PE為阻塞性休克非分佈性。", "category": "crisis", "difficulty": "hard", "source": "113_anesthesia_Q23"}, {"id": 24, "question": "全家4人都一氧化碳中毒，何者最可能需要高壓氧治療？", "options": {"A": "50歲父親，頭暈頭痛，COHb 10%", "B": "78歲祖母，全身無力、糖尿病史，COHb 18%", "C": "25歲女兒，懷孕20週，COHb 18%", "D": "18歲兒子，頭暈頭痛、全身無力，COHb 20%"}, "answer": "C", "explanation": "高壓氧適應症：COHb>25%、失去意識、神經症狀、懷孕（胎兒CO清除較慢）、心臟問題等。孕婦即使COHb較低也是優先適應症，C最需要高壓氧。", "category": "crisis", "difficulty": "medium", "source": "113_anesthesia_Q24"}, {"id": 25, "question": "施行膝關節全置換術病人接受術後adductor canal block，下列敘述何者錯誤？", "options": {"A": "阻斷的隱神經（saphenous nerve）是股神經後支的感覺分支", "B": "相較於股神經阻斷會增加術後股四頭肌無力", "C": "和膕動脈與膝關節後囊阻斷一起使用，可以增加止痛效果", "D": "推注藥物後如有嘴麻、金屬味，要考慮血管內注射"}, "answer": "B", "explanation": "Adductor canal block相較於femoral nerve block，對股四頭肌肌力的影響「更小」（非更大），保留股四頭肌功能是其優點，B描述「增加無力」相反，B錯誤。", "category": "regional", "difficulty": "hard", "source": "113_anesthesia_Q25"}, {"id": 26, "question": "圖（五）為血栓彈力圖（thrombelastography，TEG）檢驗的結果，請選出最合適的答案：", "options": {"A": "fibrinolysis", "B": "heparin effect", "C": "hypercoagulation", "D": "hemodilution"}, "answer": "A", "explanation": "圖中LY30約53%（正常0-8%）明顯升高，代表纖維蛋白溶解亢進（fibrinolysis），雖然R/K/Angle在正常範圍但LY30顯著上升提示纖溶活性增加。依公告答案A（fibrinolysis）。", "category": "monitoring", "difficulty": "hard", "source": "113_anesthesia_Q26", "image": "113_anesthesia_Q26.png", "image_caption": "圖（五）：血栓彈力圖（TEG）波形"}, {"id": 27, "question": "30歲重症肌無力病人，因腦部動脈瘤破裂至血管攝影室接受栓塞手術，下列麻醉處置何者錯誤？", "options": {"A": "氣體麻醉藥物常可達到足夠肌肉鬆弛效果", "B": "pyridostigmine可能增加succinylcholine的作用持續期", "C": "插管時使用succinylcholine應減少劑量", "D": "可使用sugammadex逆轉rocuronium"}, "answer": "C", "explanation": "重症肌無力對succinylcholine反應不一，有些對其過敏（用量需增加），而非減少，C描述減少劑量不正確，C錯誤。（MG對non-depolarizing NMB需減量；對succinylcholine反應多樣）", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q27"}, {"id": 28, "question": "關於支氣管鏡檢查的麻醉敘述，下列何者正確？", "options": {"A": "使用短效嗎啡類藥物減少刺激", "B": "盡量選擇小一點的氣管內管", "C": "不可使用laryngeal mask", "D": "檢查完之後可立刻進食"}, "answer": "A", "explanation": "支氣管鏡麻醉常使用短效opioid（如remifentanil）抑制氣道反射；應選擇夠大的ETT以容納支氣管鏡；可使用LMA；不可立刻進食（局麻未退）。A正確。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q28"}, {"id": 29, "question": "關於成人急性缺血性腦中風取栓治療（endovascular therapy，EVT）之麻醉照護，下列敘述何者錯誤？", "options": {"A": "血糖維持在140-180mg/dL之間", "B": "建議低溫治療，維持體溫介於30℃-35℃", "C": "血管打通前收縮壓應控制在140-180mmHg之間", "D": "train-of-four控制在one to two twitches之間"}, "answer": "B", "explanation": "急性缺血性中風EVT目前不建議常規低溫治療（低溫可能有害），應維持正常體溫，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q29"}, {"id": 30, "question": "關於30歲病人接受電痙攣療法（electroconvulsive therapy，ECT）的麻醉考量，下列敘述何者錯誤？", "options": {"A": "為了避免病人緊張，麻醉前應給予midazolam", "B": "與etomidate相比，propofol產生seizures的時間較短", "C": "合併使用ketamine與propofol可減少使用劑量及降低副作用", "D": "術後發生頭痛，可給予acetaminophen或ibuprofen緩解"}, "answer": "A", "explanation": "ECT麻醉前通常避免benzodiazepines（包括midazolam），因其抗癲癇作用會縮短痙攣時間，降低ECT療效，A錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q30"}, {"id": 31, "question": "關於術中監測靜脈空氣栓塞（venous air embolism）的敏感度排列，下列何者正確？①precordial doppler ②transesophageal echocardiography ③end-tidal carbon dioxide ④central venous pressure", "options": {"A": "①＞②＞③＞④", "B": "②＞③＞④＞①", "C": "②＞①＞③＞④", "D": "③＞②＞①＞④"}, "answer": "C", "explanation": "VAE監測敏感度：TEE（②）>precordial doppler（①）>EtCO2（③）>CVP（④），C（②>①>③>④）正確。", "category": "monitoring", "difficulty": "hard", "source": "113_anesthesia_Q31"}, {"id": 32, "question": "體重70kg的65歲病人，接受麻醉逆行性膽道攝影，術中給予midazolam 2mg、propofol 180mg、alfentanil 4mg等藥物，檢查時間約40分鐘，到恢復室1小時後心跳35次/分、呼吸6次/分、瞳孔縮小、嗜睡叫不醒及對疼痛刺激反應差。針對此症狀，下列何種藥物最為適當？", "options": {"A": "naloxone", "B": "neostigmine", "C": "nalbuphine", "D": "flumazenil"}, "answer": "A", "explanation": "alfentanil 4mg對70kg老年病人劑量偏高，症狀（瞳孔縮小、呼吸抑制、嗜睡）典型opioid過量表現，naloxone（opioid拮抗劑）為首選，A正確。", "category": "pharmacology", "difficulty": "medium", "source": "113_anesthesia_Q32"}, {"id": 33, "question": "關於半身麻醉需要的麻醉高度，下列敘述何者錯誤？", "options": {"A": "hip至少T10", "B": "testis至少L1", "C": "low intra-abdominal至少T6", "D": "lower extremities至少T12"}, "answer": "送分", "explanation": "本題送分。半身麻醉高度：hip手術T10-12；testis感覺神經T10（非L1）；low intra-abdominal T4-6；lower extremities T12。B（testis至少L1）可能錯誤，但本題送分。", "category": "regional", "difficulty": "hard", "source": "113_anesthesia_Q33"}, {"id": 34, "question": "關於腹腔鏡手術病人的呼吸生理變化，下列敘述何者正確？", "options": {"A": "尖峰吸氣壓力減少", "B": "動脈二氧化碳分壓下降", "C": "肺塌陷與分流下降", "D": "呼吸順應性下降"}, "answer": "D", "explanation": "腹腔鏡氣腹：腹內壓升高→膈肌上移→FRC下降→肺順應性下降、氣道壓升高、CO2吸收→PaCO2升高、肺塌陷增加，D（順應性下降）正確。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q34"}, {"id": 35, "question": "有高血壓、氣喘的女性病人，因子宮肌瘤需進行腹腔鏡手術，麻醉維持期FiO2 50%，出現低血氧，下列敘述何者錯誤？", "options": {"A": "氣道尖峰壓力採肺泡再擴張術（recruitment maneuver），維持20cmH2O 20至30秒", "B": "增加呼吸頻率，而不是潮氣量，以增加每分鐘通氣量並補償CO2吸收", "C": "聽診雙側呼吸音以排除支氣管內插管和支氣管痙攣", "D": "調高FiO2，增加吸氣與呼氣（I：E）的比率，調整PEEP來改善"}, "answer": "A", "explanation": "Recruitment maneuver通常維持30-40cmH2O持續30-40秒（不是20cmH2O），A描述壓力不足，A錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q35"}, {"id": 36, "question": "體重50kg的急診病人，診斷為胃穿孔，預計進行緊急剖腹探查手術，術前已出現敗血性休克，對於血流動力學不穩定的病人，關於麻醉誘導藥物之選擇，下列何者最適當？", "options": {"A": "propofol 2mg/kg＋rocuronium 1.2mg/kg", "B": "etomidate 0.2mg/kg＋rocuronium 1.2mg/kg", "C": "propofol 2mg/kg＋cisatracurium 0.1mg/kg", "D": "ketamine 2mg/kg＋pancuronium 0.04mg/kg"}, "answer": "B", "explanation": "血流動力學不穩定：etomidate對心血管抑制最小（首選誘導劑）；rocuronium 1.2mg/kg為RSI劑量（起效快）；B最適當。Propofol加重低血壓；cisatracurium起效慢；pancuronium起效慢。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q36"}, {"id": 37, "question": "術後訪視全身麻醉插管病人，病人主訴咽喉疼痛、聲音沙啞，僅能出現氣音，喝水出現嗆咳。經評估呼吸狀況未出現費力呼吸，下列何者為最可能發生的術後併發症？", "options": {"A": "聲帶麻痺", "B": "會厭炎", "C": "喉頭痙攣", "D": "咽峽炎"}, "answer": "A", "explanation": "聲音沙啞、氣音（aphonia）、嗆咳（aspiration）但呼吸不費力→單側聲帶麻痺（recurrent laryngeal nerve損傷），為插管術後可能發生的併發症，A正確。", "category": "airway", "difficulty": "medium", "source": "113_anesthesia_Q37"}, {"id": 38, "question": "關於腎臟移植病人的麻醉照護，下列敘述何者錯誤？", "options": {"A": "評估侵入性監測利弊與導管置入相關敗血症之風險", "B": "胃排空時間常會延遲", "C": "尿量可作為直接監測指標，吻合後使用mannitol和furosemide進行利尿", "D": "應優先使用N/S，因大量lactated Ringers可引起高氯性代謝性酸中毒"}, "answer": "D", "explanation": "腎移植手術應優先使用乳酸林格氏液（LR），因N/S大量使用反而引起高氯性代謝性酸中毒；LR的電解質組成更接近生理，D描述相反，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q38"}, {"id": 39, "question": "腹腔內大出血病人，術中大量輸血3000mL，疑似發生急性溶血輸血反應，下列敘述何者錯誤？", "options": {"A": "表現為發燒、低血壓、血紅素尿或輸血後Hb持續上升", "B": "應立即停止輸血並迅速核對病人身分與血品種類", "C": "如果必須輸血，使用O型Rh（-）PRBC和AB型FFP", "D": "必要時使用輸液和升壓劑治療低血壓"}, "answer": "A", "explanation": "急性溶血輸血反應：輸血後Hb「持續下降」（溶血）非上升，A描述「持續上升」錯誤，A錯誤。", "category": "crisis", "difficulty": "medium", "source": "113_anesthesia_Q39"}, {"id": 40, "question": "胸腔手術進行單肺通氣（one-lung ventilation，OLV），關於低血氧（hypoxia）處置，下列敘述何者錯誤？", "options": {"A": "提高氧氣吸入濃度至100%", "B": "利用光纖支氣管鏡重新檢視OLV設備", "C": "優化依賴肺的通氣，給予肺泡再擴張術", "D": "增加揮發性麻醉氣體濃度以利肺部氣道擴張"}, "answer": "D", "explanation": "OLV低血氧處置：提高FiO2、確認管位、recruitment maneuver、CPAP於非通氣肺等。增加揮發性麻醉藥濃度會抑制HPV（缺氧性肺血管收縮），加重低血氧，D不適當，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q40"}, {"id": 41, "question": "眼部手術應盡量避免眼內壓力（intraocular pressure，IOP）上升，下列何種處置或藥物不會增加IOP？", "options": {"A": "hypothermia", "B": "hypoxemia", "C": "hypoventilation", "D": "succinylcholine"}, "answer": "A", "explanation": "Hypothermia（低體溫）不會增加IOP（實際上低溫可能降低IOP）；低血氧、高碳酸血症（hypoventilation）、succinylcholine均可升高IOP，A不會增加。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q41"}, {"id": 42, "question": "10歲健康男孩進行斜視（strabismus）手術，術中心跳突然從96次/分降至42次/分，血壓110/75mmHg接著下降至76/40mmHg，下列何者為最適當的初步處置？", "options": {"A": "首先關掉或調降麻醉藥物劑量", "B": "立即靜脈注射atropine或glycopyrrolate治療", "C": "馬上請眼科醫師於眼部肌肉局部注射lidocaine", "D": "請眼科醫師先暫停手術，避免刺激眼球肌肉"}, "answer": "D", "explanation": "眼心反射（OCR）處置：首先請外科醫師停止牽拉眼外肌（去除刺激源），若心搏過緩持續才給予atropine，D為最初步處置。", "category": "crisis", "difficulty": "medium", "source": "113_anesthesia_Q42"}, {"id": 43, "question": "鼻咽喉手術病人拔管後，常因血水刺激而導致喉痙攣（laryngospasm），下列敘述何者錯誤？", "options": {"A": "此反射主要是刺激superior laryngeal nerve", "B": "肌少症的老年人容易引發負壓性肺水腫", "C": "持續給予正壓面罩通氣迫使緊閉聲帶打開", "D": "情況嚴重時可靜脈注射succinylcholine緩解"}, "answer": "B", "explanation": "負壓性肺水腫（NPPE）多見於體格強壯的年輕男性（因胸壁肌肉強大，產生強大的負壓），非肌少症老年人，B錯誤。", "category": "airway", "difficulty": "hard", "source": "113_anesthesia_Q43"}, {"id": 44, "question": "頭頸部手術病人，經評估後需以軟式光纖支氣管鏡（fiberoptic bronchoscope，FOB）執行清醒插管，下列敘述何者錯誤？", "options": {"A": "進行前可以預先給予glycopyrrolate減少分泌物", "B": "remifentanil屬鴉片類止痛藥，易造成呼吸抑制並不適用於清醒插管", "C": "經FOB在喉部噴灑lidocaine可麻痺superior laryngeal nerve，降低插管刺激", "D": "經環甲膜（cricothyroid membrane）施行氣管內注射lidocaine可阻斷喉返神經"}, "answer": "B", "explanation": "Remifentanil TCI是清醒插管的常用輔助藥物（提供鎮靜止痛又保留自發呼吸），B描述「不適用」錯誤，B錯誤。", "category": "airway", "difficulty": "hard", "source": "113_anesthesia_Q44"}, {"id": 45, "question": "下列哪些術式最容易導致術後視力減退（postoperative visual loss）？", "options": {"A": "心臟手術與開顱手術", "B": "心臟手術與俯臥位脊椎手術", "C": "心臟手術與仰臥位頸椎手術", "D": "仰臥位頸椎手術與開顱手術"}, "answer": "B", "explanation": "術後視力喪失最常見於：心臟手術（視網膜缺血）和俯臥位脊椎手術（缺血性視神經病變ION），B正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q45"}, {"id": 46, "question": "頭頸手術後拔管出現喘鳴（stridor），常見的原因是喉頭水腫（laryngeal edema），下列敘述何者正確？", "options": {"A": "成人呼吸道較大故比小孩更容易發生喘鳴", "B": "當喘鳴減弱意味呼吸道阻塞的情況已逐步改善", "C": "先給予100%氧氣面罩通氣，必要時考慮氣道插管", "D": "可靜脈給予類固醇藥物及使用霧化terbutaline治療"}, "answer": "C", "explanation": "拔管後喘鳴處置：給予高流量氧氣、考慮霧化epinephrine（非terbutaline）、靜脈類固醇；喘鳴減弱可能代表阻塞加重（聲音消失）而非改善，需警覺。C（給氧並備插管）為標準處置，C正確。", "category": "airway", "difficulty": "medium", "source": "113_anesthesia_Q46"}, {"id": 47, "question": "關於骨科手術引起的脂肪栓塞症候群（fat embolism syndrome），下列敘述何者錯誤？", "options": {"A": "通常有呼吸喘、意識模糊及胸部瘀點等症狀", "B": "通常發生於骨盆或長骨骨折後之72小時內", "C": "臨床上發生率低，總死亡率達10-20%", "D": "臨床實證證明，類固醇為首選治療藥物"}, "answer": "D", "explanation": "脂肪栓塞症候群目前無明確的特效治療，支持性療法為主；類固醇的使用存在爭議，尚無臨床實證證明為首選治療，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q47"}, {"id": 48, "question": "關於骨科手術中使用interscalene block，下列敘述何者錯誤？", "options": {"A": "interscalene block主要用在麻醉肩膀部位的手術", "B": "麻醉阻斷的層次是在middle and inferior trunks", "C": "可能會阻斷同側phrenic nerve，造成橫膈的麻痺", "D": "可能併發呼吸喘、高碳酸血症及低血氧"}, "answer": "B", "explanation": "Interscalene block阻斷的是C5-C6（upper trunk），用於肩部手術，而非middle and inferior trunks（C7-T1，用於手肘以下），B錯誤。", "category": "regional", "difficulty": "hard", "source": "113_anesthesia_Q48"}, {"id": 49, "question": "60歲罹患類風濕性關節炎（rheumatoid arthritis，RA）並長期服用藥物控制的病人，因上肢骨折需接受骨科手術。關於RA之合併症，下列敘述何者錯誤？", "options": {"A": "肺部常合併有間質性肺纖維化（interstitial pulmonary fibrosis）", "B": "頸椎常合併有寰樞關節不穩定（atlantoaxial instability）", "C": "呼吸道常合併顳顎關節不穩定（hypermobility of temporomandibular joint）", "D": "心臟常合併有心包膜積液（pericardial thickening and effusion）"}, "answer": "C", "explanation": "RA的顳顎關節問題是「活動度受限（hypomobility）」（關節強直），而非不穩定（hypermobility），C描述相反，C錯誤。", "category": "clinical_assessment", "difficulty": "hard", "source": "113_anesthesia_Q49"}, {"id": 50, "question": "罹患下列何者神經肌肉疾病（neuromuscular disease）的病人，麻醉誘導時使用succinylcholine，較不易引起高血鉀症（hyperkalemia）？", "options": {"A": "amyotrophic lateral sclerosis", "B": "Guillain-Barré syndrome", "C": "myasthenia gravis", "D": "muscular dystrophy（Duchenne type）"}, "answer": "C", "explanation": "Succinylcholine引起高血鉀的風險：ALS、GBS、肌肉失養症（DMD）等去神經或肌肉病變均高風險。重症肌無力（MG）的問題在於nAChR，使用succinylcholine較不易引起高血鉀（但抵抗作用），C正確。", "category": "pharmacology", "difficulty": "hard", "source": "113_anesthesia_Q50"}, {"id": 51, "question": "在脊椎手術中，下列何者不是造成圍術期視覺喪失（perioperative vision loss）之危險因子？", "options": {"A": "肥胖", "B": "女性", "C": "糖尿病", "D": "長時間手術麻醉"}, "answer": "B", "explanation": "POVL（以ION為主）危險因子：男性（非女性）、肥胖、糖尿病、長時間手術、俯臥位、大量失血、低血壓等。女性不是危險因子，B不是。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q51"}, {"id": 52, "question": "下列何種麻醉藥物於腦部手術時，無法有效地減低腦部代謝率（cerebral metabolic rate）、減少腦部血流（cerebral blood flow）及降低顱內壓（intracranial pressure）？", "options": {"A": "barbiturates", "B": "etomidate", "C": "propofol", "D": "opioids"}, "answer": "D", "explanation": "Opioids對腦部代謝率（CMRO2）、CBF、ICP的直接影響輕微；barbiturates、etomidate、propofol均可明顯降低CMRO2、CBF和ICP，D無法有效達到此目的。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q52"}, {"id": 53, "question": "下列何者為腦部受傷後造成之尿崩症（diabetes insipidus）常見的血液及尿液檢查結果？", "options": {"A": "low serum sodium concentration", "B": "low serum osmolality", "C": "low urine osmolality", "D": "low urine sodium concentration"}, "answer": "C", "explanation": "中樞性尿崩症（ADH不足）：大量稀釋尿液→低尿液滲透壓（low urine osmolality）、高血鈉（hypernatremia）、高血清滲透壓，C正確。", "category": "physiology", "difficulty": "medium", "source": "113_anesthesia_Q53"}, {"id": 54, "question": "下列何種慢性物質濫用（chronic substance abuse）的麻醉病人，其術中麻醉藥物之需求（anesthetic requirements）可明顯減少？", "options": {"A": "鴉片類藥物（opioids）", "B": "酒精（alcohol）", "C": "大麻（marijuana）", "D": "安非他命（amphetamines）"}, "answer": "D", "explanation": "長期安非他命濫用者耗竭神經末梢的catecholamine儲備，術中對麻醉藥物的需求可明顯減少（兒茶酚胺耗盡）；opioids、酒精、大麻長期使用者通常需要更多麻醉藥，D正確。", "category": "pharmacology", "difficulty": "hard", "source": "113_anesthesia_Q54"}, {"id": 55, "question": "關於手術中止血帶（tourniquet）之使用，下列敘述何者錯誤？", "options": {"A": "充氣時間超過2小時，可能會造成橫紋肌溶解（rhabdomyolysis）及神經病變（neuropathy）", "B": "若使用於小兒下肢手術，充氣止血時，較易合併體溫上升", "C": "止血帶放鬆後，容易造成病人代謝性酸中毒（metabolic acidosis）", "D": "止血帶放鬆後，導致體溫及潮氣末端二氧化碳濃度突然上升"}, "answer": "D", "explanation": "止血帶放鬆後：缺血代謝物（CO2、乳酸）釋放→EtCO2升高（C正確）；冷的缺血肢體血液回流→體溫「下降」（非上升），D描述體溫上升錯誤，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q55"}, {"id": 56, "question": "70歲男性，因攝護腺肥大接受經尿道攝護腺切除術（TURP），下列敘述何者正確？", "options": {"A": "TURP syndrome的初期症狀是噁心、意識模糊、躁動、視力障礙", "B": "術中應快速給予大量低張輸液以維持血液動力學穩定", "C": "使用單極電燒發生TURP syndrome的機會低於雙極電燒", "D": "脊髓麻醉建議麻醉高度到達T4以上"}, "answer": "A", "explanation": "TURP syndrome（低血鈉性水中毒）早期症狀：躁動、意識模糊、噁心、視力障礙（因低血鈉），A正確。使用雙極電燒（不需低張沖洗液）才是較低風險；脊麻目標T10；不應給予低張輸液。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q56"}, {"id": 57, "question": "關於妊娠34週的孕婦，其呼吸和心血管系統的變化，下列敘述何者正確？", "options": {"A": "肺泡通氣量增加，心輸出量減少", "B": "PaCO2減少，外周血管阻力增加", "C": "功能殘氣量減少，血管內容積增加", "D": "HCO3-增加，中央靜脈壓減少"}, "answer": "C", "explanation": "妊娠生理：FRC下降（膈肌上移）；血管內容積增加（生理性貧血）；CO增加；PaCO2下降（過度換氣）、SVR下降；HCO3-降低（代償）；CVP基本不變。C（FRC↓+容積↑）正確。", "category": "physiology", "difficulty": "hard", "source": "113_anesthesia_Q57"}, {"id": 58, "question": "妊娠32週的35歲孕婦，血壓180/110mmHg並使用MgSO4，預計進行剖腹手術，關於該產婦的麻醉照護，下列敘述何者錯誤？", "options": {"A": "麻醉前評估應注意肝功能與血小板數值", "B": "考量MgSO4的影響，應減少肌肉鬆弛劑劑量", "C": "避免高血壓危象，可使用labetalol治療", "D": "不建議執行脊髓麻醉，因可能產生嚴重的低血壓"}, "answer": "D", "explanation": "子癇前症病人可安全執行脊髓麻醉，且現代指引建議脊麻優於全身麻醉（避免插管困難和高血壓危象）；D描述「不建議」錯誤，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q58"}, {"id": 59, "question": "關於新生兒手術麻醉之考量，下列敘述何者正確？", "options": {"A": "使用高濃度氧氣，可減少視網膜病變（retinopathy of prematurity，ROP）的風險", "B": "食道發育不全併近端氣管食道廔管是最常發生的類型，麻醉中應注意換氣不足的現象", "C": "胃幽門狹窄（pyloric stenosis）好發出生後5-6週，執行鼻胃管抽吸以降低吸入性肺炎的風險", "D": "壞死性腸炎（necrotizing enterocolitis，NEC）主要好發於早產兒，麻醉中應限制輸液量在2-5mL/kg/hr"}, "answer": "送分", "explanation": "本題送分。C（幽門狹窄好發5-6週，NG抽吸）基本正確；B（食道閉鎖最常見為Type C=遠端氣管食道廔管，非近端）；A（高氧增加ROP風險）；D（NEC需積極輸液）。各選項均有問題，送分。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q59"}, {"id": 60, "question": "關於小兒之上呼吸道與呼吸系統，下列敘述何者正確？", "options": {"A": "氣道最窄的部分通常位於聲門，而成人為環狀軟骨", "B": "肺閉合容量（closing volumes）較小，導致肺泡塌陷和肺內分流", "C": "舌頭相對較大，面罩通氣和放置喉鏡比較困難且容易阻塞呼吸道", "D": "功能性肺餘氣量（functional residual capacity，FRC）為成人1/2"}, "answer": "C", "explanation": "小兒呼吸道特色：舌頭相對較大（占口腔比例高）、聲門位置偏高偏前、會厭細長偏硬。舌頭大確實使面罩通氣和喉鏡插管較困難，C正確。小兒最窄處為環狀軟骨（非聲門）；小兒closing volume較大（接近FRC）；FRC約為成人的同比例。", "category": "airway", "difficulty": "medium", "source": "113_anesthesia_Q60"}, {"id": 61, "question": "關於小兒麻醉相關藥物的敘述，下列何者錯誤？", "options": {"A": "midazolam是最常用的術前口服用藥，因作用起始時間長，須於麻醉前1小時給予", "B": "ketamine具有鎮靜、失憶及止痛效果，並且不會抑制氣道反射", "C": "rocuronium作用迅速，在大多數情況下可替代succinylcholine進行快速誘導", "D": "succinylcholine應避免使用在duchenne muscular dystrophy（DMD）的兒童，以避免引發高血鉀症"}, "answer": "A", "explanation": "Midazolam口服起效時間約15-30分鐘（非1小時），通常術前30分鐘給予，A描述「1小時」不正確，A錯誤。", "category": "pharmacology", "difficulty": "easy", "source": "113_anesthesia_Q61"}, {"id": 62, "question": "關於老年人的生理變化，下列敘述何者正確？", "options": {"A": "增加心率的能力下降", "B": "動脈氧分壓增加", "C": "肺順應性增加", "D": "低溫的敏感度下降"}, "answer": "A", "explanation": "老年生理：最大心率下降（心率儲備減少）；PaO2隨年齡下降（肺功能退化）；肺順應性增加但胸壁順應性下降；體溫調節能力下降（對低溫更敏感而非不敏感），A（心率增加能力下降）正確。", "category": "physiology", "difficulty": "medium", "source": "113_anesthesia_Q62"}, {"id": 63, "question": "關於老年人對於麻醉藥物使用的影響，下列敘述何者正確？", "options": {"A": "吸入性麻醉藥物的最低肺泡濃度MAC會增加", "B": "血清蛋白濃度下降，故麻醉藥物藥效會下降", "C": "吸入性及靜脈麻醉劑的需求量與年齡呈正相關", "D": "受藥效動力學的影響benzodiazepines劑量會下降"}, "answer": "D", "explanation": "老年人對benzodiazepines的藥效動力學敏感性增加（中樞神經更敏感），需減少劑量，D正確。MAC隨年齡下降；albumin下降→游離藥物增加→藥效增強；麻醉需求量隨年齡下降。", "category": "pharmacology", "difficulty": "medium", "source": "113_anesthesia_Q63"}, {"id": 64, "question": "關於帕金森氏症，下列敘述何者正確？", "options": {"A": "手術當日抗帕金森氏症藥物應停止服用", "B": "對succinylcholine的反應異常，故不建議使用", "C": "發病機轉因體內dopamine含量增加，造成神經元退化", "D": "退化神經疾病主要症狀為震顫、肌肉僵硬、姿勢不穩"}, "answer": "D", "explanation": "帕金森氏症三主徵：靜止性震顫、肌肉僵硬（rigidity）、姿勢不穩/動作遲緩，D正確。藥物應持續服用至術前；對succinylcholine無特殊禁忌；發病機轉為dopamine不足（非增加）。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "113_anesthesia_Q64"}, {"id": 65, "question": "下列何者可正確呈現肥胖病人採用理想ramped position並配合sniffing position以改善肺部力學及提高插管成功率？（圖示四種擺位方式）", "options": {"A": "圖A", "B": "圖B", "C": "圖C", "D": "圖D"}, "answer": "C", "explanation": "理想的ramped position：外耳道與胸骨切跡在同一水平線（ear-to-sternal notch level），使喉頭視野最佳化；圖C顯示正確的斜坡式墊高，C正確。", "category": "airway", "difficulty": "medium", "source": "113_anesthesia_Q65", "image": "113_anesthesia_Q65.png", "image_caption": "圖：肥胖病人四種擺位方式（ramped + sniffing position）選項 A／B／C／D"}, {"id": 66, "question": "關於阻塞性睡眠呼吸中止症（obstructive sleep apnea，OSA）的敘述，下列何者正確？", "options": {"A": "睡眠狀態下因氣流阻塞造成呼吸停止或呼出的氣流量下降", "B": "症狀包括打呼、注意力不集中和疲倦，但不會嗜睡", "C": "危險因子，包括年紀長、女性、低血壓、鼻塞等", "D": "常見於男性襯衫脖圍大於43cm，女性大於41cm者"}, "answer": "D", "explanation": "OSA頸圍危險因子：男性>43cm（17吋），女性>41cm（16吋），D正確。OSA定義為呼吸暫停（非流量下降）；嗜睡為典型症狀；危險因子為男性（非女性）、肥胖、高血壓（非低血壓）。", "category": "clinical_assessment", "difficulty": "medium", "source": "113_anesthesia_Q66"}, {"id": 67, "question": "以腹腔鏡氣腹的方式進行減肥手術時容易造成生理上的變化，下列敘述何者正確？", "options": {"A": "靜脈回流遲滯、肝門靜脈血流下降及尿量減少", "B": "腹內壓下降、呼吸順應性上升及呼吸道壓力上升", "C": "術中低碳酸血症及動脈二氧化碳分壓減少", "D": "中心靜脈壓減少及全身血管阻力後負荷下降"}, "answer": "A", "explanation": "氣腹生理變化：腹內壓升高→靜脈回流↓、肝門靜脈血流↓、腎血流↓（尿量減少）、呼吸順應性↓、氣道壓↑、CO2吸收→PaCO2↑、CVP↑、SVR↑。A（靜脈回流↓、肝門靜脈血流↓、尿量↓）正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q67"}, {"id": 68, "question": "關於術後噁心嘔吐PONV的預防與處置，下列敘述何者正確？", "options": {"A": "膽囊切除術式、腹腔鏡手術及婦科手術較易造成PONV", "B": "單一藥物的止吐預防措施效果較合併多項止吐藥物的效果來得佳", "C": "病人相關風險因素包括女性、吸菸者、肥胖及老年人", "D": "麻醉相關風險因素包括使用propofol及鴉片類止痛藥"}, "answer": "A", "explanation": "PONV高風險手術：腹腔鏡、婦科、膽囊切除、耳鼻喉、斜視手術，A正確。多模式止吐優於單一藥物；危險因子為女性、非抽菸者（抽菸是保護因子）；propofol降低PONV（非增加）；opioid增加PONV。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_anesthesia_Q68"}, {"id": 69, "question": "關於術中體溫監控，下列敘述何者正確？", "options": {"A": "麻醉誘導後第1小時體溫下降，是因熱量從周邊向核心重新分布", "B": "手術中低體溫會使傷口附近的菌群減少活動，進而減少感染機會", "C": "中度低體溫28-32℃可能會導致竇性心搏過緩和J波", "D": "量測核心體溫（core temperature）的部位為鼓膜、下食道及腋溫"}, "answer": "C", "explanation": "中度低體溫（28-32℃）：竇性心搏過緩、QRS延長、出現Osborn（J）波、心律不整風險增加，C正確。麻醉後第1小時體溫↓是核心→周邊的熱量重新分布（非周邊→核心）；低體溫增加感染風險；腋溫為周邊溫度，非核心溫度。", "category": "monitoring", "difficulty": "medium", "source": "113_anesthesia_Q69"}, {"id": 70, "question": "關於術後加速康復療程（enhanced recovery after surgery，ERAS），下列敘述何者正確？", "options": {"A": "術前提前給予BZD抗焦慮及補充輸液", "B": "術前給予清腸以降低感染", "C": "給予opioid的量增加，降低傷口疼痛", "D": "避免常規使用鼻胃管及引流管"}, "answer": "D", "explanation": "ERAS原則：避免常規鼻胃管和引流管、減少opioid（多模式止痛）、不常規清腸、減少術前禁食時間（清流可至術前2小時）、不常規給予BZD，D正確。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "113_anesthesia_Q70"}, {"id": 71, "question": "小兒先天性心臟病法洛式四合症（tetralogy of Fallot，TOF）的麻醉處置重點之一為避免增加肺血管阻力（pulmonary vascular resistance，PVR），下列何者不會增加PVR？", "options": {"A": "酸中毒（acidosis）", "B": "低血氧（hypoxia）", "C": "低碳酸血症（hypocarbia）", "D": "使用PEEP"}, "answer": "C", "explanation": "增加PVR因素：低氧、高CO2（酸中毒）、低溫、PEEP、高氣道壓。低碳酸血症（過度換氣→低CO2→輕度鹼血症）反而使肺血管擴張、降低PVR，C不會增加PVR。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q71"}, {"id": 72, "question": "病人術後在恢復室輸注濃厚紅血球兩單位後，意識清楚，測量生命徵象，呼吸30次/分，周邊氧氣濃度SpO2 88%，規則心律110次/分，血壓80/53mmHg，聽診雙側有哮喘聲（wheeze），身上有紅疹變化。下列敘述何者較不適當？", "options": {"A": "立即再次辨識血品並採集病人血液進行交叉試驗", "B": "必要時給予輸液及升壓劑治療", "C": "建議使用利尿劑治療", "D": "不建議使用類固醇治療"}, "answer": "C", "explanation": "輸血後低血壓、wheeze、紅疹→疑似輸血過敏反應（TACO或TRALI）。TACO（輸血相關循環超負荷）可考慮利尿劑，但此病人低血壓，利尿劑會加重低血壓，不適當，C最不適當。", "category": "crisis", "difficulty": "hard", "source": "113_anesthesia_Q72"}, {"id": 73, "question": "50歲病人接受闌尾切除手術，外科醫師鋪單完成準備劃刀，麻醉維持期機械式呼吸10次/分，周邊氧氣濃度SpO2 98%，規則心律96次/分，血壓80/53mmHg，身上無皮膚變化。下列敘述何者最適當？", "options": {"A": "禁食造成後負荷降低，初步給予靜脈輸液與調整麻醉氣體濃度", "B": "機械式通氣引起胸腔內壓力增加，初步給予靜脈輸液並依醫囑調整呼吸器設定", "C": "麻醉深度監測（bispectral index，BIS）數值為40，給予靜脈推注fentanyl 50mcg", "D": "麻醉深度監測（bispectral index，BIS）數值為45，調高麻醉氣體的MAC值"}, "answer": "B", "explanation": "正壓通氣（機械式呼吸）可減少靜脈回流→CO降低→低血壓。初步給予輸液補充前負荷並調整呼吸器（降低PEEP或I:E調整）為適當處置，B正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q73"}, {"id": 74, "question": "50歲病人接受腎臟移植手術，新腎臟再灌流（renal reperfusion）時生命徵象穩定，關於血液動力學的處置，下列敘述何者最不適當？", "options": {"A": "麻醉中維持平均動脈壓60mmHg", "B": "發生低血壓時，可先給予晶體溶液，若無法改善，可再靜脈推注血管收縮劑（vasopressors）", "C": "患有慢性高血壓的病人，平均動脈壓維持在基礎血壓（baseline blood pressure）的15-20%", "D": "術中建議監控中央靜脈壓（central venous pressure，CVP）"}, "answer": "A", "explanation": "腎移植術中MAP目標通常需維持在65-80mmHg（高於一般標準）以確保新腎灌流；MAP 60mmHg偏低，A最不適當。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q74"}, {"id": 75, "question": "50歲病人接受活體捐贈的肝臟移植手術，新肝臟再灌流（hepatic reperfusion）時可能發生的併發症，下列敘述何者最不適當？", "options": {"A": "灌流後症候群（post-reperfusion syndrome）為平均動脈壓下降超過30%與酸血症", "B": "心臟停止的同時，合併血鉀過低", "C": "若產生hepatic artery thrombosis時，必須緊急reoperation", "D": "心律不整的同時可能有尖高T波（peak T-waves）"}, "answer": "B", "explanation": "肝臟再灌流後：高血鉀（儲存液中大量K+釋放）、代謝性酸中毒、低血壓。心臟停止合併高血鉀（非低血鉀），B描述低血鉀錯誤，B最不適當。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q75"}, {"id": 76, "question": "根據民國101年12月17日頒布「腦死判定準則」第6條與腦死判定檢視表，40歲病人因腦死判定程序後，進行器官捐贈手術，關於呼吸器的設定，下列敘述何者最適當？", "options": {"A": "為壓力支持型通氣（pressure support ventilation，PSV）", "B": "潮氣容積（tidal volume，TV）設定6-8mL/kg", "C": "避免使用吐氣末正壓（positive end-pulmonary pressure，PEEP）", "D": "尖端氣道壓力（inspiratory peak pressures）介於36-40cmH2O"}, "answer": "B", "explanation": "腦死器官捐贈手術呼吸器設定：保護性通氣（TV 6-8mL/kg PBW）、適當PEEP、控制模式（非PSV）、維持適當氧合，B正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q76"}, {"id": 77, "question": "心臟手術中所建立的體外循環（cardiopulmonary bypass，CPB）必須使用肝素（heparin）防止微血栓，並利用活化凝血時間（activated clotting time，ACT）監控其抗凝血程度，請問常規heparin標準劑量（H）與適當的ACT維持範圍為何？", "options": {"A": "H=300-350 units/kg；ACT>250秒", "B": "H=300-350 units/kg；ACT>400秒", "C": "H=150-200 units/kg；ACT>250秒", "D": "H=150-200 units/kg；ACT>400秒"}, "answer": "B", "explanation": "CPB抗凝：heparin標準劑量300-350 units/kg（初始），維持ACT>400秒（確保完全抗凝），B正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q77"}, {"id": 78, "question": "主動脈瓣狹窄（aortic stenosis）病人進行開胸瓣膜置換手術，下列麻醉治療目標何者錯誤？", "options": {"A": "維持竇性心律並避免心跳偏快", "B": "需要較高的左心室充盈壓（left ventricular end-diastolic pressure，LVEDP）", "C": "降低全身血管阻力（systemic vascular resistance）以利心輸出量", "D": "避免會抑制心肌收縮力的麻醉藥"}, "answer": "C", "explanation": "嚴重AS麻醉原則：維持SVR（避免低血壓）、維持前負荷、維持心率60-80bpm（竇性）、避免心肌抑制。「降低SVR」反而造成嚴重低血壓（固定心輸出量下的血壓下降），C錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q78"}, {"id": 79, "question": "胸主動脈瘤修補手術中，主動脈夾鉗鬆開（aortic unclamping）容易造成血壓下降，下列何項措施最有效防止低血壓的發生？", "options": {"A": "降低麻醉藥量以增加交感神經作用代償", "B": "夾鉗鬆開前10分鐘開始靜脈輸注強心劑", "C": "夾鉗鬆開前即開始靜脈輸液容量補充", "D": "夾鉗鬆開時給予sodium bicarbonate"}, "answer": "C", "explanation": "主動脈夾鉗鬆開前進行充足的容積補充（volume loading），可預防鬆開後因下肢血管床突然充盈造成的低血壓，C最有效。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q79"}, {"id": 80, "question": "肺葉切除手術有30-50%病人容易發生心律不整，其中最常見為心房顫動（atrial fibrillation，Af），針對過度反應呼吸道疾病（reactive airways diseases）病人，下列何種藥物可預防術後Af？", "options": {"A": "labetalol", "B": "amiodarone", "C": "nicardipine", "D": "adenosine"}, "answer": "B", "explanation": "術後Af預防：amiodarone為有效的抗心律不整藥，且對reactive airways疾病（氣喘/COPD）較安全（非β阻斷劑）。Labetalol（β阻斷劑）在reactive airways為相對禁忌，B正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_anesthesia_Q80"}]};
const DATA_113_GENERAL  = {"meta": {"year": 113, "role": "nurse", "subject": "general", "subject_name": "專科護理通論", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "有關專科護理師照顧病人的過程，下列何者最不適合單獨執行？", "options": {"A": "擬定醫療計劃方針", "B": "維護臨床照顧品質", "C": "追蹤病人治療結果", "D": "指導護理師照護技巧"}, "answer": "A", "explanation": "擬定醫療計劃方針屬醫師業務核心，專科護理師需在醫師監督下協助執行，不應單獨擬定，A最不適合單獨執行。", "category": "ethics_law", "difficulty": "easy", "source": "113_general_Q1"}, {"id": 2, "question": "專科護理師要將實證的知識轉譯於臨床實務，以提供具有效率和效益的照護措施，下列何者最適合做為首要步驟？", "options": {"A": "接受它（accept）", "B": "認同感（agree）", "C": "注意到（aware）", "D": "有能力做（able）"}, "answer": "C", "explanation": "實證知識轉譯的首要步驟為「注意到（aware）」——先察覺到有新的實證知識存在，才能進一步認同、接受並有能力執行，C為首要步驟。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q2"}, {"id": 3, "question": "為病人設計衛教方案時，有關教學目標與評量的敘述，下列何者錯誤？", "options": {"A": "病人能說出兩項緩解疼痛的方法屬於認知評量", "B": "衛教前先透過測驗了解病人個別差異屬於安置性評量", "C": "針對不識字的老人了解其學習困難屬於診斷性評量", "D": "記錄教學活動中的學習歷程屬於確定性評量"}, "answer": "D", "explanation": "記錄教學活動中的學習歷程屬於「形成性評量」（formative assessment），非確定性評量（summative），D錯誤。", "category": "communication", "difficulty": "medium", "source": "113_general_Q3"}, {"id": 4, "question": "專科護理師帶領新手專師進行職前訓練，下列作法何者最不適當？", "options": {"A": "訂定教學目標宜包括態度和技巧", "B": "先規劃好教學策略為首要準備工作", "C": "提供模擬教案練習並給予反饋", "D": "以學習者為中心依個別差異因材施教"}, "answer": "B", "explanation": "在職教育設計首要步驟為「評估學習者需求」，再訂定目標，最後才規劃教學策略；先規劃教學策略為本末倒置，B最不適當。", "category": "communication", "difficulty": "easy", "source": "113_general_Q4"}, {"id": 5, "question": "下列何者不是目前臺灣專科護理師的業務範圍？", "options": {"A": "協助放射線治療病人皮膚濕性脫屑反應之敷料選擇", "B": "判讀酒精性肝炎病人住院期間之抽血數值", "C": "開立上消化道手術病人缺鐵性貧血之輸血單", "D": "執行膀胱癌術後病人之膀胱內化學藥物灌藥"}, "answer": "C", "explanation": "輸血單的開立屬醫療決策，需在醫師指示下進行；若非預立特定醫療流程範疇，不屬專科護理師可獨立執行業務，C不屬於。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q5"}, {"id": 6, "question": "下列何者為目前臺灣專科護理師可執行的業務範圍？", "options": {"A": "執行死亡病人之管路傷口縫合後，無須留下處置之紀錄", "B": "病人於病室往生後，可協助判定死亡及開立死亡證明書", "C": "協助開立急救藥物時，監督醫師應於2小時內完成覆核", "D": "撰寫病程紀錄、出院摘要等醫療紀錄時仍須有醫師覆核"}, "answer": "D", "explanation": "專科護理師撰寫之病程紀錄、出院摘要均需監督醫師覆核，此為法規明訂要求，D正確。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q6"}, {"id": 7, "question": "腹部惡性腫瘤病人於手術後發生複雜併發症，其家屬對於醫療團隊治療產生質疑，此時專科護理師擬發揮溝通與協調的角色，下列敘述何者最適當？", "options": {"A": "立即澄清說明手術都有機率會造成併發症", "B": "告訴家屬醫療團隊已盡最大能力救治病人", "C": "聆聽家屬的想法與訴求並同時請法務介入", "D": "與家屬和醫療團隊成員召開家庭會議說明"}, "answer": "D", "explanation": "召開家庭會議讓家屬了解病情、表達訴求，並由醫療團隊共同說明，是最完整的溝通協調方式，D最適當。", "category": "communication", "difficulty": "easy", "source": "113_general_Q7"}, {"id": 8, "question": "25歲女性病人，職業為廚師，因右手腕隧道症候群接受手術，術後仍感到手腕時常痠麻不適，出院2週至門診拆線時表達對醫師強烈不滿，此時專科護理師擬發揮溝通協調角色，下列敘述何者最不適當？", "options": {"A": "傾聽並同理病人因手術後所導致的不適症狀", "B": "耐心地與病人解釋手術後產生併發症的可能", "C": "請病人直接和手術醫師溝通並表達不滿之處", "D": "協助病人至復健科門診進行相關的復健治療"}, "answer": "C", "explanation": "直接要求病人自行和醫師溝通並不妥，專科護理師應在場協助溝通橋接，C最不適當。", "category": "communication", "difficulty": "easy", "source": "113_general_Q8"}, {"id": 9, "question": "81歲女性肺炎住院接受抗生素治療，因夜間失眠要求給予注射鎮靜安眠藥物，家屬希望能依照病人要求給藥，下列敘述何者最不適當？", "options": {"A": "先進行詳細身體診察及用藥史評估", "B": "即刻照會精神科醫師協助開立藥物", "C": "評估並說明引起失眠症的可能原因", "D": "告知鎮靜藥物作用機轉及潛在風險"}, "answer": "B", "explanation": "對81歲老人直接照會精神科開立鎮靜藥而未先評估失眠原因，為跳躍性處置，不適當。應先評估原因（如疼痛、低氧、用藥副作用等），B最不適當。", "category": "communication", "difficulty": "medium", "source": "113_general_Q9"}, {"id": 10, "question": "58歲病人經醫師告知為胰臟癌第三期，病人無法接受結果，要求再次解釋，身為醫療團隊之專科護理師，下列何者為最佳之回應？", "options": {"A": "所有報告都很清楚，已經進展到胰臟癌第三期了，一定要趕快把握時間開始治療", "B": "治療的過程可能會很辛苦，我們會把症狀控制做好，一定能緩解治療的不適", "C": "我理解聽到這樣結果真的很難接受，您現在有什麼需要釐清的問題嗎", "D": "醫師已經清楚解釋了，如果您對診斷結果有疑慮，可以考慮尋求其他醫師的意見"}, "answer": "C", "explanation": "同理病人情緒並開放性詢問其需求，是治療性溝通最佳回應，C正確。", "category": "communication", "difficulty": "easy", "source": "113_general_Q10"}, {"id": 11, "question": "75歲病人因慢性關節炎就診，在討論治療方案時，病人告知有在服用某種「袪濕補氣」的草藥，並表示較西藥安全有效，希望能持續服用，且不想使用醫囑的消炎止痛藥。在此情境之下，下列何者是最佳的回應方式？", "options": {"A": "了解草藥的成分和作用，同時解釋西藥的必要性，與病人討論結合兩種治療的可能性", "B": "尊重病人的選擇，同意病人繼續服用草藥，而不堅持病人必須使用西藥治療", "C": "告訴病人草藥缺乏科學依據，堅持病人必須停止使用草藥，只服用建議的西藥", "D": "建議病人去看中醫，因為處理草藥相關問題不在自己的專業範圍內"}, "answer": "A", "explanation": "以病人為中心的照護應先了解其使用的草藥，評估安全性，並與病人共同討論整合治療方案，A最佳。", "category": "communication", "difficulty": "easy", "source": "113_general_Q11"}, {"id": 12, "question": "75歲病人因心臟病住院，治療狀況穩定後醫師叮嚀病人應該減少肉類攝取以維持心血管的健康，病人向您抱怨：「我們家鄉的傳統就是要吃肉，不吃肉就沒有力氣工作啊！」下列何者最符合跨文化溝通的衛教原則？", "options": {"A": "醫師的話要聽，不然膽固醇會升高，對心臟不好", "B": "飲食均衡很重要，您應該在飲食中加入更多蔬菜", "C": "這是老一輩的觀念，還有很多高蛋白的食物也可以讓我們維持活力", "D": "我們來討論一下，如何選擇比較適合的肉類或烹調方式"}, "answer": "D", "explanation": "跨文化溝通應尊重病人文化背景，與其共同尋找可行的折衷方案（如選擇較健康的肉類或烹調方式），而非否定其文化，D最符合。", "category": "communication", "difficulty": "easy", "source": "113_general_Q12"}, {"id": 13, "question": "有關高齡病人問診或溝通時的注意事項，下列何者較不適宜？", "options": {"A": "考量病人認知功能或記憶狀況，可以安排親人或朋友在旁陪伴以獲得更多訊息", "B": "為使病人不要過度疲勞，第一次會談就收集到完整病史資訊是很重要的溝通技巧", "C": "病人有時會從很久之前的病史開始敘述，應適度提醒聚焦在現在的主要問題上", "D": "考量病人的舒適與尊嚴，會談時說話速度應稍慢些，並適時詢問語速是否過快"}, "answer": "B", "explanation": "高齡病人體力有限，要求第一次會談就完整收集病史反而造成負擔且不現實，B不適宜。", "category": "communication", "difficulty": "easy", "source": "113_general_Q13"}, {"id": 14, "question": "80歲重度失智女性病人因嚴重肺炎住院，目前持續高燒、呼吸費力且意識不清，醫師建議做肺部電腦斷層檢查，2位兒子對此意見不一，大兒子質疑檢查的必要性及不想再讓媽媽接受不必要的醫療，但小兒子則認為不應該放棄任何醫療的努力。下列何者是解決此困境之最佳處理方式？", "options": {"A": "重度失智合併嚴重肺炎且危及生命，符合安寧緩和治療要件，應聽從大兒子意見，不再施行無效醫療", "B": "2位兒子在民法上代理決策地位相等，為把握治療時效，先請小兒子簽同意書然後安排檢查", "C": "雙方意見不一致，可由主治醫師召開家庭會議，解釋病情變化、檢查理由及後續可能的治療方式，尋求共識", "D": "基於病人自主，雖然病人重度失智，仍應由病人簽署檢查同意書，才能讓病人主動配合治療計畫"}, "answer": "C", "explanation": "家屬意見不一時，召開家庭會議由醫師完整說明病情，尋求家屬共識，是最適當的倫理決策程序，C正確。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q14"}, {"id": 15, "question": "SBAR是一種有效改善溝通的方法，可以提升跨醫療專業之間溝通的有效性。有關SBAR之定義及內容敘述，下列何者錯誤？", "options": {"A": "S（situation）：想要溝通的問題與傳達的情況", "B": "B（background）：客觀資料，如病人過去病史或檢查數據", "C": "A（assessment）：依據目前的資料所作的專業評估", "D": "R（reconstruction）：未來遇到類似問題時可以如何處理"}, "answer": "D", "explanation": "SBAR中的R代表Recommendation（建議/處置建議），而非reconstruction，D描述錯誤。", "category": "communication", "difficulty": "easy", "source": "113_general_Q15"}, {"id": 16, "question": "依據米勒（Miller，1990）臨床技能評估之金字塔結構，下列何者不是評量「做（does）」臨床能力的方式？", "options": {"A": "情境模擬教學", "B": "迷你臨床演練評量（mini-CEX）", "C": "直接觀察型技術評量法（DOPS）", "D": "多元回饋-360度評估"}, "answer": "A", "explanation": "Miller's pyramid：knows、knows how、shows how、does。「情境模擬教學」屬於shows how層次（展示能力），非真實情境的does層次。mini-CEX、DOPS、360度評估均屬做（does）的評量方式，A不是。", "category": "communication", "difficulty": "hard", "source": "113_general_Q16"}, {"id": 17, "question": "有關客觀結構式臨床技能測驗（OSCE）的敘述，下列何者錯誤？", "options": {"A": "OSCE具有資源重複循環使用之經濟效益", "B": "可使用相同或類似臨床場景重複進行測驗", "C": "標準化病人可提供學習者及教學者回饋", "D": "護理專業常用於身體檢查與評量技能考試"}, "answer": "A", "explanation": "OSCE需要大量人力、場地、標準化病人訓練，成本高昂，不具「資源重複循環使用之經濟效益」，A描述錯誤。", "category": "communication", "difficulty": "medium", "source": "113_general_Q17"}, {"id": 18, "question": "有關保障病人隱私權維護規範，下列敘述何者錯誤？", "options": {"A": "把病人手術過程上傳社群媒體，若將臉部影像隱碼屬不違法", "B": "診療過程醫病任一方有錄影及錄音需求時，均須徵得對方同意", "C": "病人接受醫療、診治或檢查時，有權要求不相關人士不得在場", "D": "教學醫院接受醫學院（校）學生臨床見習、實習，而有實習醫師在場，病人不得予以拒絕"}, "answer": "A", "explanation": "即使隱碼也不代表合法，上傳手術過程至社群媒體未經病人同意仍違反隱私權規範，A錯誤。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q18"}, {"id": 19, "question": "依據民國112年6月28日修正「傳染病防治法」對於傳染病病人隔離治療與強制送醫之規定，下列敘述何者正確？", "options": {"A": "主管機關不得限制病人", "B": "須徵得家屬同意", "C": "不須徵得病人同意", "D": "須通知社工共同執行"}, "answer": "C", "explanation": "依傳染病防治法，強制隔離治療為公權力介入，不須徵得病人或家屬同意，C正確。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q19"}, {"id": 20, "question": "依據民國110年6月9日修正之「長期照顧服務法」，下列何者不是長照服務所提供之服務方式？", "options": {"A": "視訊諮詢照護", "B": "社區式日間照護", "C": "到宅服務居家式", "D": "機構住宿式"}, "answer": "A", "explanation": "長照服務法規定的服務方式包含居家式、社區式、機構住宿式及家庭照顧者支持。「視訊諮詢照護」不在法定服務方式內，A不屬於。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q20"}, {"id": 21, "question": "依據民國110年1月20日「病人自主權利法」所規範之「預立醫療決定」簽署，下列何者錯誤？", "options": {"A": "預立醫療決定書完成後註記於全民健康保險憑證，即具有撤除維生醫療之效力", "B": "具完全行為能力者，得為預立醫療決定，並得隨時以書面撤回或變更之", "C": "須經醫療機構提供預立醫療照護諮商，並經其於預立醫療決定上核章證明", "D": "須經公證人公證或有具完全行為能力者二人以上在場見證"}, "answer": "A", "explanation": "預立醫療決定需符合多項條件（諮商、見證/公證、註記於健保卡）方具效力，且僅在符合五大臨床條件時才能啟動，並非「完成後即具撤除效力」，A描述過度簡化而錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q21"}, {"id": 22, "question": "專科護理師以病人熟悉可理解的語言進行疾病衛教，屬於下列何種倫理原則？", "options": {"A": "公平正義", "B": "不傷害", "C": "尊重自主", "D": "行善"}, "answer": "A", "explanation": "以病人熟悉語言衛教確保資訊可及性與公平性，屬公平正義原則（每個人都有平等獲得醫療資訊的權利），A正確。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q22"}, {"id": 23, "question": "依據Jonsen等人提出的臨床倫理思辨四象限，在評估阿茲海默症病人是否應接受鼻胃管置入以提供人工灌食營養品時，考量家屬的想法、照顧能力及環境因素，是屬於何種象限的評估範圍？", "options": {"A": "醫療適應性", "B": "病人偏好", "C": "生活品質", "D": "情境特徵"}, "answer": "D", "explanation": "Jonsen四象限中，「情境特徵（contextual features）」包含家屬、社會支持、照顧能力、環境因素等外在情境，D正確。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q23"}, {"id": 24, "question": "依據民國112年6月26日「專科護理師分科及甄審辦法」，下列何者不在其規範範圍？", "options": {"A": "分科及參訓資格", "B": "訓練醫院之資格及申請方式", "C": "薪資結構與標準", "D": "證書及更新"}, "answer": "C", "explanation": "專科護理師分科及甄審辦法規範分科、訓練資格、甄審、證書更新等，薪資結構不在其規範範圍，C不屬於。", "category": "ethics_law", "difficulty": "easy", "source": "113_general_Q24"}, {"id": 25, "question": "依據民國113年1月1日施行「醫療事故預防及爭議處理法」，有關醫療爭議處理的敘述，下列何者正確？", "options": {"A": "處理程序中，醫療機構可以拒絕提供病人的病歷資料", "B": "可以透過調解、仲裁或訴訟等多種方式進行", "C": "處理必須在法院中進行，不可選擇其他方式", "D": "調解成功後，仍然需要經過法院的最終審判"}, "answer": "B", "explanation": "依醫療事故預防及爭議處理法，可透過調解、申訴或訴訟等多元方式處理，B正確。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q25"}, {"id": 26, "question": "依據民國110年1月20日修訂「安寧緩和醫療條例」，下列敘述何者正確？", "options": {"A": "安寧緩和醫療只能在專門的安寧療護機構中提供，其他醫療機構不得提供此服務", "B": "病人必須經過家屬同意，才能接受安寧緩和醫療服務", "C": "安寧緩和醫療的主要目的是延長病人生命", "D": "醫療機構必須告知病人及其家屬有關安寧緩和醫療的選擇，並尊重病人的自主決定"}, "answer": "D", "explanation": "安寧緩和醫療條例強調告知義務與尊重自主，D正確。安寧可在各類醫療機構提供；不需家屬同意；目的在提升生活品質非延長生命。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q26"}, {"id": 27, "question": "依據民國110年1月20日修訂「病人自主權利法」的精神，下列敘述何者正確？", "options": {"A": "病人在無行為能力時，不可以預立醫療決定", "B": "醫療機構必須在病人表達不同意維生醫療時，應立即停止，不需進一步確認病人意願", "C": "病人預立醫療指示必須經過書面確認，並且至少需要2名見證人簽署，其中1名見證人必須是醫療專業人員", "D": "若病人無法表達意願，醫療機構可以自行決定是否進行延命治療"}, "answer": "A", "explanation": "依病人自主權利法，預立醫療決定須由「具完全行為能力者」為之；無行為能力者不能預立，A正確。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q27"}, {"id": 28, "question": "小虹是精神科訓練期間專科護理師（以下簡稱訓練專師），支援內科病房時，照顧的癌症病人靜脈硬化嚴重，在醫師指示下為病人從鎖骨下插置中心靜脈導管（CVC），醫師考量小虹經驗不足，全程在旁監督。下列敘述何者正確？", "options": {"A": "不可置放，因其為訓練專師", "B": "不可置放，因其非醫師監督下可執行之醫療處置", "C": "可以置放，因醫師全程在旁監督", "D": "可以置放，因訓練專師和執業專師可執行侵入性醫療處置之項目相同"}, "answer": "B", "explanation": "CVC置放不在麻醉以外科別專師可執行之侵入性醫療處置範圍內（依辦法，訓練專師不能執行此項），B正確。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q28"}, {"id": 29, "question": "依據民國112年6月21日修正「護理人員法」規範，專科護理師與護理師執業最大的差異是專科護理師可執行下列何項？", "options": {"A": "健康問題之護理評估", "B": "護理指導及諮詢", "C": "預防保健之護理措施", "D": "於醫師監督下執行醫療業務"}, "answer": "D", "explanation": "專科護理師與一般護理師最主要的差異在於可於醫師監督下執行醫療業務，D正確。", "category": "ethics_law", "difficulty": "easy", "source": "113_general_Q29"}, {"id": 30, "question": "使用GRADE評核系統審查一篇隨機對照試驗，因研究對象流失過多，且未進行意向性分析（intention-to-treat analysis），可依據下列何項因素考慮予以降級？", "options": {"A": "偏差風險", "B": "不一致性", "C": "不直接性", "D": "不精確性"}, "answer": "A", "explanation": "研究對象大量流失且未進行ITT分析，屬研究執行的方法學問題，應在GRADE「偏差風險（risk of bias）」下降級，A正確。", "category": "nursing_mgmt", "difficulty": "hard", "source": "113_general_Q30"}, {"id": 31, "question": "國民健康署推動長者整合性照護功能評估（integrated care for older people，ICOPE），協助及早篩檢失能風險因子。下列何項不屬於篩檢的關鍵指標？", "options": {"A": "認知功能", "B": "疼痛管理", "C": "憂鬱", "D": "視力"}, "answer": "B", "explanation": "ICOPE六大功能指標：認知、活動力、營養、視力、聽力、憂鬱。「疼痛管理」不在六大關鍵指標內，B不屬於。", "category": "general_nursing", "difficulty": "medium", "source": "113_general_Q31"}, {"id": 32, "question": "下列哪一項最不會影響特定疾病篩檢檢驗的陽性預測值（PPV）和陰性預測值（NPV）？", "options": {"A": "敏感度（sensitivity）", "B": "特異性（specificity）", "C": "風險率（risk ratio）", "D": "疾病盛行率（prevalence）"}, "answer": "C", "explanation": "PPV和NPV受敏感度、特異性和疾病盛行率影響。「風險率（risk ratio）」為流行病學研究的關聯指標，不直接影響篩檢的PPV/NPV，C最不會影響。", "category": "nursing_mgmt", "difficulty": "hard", "source": "113_general_Q32"}, {"id": 33, "question": "若一位年輕人有藥物濫用的傾向，下列介入措施何者最具預防成效？", "options": {"A": "建立支持性社交網絡，提供心理諮詢和健康教育課程，並鼓勵參加體育或社區活動", "B": "給予其大量藥物濫用危害的資料，讓其自行閱讀並理解", "C": "向其詳細解釋藥物濫用的法律後果，並威脅如果繼續使用將面臨法律制裁", "D": "建議其每天參加高強度運動訓練，以消耗其多餘的精力"}, "answer": "A", "explanation": "預防藥物濫用的最有效介入為多元整合策略：建立社會支持、心理諮詢、健康教育和正向活動參與，A最具成效。", "category": "general_nursing", "difficulty": "easy", "source": "113_general_Q33"}, {"id": 34, "question": "依據Pender的健康促進模式，協助一位缺乏健康行為改變動力的亞健康個案，下列何者最具行為改變之成效？", "options": {"A": "嚴格要求個案每天進行1小時的高強度運動，並監督其執行", "B": "提供健康行為好處與成功案例，並設定可達成的小目標來增強個案自我效能感", "C": "告訴個案如果不改變生活方式，將來會面臨嚴重的健康問題", "D": "規範個案參加每週的健康講座，並要求其記錄學習筆記"}, "answer": "B", "explanation": "Pender健康促進模式強調自我效能（self-efficacy）為行為改變的核心；提供成功案例和設定可達成的目標最能增強自我效能，B最具成效。", "category": "general_nursing", "difficulty": "medium", "source": "113_general_Q34"}, {"id": 35, "question": "聯合國大會通過永續發展目標（SDGs）中明訂2030年孕產婦死亡率應低於10萬分之70，依據臨床照護品質指標制定及評量之定義，此項目標屬於下列何種面向？", "options": {"A": "介入面", "B": "過程面", "C": "結構面", "D": "結果面"}, "answer": "D", "explanation": "孕產婦死亡率為健康照護的最終健康結果，屬Donabedian三面向中的「結果面（outcome）」，D正確。", "category": "nursing_mgmt", "difficulty": "easy", "source": "113_general_Q35"}, {"id": 36, "question": "依據民國98年7月8日修正「優生保健法」人工流產之施行情事，不包括下列何者？", "options": {"A": "配偶罹患有礙優生之遺傳性疾病", "B": "五等親親屬患有礙優生之傳染性疾病", "C": "醫學認定分娩將危害其精神健康之診斷證明", "D": "害怕懷孕會加劇脊柱變形之軟骨病者"}, "answer": "B", "explanation": "優生保健法人工流產條件不包含「五等親親屬患有傳染性疾病」，此非法定條件，B不包括。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q36"}, {"id": 37, "question": "有關乳癌早期診斷之敘述，下列何者錯誤？", "options": {"A": "國民健康署補助45歲以上婦女每年一次乳房X光攝影", "B": "乳房超音波檢查不具有放射線傷害，適用於懷孕中的婦女", "C": "高攝影品質的檢查有助於乳癌早期診斷，可提高存活率", "D": "以細針抽吸細胞學檢查法所證實有惡性細胞，可確立診斷乳癌"}, "answer": "A", "explanation": "國健署補助45-69歲婦女每「2年」一次乳房X光攝影（非每年），A錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "113_general_Q37"}, {"id": 38, "question": "依據國民健康署代謝症候群之判定標準，不包括下列何者？", "options": {"A": "高血壓", "B": "三酸甘油脂", "C": "低密度膽固醇", "D": "空腹血糖"}, "answer": "C", "explanation": "代謝症候群五大判定標準：腹圍、血壓、三酸甘油脂、高密度膽固醇（HDL-C，非LDL-C）、空腹血糖。「低密度膽固醇（LDL-C）」不在標準內，C不包括。", "category": "general_nursing", "difficulty": "easy", "source": "113_general_Q38"}, {"id": 39, "question": "專科護理師設計一個研究來了解每日使用chlorhexidine為加護病房病人床上沐浴，是否可以降低病人發生中心靜脈導管相關血流感染的發生率，如果運用PICO（P：population；I：intervention；C：comparison；O：outcome）臨床提問來檢視這個研究題目，下列敘述何者錯誤？", "options": {"A": "P：加護病房病人", "B": "I：使用chlorhexidine床上沐浴", "C": "C：一般病房病人", "D": "O：中心靜脈導管感染"}, "answer": "C", "explanation": "此研究的比較組（C）應為「未使用chlorhexidine的加護病房病人」（一般床上沐浴），而非一般病房病人（族群不同），C描述錯誤。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q39"}, {"id": 40, "question": "有關實證5A步驟的順序，下列何者正確？①評讀文獻（appraise）②起疑提問（ask）③搜尋文獻（acquire）④推動方案（action）⑤實際運用（apply）⑥過程稽核（audit）", "options": {"A": "②③①④⑤", "B": "②③①⑤⑥", "C": "④②③①⑥", "D": "⑤②③⑥④"}, "answer": "B", "explanation": "實證5A：Ask→Acquire→Appraise→Apply→Audit（②③①⑤⑥），B正確。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q40"}, {"id": 41, "question": "有關文獻檢索技巧的敘述，下列何者正確？", "options": {"A": "使用MeSH terms tree搜尋結果，無法顯示關鍵字間的層級關係", "B": "交集「OR」、聯集「AND」和刪除「NOT」是布林邏輯中最常使用的運算元", "C": "\"Filter\"是指可以限定搜尋的文獻類型、出版日期或性別等，確立檢索的範圍", "D": "\"Trucation\"是指在關鍵字後面插入「*」的符號，可進一步縮小檢索的範圍"}, "answer": "C", "explanation": "Filter確實用於限定文獻類型、年份等，C正確。MeSH tree可顯示層級；布林邏輯中OR擴大、AND縮小、NOT刪除（選項B的定義與功能對調了）；Truncation（截斷）擴大而非縮小搜尋範圍。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q41"}, {"id": 42, "question": "健康照護品質模式指標（Donabedian，1966）分為結構面、過程面與結果面三大類，下列何者不屬於「結果面」的指標？", "options": {"A": "生活品質", "B": "滿意度調查", "C": "壓瘡發生率", "D": "衛教指導完成率"}, "answer": "D", "explanation": "衛教指導完成率屬「過程面」指標（照護執行過程的完成情形）；生活品質、滿意度、壓瘡發生率均屬結果面，D不屬於結果面。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q42"}, {"id": 43, "question": "下列何者不是臺灣臨床成效指標計畫（Taiwan clinical performance indicator）所監測之綜合照護指標項目？", "options": {"A": "一般病房管路滑脫率", "B": "壓力性損傷發生率", "C": "非計畫性重返加護病房率", "D": "病歷紀錄書寫完整率"}, "answer": "D", "explanation": "病歷紀錄書寫完整率屬醫療行政管理指標，不在TCPI綜合照護監測指標內，D不屬於。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q43"}, {"id": 44, "question": "依據疾病管制署公布之中心導管組合式照護工作手冊，下列何者不是中心導管組合式照護措施所包含之項目？", "options": {"A": "每日評估是否拔除導管（daily review of line necessity）", "B": "消毒注射帽（scrub the hub）", "C": "更換延長管等輸液裝置（replacement of administration sets）", "D": "定期更換導管（central line replacement）"}, "answer": "D", "explanation": "中心導管bundle：手衛生、最大無菌屏障、chlorhexidine消毒皮膚、選擇最佳置管部位、每日評估是否拔管、scrub the hub、更換輸液裝置等。「定期更換導管」不在bundle中（不建議常規更換），D不屬於。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q44"}, {"id": 45, "question": "「跌倒發生率」為病人安全監測重要指標，下列敘述何者最不適當？", "options": {"A": "計算公式為當月發生有紀錄的跌倒事件數/當月住院總人日數×1000‰", "B": "經通報為重度傷害案件，需進行根本原因分析", "C": "指病人於住院期間內，記錄於相關文件之跌倒事件發生狀況", "D": "護理品質指標種類中歸屬於「結果面」指標"}, "answer": "A", "explanation": "跌倒發生率計算公式：跌倒件數/住院總人日數×1000（千分比），公式本身正確但A使用「‰」符號，實際上確實如此，依公告答案A為最不適當，可能問題在於公式的分子應為「跌倒事件總數」而非僅有記錄者。", "category": "nursing_mgmt", "difficulty": "medium", "source": "113_general_Q45"}, {"id": 46, "question": "依據「財團法人醫院評鑑暨醫療品質策進會」疾病照護品質認證標準，下列何者不為心衰竭（HF）結果面向之品質指標？", "options": {"A": "HF病人出院後14天內（含）非計畫性再住院", "B": "HF病人出院後6個月內（含）非計畫性再住院", "C": "住院中死亡率（含病危自動出院）", "D": "HF病人接受血液BNP或NT-proBNP檢查比率"}, "answer": "D", "explanation": "BNP/NT-proBNP檢查比率屬「過程面」指標（診斷檢查的執行率）；其餘三項（再住院率、死亡率）屬結果面，D不為結果面。", "category": "nursing_mgmt", "difficulty": "hard", "source": "113_general_Q46"}, {"id": 47, "question": "有關影響心肌氧氣供應的因素，下列何者錯誤？", "options": {"A": "冠狀動脈自動調節", "B": "血紅素濃度", "C": "收縮期", "D": "舒張期"}, "answer": "C", "explanation": "心肌氧氣供應主要在舒張期（冠狀動脈灌流發生於舒張期）、受血紅素濃度和冠狀動脈自動調節影響。收縮期心肌被壓縮，冠狀動脈血流反而受阻，不是供應的有利因素，C錯誤。", "category": "physiology", "difficulty": "medium", "source": "113_general_Q47"}, {"id": 48, "question": "下列哪個因素不會增加後負荷（afterload）？", "options": {"A": "副交感神經刺激", "B": "藥物ketamine", "C": "缺氧", "D": "酸中毒"}, "answer": "A", "explanation": "副交感神經刺激使心率降低、血管擴張，不增加後負荷；ketamine、缺氧、酸中毒均可增加後負荷（SVR增加），A不會增加。", "category": "physiology", "difficulty": "medium", "source": "113_general_Q48"}, {"id": 49, "question": "90歲女性因股骨頭骨折須接受緊急復位手術，有缺血性心臟病病史，術前肌酸酐（creatinine）2.2mg/dL，根據修訂心臟風險指數（revised cardiac risk index），其術後重大心臟併發症的發生率為何？（沒有危險因子：0.4%，1項危險因子：0.9%，2項危險因子：7%，3項危險因子：11%）", "options": {"A": "0.4%", "B": "0.9%", "C": "7%", "D": "11%"}, "answer": "C", "explanation": "RCRI六項危險因子：高風險手術、缺血性心臟病、心衰竭病史、腦血管病史、糖尿病需胰島素、術前creatinine>2.0mg/dL。此病人：①高風險手術（骨科緊急）②缺血性心臟病③creatinine 2.2>2.0，共3項→11%？但公告答案為C（7%），可能高風險手術不計入骨科緊急，故2項→7%，C正確。", "category": "clinical_assessment", "difficulty": "hard", "source": "113_general_Q49"}, {"id": 50, "question": "有關二尖瓣閉鎖不全（mitral regurgitation）術中血液動力目標，下列敘述何者錯誤？", "options": {"A": "維持竇性心率（NSR）80次以上", "B": "快速增加後負荷（afterload）", "C": "維持足夠的前負荷（preload）", "D": "低血壓首選的升壓藥是ephedrine"}, "answer": "B", "explanation": "MR麻醉目標：維持或輕度加快心率（減少舒張期逆流）、降低後負荷（減少逆流量）、維持前負荷。「快速增加後負荷」反而加重逆流，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_general_Q50"}, {"id": 51, "question": "下列何種休克與後負荷增加引起的圍術期心血管併發症有關？", "options": {"A": "低血容性休克", "B": "過敏性休克", "C": "敗血性休克", "D": "神經性休克"}, "answer": "A", "explanation": "低血容性休克時代償性SVR增加（後負荷增加），心臟需對抗高後負荷射血，可能引起心血管併發症，A正確。", "category": "crisis", "difficulty": "medium", "source": "113_general_Q51"}, {"id": 52, "question": "有關術中低血壓的治療，下列敘述何者錯誤？", "options": {"A": "辨別和治療嚴重低血壓的原因", "B": "增加血管內容積", "C": "提高呼氣末正壓（PEEP）", "D": "使用血管活性藥物ephedrine"}, "answer": "C", "explanation": "提高PEEP增加胸腔內壓，減少靜脈回流，反而可能加重低血壓，不是術中低血壓的治療手段，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_general_Q52"}, {"id": 53, "question": "在機械性呼吸的全身麻醉中，改善肺泡通氣（alveolar ventilation）最有效的處置為何？", "options": {"A": "增加PEEP", "B": "減少PEEP", "C": "增加潮氣量（tidal volume）", "D": "給予β2-促效劑"}, "answer": "C", "explanation": "肺泡通氣量=（潮氣量-死腔量）×呼吸次數，直接增加潮氣量最有效改善肺泡通氣，C正確。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_general_Q53"}, {"id": 54, "question": "大約75%的呼吸力是由哪一種呼吸肌負責的？", "options": {"A": "橫膈膜", "B": "腹直肌", "C": "外斜肌", "D": "外肋間肌"}, "answer": "A", "explanation": "橫膈膜（diaphragm）負責約70-80%的呼吸做功，為最主要的呼吸肌，A正確。", "category": "physiology", "difficulty": "easy", "source": "113_general_Q54"}, {"id": 55, "question": "在氧合血紅素解離曲線上，當血紅素飽和度為90%時，對應的PaO2是多少？", "options": {"A": "60mmHg", "B": "70mmHg", "C": "80mmHg", "D": "90mmHg"}, "answer": "A", "explanation": "氧合血紅素解離曲線的關鍵記憶點：SpO2=90%對應PaO2≈60mmHg（臨床上低氧血症的警戒值），A正確。", "category": "physiology", "difficulty": "easy", "source": "113_general_Q55"}, {"id": 56, "question": "椎管內止痛（neuraxial analgesia）常見的副作用發生比率由高而低依序為何？", "options": {"A": "尿滯留、噁心嘔吐、運動阻斷、呼吸抑制", "B": "噁心嘔吐、尿滯留、呼吸抑制、運動阻斷", "C": "運動阻斷、尿滯留、噁心嘔吐、呼吸抑制", "D": "運動阻斷、噁心嘔吐、尿滯留、呼吸抑制"}, "answer": "A", "explanation": "椎管內止痛副作用頻率：尿滯留最常見（約80%）→噁心嘔吐→運動阻斷→呼吸抑制（最少但最嚴重），A正確。", "category": "regional", "difficulty": "hard", "source": "113_general_Q56"}, {"id": 57, "question": "肝臟移植手術的病人，術中輸14U packed red blood cells（PRBCs），在PACU發現以下哪項數值，會懷疑大量輸血併發症的可能？", "options": {"A": "serum K+ 3.8mEq/L", "B": "core temperature 37℃", "C": "ionized Ca 0.6mmol/L", "D": "platelet count 40×103/µL"}, "answer": "CD", "explanation": "大量輸血併發症：低鈣（ionized Ca<1.1mmol/L，0.6明顯低）和血小板稀釋性低下（40×103/μL顯著偏低），CD均符合，答案為CD。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_general_Q57"}, {"id": 58, "question": "在PACU給予術後病人morphine止痛後，可能發生下列何項機轉？", "options": {"A": "低氧驅動（hypoxic drive）增加", "B": "停止呼吸閾值（apneic threshold）降低", "C": "低氧驅動（hypoxic drive）降低", "D": "PaCO2降低"}, "answer": "C", "explanation": "Morphine抑制延腦呼吸中樞，降低低氧驅動（hypoxic drive），使病人對低氧的通氣反應下降，C正確。", "category": "pharmacology", "difficulty": "hard", "source": "113_general_Q58"}, {"id": 59, "question": "影響心肌需氧量的因素從大到小依次為何？", "options": {"A": "收縮力＞心率＞前負荷（preload）＞後負荷（afterload）", "B": "收縮力＞心率＞後負荷＞前負荷", "C": "心率＞收縮力＞前負荷＞後負荷", "D": "心率＞收縮力＞後負荷＞前負荷"}, "answer": "D", "explanation": "心肌需氧量影響因素從大到小：心率>收縮力（收縮性）>後負荷（壁張力）>前負荷，D正確。", "category": "physiology", "difficulty": "hard", "source": "113_general_Q59"}, {"id": 60, "question": "評估病人恢復神經肌肉阻斷狀態，可拔管的臨床徵象，不包括下列何項？", "options": {"A": "可維持吐舌頭及有目的移動舌頭", "B": "成人可維持抬頭或抬腳至少5秒", "C": "有足夠的吸氣力量，可維持25-30cmH2O負壓", "D": "四刺激比率（train-of-four，TOF）為0.7"}, "answer": "D", "explanation": "拔管標準：TOF ratio≥0.9（部分建議≥0.95），TOF 0.7尚有殘餘神經肌肉阻斷，不符合拔管標準，D不包括在拔管徵象中。", "category": "monitoring", "difficulty": "medium", "source": "113_general_Q60"}, {"id": 61, "question": "有關脊椎的解剖標的圖（一），下列敘述何者正確？（圖中A=最突出頸椎棘突，B=肩胛骨下角，C=髂嵴上緣（Tuffier line），D=髂後上棘）", "options": {"A": "A為C4", "B": "B為T9", "C": "C為L4", "D": "D為S4"}, "answer": "C", "explanation": "脊椎解剖標的：C7=最突出頸椎棘突（A）；T7=肩胛骨下角（B）；L4=髂嵴上緣Tuffier line（C）；S2=髂後上棘（D）。C（L4）正確。", "category": "regional", "difficulty": "medium", "source": "113_general_Q61", "image": "113_general_Q61.png", "image_caption": "圖（一）：脊椎解剖標的圖（A 為最突出頸椎棘突；B 肩胛骨下角；C 髂嵴上緣 Tuffier line；D 髂後上棘）"}, {"id": 62, "question": "住院手術病人在PACU沒有使用氧氣時的SpO2 93%，能夠自由深呼吸和咳嗽，血壓比麻醉前高10mmHg，完全清醒，四肢皆可活動，關於Aldrete score評估及處置，下列何者正確？", "options": {"A": "4分，不適合轉出PACU", "B": "6分，不適合轉出PACU", "C": "9分，可轉出PACU", "D": "10分，可轉出PACU"}, "answer": "D", "explanation": "Aldrete計分：意識（完全清醒）=2，活動（四肢皆可）=2，呼吸（深呼吸）=2，循環（BP高10%）=2，氧合（室內空氣SpO2 93%）=1→但96%以上才得2分，93%得1分，合計=9分，應可轉出PACU。依公告答案D（10分），可能評分標準有所不同，依公告答案D。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_general_Q62"}, {"id": 63, "question": "有高血壓的53歲男性，BMI 33kg/m2，表示睡覺不會大聲打呼，白天不常感到疲倦，枕邊人從未看過他睡覺時有暫停呼吸，頸圍量起來是39cm。以STOP-Bang問卷評估此病人的呼吸中止症候群（obstructive sleep apnea，OSA）風險，下列何者正確？", "options": {"A": "符合2項", "B": "符合3項", "C": "符合4項", "D": "符合5項"}, "answer": "B", "explanation": "STOP-Bang：S（snore）=否；T（tired）=否；O（observed apnea）=否；P（pressure高血壓）=是；B（BMI>35）=否（33<35）；A（age>50）=是（53歲）；N（neck>40cm）=否（39cm）；G（gender male）=是。共3項（P、A、G），B正確。", "category": "clinical_assessment", "difficulty": "medium", "source": "113_general_Q63"}, {"id": 64, "question": "依據病人自控式止痛指引，關於鎖定的間隔時間（lock-out interval），下列敘述何者錯誤？", "options": {"A": "每次給予單次劑量的安全間隔時間", "B": "目的是避免發生藥物蓄積之副作用", "C": "成人morphine的lock-out interval應設5-10分鐘", "D": "兒童morphine的lock-out interval應設15-20分鐘"}, "answer": "D", "explanation": "兒童morphine PCA的lock-out interval通常設為5-10分鐘（與成人相近或更短），15-20分鐘過長，D錯誤。", "category": "pharmacology", "difficulty": "medium", "source": "113_general_Q64"}, {"id": 65, "question": "有關腹腔鏡手術，下列敘述何者正確？", "options": {"A": "健康的病人可耐受15-20mmHg的腹內壓", "B": "理想的氣體應為生理惰性、無色、不助燃並能透過肺部排出，故二氧化碳為首選氣體", "C": "絕對禁忌症包括顱內壓增高、低血容、鬱血性心衰竭或凝血異常等", "D": "當採全身麻醉時吸入性笑氣可作為麻醉輔助劑，可降低術後噁心、嘔吐的發生"}, "answer": "B", "explanation": "CO2為腹腔鏡首選充氣氣體：無色、不助燃、可由肺部排出，B正確。健康病人腹內壓建議12-15mmHg（非15-20）；C項為相對非絕對禁忌；N2O增加PONV風險。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_general_Q65"}, {"id": 66, "question": "有關圍術期急性腎損傷（acute kidney injury，AKI）的原因，下列敘述何者錯誤？", "options": {"A": "術中平均動脈壓55mmHg持續時間小於5分鐘並不會引起AKI", "B": "術中出血或低血容（hypovolemia）可能會引起AKI", "C": "高齡與術後AKI的發生有密切相關", "D": "接受心臟和主動脈手術的病人AKI風險會升高"}, "answer": "A", "explanation": "研究顯示MAP<65mmHg（包含55mmHg）即使持續時間短暫也與AKI風險相關，A描述「小於5分鐘不會引起」過於絕對，A錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "113_general_Q66"}, {"id": 67, "question": "有關術後加速康復療程（enhanced recovery after surgery，ERAS），下列敘述何者錯誤？", "options": {"A": "術後可更快速的恢復和出院", "B": "減少NPO時間、術後早期進食及早期活動", "C": "給予lactated Ringers優於sodium chloride", "D": "再住院率與死亡率有明顯的改變"}, "answer": "D", "explanation": "ERAS確實可改善術後恢復、縮短住院時間、減少併發症，但對「死亡率」的改善效果並不像對住院時間那樣明顯，D描述「明顯的改變」過於絕對，D錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_general_Q67"}, {"id": 68, "question": "下列何種藥物不會抑制缺氧性肺血管收縮（hypoxic pulmonary vasoconstriction）？", "options": {"A": "esmolol", "B": "propranolol", "C": "dexamethasone", "D": "aspirin"}, "answer": "送分", "explanation": "本題送分。Esmolol和propranolol為β阻斷劑；dexamethasone和aspirin為消炎藥。HPV抑制劑通常為吸入麻醉藥、血管擴張劑等；β阻斷劑對HPV影響有爭議。本題送分。", "category": "pharmacology", "difficulty": "hard", "source": "113_general_Q68"}, {"id": 69, "question": "下列何種藥物不會抑制缺氧性肺血管收縮（hypoxic pulmonary vasoconstriction）？", "options": {"A": "鈣離子通道阻斷劑", "B": "血管收縮素轉化酵素抑制劑（ACEIs）", "C": "靜脈麻醉藥propofol", "D": "吸入性麻醉藥（>1 MAC）"}, "answer": "C", "explanation": "Propofol靜脈麻醉藥對HPV影響輕微或無抑制（相較於吸入麻醉藥）；鈣阻斷劑、ACEIs、高濃度吸入麻醉藥均可抑制HPV，C不會抑制HPV。", "category": "pharmacology", "difficulty": "hard", "source": "113_general_Q69"}, {"id": 70, "question": "Mallampati score可用來評估喉頭鏡使用的困難程度，圖（二）屬於何種分級？", "options": {"A": "class I", "B": "class II", "C": "class III", "D": "class IV"}, "answer": "B", "explanation": "Mallampati分級：I=可見軟顎、懸雍垂、咽門柱全部；II=可見軟顎、懸雍垂但咽門柱被遮住；III=只見軟顎和懸雍垂基部；IV=只見硬顎。圖示為class II，B正確。", "category": "airway", "difficulty": "medium", "source": "113_general_Q70", "image": "113_general_Q70.png", "image_caption": "圖（二）：Mallampati 分級評估示意圖"}, {"id": 71, "question": "Upper lip bite test可評估插管難易程度，下列敘述何者錯誤？", "options": {"A": "class I表示病人下排牙齒可咬到超過上唇朱紅色邊緣（vermilion border）之上", "B": "class II表示病人下排牙齒只能咬到上唇朱紅色邊緣之下", "C": "class III表示病人下排牙齒咬不到上唇", "D": "class II以上表示與困難插管相關"}, "answer": "D", "explanation": "Upper lip bite test：class III（咬不到上唇）才與困難插管相關，不是class II以上，D錯誤。", "category": "airway", "difficulty": "medium", "source": "113_general_Q71"}, {"id": 72, "question": "有關眼心反射（oculocardiac reflex），下列敘述何者錯誤？", "options": {"A": "最常見於斜視手術（strabismus surgery），其他眼科手術也可能發生", "B": "常發生於眼外肌被拉扯或施打眼科神經阻斷時", "C": "發生時會造成心跳變快、血壓變高", "D": "年輕人比較容易發生"}, "answer": "C", "explanation": "眼心反射（Aschner reflex）：壓迫或牽拉眼球→迷走神經活化→心搏過緩（bradycardia）甚至停跳，而非心跳變快，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "113_general_Q72"}, {"id": 73, "question": "下列何者不是succinylcholine使用的絕對或相對禁忌症？", "options": {"A": "孕婦", "B": "高血鉀", "C": "惡性高熱", "D": "顱內高壓"}, "answer": "A", "explanation": "孕婦不是succinylcholine的禁忌症（胎兒無法通過胎盤，且緊急氣道時效益大於風險）；高血鉀（絕對禁忌）、惡性高熱（絕對禁忌）、顱內高壓（相對禁忌，因短暫升壓）均為禁忌，A不是禁忌症。", "category": "pharmacology", "difficulty": "medium", "source": "113_general_Q73"}, {"id": 74, "question": "下列何者肌肉的神經阻斷恢復速度最慢？", "options": {"A": "內收拇肌（adductor pollicis muscle）", "B": "橫膈膜（diaphragm）", "C": "腹直肌（rectus abdominis）", "D": "眼輪匝肌（orbicularis oculi muscle）"}, "answer": "A", "explanation": "肌肉鬆弛劑恢復速度：橫膈膜和眼輪匝肌最快恢復（呼吸和眼部），內收拇肌（adductor pollicis，TOF監測部位）恢復最慢，且最能代表深部肌肉（如聲帶）的恢復，A恢復最慢。", "category": "pharmacology", "difficulty": "hard", "source": "113_general_Q74"}, {"id": 75, "question": "病人因局部麻醉藥系統性中毒（local anesthetic systemic toxicity）後心律停止需要急救，下列藥物何者最為重要？", "options": {"A": "propofol", "B": "20% intralipid", "C": "10% intralipid", "D": "1% lidocaine"}, "answer": "BC", "explanation": "LAST心臟驟停治療：20% lipid emulsion（intralipid）為首選（可從心肌捕獲局麻藥），依公告答案為BC，10% intralipid亦可使用，BC均列為答案。", "category": "crisis", "difficulty": "medium", "source": "113_general_Q75"}, {"id": 76, "question": "有關術式與脊髓麻醉高度的配對，下列何者錯誤？", "options": {"A": "痔瘡手術S2-S5", "B": "腳掌手術L2-L3", "C": "剖腹產T10", "D": "闌尾切除T6-T7"}, "answer": "C", "explanation": "剖腹產脊髓麻醉需達T4（非T10）；T10只足夠子宮頸以下的感覺阻斷，剖腹產需更高的麻醉平面，C錯誤。", "category": "regional", "difficulty": "medium", "source": "113_general_Q76"}, {"id": 77, "question": "依據「專科護理師於醫師監督下執行醫療業務辦法」第5條，醫療機構或護理機構應成立專科護理師執行醫療業務委員會，其主要功能何者錯誤？", "options": {"A": "專科護理師之甄審", "B": "訂定執行醫療業務標準作業程序", "C": "訂定醫療業務範圍及特定訓練", "D": "定期檢討醫療業務的適當性及品質"}, "answer": "A", "explanation": "委員會功能為訂定SOP、醫療業務範圍、定期檢討品質等；「甄審」屬另一專責機構（衛福部或評鑑機構）的功能，不是院內委員會的主要功能，A錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q77"}, {"id": 78, "question": "依據「專科護理師於醫師監督下執行醫療業務辦法」，麻醉專科護理師對侵入性醫療處置在臨床上的執業範圍，下列敘述何者錯誤？", "options": {"A": "口咽呼吸道置入", "B": "調整藥物與麻醉設備", "C": "上聲門呼吸道置入", "D": "初次鼻胃管置入"}, "answer": "C", "explanation": "麻醉專師可執行的侵入性處置包含口咽呼吸道置入、鼻胃管置入（初次）、動靜脈導管等；上聲門呼吸道（LMA）置入在一般通則中為可執行項目，但依公告答案C錯誤，可能指特定情境下的限制。", "category": "ethics_law", "difficulty": "hard", "source": "113_general_Q78"}, {"id": 79, "question": "有關專科護理師執行醫療業務時，醫師的監督方式，下列敘述何者錯誤？", "options": {"A": "醫師必須親自在場", "B": "醫師可以透過視訊或電話進行監督", "C": "醫師可以透過指示、指導或督促的方式進行監督", "D": "監督時，不以醫師親自在場為必要"}, "answer": "A", "explanation": "依辦法，監督不以醫師親自在場為必要（可透過電話、視訊等方式），A描述「必須親自在場」錯誤，A錯誤。", "category": "ethics_law", "difficulty": "easy", "source": "113_general_Q79"}, {"id": 80, "question": "麻醉專科護理師對侵入性醫療處置在臨床上的執業範圍，下列敘述何者正確？", "options": {"A": "氣管內管移除", "B": "硬脊膜外導管置入", "C": "中心靜脈導管置入", "D": "施打脊髓麻醉"}, "answer": "A", "explanation": "氣管內管移除（拔管）屬麻醉專師可執行範圍；硬膜外導管置入、CVC置入、脊髓麻醉施打均為麻醉醫師業務，A正確。", "category": "ethics_law", "difficulty": "medium", "source": "113_general_Q80"}]};

const DATA_114_ADVANCED = {"meta": {"year": 114, "role": "nurse", "subject": "advanced", "subject_name": "進階專科護理", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "有關腸道營養（enteral nutrition）的一般原則，下列敘述何者正確？①假如病人情況允許，靜脈營養應優先於腸道營養 ②管路灌食有腹瀉情形時，應使用止瀉藥及減少纖維素含量 ③鼻胃管放置錯位，包括插進氣管、支氣管，常發生在昏迷的病人 ④有長期管灌需求的病人，可以建議放置胃造廔管", "options": {"A": "①②", "B": "②③", "C": "③④", "D": "①④"}, "answer": "C", "explanation": "腸道營養優先於靜脈營養（①錯）。腸道灌食腹瀉時應尋找原因而非直接減少纖維（②錯）。昏迷病人缺乏保護性反射，鼻胃管易誤插入氣道（③正確）。長期管灌建議胃造廔管以減少鼻咽刺激（④正確）。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q1"}, {"id": 2, "question": "一位58歲男性罹患糖尿病15年，目前口服藥物控制，下列何者不是營養狀態評估的指標？", "options": {"A": "BMI", "B": "albumin", "C": "HbA1c", "D": "hemoglobin"}, "answer": "C", "explanation": "BMI、albumin、hemoglobin均為評估營養狀態的常用指標。HbA1c反映3個月血糖控制情況，是糖尿病監測指標，不屬於營養狀態評估指標。", "category": "critical_care", "difficulty": "easy", "source": "114_anesthesia_Q2"}, {"id": 3, "question": "有關嚴重高血鉀合併心電圖改變的醫療處置，下列敘述何者不適當？", "options": {"A": "靜脈輸注葡萄糖酸鈣（calcium gluconate），可以有效降低血清鉀離子濃度", "B": "胰島素（regular insulin）與葡萄糖靜脈注射，可以使鉀離子移入細胞", "C": "以NaHCO3等滲溶液靜脈輸注，可以改善代謝性酸中毒", "D": "以β2腎上腺素促效劑，可以促進細胞對鉀的攝取"}, "answer": "A", "explanation": "Calcium gluconate不降低血鉀，而是穩定心肌膜電位，拮抗高血鉀對心臟的毒性。降低血鉀需用：胰島素+葡萄糖（轉移）、NaHCO3（轉移）、β2促效劑（轉移）、透析或排鉀利尿劑（排除）。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q3"}, {"id": 4, "question": "有關成年人的營養需求，下列敘述何者不適當？", "options": {"A": "蛋白質攝取量每日0.8g/kg，可以滿足97%成年人的需求", "B": "對於重症病人，蛋白質攝取量至少每日1.2g/kg，以減少瘦體身體（lean body）質量流失", "C": "身體質量指數25-29 kg/m²的成年人，其熱量需求為21-25 kcal/kg/day", "D": "某些組織（如骨髓、眼睛等）不能代謝脂肪酸，需以葡萄糖（每日約40g）作為能量來源"}, "answer": "CD", "explanation": "本題為多選題，答案為CD。(C)BMI 25-29的熱量需求通常為25-30 kcal/kg/day（非21-25）。(D)每日必需葡萄糖約100g（非40g），供應大腦及無法代謝脂肪酸的組織使用。", "category": "critical_care", "difficulty": "hard", "source": "114_anesthesia_Q4", "is_multiple": true}, {"id": 5, "question": "有關病毒性腦炎（encephalitis）感染，下列敘述何者不適當？", "options": {"A": "第一型單純皰疹病毒（HSV-1）為最常見和最重要的病原", "B": "臨床表現為發燒、意識狀態改變，合併性格改變或癲癇", "C": "腦脊髓液分析應包括單純皰疹病毒和腸病毒聚合酶連鎖反應檢測", "D": "磁振攝影常發現枕葉病灶，為HSV-1最敏感的影像檢查"}, "answer": "D", "explanation": "HSV-1腦炎的MRI特徵病灶位於顳葉（temporal lobe）及額葉（frontal lobe），而非枕葉。顳葉病灶為HSV-1腦炎最典型的影像表現。", "category": "neurology", "difficulty": "medium", "source": "114_anesthesia_Q5"}, {"id": 6, "question": "有關胺基糖苷類（aminoglycosides）藥物，下列敘述何者不適當？", "options": {"A": "透過與細菌核糖體（ribosome）結合，在mRNA轉譯過程，抑制細菌蛋白質合成", "B": "常與細胞壁活性藥物（如β內醯胺類）併用，用於治療嚴重感染", "C": "在膿瘍（abscesses）的低pH值/低氧環境中，仍保有良好的活性", "D": "使用需注意發生不可逆腎毒性（nephrotoxicity）和耳毒性（ototoxicity）"}, "answer": "C", "explanation": "胺基糖苷類需要氧依賴性主動轉運進入細菌，在膿瘍的低pH值、低氧環境中活性顯著降低，無法有效滲透。這是其主要臨床限制之一。", "category": "pharmacology", "difficulty": "hard", "source": "114_anesthesia_Q6"}, {"id": 7, "question": "磺胺類藥物（trimethoprim/sulfamethoxazole：Baktar®），是廣效性抗生素，臨床無法治療下列何種病原？", "options": {"A": "人類肺囊蟲（Pneumocystis jiroveci）", "B": "大腸桿菌（E. coli）", "C": "金黃色葡萄球菌（Staphylococcus aureus）", "D": "綠膿桿菌（Pseudomonas aeruginosa）"}, "answer": "D", "explanation": "Trimethoprim/sulfamethoxazole對PCP、大腸桿菌、金黃色葡萄球菌（部分MSSA）有效，但對綠膿桿菌（Pseudomonas aeruginosa）天然具有抗藥性，無法有效治療。", "category": "pharmacology", "difficulty": "medium", "source": "114_anesthesia_Q7"}, {"id": 8, "question": "病人生命徵象為體溫38.5℃、脈搏120次/分、呼吸22次/分、血壓120/65 mmHg、WBC 15000μL（seg 84.7%）、CRP 19.8mg/dL、指甲夾板出血及主動脈瓣區舒張期心雜音，下列何者為最可能的診斷？", "options": {"A": "bacterial peritonitis", "B": "myocarditis", "C": "pericarditis", "D": "bacterial endocarditis"}, "answer": "D", "explanation": "感染性心內膜炎（bacterial endocarditis）的典型表現：發燒、白血球升高、指甲夾板出血（splinter hemorrhage）、新出現的心雜音（主動脈瓣逆流的舒張期雜音）。符合Duke criteria中的主要和次要標準。", "category": "cardiology", "difficulty": "medium", "source": "114_anesthesia_Q8"}, {"id": 9, "question": "一位70歲女性因暈厥被送至急診，圖(一)是此病人的心電圖，最有可能是下列何種心律？", "options": {"A": "一度房室傳導阻滯（first-degree AV block）", "B": "二度房室傳導阻滯（second-degree AV block），Mobitz type I", "C": "二度房室傳導阻滯（second-degree AV block），Mobitz type II", "D": "完全性房室傳導阻滯（complete AV block）"}, "answer": "C", "explanation": "依據心電圖表現描述（PR間期固定，突然出現P波未下傳，無PR延長），符合Mobitz type II。Mobitz I（Wenckebach）特徵是PR間期逐漸延長後出現脫落。Mobitz II較危險，常需要裝置節律器。", "category": "cardiology", "difficulty": "hard", "source": "114_anesthesia_Q9", "image": "114_anesthesia_Q9.png", "image_caption": "心電圖（圖一）：70 歲女性暈厥之心律分析"}, {"id": 10, "question": "一位60歲女性因腹痛、噁心與嘔吐來急診。此病人有剖腹產與膽囊切除手術病史，其KUB如圖(二)，請問最有可能的診斷為何？", "options": {"A": "沾黏性小腸阻塞（adhesive small bowel obstruction）", "B": "大腸阻塞（large bowel obstruction）", "C": "缺血性大腸炎（ischemic colitis）", "D": "小腸憩室炎（small bowel diverticulitis）"}, "answer": "A", "explanation": "有腹部手術史（剖腹產、膽囊切除），KUB顯示小腸擴張合併空氣液面，最常見原因是腹腔沾黏（adhesion）導致的小腸阻塞。沾黏是手術後腸阻塞最主要的原因。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q10", "image": "114_anesthesia_Q10.png", "image_caption": "KUB（圖二）：60 歲女性腹痛、噁心嘔吐，曾接受剖腹產與膽囊切除手術"}, {"id": 11, "question": "下列實驗室檢查結果，何者不符合腎前性急性腎損傷（prerenal acute kidney injury）的診斷？", "options": {"A": "排鈉分率（fractional excretion of sodium，FENa）>1%", "B": "尿液滲透壓（urine osmolality）>500mOsm/kg", "C": "尿素氮和血清肌酸酐的比值（BUN:Cr ratio）>20", "D": "尿素排出分率（fractional excretion of urea nitrogen，FEUrea）<35%"}, "answer": "A", "explanation": "腎前性AKI的特徵：腎臟保鈉，FENa<1%（>1%提示腎因性）；尿液濃縮，osmolality>500；BUN:Cr>20（因腎小管重吸收增加）；FEUrea<35%。因此FENa>1%不符合腎前性AKI診斷。", "category": "renal", "difficulty": "hard", "source": "114_anesthesia_Q11"}, {"id": 12, "question": "一位25歲男性因呼吸困難至急診就醫，主訴2天前工作撞擊到右側胸部，胸部X光檢查如圖(三)，下列處置何者較適當？", "options": {"A": "立即給予右側胸管置入引流", "B": "觀察呼吸困難狀況並給予肌肉鬆弛劑", "C": "立即安排胸腔鏡手術治療", "D": "安排胸部電腦斷層檢查確立診斷"}, "answer": "A", "explanation": "外傷後氣胸合併呼吸困難，X光已確認氣胸，應立即置入胸管引流。電腦斷層可提供更多資訊但不應延誤處置；胸腔鏡手術不是第一線處置；肌肉鬆弛劑對氣胸無治療效果。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q12", "image": "114_anesthesia_Q12.png", "image_caption": "胸部 X 光（圖三）：25 歲男性右側胸部撞擊後呼吸困難"}, {"id": 13, "question": "一位68歲男性因右上腹悶痛3天加劇，伴隨噁心，出現黃疸與發燒（38.5°C）而就醫。抽血檢查結果WBC 16200/μL（neutrophil 87%，band form 9%）、CRP 12.8mg/dL、AST 38U/L、ALT 45U/L、total bilirubin 4.5mg/dL。最有可能之診斷為何？", "options": {"A": "病毒性肝炎", "B": "細菌性膽管炎", "C": "肝硬化急性發作", "D": "急性胰臟炎"}, "answer": "B", "explanation": "Charcot's triad（右上腹痛、黃疸、發燒）加上白血球升高、band form增加，高度符合細菌性膽管炎（ascending cholangitis）。肝酵素輕微上升而bilirubin顯著升高，提示膽道阻塞。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q13"}, {"id": 14, "question": "一位38歲男性，罹患第二型糖尿病未規則治療，因意識改變就醫。抽血檢查結果血糖980mg/dL、血清滲透壓350mOsm/kg、ketone（定量）0.1mmol/L、lactate 1.9mmol/L，動脈血液氣體分析結果pH 7.36、PaCO₂ 41mmHg、HCO₃⁻ 22mmol/L。根據以上數據，最可能的診斷為何？", "options": {"A": "高滲透壓高血糖狀態", "B": "糖尿病酮酸中毒", "C": "高乳酸酸中毒", "D": "正常代謝性酸中毒"}, "answer": "A", "explanation": "血糖極高（980mg/dL）、血清滲透壓升高（>320mOsm/kg）、幾乎無酮體（<0.6mmol/L）、pH正常（7.36）→符合高滲透壓高血糖狀態（HHS）。DKA特徵為顯著酮酸中毒。", "category": "endocrine", "difficulty": "hard", "source": "114_anesthesia_Q14"}, {"id": 15, "question": "下列哪項檢驗最常用於判斷心衰竭嚴重程度的血清指標？", "options": {"A": "Troponin T", "B": "Myoglobin", "C": "BNP", "D": "Lactate"}, "answer": "C", "explanation": "BNP（brain natriuretic peptide）及NT-proBNP是評估心衰竭嚴重程度及預後的最重要血清指標，與心室壁張力直接相關。Troponin用於心肌損傷；Myoglobin用於肌肉損傷；Lactate評估組織灌流。", "category": "cardiology", "difficulty": "easy", "source": "114_anesthesia_Q15"}, {"id": 16, "question": "一位80歲男性因肺炎併急性呼吸衰竭使用機械通氣（mechanical ventilation），護理師發現呼吸器異常警示音、頸部可觸及皮下氣泡聲（crepitus）、呼吸音右側變弱，SpO₂降至86%。最可能的併發症及最恰當的處置為何？", "options": {"A": "呼吸器相關肺炎；給予經驗性抗生素治療", "B": "氣壓性傷害（barotrauma）；通知醫師評估是否需胸管引流", "C": "呼吸器脫落導致肺不張；立即重新連接呼吸器", "D": "呼吸器異常同步（ventilator dyssynchrony）；增加鎮靜劑改善病人適應度"}, "answer": "B", "explanation": "皮下氣腫（crepitus）+ 呼吸音不對稱 + SpO₂下降，在使用機械通氣的病人，最可能是氣壓性傷害（barotrauma）導致氣胸或縱膈氣腫，需通知醫師評估是否需胸管引流。", "category": "pulmonary", "difficulty": "medium", "source": "114_anesthesia_Q16"}, {"id": 17, "question": "一位65歲男性因泌尿道感染併發寒顫與發燒入院，生命徵象為血壓85/50 mmHg、體溫37.8°C、心跳110次/分、呼吸速率24次/分，尿量明顯減少。SpO₂為98%，乳酸值為4.2mmol/L。此時，作為專科護理師，下列哪項處置應優先執行？", "options": {"A": "盡快安排病人立即接受腎臟超音波檢查，查明是否有水腎（hydronephrosis）", "B": "給予退燒藥以降低病人不適", "C": "快速給予靜脈輸注晶體溶液（crystalloid fluid）30mL/kg以穩定血壓", "D": "等待醫師評估後再決定是否使用升壓劑"}, "answer": "C", "explanation": "符合敗血性休克診斷（感染+低血壓+乳酸>2mmol/L）。依Surviving Sepsis Campaign指引，1小時bundle包括30mL/kg晶體液快速輸注為優先處置。其他評估可同步進行，但輸液復甦最緊迫。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q17"}, {"id": 18, "question": "有關4種休克類型的病理機轉，下列敘述何者最適當？", "options": {"A": "低血容量性休克是因血管阻塞，造成心臟無法有效射出血液", "B": "心因性休克的主要機轉是心肌收縮力不足，導致心輸出量下降", "C": "阻塞性休克常見於嚴重感染，造成微血管滲透性上升", "D": "血管擴張性休克的特徵是前負荷增加，導致周邊灌流過度"}, "answer": "B", "explanation": "心因性休克（cardiogenic shock）：心肌收縮力不足→心輸出量下降→組織灌流不足。低血容量性：血量不足，非血管阻塞。阻塞性（如張力性氣胸、心包填塞）：機械性阻礙血流，非感染所致。血管擴張性：血管阻力下降導致灌流不足，非前負荷增加。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q18"}, {"id": 19, "question": "一位72歲男性因嚴重感染合併意識改變至加護病房治療，平均動脈壓52mmHg，依體重給予生理食鹽水輸注30mL/kg後仍呈現低血壓。此時最適合的第一線升壓劑為何？", "options": {"A": "epinephrine", "B": "dopamine", "C": "norepinephrine", "D": "vasopressin"}, "answer": "C", "explanation": "依Surviving Sepsis Campaign指引，敗血性休克充分輸液後仍低血壓，第一線升壓劑選擇norepinephrine（正腎上腺素）。Vasopressin可作為附加用藥，epinephrine用於難治性休克，dopamine因副作用較多已非首選。", "category": "critical_care", "difficulty": "easy", "source": "114_anesthesia_Q19"}, {"id": 20, "question": "院內心跳停止（in-hospital cardiac arrest，IHCA）後成功ROSC（恢復自發性循環）之病人，下列處置何者不適當？", "options": {"A": "常規給予lidocaine防止再次心律不整", "B": "維持PaCO₂在35-45mmHg", "C": "對STEMI病人或高度疑似STEMI病人做PCI治療", "D": "將平均動脈壓控制在65mmHg以上"}, "answer": "A", "explanation": "ROSC後，常規預防性給予lidocaine並無實證支持，且可能有害，不建議常規使用。目前指引建議：避免低血壓（MAP≥65mmHg）、正常CO₂、STEMI行急診PCI、考慮目標溫度管理。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q20"}, {"id": 21, "question": "一位58歲男性主訴胸悶、盜汗到急診，十二導程心電圖如圖(四)。目前血壓90/60mmHg、心跳52次/分，無明顯肺部濕囉音。在等待心導管檢查的同時，下列處置何者不適當？", "options": {"A": "監測生命徵象、建立靜脈路徑", "B": "給予低流量氧氣支持（若SpO₂<90%）", "C": "給予硝酸甘油（nitroglycerin）緩解胸痛", "D": "安排右側心電圖以排除右心心肌梗塞"}, "answer": "C", "explanation": "下壁STEMI合併低血壓（90/60）、心跳慢（52次/分），需排除右心室心肌梗塞（右側心電圖有助診斷）。右心室梗塞時禁用硝酸甘油，因其擴張靜脈、降低前負荷，會使血壓進一步下降。", "category": "cardiology", "difficulty": "hard", "source": "114_anesthesia_Q21", "image": "114_anesthesia_Q21.png", "image_caption": "十二導程心電圖（圖四）：58 歲男性胸悶、盜汗，BP 90/60 mmHg、HR 52 bpm"}, {"id": 22, "question": "有關腦血流量（cerebral blood flow，CBF）的調節機制，下列敘述何者正確？", "options": {"A": "低體溫（hypothermia）會增加腦血流量", "B": "慢性高血壓病人腦血流量自我調節的上下限都會上升", "C": "腦灌流壓（cerebral perfusion pressure）正常值約25-50mmHg", "D": "PaCO₂介於20-80mmHg時，PaCO₂越高，腦血流量越低"}, "answer": "B", "explanation": "慢性高血壓使腦血管自動調節曲線右移，上下限均升高，因此這類病人在正常血壓時反而可能腦血流不足。低體溫降低CMRO₂進而降低CBF。CPP正常值約60-80mmHg。PaCO₂升高時CBF增加（血管擴張）。", "category": "neurology", "difficulty": "hard", "source": "114_anesthesia_Q22"}, {"id": 23, "question": "顱內壓（intracranial pressure，ICP）升高對腦血流量（cerebral blood flow，CBF）及腦灌流壓（cerebral perfusion pressure，CPP）的影響為何？", "options": {"A": "腦血流量不變", "B": "腦血流量增加", "C": "腦灌流壓下降", "D": "腦灌流壓增加"}, "answer": "C", "explanation": "CPP = MAP - ICP。ICP升高時，在MAP不變的情況下CPP下降。CPP下降→CBF下降（非不變或增加）。因此答案為(C)腦灌流壓下降，同時CBF通常也會下降。", "category": "neurology", "difficulty": "medium", "source": "114_anesthesia_Q23"}, {"id": 24, "question": "有關麻醉藥物對體感誘發電位（somatosensory evoked potentials，SSEPs）與運動誘發電位（motor evoked potentials，MEPs）監測的影響，下列敘述何者正確？", "options": {"A": "ketamine傾向增加長潛伏期（long-latency）電位的波幅", "B": "一般臨床劑量下，靜脈麻醉劑對誘發電位的影響小於揮發性麻醉劑", "C": "高劑量靜脈藥物，會增加誘發電位波幅（amplitude）並縮短潛伏期（latency）", "D": "吸入性麻醉劑對MEPs影響小，可使用1.2最小肺泡分壓（MAC）維持麻醉深度"}, "answer": "B", "explanation": "靜脈麻醉劑（propofol、opioid為主）對SSEP/MEP影響遠小於吸入性麻醉劑。Ketamine增加的是短潛伏期皮質電位。高劑量麻醉藥物使波幅下降、潛伏期延長（非反之）。吸入性麻醉劑對MEPs影響顯著，通常不超過0.5MAC。", "category": "neuroanesthesia", "difficulty": "hard", "source": "114_anesthesia_Q24"}, {"id": 25, "question": "有關麻醉藥物對大腦生理的影響，下列敘述何者正確？", "options": {"A": "etomidate可降低腦代謝率與顱內壓", "B": "propofol可降低腦代謝率與腦血流量", "C": "ketamine可降低顱內壓與腦血流量", "D": "isoflurane可降低腦血流與腦代謝率"}, "answer": "AB", "explanation": "本題經疑義更正，(A)(B)皆正確。(A)etomidate：降低CMRO₂、進而降低ICP，可用於顱內壓升高的病人誘導。(B)propofol：降低CMRO₂及CBF，適合神經外科麻醉。(C)ketamine：傳統認為升高ICP及CBF（在控制通氣下影響較小，但不能說「降低」）。(D)isoflurane：可降低CMRO₂但具血管擴張作用，可能升高CBF（劑量依賴性）。", "category": "neuroanesthesia", "difficulty": "hard", "source": "114_anesthesia_Q25", "is_multiple": true}, {"id": 26, "question": "有關骨水泥植入症候群的臨床表現，下列敘述何者正確？", "options": {"A": "包括高血壓與心輸出量增加", "B": "可能導致全身血管阻力上升", "C": "可能引起心律不整，如心傳導阻滯與竇性停搏", "D": "經常發生在肩關節置換，但與髖關節置換無關"}, "answer": "C", "explanation": "骨水泥植入症候群（BCIS）臨床表現包括：低血壓（非高血壓）、低血氧、心律不整（傳導阻滯、竇性停搏）、心輸出量下降（非增加）、全身血管阻力下降（非上升）。最常見於髖關節置換，也可見於其他部位。", "category": "orthopedic_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q26"}, {"id": 27, "question": "人工膝關節置換術於止血帶放氣後出現低血壓，下列何者為最可能的原因？", "options": {"A": "局部缺血導致交感神經活性持續升高", "B": "麻醉藥物於放氣後被快速吸收導致中樞抑制", "C": "缺血末端產物釋放引發代謝性酸中毒與心律不整", "D": "因心跳變慢導致心輸出量降低"}, "answer": "C", "explanation": "止血帶放氣後，缺血末端肢體的代謝廢物（乳酸、CO₂、鉀離子等）大量回流，引起反應性充血、血管擴張、代謝性酸中毒，可能導致低血壓、心律不整。這是止血帶放氣後低血壓的主要機轉。", "category": "orthopedic_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q27"}, {"id": 28, "question": "有關dexmedetomidine臨床使用，下列敘述何者正確？", "options": {"A": "可引起顯著呼吸抑制，因此不適用於清醒插管", "B": "再分布時間較慢，且消除半衰期超過6小時", "C": "可取代鴉片類藥物，單獨使用即可達到強效鎮痛效果", "D": "為α₂-腎上腺素受體促效劑，可用於抗焦慮、鎮靜與止痛"}, "answer": "D", "explanation": "Dexmedetomidine為高選擇性α₂腎上腺素受體促效劑，具鎮靜、抗焦慮、適度鎮痛作用，且呼吸抑制輕微，適用於清醒插管。其消除半衰期約2小時（非>6小時），鎮痛效果不足以單獨替代opioid。", "category": "pharmacology", "difficulty": "medium", "source": "114_anesthesia_Q28"}, {"id": 29, "question": "有關圍術期視力喪失（perioperative vision loss，POVL）的風險，下列敘述何者正確？", "options": {"A": "最常見於眼睛直接受到手術操作造成的創傷", "B": "缺血性視神經病變和青光眼會增加發生率", "C": "頭部穩定擺位與眼部壓力無關，不會增加發生率", "D": "俯臥手術時刻意採用低血壓策略，有助於降低發生率"}, "answer": "B", "explanation": "POVL最常見原因為缺血性視神經病變（ION），非直接創傷。青光眼病人因視神經對缺血更敏感，風險更高。俯臥位時眼部可能受到直接壓迫（增加眼內壓），低血壓策略反而增加POVL風險（非降低）。", "category": "ophthalmology", "difficulty": "hard", "source": "114_anesthesia_Q29"}, {"id": 30, "question": "全膝關節置換術於術後止痛採用acetaminophen、ketorolac、單次劑量硬脊膜外止痛與股神經阻斷（femoral nerve block），下列敘述何者正確？", "options": {"A": "acetaminophen與單次劑量硬脊膜外止痛合併使用會拮抗止痛效果", "B": "ketorolac屬中樞止痛藥，與acetaminophen作用機轉相同", "C": "股神經阻斷不影響運動功能，不會增加跌倒風險", "D": "多模式止痛可降低鴉片類藥物使用"}, "answer": "D", "explanation": "多模式止痛（multimodal analgesia）利用不同機轉的止痛藥物協同作用，可有效降低opioid用量並減少副作用。股神經阻斷會影響股四頭肌功能，增加跌倒風險。Ketorolac為NSAIDs（周邊作用），與acetamin
