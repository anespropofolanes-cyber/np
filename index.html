ion": "影響 SpO₂ 準確性：COHb（CO 中毒，脈氧計讀偏高）、MetHb（讀數趨向 85%）、色素（指甲油、Methylene blue 使讀數偏低）、低灌流、色素沉著等。甲狀腺亢進不影響脈氧計的光學偵測原理。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q71"}, {"id": 72, "question": "60歲男性病人有高血壓病史，接受輸尿管鏡碎石術(URSL)後，在恢復室抱怨呼吸困難，心電圖監視器如下，請問下列何項處置最不適當？", "options": {"A": "做12導程心電圖", "B": "給予Insulin + Glucose", "C": "抽血檢驗心肌酵素", "D": "給予Nitroglycerin"}, "answer": "D", "explanation": "心電圖顯示高峻T波，長期洗腎（此情境）提示高血鉀。Nitroglycerin 是治療心肌缺血/心絞痛，對高血鉀無效且可能加重低血壓。應優先確認高血鉀並給予 Calcium、Insulin+Glucose、Bicarbonate、透析等治療。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q72", "image": "109_general_Q72.png", "image_caption": "心電圖：高峻 T 波（peaked T wave）"}, {"id": 73, "question": "麻醉機開機後都應按標準程序進行安全檢查，通常麻醉機完成安全檢查後的最終狀態，下列何項正確？", "options": {"A": "打開揮發器", "B": "關閉APL valve", "C": "打開氧氣流量計", "D": "通氣選擇鈕轉到人工通氣模式"}, "answer": "D", "explanation": "麻醉機安全檢查完成後的預備狀態：揮發器應關閉（準備使用前再開）；APL valve 應打開（預防氣道壓過高）；氧氣流量計關閉；通氣選擇應設定在手動/人工通氣模式，讓醫師誘導時可控制呼吸。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q73"}, {"id": 74, "question": "進行麻醉時，若有呼吸道問題無法適當通氣，可使用呼吸道輔助物，以下敘述何者最適當？", "options": {"A": "鼻腔人工氣道(nasal airway)長度選擇為口至下頷骨角距離", "B": "清醒或輕度麻醉病人適合使用口腔人工氣道(oral airway)，較不會發生嘔吐反射", "C": "凝血或血小板異常病人是使用鼻腔人工氣道(nasal airway)的相對禁忌", "D": "顱底骨折病人建議使用鼻腔人工氣道(nasal airway)"}, "answer": "C", "explanation": "鼻腔氣道（nasal airway）插入時可能造成鼻黏膜出血，凝血異常者有大出血風險，屬相對禁忌。長度選擇為鼻尖至耳垂（非口至下頷）；清醒病人適合鼻腔（非口腔）氣道；顱底骨折禁用鼻腔氣道。", "category": "airway", "difficulty": "easy", "source": "109_general_Q74"}, {"id": 75, "question": "病人接受常規全身麻醉手術，術中使用雙譜指數(bispectral index，BIS)監測，其敘述何者正確？", "options": {"A": "BIS監測數值100，代表病人是在清醒的狀態", "B": "給予Ketamine，BIS超過70，代表病人發生術中清醒", "C": "當BIS低到20~35時，才代表病人已達到適當麻醉狀態", "D": "當病人術中體溫34℃時，BIS數值仍然準確具有效力"}, "answer": "A", "explanation": "BIS 0-100：100=完全清醒，0=完全抑制。適當麻醉目標：BIS 40–60。Ketamine 可使 BIS 升高但不代表清醒（機制不同）；低體溫（< 33℃）可使 BIS 不準確（偏低）；爆發性抑制（burst suppression）在 20–35。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q75"}, {"id": 76, "question": "使用壓脈帶(BP cuff)在病人上臂測量血壓，以下何者為非？", "options": {"A": "壓脈帶的最佳尺寸，寬度約是上臂圍的40%", "B": "壓脈帶的最佳尺寸，寬度約是上臂長的2/3", "C": "太大的壓脈帶測出的血壓數值會比實際偏低", "D": "病人低血壓時測出的血壓數值會比實際偏低"}, "answer": "D", "explanation": "壓脈帶過大→測出血壓偏低（需較低充氣壓即可壓迫動脈）；壓脈帶過小→測出血壓偏高。低血壓時，NIBP 測出值可能比實際偏高（Korotkoff 音不易聽清，測量值誤差大且常高估實際動脈壓）。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q76"}, {"id": 77, "question": "病人因輸尿管結石進行內視鏡取石術，採脊髓麻醉，手術半小時結束送至恢復室，一開始病人主訴吸不到氣，血壓70/30 mmHg、心跳45次/分，測麻醉阻斷高度在T4，下列處置何者不適當？", "options": {"A": "快速靜脈輸液", "B": "Atropine 0.5 mg IV", "C": "Ephedrine 8-12 mg IV", "D": "Xylocaine 1.5 mg/kg IV"}, "answer": "D", "explanation": "脊髓麻醉高位阻斷（T4）：阻斷心臟加速神經（T1–T4）→ 心搏過緩 + 低血壓。處置：快速輸液（增加前負荷）、Atropine（治療心搏過緩）、Ephedrine（升壓+增加心率）。Xylocaine 靜脈注射無助於此情境，且有心臟毒性風險。", "category": "regional", "difficulty": "hard", "source": "109_general_Q77"}, {"id": 78, "question": "關於殘餘神經肌肉阻斷作用(residual neuromuscular blockade, RNB)的描述，下列何者為非？", "options": {"A": "在恢復室發生上呼吸道阻塞時，要考慮RNB的可能性", "B": "Train-of-four(TOF) ratio常作為客觀的評估方法", "C": "發燒或低血鎂常導致非去極化神經肌肉阻斷作用延長", "D": "臨床評估RNB尚有抓握力、伸舌頭、抬腿和抬頭5秒"}, "answer": "C", "explanation": "使非去極化肌鬆效果延長的因素：低體溫（非發燒）、高血鎂（非低血鎂）、酸中毒、低鉀血症、使用吸入性麻醉藥、抗生素（aminoglycosides）。低血鎂反而可能使阻斷作用縮短。", "category": "pharmacology", "difficulty": "medium", "source": "109_general_Q78"}, {"id": 79, "question": "關於重症肌無力(myasthenia gravis, MG)病人接受麻醉的評估與考量，下列敘述何者為非？", "options": {"A": "MG的發病常表現為漸進式的喉肌或眼球肌無力", "B": "術前應停用anticholinesterase治療", "C": "MG病人對去極化肌肉鬆弛劑不敏感", "D": "MG病人對非去極化肌肉鬆弛劑非常敏感"}, "answer": "B", "explanation": "MG 病人術前一般應繼續使用抗膽鹼酯酶藥物（如 Pyridostigmine）至手術前，突然停用可能誘發肌無力危象。術中可能需要減少或避免肌肉鬆弛劑（對非去極化藥物極度敏感）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q79"}, {"id": 80, "question": "重症病人有糖尿病史，建議應將圍術期血糖維持在何範圍？", "options": {"A": "60-100 mg/dL", "B": "80-120 mg/dL", "C": "140-180 mg/dL", "D": "200-240 mg/dL"}, "answer": "C", "explanation": "目前主流指引（包括 ADA、AACE）建議重症病人圍術期血糖控制在 140–180 mg/dL。過度嚴格控制（< 110 mg/dL）反而增加低血糖風險，與更差的預後相關（NICE-SUGAR 研究）。", "category": "physiology", "difficulty": "medium", "source": "109_general_Q80"}]};
const DATA_110_ADVANCED = {"meta": {"year": 110, "role": "nurse", "subject": "advanced", "subject_name": "進階專科護理", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "病人檢測血鈣值為2.0mg/dL，且血清白蛋白為2.5g/dL，其校正後的血鈣值為多少mg/dL？", "options": {"A": "1.8", "B": "2.4", "C": "2.8", "D": "3.2"}, "answer": "D", "explanation": "校正血鈣公式：校正血鈣 = 測得血鈣 + 0.8 × (4 - 白蛋白)。= 2.0 + 0.8 × (4 - 2.5) = 2.0 + 0.8 × 1.5 = 2.0 + 1.2 = 3.2 mg/dL。正常白蛋白為 4 g/dL，每降低 1 g/dL，校正值加 0.8 mg/dL。", "category": "physiology", "difficulty": "medium", "source": "110_advanced_Q1"}, {"id": 2, "question": "有關高血鉀藥物治療的作用機轉，下列何者錯誤？", "options": {"A": "靜脈注射calcium gluconate可以穩定心肌細胞膜", "B": "靜脈注射regular insulin會將鉀離子轉移至細胞內", "C": "靜脈注射sodium bicarbonate會將鉀離子與鈉離子交換", "D": "口服kayexalate會將腸道鉀離子與鈉離子交換"}, "answer": "C", "explanation": "NaHCO₃ 治療高血鉀的機轉是使血液鹼化，促進 K⁺ 進入細胞內（H⁺-K⁺ 交換），而非 K⁺ 與 Na⁺ 直接交換。Kayexalate（離子交換樹脂）才是在腸道中以 Na⁺ 交換 K⁺。", "category": "pharmacology", "difficulty": "medium", "source": "110_advanced_Q2"}, {"id": 3, "question": "有關嗎啡類止痛劑的說明，下列何者正確？", "options": {"A": "主要藉由μ receptor達到止痛效果，可能產生心搏過快及瞳孔放大等反應", "B": "meperidine (Demerol®)常用於急性胰臟炎止痛，臨床上少見有成癮的狀況", "C": "腎衰竭病人使用morphine進行止痛不須調整劑量", "D": "fentanyl為強效型嗎啡類止痛劑，可經由靜脈、經皮及黏膜等途徑吸收"}, "answer": "D", "explanation": "Fentanyl 脂溶性高，可靜脈、經皮貼片、口腔黏膜（棒棒糖型）等途徑給藥。μ 受體作用產生瞳孔縮小（非放大）及心搏過緩（非過快）；Meperidine 成癮性高；腎衰竭時 Morphine 活性代謝物（M6G）蓄積需調整劑量。", "category": "pharmacology", "difficulty": "easy", "source": "110_advanced_Q3"}, {"id": 4, "question": "有關病人疼痛評估的敘述，下列何者錯誤？", "options": {"A": "了解是否有相關的誘發因子或緩解因子", "B": "常使用numerical rating scale (NRS) 0～5分來評估", "C": "確認疼痛的位置，以及是否有轉移痛或放射至其他位置", "D": "確認疼痛的性質，有助於鑑別診斷為哪一種類型的疼痛"}, "answer": "B", "explanation": "NRS（數字評分量表）標準為 0～10 分，0 為無痛，10 為最劇烈疼痛，而非 0～5 分。VAS 和 NRS 皆為 0–10 的量尺。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q4"}, {"id": 5, "question": "有關燒傷的病理機轉與處置，下列何者正確？", "options": {"A": "量測SpO2大於95%即可排除一氧化碳吸入性傷害的可能", "B": "初期輸液以0.9%N/S為優先選擇", "C": "全身新陳代謝率增加，容易產生低血糖的現象", "D": "皮膚完整性受損會產生併發感染的風險"}, "answer": "D", "explanation": "燒傷病人皮膚屏障受損，是感染最重要的危險因子。SpO₂ 無法區分 COHb（脈氧計誤讀偏高）；燒傷初期以乳酸林格氏液（不是 N/S）為首選；燒傷代謝率增加但常見高血糖（非低血糖）。", "category": "clinical_assessment", "difficulty": "medium", "source": "110_advanced_Q5"}, {"id": 6, "question": "有關膽道炎的敘述，下列何者錯誤？", "options": {"A": "膽道結石是最常見的病因", "B": "常見右上腹痛、黃疸、發燒及寒顫等症狀", "C": "嚴重時可能會發生休克和意識狀態改變", "D": "對抗生素治療反應差，須緊急膽道引流或手術"}, "answer": "D", "explanation": "急性膽道炎（Charcot 三聯症：右上腹痛、發燒、黃疸）大多對抗生素有反應；Reynold 五聯症（加上休克及意識改變）表示重症，需緊急膽道引流。輕中度者可先抗生素治療再擇期引流，不是「對抗生素治療反應差」。", "category": "clinical_assessment", "difficulty": "medium", "source": "110_advanced_Q6"}, {"id": 7, "question": "女性26歲，於體檢尿液檢查中發現有細菌，但無不適及無懷孕可能，下列敘述何者正確？", "options": {"A": "儘速回診與複檢，排除下泌尿道感染", "B": "若發燒，自行服用退燒藥即可", "C": "若無不適，則不予理會", "D": "接受口服抗生素治療"}, "answer": "C", "explanation": "無症狀菌尿（asymptomatic bacteriuria）在非懷孕健康女性，目前指引（AUA/IDSA）建議不予治療，因治療無明確益處且可能增加抗藥性。懷孕婦女和即將接受泌尿道手術者才需治療。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q7"}, {"id": 8, "question": "有關「穿刺傷」造成蜂窩性組織炎伴隨深層組織膿瘍，下列何者為最有可能的致病菌？", "options": {"A": "Aeromonas hydrophila", "B": "Vibrio vulnificus", "C": "Pseudomonas aeruginosa", "D": "Escherichia coli"}, "answer": "C", "explanation": "足底穿刺傷（如踩到釘子穿過鞋底）最常見的致病菌為 Pseudomonas aeruginosa，可導致骨髓炎和深層感染。Aeromonas 和 Vibrio 與水接觸有關；E. coli 較常見於腸道及泌尿道感染。", "category": "clinical_assessment", "difficulty": "medium", "source": "110_advanced_Q8"}, {"id": 9, "question": "病人70歲，經診斷為急性腦膜炎，每日以生乳當早餐，有酗酒習慣。腦脊髓液檢查發現細胞增多以多核球為主，且發現革蘭氏陽性菌，下列何者為最有可能的致病菌？", "options": {"A": "Staphylococcus aureus", "B": "Streptococcus pneumoniae", "C": "Listeria monocytogenes", "D": "group B streptococcus"}, "answer": "C", "explanation": "Listeria monocytogenes 是革蘭氏陽性桿菌，常見於生乳/未消毒乳製品，好發於老年人（免疫功能下降）、酗酒者、孕婦和新生兒。CSF 呈多核球為主（有別於典型單核球）。", "category": "clinical_assessment", "difficulty": "medium", "source": "110_advanced_Q9"}, {"id": 10, "question": "有關SARS-CoV-2感染的臨床表現，下列何者錯誤？", "options": {"A": "約有三分之一的病人會發生呼吸急促", "B": "少數病人會出現嚴重症狀須氧氣治療", "C": "血液檢查一般會出現淋巴球數增加", "D": "胸部X光浸潤多為雙側病灶"}, "answer": "C", "explanation": "COVID-19 血液檢查特徵為淋巴球減少（lymphopenia），而非增加。這是重要的實驗室指標，淋巴球減少程度與疾病嚴重度相關。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q10"}, {"id": 11, "question": "有關SARS-CoV-2成年病人敗血性休克的敘述，下列何者錯誤？", "options": {"A": "定義為無低血容積情形下，須使用升壓劑以維持平均動脈壓大於65mmHg", "B": "可在處理前15～30分鐘快速輸注250～500ml等張晶體溶液(crystalloid)", "C": "等張晶體溶液包括生理食鹽水或乳酸林格氏溶液", "D": "使用澱粉類溶液(starches)可以減少病人的死亡率及避免腎衰竭"}, "answer": "D", "explanation": "羥乙基澱粉（HES）等膠體液研究（CHEST trial, 6S trial）顯示反而增加腎衰竭和死亡率，目前不建議用於敗血性休克。SSC 指引推薦晶體液（生理食鹽水或平衡晶體液）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q11"}, {"id": 12, "question": "有關安寧緩和療護「五全」照護理念的敘述，下列何者錯誤？", "options": {"A": "全人照護：指對病人身心靈的整體性照護", "B": "全家照護：除了病人外，也要顧及家屬的反應", "C": "全程照護：從病人開始接受安寧緩和療護直至病人出院為止", "D": "全隊照護：包含醫師、護理師、社工及復健師等跨域照護"}, "answer": "C", "explanation": "全程照護是指從診斷重病、接受安寧療護直至死亡後的哀傷輔導，涵蓋病人從生到死及家屬的哀傷期，並非僅至出院為止。", "category": "general_nursing", "difficulty": "easy", "source": "110_advanced_Q12"}, {"id": 13, "question": "有關癌症末期病人臨終前照護的敘述，下列何者最為適當？", "options": {"A": "針對呼吸困難的情況，清醒病人可考慮半坐臥姿，以利肺部擴張", "B": "使用嗎啡類藥物引起的便秘，可直接置入肛管，以避免病人腹脹不適", "C": "世界衛生組織第三階段的癌症疼痛治療，主要使用弱效型嗎啡類藥物", "D": "應避免持續使用高劑量嗎啡類藥物，而造成意識不清及成癮等問題"}, "answer": "A", "explanation": "半坐臥（semi-Fowler's position）可降低橫膈壓力，改善肺部擴張，減緩呼吸困難，是呼吸困難病人最適當的體位。WHO 第三階梯使用強效型（非弱效型）鴉片類藥物；末期病人止痛應定時給予（不因成癮顧慮而避免）。", "category": "general_nursing", "difficulty": "easy", "source": "110_advanced_Q13"}, {"id": 14, "question": "有關癌症腫瘤標記升高之臨床意義，下列何者正確？", "options": {"A": "α胎兒蛋白(AFP)常見於肝癌", "B": "抑鈣素(calcitonin)常見於多發性骨髓瘤", "C": "鱗狀上皮癌關聯抗原(SCC antigen)常見於前列腺癌", "D": "艾巴二氏病毒(EBV)常見於子宮頸癌"}, "answer": "A", "explanation": "AFP 是肝細胞癌（HCC）和生殖細胞腫瘤的重要標記。Calcitonin 升高見於甲狀腺髓質癌（非多發性骨髓瘤）；PSA 是前列腺癌標記；HPV（非 EBV）與子宮頸癌相關；EBV 與鼻咽癌相關。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q14"}, {"id": 15, "question": "有關肋膜積液(pleural effusion)的敘述，下列何者正確？", "options": {"A": "肋膜腔在正常情況下，不會有液體產生", "B": "心臟衰竭病人常造成滲出性胸水(exudate)", "C": "肝硬化病人常造成濾出性胸水(transudate)", "D": "濾出性胸水的乳酸脫氫酶(LDH)，會大於血清正常值的2/3倍"}, "answer": "C", "explanation": "肝硬化（低白蛋白、門脈高壓）造成漏出液（transudate）；心臟衰竭也造成漏出液（非滲出液）。正常肋膜腔有少量液體（約 5–15 mL）潤滑。LDH > 血清 2/3 是滲出液（exudate）的 Light's 標準，漏出液 LDH 低。", "category": "physiology", "difficulty": "medium", "source": "110_advanced_Q15"}, {"id": 16, "question": "病人因發燒及咳嗽三週入院，身體檢查發現右側呼吸音變小，叩診濁音，下列何者為最可能的診斷？", "options": {"A": "肋膜積液", "B": "氣胸", "C": "氣喘", "D": "慢性阻塞性肺疾病"}, "answer": "A", "explanation": "呼吸音降低 + 叩診濁音（dull）= 肋膜積液的典型表現。氣胸呈現叩診過清音（hyperresonant）；氣喘和 COPD 為雙側彌漫性喘鳴，呼吸音不會只有單側降低。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q16"}, {"id": 17, "question": "當腹部身體檢查Cullen's sign呈現陽性時，下列何者為最可能的診斷？", "options": {"A": "膽囊炎(cholecystitis)", "B": "胰臟炎(pancreatitis)", "C": "闌尾炎(appendicitis)", "D": "肝炎(hepatitis)"}, "answer": "B", "explanation": "Cullen's sign（臍周瘀青）和 Grey Turner's sign（側腹瘀青）均為腹腔內出血進入腹膜外脂肪的表現，最常見於重症急性胰臟炎（出血性胰臟炎）。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q17"}, {"id": 18, "question": "病人有高血壓病史，但未定期服藥，此次因撕裂感的胸痛到急診，疼痛由前胸放射到頸部及背部，下列何者為最可能的診斷？", "options": {"A": "胃食道逆流", "B": "主動脈剝離", "C": "肺栓塞", "D": "氣胸"}, "answer": "B", "explanation": "主動脈剝離的典型表現：撕裂感/刀割感的劇烈胸痛，由前胸放射至背部/頸部，常見於高血壓控制不良者。CXR 可見縱膈腔擴大，確診靠 CT 血管攝影。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q18"}, {"id": 19, "question": "30歲病人，主訴頭痛數天，身體檢查發現頸部僵硬(nuchal rigidity)時，預期會出現下列何種徵象？", "options": {"A": "Brudzinski's sign", "B": "Babinski sign", "C": "Rovsing's sign", "D": "Turner's sign"}, "answer": "A", "explanation": "Brudzinski's sign（被動屈曲頸部時，髖膝不自主屈曲）和 Kernig's sign 均為腦膜刺激的陽性表現，見於腦膜炎。Babinski 為上運動神經元損傷；Rovsing's sign 為闌尾炎；Turner's sign（Grey Turner）為腹腔出血。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q19"}, {"id": 20, "question": "年輕女性主訴發燒、右側腰痛2天，且有噁心、嘔吐症狀，抽血結果白血球16,200/µL，身體檢查發現右側肋骨脊椎角(costovertebral angle)有敲痛(knocking pain)，下列何者為最有可能的診斷？", "options": {"A": "acute pyelonephritis", "B": "acute glomerulonephritis", "C": "acute appendicitis", "D": "pelvic inflammatory disease"}, "answer": "A", "explanation": "肋脊角叩擊痛（CVA tenderness）+ 發燒 + 白血球增加 + 噁心嘔吐，典型表現為急性腎盂腎炎（ascending UTI），需尿液培養確認並給予抗生素治療。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q20"}, {"id": 21, "question": "下列何項血清學檢查結果，最可能為B型肝炎急性期？", "options": {"A": "HBsAg(−), anti-HBe (+), anti-HBc IgM(+), anti-HBc IgG(−)", "B": "HBsAg(−), anti-HBe (+), anti-HBc IgM(+), anti-HBc IgG(+)", "C": "HBsAg(+),HBeAg(+), anti-HBc IgM(−), anti-HBc IgG(+)", "D": "HBsAg(+),HBeAg(+), anti-HBc IgM(+), anti-HBc IgG(−)"}, "answer": "D", "explanation": "B 型肝炎急性期特徵：HBsAg (+)、HBeAg (+)（病毒複製活躍）、anti-HBc IgM (+)（急性感染標記）、anti-HBc IgG (−)（尚未產生長期抗體）。IgM 是急性感染的關鍵指標。", "category": "clinical_assessment", "difficulty": "medium", "source": "110_advanced_Q21"}, {"id": 22, "question": "當在診間遇到病人於你面前忽然倒下，此時病人叫喚無反應，根據ACLS的原則，下列何者不是立即措施？", "options": {"A": "保持呼吸道暢通", "B": "立即插管", "C": "請求支援", "D": "開始壓胸"}, "answer": "B", "explanation": "ACLS 基本處置：確認安全→叫喚→請求支援→開始 CPR（壓胸優先）→使用 AED。立即插管並非第一步驟，應先建立基本氣道（面罩通氣）並持續 CPR；氣管插管在有足夠人手時才執行。", "category": "crisis", "difficulty": "easy", "source": "110_advanced_Q22"}, {"id": 23, "question": "有關敗血性休克的敘述，下列何者正確？", "options": {"A": "其定義為在給予適當輸液下，仍持續低血壓，平均動脈壓小於80mmHg", "B": "可先給予dopamine提升血壓，成效不彰再加上norepinephrine (Levophed®)", "C": "中央靜脈氧氣飽和濃度(ScvO2)為重要指標之一，儘量維持到70%以上", "D": "必須量測中央靜脈壓(CVP)，因其與血管內容積有極高的相關性"}, "answer": "C", "explanation": "ScvO₂ ≥ 70%（或 SvO₂ ≥ 65%）是 SSC 建議的氧氣輸送充足指標之一。敗血性休克 MAP 目標 ≥ 65 mmHg（非 80）；Norepinephrine 是第一線升壓劑（非 Dopamine）；CVP 與血管內容積相關性差。", "category": "crisis", "difficulty": "medium", "source": "110_advanced_Q23"}, {"id": 24, "question": "病人無意識且評估為無脈搏，心電圖顯示如圖(一)，下列敘述何者正確？", "options": {"A": "此心電圖為VF，給予非同步電擊雙相200J，電擊後持續進行CPR", "B": "可給予atropine 1mg IV push，並趕快插管", "C": "在torsades de pointes時，可給予MgSO4 1～2g IV drip 30分鐘", "D": "在CPR過程中，可給予amiodarone 300mg IV push"}, "answer": "D", "explanation": "CPR 過程中，Amiodarone 首劑 300 mg IV push 用於電擊無效的 VF/pVT。Atropine 用於心搏過緩（非 VF）；MgSO₄ 用於 Torsades de pointes 但通常 IV push（非 drip 30 分鐘）；VF 電擊能量雙相 200J 正確，但電擊後立即持續 CPR，不等待確認節律。", "category": "crisis", "difficulty": "hard", "source": "110_advanced_Q24", "image": "110_advanced_Q24.png"}, {"id": 25, "question": "50歲病人，主訴有胃食道逆流疾病(gastroesophageal reflux disease, GERD)，禁食時間約8小時，因肝臟腫瘤(liver tumor)欲進行肝臟切除手術(hepatectomy)，下列敘述何者錯誤？", "options": {"A": "正壓通氣和呼氣末正壓(positive end-expiratory pressure, PEEP)，會減少心輸出量及肝臟總血量，對肝靜脈壓造成不利影響", "B": "預期有大量失血的情形，除採用麻醉標準監測方法之外，可放置動脈導管、大口徑的周邊靜脈管路或中心靜脈導管", "C": "進行肝臟切除手術時，輸液給予的重點在於補充禁食時間、水分維持基本量、無感性水分喪失量及出血量，以確保CVP壓力維持在6mmHg以上", "D": "麻醉誘導時，可考慮使用快速誘導(rapid sequence induction, RSI)以降低誤吸(aspiration)風險"}, "answer": "C", "explanation": "肝切除手術麻醉關鍵策略為「低 CVP 麻醉」（CVP < 5 mmHg），以減少肝靜脈出血及改善手術視野，而非維持 CVP ≥ 6 mmHg。GERD 病人應考慮 RSI。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_advanced_Q25"}, {"id": 26, "question": "傳統腹腔鏡及達文西機器手臂輔助手術，兩者皆須運用人工氣腹(pneumoperitoneum)以增加手術空間，有關氣腹壓力的影響，下列何者錯誤？", "options": {"A": "尿量減少", "B": "呼吸道壓力增加", "C": "股靜脈血液回流增加", "D": "穩定時的心輸出量不變"}, "answer": "C", "explanation": "氣腹增加腹內壓，壓迫下腔靜脈，使股靜脈血液回流減少（非增加），靜脈回心血量下降。氣腹也造成呼吸道壓力升高（膈肌上推）、尿量減少（腎靜脈受壓）；穩定後心輸出量通常維持正常。", "category": "physiology", "difficulty": "medium", "source": "110_advanced_Q26"}, {"id": 27, "question": "56歲病人因結腸癌進行常規結腸切除手術，根據術後加速康復療程(enhanced recovery after surgery, ERAS)的概念，下列處置何者正確？", "options": {"A": "可於手術前2～3小時給予運動飲料", "B": "術前須常規執行機械性腸道準備", "C": "採用多模式止痛並仍以全身性鴉片類止痛藥為主", "D": "應放置鼻胃管以減低胃腸道的壓力"}, "answer": "A", "explanation": "ERAS 術前碳水化合物負荷（術前 2～3 小時飲用碳水化合物飲料）可減少胰島素阻抗。ERAS 不鼓勵常規機械性腸道準備、不常規放置鼻胃管、多模式止痛以減少鴉片類藥物為目標。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q27"}, {"id": 28, "question": "病人以截石臥位(lithotomy position)進行直腸切除手術，其姿勢照護處置，下列何者錯誤？", "options": {"A": "手掌可朝向身體以減少對尺神經損傷", "B": "神經損傷通常發生於體重較重的病人", "C": "下肢需要放置軟墊以預防支撐物的壓力損傷", "D": "上肢若張開幅度應小於90度以避免臂神經損傷"}, "answer": "B", "explanation": "截石位的神經損傷風險與手術時間長短相關，並非主要發生於體重較重的病人。任何體型的病人若長時間維持截石位都有神經損傷風險，包括總腓神經（腿架壓迫）和股神經。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q28"}, {"id": 29, "question": "有關前列腺全切除術的傳統及達文西機器手臂輔助手術，其麻醉照護的考量，下列敘述何者錯誤？", "options": {"A": "達文西機器手臂輔助手術方式較能確保神經血管不受損傷", "B": "傳統手術不需人工氣腹，故有較佳的手術視野且出血量較低", "C": "具青光眼之病人不建議選擇達文西機器手臂輔助手術進行前列腺切除", "D": "達文西機器手臂輔助手術因氣腹及頭低腳高的姿勢，容易造成呼吸道壓力增加"}, "answer": "B", "explanation": "傳統開放手術（非腹腔鏡）出血量較多、視野較小；達文西手術雖需氣腹，但放大視野精準度高、出血量反而更少。選項B所述「較佳手術視野且出血量較低」描述錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q29"}, {"id": 30, "question": "58歲末期腎病(end-stage renal disease, ESRD)病人，預計接受傳統大腸直腸切除手術，下列敘述何者錯誤？", "options": {"A": "末期腎病病人可常規給予meperidine以降低術後疼痛", "B": "插管全身麻醉對於末期腎病病人仍有較好的血液動力控制", "C": "末期腎病伴隨糖尿病之病人，麻醉時發生吸入性風險較高", "D": "對於末期腎病病人肌肉鬆弛劑可使用cisatracurium"}, "answer": "A", "explanation": "Meperidine 在腎衰竭病人禁用，因其代謝物 Normeperidine 會蓄積，導致神經毒性（震顫、癲癇）。Cisatracurium 經 Hofmann 消除不依賴腎臟，適用於 ESRD 病人。", "category": "pharmacology", "difficulty": "medium", "source": "110_advanced_Q30"}, {"id": 31, "question": "有關甲狀腺疾病手術的麻醉注意事項，下列敘述何者正確？", "options": {"A": "甲狀腺風暴可能由感染、外傷、手術所誘發", "B": "使用喉返神經監測功能之氣管內管時，應定時使用神經肌肉阻斷劑", "C": "甲狀腺手術應給予高劑量的止痛及鎮靜劑，以防甲狀腺亢進狀態下活化交感神經而引發的甲狀腺風暴", "D": "Graves' disease之治療藥物如：propylthiouracil(PTU)或methimazole，必須於手術前停藥"}, "answer": "A", "explanation": "甲狀腺風暴誘發因子：感染、手術、外傷、分娩、碘造影劑等。術中若需監測喉返神經，應避免使用肌肉鬆弛劑（而非定時使用）；PTU/Methimazole 應術前持續使用（非停藥）控制甲狀腺功能。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q31"}, {"id": 32, "question": "有關靜脈空氣栓塞(venous air embolism)，下列敘述何者錯誤？", "options": {"A": "經食道心臟超音波(TEE)是高敏感性的監測工具", "B": "發生靜脈空氣栓塞，應告知主刀醫師並清除空氣來源", "C": "可嘗試從中心靜脈導管抽出空氣，避免大量空氣導致心衰竭", "D": "常見於需抬高頭部的神經外科手術，尤以後顱窩手術採取的側臥為高風險術式"}, "answer": "D", "explanation": "後顱窩手術最危險的體位是「坐姿（sitting position）」而非側臥。坐姿時術野高於心臟，靜脈壓為負壓，空氣最容易進入靜脈系統。", "category": "crisis", "difficulty": "medium", "source": "110_advanced_Q32"}, {"id": 33, "question": "有關脊椎手術麻醉，下列敘述何者正確？", "options": {"A": "在脊髓損傷的病人建議常規使用succinylcholine作為麻醉誘導", "B": "脊椎手術皆以趴姿進行，擺位時應注意神經保護並避免臉部五官及腹部受壓迫", "C": "術後視力喪失(postoperative visual loss, POVL)為罕見的併發症，在長時間手術及失血量多的個案，有較高的風險", "D": "為維持麻醉深度以避免影響脊髓監測體感覺激發電位(somatosensory evoked potential, SSEP)，必須使用高濃度的吸入性麻醉藥物"}, "answer": "C", "explanation": "術後視力喪失（POVL）主因為缺血性視神經病變，高風險因素：長時間俯臥手術、大量失血、低血壓、頭低腳高姿勢。脊髓損傷後 24 小時起應避免 Succinylcholine（高鉀風險）；SSEP 監測時應降低（非增加）吸入性麻醉藥濃度或改用 TIVA。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_advanced_Q33"}, {"id": 34, "question": "採用脊髓麻醉合併硬脊膜外麻醉的骨科膝關節置換術(total knee replacement, TKR)，下列敘述何者錯誤？", "options": {"A": "麻醉執行過程須符合美國麻醉學會採用的標準監測項目", "B": "可利用酒精棉片來測試脊髓麻醉的高度", "C": "硬脊膜外麻醉測試劑量可添加濃度1：200,000或5 mcg/mL的epinephrine，偵測意外導管血管置放", "D": "術中使用止血帶放開後產生血壓下降及潮氣末二氧化碳下降情形"}, "answer": "D", "explanation": "止血帶放開後，缺血肢體的代謝廢物（CO₂、乳酸、K⁺）大量回流，會造成血壓下降和 EtCO₂ 升高（非下降）。CO₂ 釋放入循環使 EtCO₂ 上升。", "category": "regional", "difficulty": "medium", "source": "110_advanced_Q34"}, {"id": 35, "question": "有關扁桃腺切除麻醉注意事項，下列敘述何者正確？", "options": {"A": "病人大多年輕健康，只需簡易詢問病史，無需注意睡眠相關異常", "B": "麻醉甦醒時，只有在病人完全清醒可配合狀態下，才能考慮拔管", "C": "手術結束時應提醒外科醫師移除咽喉部的填塞物，避免氣道阻塞", "D": "扁桃腺切除後出血常發生於數小時至24小時，若需再次進行手術，可視為NPO時間足夠"}, "answer": "C", "explanation": "扁桃腺手術時咽喉部常放置填塞物（throat pack）以防止血液流入氣道，手術結束前必須確認移除，否則拔管後可能造成氣道阻塞。術後出血病人應視為飽胃（胃中有大量血液），不可視為 NPO 足夠。", "category": "airway", "difficulty": "medium", "source": "110_advanced_Q35"}, {"id": 36, "question": "55歲車禍病人被送至急診室，脖子帶著頸圈，懷疑頭部外傷可能，當詢問基本資料只發出呻吟聲，並且在給予痛刺激時，才有眼睛打開並肢體回縮現象，則其Glasgow coma scale分數為何？", "options": {"A": "E3V2M3", "B": "E2V3M4", "C": "E2V2M3", "D": "E2V2M4"}, "answer": "D", "explanation": "E2（疼痛刺激才睜眼）+ V2（發出呻吟聲，無可辨識語言）+ M4（疼痛刺激縮回，withdrawal）= GCS 8分，E2V2M4。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q36"}, {"id": 37, "question": "有關眼心反射(oculocardiac reflex, OCR)的說明，下列敘述何者錯誤？", "options": {"A": "常見於斜視手術病人", "B": "反射路徑由三叉神經傳入、迷走神經傳出", "C": "發生眼心反射時，首要處置為注射atropine", "D": "藉由眼球周圍局部麻醉阻斷技術，可減少眼心反射的發生"}, "answer": "C", "explanation": "OCR 發生時首要處置是立即停止手術刺激（告知外科醫師鬆開牽拉），讓心率恢復；若持續不改善，才考慮給予 Atropine。非一發生立即注射 Atropine。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q37"}, {"id": 38, "question": "有關麻醉後恢復室的照護，下列敘述何者錯誤？", "options": {"A": "恢復室低體溫情形，可使用空氣加溫毯來改善", "B": "疑似氣道水腫病人，可單由氣囊漏氣測試(cuff leakage test)來決定拔管", "C": "離開恢復室的評估項目包含活動能力、呼吸、循環、意識及血氧飽合度", "D": "斜視手術、中耳手術及腹腔鏡手術為發生術後噁心嘔吐(postoperative nausea and vomiting, PONV)高風險術式"}, "answer": "B", "explanation": "氣囊漏氣測試（cuff leak test）陽性可提示存在氣道水腫，但不能「單由」此決定拔管。拔管決策需綜合評估：意識恢復、肌力恢復、呼吸型態、血氧、臨床判斷及準備重新插管的設備。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q38"}, {"id": 39, "question": "有關呼吸道的處理，下列敘述何者正確？", "options": {"A": "臉部留有鬍鬚、無牙齒或肥胖者，皆為困難插管的相關因素", "B": "喉痙攣(laryngospasm)發生時，應給予100%O2、維持正壓通氣，並降低麻醉深度", "C": "過去曾接受頸部放射線治療病人，可能因頸部纖維化而有困難氣道風險", "D": "dexmedetomidine(Precedex®)對呼吸系統的影響微弱，是高選擇性α2-腎上腺受體拮抗劑(α2 adrenergic receptor antagonist)，適合於清醒光纖氣管內管插管使用"}, "answer": "C", "explanation": "頸部放射線治療後纖維化可使組織僵硬、頸部活動受限、氣道結構改變，增加困難插管風險。鬍鬚/無牙齒為困難面罩通氣（非插管）因素；喉痙攣時應加深麻醉（非降低）；Dexmedetomidine 是 α2 激動劑（非拮抗劑）。", "category": "airway", "difficulty": "medium", "source": "110_advanced_Q39"}, {"id": 40, "question": "在心臟手術準備脫離體外心肺循環(cardiopulmonary bypass, CPB)前的麻醉照護，下列何者錯誤？", "options": {"A": "確認體溫已回溫至37℃", "B": "確認血液動力學穩定", "C": "確認呼吸器已開啟", "D": "確認肝素(heparin)的作用已中和"}, "answer": "D", "explanation": "脫離 CPB 前，肝素效果應保持（以維持抗凝血），等脫離 CPB 且停止體外循環後，才使用 Protamine 中和 Heparin。過早中和肝素可能導致體外循環管路血栓。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_advanced_Q40"}, {"id": 41, "question": "有關主動脈內氣球幫浦(intra-aortic balloon pump, IABP)的敘述，下列何者正確？", "options": {"A": "氣球幫浦在收縮期消氣，以增加心肌供氧", "B": "氣球幫浦在收縮期充氣，以減少心肌耗氧", "C": "氣球幫浦在舒張期消氣，以減少心肌耗氧", "D": "氣球幫浦在舒張期充氣，以增加心肌供氧"}, "answer": "D", "explanation": "IABP 作用原理：舒張期充氣（增加舒張壓）→增加冠狀動脈灌流（供氧增加）；收縮期消氣（降低後負荷）→減少心肌耗氧。兩個效果共同改善心肌氧氣供需平衡。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q41"}, {"id": 42, "question": "在體外心肺循環回溫過程中，下列何者體溫變化較為延遲？", "options": {"A": "直腸", "B": "食道", "C": "鼻咽", "D": "肺動脈導管"}, "answer": "A", "explanation": "直腸/膀胱屬於周邊核心體溫，在 CPB 回溫時變化最慢（因為腸道血流較少且組織熱容量大）。鼻咽、食道、肺動脈反映中心體溫，回溫較快。", "category": "monitoring", "difficulty": "medium", "source": "110_advanced_Q42"}, {"id": 43, "question": "有關主動脈瓣狹窄(aortic stenosis, AS)欲接受主動脈瓣置換手術的病人，在麻醉誘導期間應注意事項，下列敘述何者正確？", "options": {"A": "降低全身血管阻力，以利心室血液搏出", "B": "維持正常竇性心律，以利心室血液回充與搏出", "C": "降低心肌收縮力，以減少心肌耗氧", "D": "減少靜脈輸液，以降低心臟前負荷"}, "answer": "B", "explanation": "主動脈瓣狹窄麻醉原則：維持竇性心律（心房收縮對充填很重要）、維持 SVR（避免低血壓）、維持心肌收縮力、維持適當前負荷（避免低血容積）。心跳 60–90 bpm 為宜（過快減少充填時間）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q43"}, {"id": 44, "question": "動脈導管為心臟手術中持續觀察血液動力學變化的必要監測，有關動脈導管的置放位置，下列何者不適當？", "options": {"A": "左側Blalock-Taussig分流手術(B-T shunt)，置放於右手", "B": "主動脈窄縮(coarctation of aorta, CoA)修補手術，置放於左手", "C": "主動脈弓手術，經右腋動脈進行順行性腦灌注(antegrade cerebral perfusion, ACP)，置放於左手", "D": "冠狀動脈繞道手術(coronary artery bypass graft, CABG)取左橈動脈為移植血管，置放於右手"}, "answer": "B", "explanation": "主動脈窄縮（CoA）修補時，縮窄部位在主動脈峽部（左鎖骨下動脈遠端），鉗夾時左手動脈壓會受影響，應將動脈導管置於右手（右橈動脈）以監測真實腦部灌流壓。", "category": "monitoring", "difficulty": "hard", "source": "110_advanced_Q44"}, {"id": 45, "question": "側臥胸腔手術時，姿勢擺位的注意事項，下列敘述何者錯誤？", "options": {"A": "下側手臂內收於身體旁", "B": "頭頸應保持正中", "C": "保護下方的眼耳勿受壓迫", "D": "若脈搏血氧分析(SpO2)夾於下側手指，可及早發現腋窩的神經血管壓迫性傷害"}, "answer": "A", "explanation": "側臥位時，下側手臂應向前伸出（置於手臂板上），而非內收於身體旁。內收可能造成腋窩的神經血管壓迫。SpO₂ 夾於下側手，若波形消失可早期發現腋窩壓迫。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q45"}, {"id": 46, "question": "病人因重症肌無力(myasthenia gravis, MG)需於全身麻醉之下接受胸腺切除術，當外科醫師切開病人胸骨時，麻醉護理師應注意事項，下列敘述何者正確？", "options": {"A": "關閉呼吸器並將調節壓力閥(APL valve)歸零，使肺臟消氣", "B": "為避免病人咳嗽，常規給予去極化神經肌肉阻斷劑", "C": "調快呼吸速率，以加速提高麻醉氣體在血液中的濃度", "D": "為避免肺塌陷，應予肺泡撐開(recruitment maneuver)"}, "answer": "A", "explanation": "開胸時（胸骨鋸開進入胸腔）為避免肺臟在正壓通氣下膨脹影響手術視野，麻醉護理師應暫時關閉呼吸器並打開 APL valve，讓肺臟消氣，待外科要求時再恢復通氣。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_advanced_Q46"}, {"id": 47, "question": "對於有氣喘病史接受全身麻醉之外科手術病人，其麻醉照護，下列敘述何者錯誤？", "options": {"A": "使用喉頭面罩(LMA)優於氣管內插管", "B": "在麻醉誘導前給予支氣管擴張劑", "C": "使用desflurane優於sevoflurane", "D": "在足夠的麻醉深度下拔管"}, "answer": "C", "explanation": "Desflurane 會強烈刺激氣道（支氣管痙攣、咳嗽、屏氣），氣喘病人禁用或應避免。Sevoflurane 氣道刺激性最低，是氣喘病人吸入性麻醉藥的首選。LMA 減少氣道刺激優於插管。", "category": "pharmacology", "difficulty": "medium", "source": "110_advanced_Q47"}, {"id": 48, "question": "有關新生兒之體溫調節功能，下列敘述何者正確？", "options": {"A": "具有足夠的棕色脂肪，容易失溫", "B": "頭部相對大，表皮面積與體重比例較低，容易失溫", "C": "神經系統尚未發展成熟，導致體溫不穩定", "D": "表皮及真皮較厚，導致體溫不穩定"}, "answer": "C", "explanation": "新生兒體溫調節不穩定的主要原因：①下視丘體溫調節中樞尚未成熟；②體表面積/體重比大，散熱快；③皮下脂肪少、皮膚薄。雖有棕色脂肪可產熱，但在低溫環境仍容易失溫。", "category": "physiology", "difficulty": "medium", "source": "110_advanced_Q48"}, {"id": 49, "question": "根據Marshall S.等人設計的手術離院標準(post-anesthesia discharge scoring system)，病人在門診手術後離開醫院的標準，下列敘述何者正確？", "options": {"A": "手術的出血量不在其中評估項目內", "B": "噁心及嘔吐是其中一個評估項目", "C": "患者達到7分就可以離開醫院", "D": "活動能力是其中一個評估項目，需要扶助為0分"}, "answer": "B", "explanation": "PADSS（Post-Anesthesia Discharge Scoring System）評估五項：生命徵象、活動能力、噁心嘔吐、疼痛、手術傷口出血。各項 0-2 分，共 10 分，≥ 9 分可出院（不是 7 分）；需要扶助為 1 分（非 0 分）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q49"}, {"id": 50, "question": "有關局部麻醉劑全身毒性反應與治療，下列敘述何者錯誤？", "options": {"A": "常見症狀為暈眩、耳鳴、口腔麻木、金屬味", "B": "硬脊膜外麻醉時加入額外的epinephrine可延長作用時間，減少全身性的吸收", "C": "心臟抑制毒性lidocaine＞levobupivacaine＞bupivacaine", "D": "預防方法可以施打前回抽，分次低劑量，一旦發現症狀立刻停止"}, "answer": "C", "explanation": "局麻藥心臟毒性順序：Bupivacaine > Levobupivacaine > Ropivacaine > Lidocaine。Lidocaine 心臟毒性最小（非最大）；Bupivacaine 毒性最大。選項 C 的順序完全相反，故為錯誤。", "category": "regional", "difficulty": "medium", "source": "110_advanced_Q50"}, {"id": 51, "question": "有關鎮靜-安眠藥物(sedative hypnotic drugs)，下列敘述何者正確？", "options": {"A": "苯二氮平類藥物(benzodiazepines)之拮抗劑為naloxone", "B": "巴比妥酸鹽(barbiturate)之拮抗劑為flumazenil", "C": "fospropofol是propofol的水溶性前驅藥物(prodrug)，注射時較無疼痛感", "D": "propofol對於上呼吸道的反射抑制比thiopental來得小，所以適合放置LMA(laryngeal mask airway)"}, "answer": "C", "explanation": "Fospropofol 是 Propofol 的水溶性前藥，注射疼痛感較傳統脂肪乳劑 Propofol 少。Benzodiazepine 的拮抗劑是 Flumazenil（非 Naloxone）；Barbiturate 無特異拮抗劑；Propofol 對上呼吸道反射抑制比 Thiopental 更強（更適合 LMA）。", "category": "pharmacology", "difficulty": "medium", "source": "110_advanced_Q51"}, {"id": 52, "question": "局部麻醉劑為弱鹼性，其結構是由芳香環和氨基以酯鍵(ester)或醯胺鍵(amide)結合所組成的，下列何者不屬於醯胺鍵類之局部麻醉劑？", "options": {"A": "tetracaine", "B": "mepivacaine", "C": "ropivacaine", "D": "lidocaine"}, "answer": "A", "explanation": "Tetracaine（丁卡因）是酯類（ester-type）局部麻醉劑（含 -COOC- 鍵）。醯胺類（amide）局麻藥記憶口訣：名字含「i」前有兩個字母：lidocaine、mepivacaine、bupivacaine、ropivacaine、prilocaine 等均為醯胺類。", "category": "pharmacology", "difficulty": "medium", "source": "110_advanced_Q52"}, {"id": 53, "question": "進行開顱手術麻醉時，有關調控腦部血流量(CBF)、腦部氧氣代謝率(CMRO2)、顱內壓(ICP)，下列敘述何者錯誤？", "options": {"A": "動脈二氧化碳分壓上升至45mmHg，會促使腦部血流量下降", "B": "benzodiazepine可以降低腦部氧氣代謝率、腦部血管收縮及降低腦部血流量", "C": "mannitol可以減少腦部組織水腫而降低顱內壓(ICP)", "D": "furosemide可以減少腦脊髓液的生成而降低顱內壓(ICP)"}, "answer": "A", "explanation": "PaCO₂ 升高（高碳酸血症）會使腦血管擴張，增加腦血流量（非下降）。這是 CO₂ 對腦血管的直接影響：PaCO₂ 每升高 1 mmHg，CBF 增加約 2 mL/100g/min。過度換氣降低 PaCO₂ 才使 CBF 下降。", "category": "physiology", "difficulty": "hard", "source": "110_advanced_Q53"}, {"id": 54, "question": "45歲病人因子宮肌瘤接受腹腔鏡子宮切除手術，手術姿勢為頭低腳高的截石臥位(lithotomy position)，下列敘述何者正確？", "options": {"A": "氣腹(pneumoperitoneum)容易增加靜脈回心血流", "B": "可以增加肺順應性(compliance)及潮氣量(tidal volume)", "C": "下肢神經損傷以總腓神經(common peroneal nerve)最常見", "D": "截石臥位(lithotomy position)比其他姿勢擺位，其下肢腔室症候群發生率較低"}, "answer": "C", "explanation": "截石位下肢神經損傷最常見為總腓神經（繞腓骨頭，被腿架壓迫）。頭低腳高氣腹使靜脈回流增加（Trendelenburg）但肺順應性下降（腹腔臟器上推橫膈）；截石位腔室症候群風險高（長時間抬腿）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q54"}, {"id": 55, "question": "有關無痛胃鏡之鎮靜麻醉，下列敘述何者錯誤？", "options": {"A": "無痛胃鏡檢查室內須具備獨立供氧系統和抽吸設備", "B": "目標為中度鎮靜，病人可以維持保護性反射及保留氣道通暢", "C": "麻醉前評估須包含心肺功能、呼吸道、睡眠呼吸中止風險等", "D": "胃鏡檢查需共用呼吸道，不宜使用吐氣末端二氧化碳監測呼吸"}, "answer": "D", "explanation": "EtCO₂ 可透過鼻腔取樣管（nasal cannula with CO₂ sampling）在胃鏡檢查期間監測呼吸，是非插管鎮靜麻醉的重要安全監測工具。呼吸道共用不影響 EtCO₂ 鼻腔監測的可行性。", "category": "monitoring", "difficulty": "medium", "source": "110_advanced_Q55"}, {"id": 56, "question": "下列何者是治療產婦半身麻醉後低血壓的常用第一線藥物？", "options": {"A": "norepinephrine", "B": "dopamine", "C": "epinephrine", "D": "ephedrine"}, "answer": "D", "explanation": "傳統上 Ephedrine（同時作用於 α 和 β 受體）是脊髓麻醉後低血壓的第一線藥物，可升壓並維持胎盤血流。近年研究顯示 Phenylephrine 效果更好且對胎兒 pH 影響較小，但題目選項未列出，故選 Ephedrine。", "category": "pharmacology", "difficulty": "easy", "source": "110_advanced_Q56"}, {"id": 57, "question": "剖腹產的孕婦在接受脊髓麻醉(spinal anesthesia)後，無法說話且失去意識，同時發生低血壓及心搏緩慢，下列何者是最可能的原因？", "options": {"A": "使用bupivacaine", "B": "脊椎血腫", "C": "使用ropivacaine", "D": "高位脊髓麻醉"}, "answer": "D", "explanation": "高位（全脊髓）麻醉症狀：突發低血壓、心搏過緩、呼吸困難、失去意識（腦幹受影響）。原因可能是硬膜外導管誤入蛛網膜下腔或藥量過多，導致脊髓阻斷升至頸胸段。立即處置：插管、支持性輸液及升壓劑。", "category": "regional", "difficulty": "medium", "source": "110_advanced_Q57"}, {"id": 58, "question": "有關藥物通過胎盤的敘述，下列何者正確？", "options": {"A": "肌肉鬆弛劑為水溶性，且分子量小，故不易通過胎盤", "B": "thiopental是屬於較低分子量，較易通過胎盤", "C": "N2O會通過胎盤，對胎兒呼吸有抑制作用", "D": "增加藥物通過胎盤的擴散因素包括脂溶性高、解離度高、蛋白結合率高"}, "answer": "B", "explanation": "Thiopental 分子量低（264 Da）、脂溶性高、蛋白結合率高但游離型可通過胎盤。肌肉鬆弛劑分子量大且帶正電，不易通過；N₂O 會通過胎盤但主要造成骨髓抑制；增加胎盤通過的因素：高脂溶性、低解離度（非高）、低蛋白結合率（游離型多）。", "category": "pharmacology", "difficulty": "medium", "source": "110_advanced_Q58"}, {"id": 59, "question": "25公斤的兒童禁食時間6小時後進行手術，術中第一個小時的理想輸液量為何？", "options": {"A": "195mL", "B": "260mL", "C": "390mL", "D": "455mL"}, "answer": "B", "explanation": "Holliday-Segar 基本量：前 10 kg × 4 = 40，次 10 kg × 2 = 20，5 kg × 1 = 5，合計 65 mL/hr。禁食補充量：65 × 6 = 390 mL（分配：第一小時補一半 = 195 mL + 基本量 65 mL = 260 mL）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q59"}, {"id": 60, "question": "有關身心障礙病人牙科麻醉，下列敘述何者錯誤？", "options": {"A": "麻醉評估不易得到必要資訊(病史、禁食時間…等)", "B": "須和牙科醫師共用呼吸道", "C": "治療過程需沖水，嗆到風險增加", "D": "病人易配合，麻醉誘導容易"}, "answer": "D", "explanation": "身心障礙病人（如自閉症、智能障礙）往往難以配合，麻醉誘導困難（可能需要基本麻醉誘導、口服鎮靜前置藥或鼻腔給藥）。選項 D 描述相反，故為錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q60"}, {"id": 61, "question": "有關大量羊水栓塞(amniotic fluid embolism, AFE)之臨床表現，下列何者正確？", "options": {"A": "高血壓", "B": "低血氧", "C": "意識正常", "D": "血管內凝血功能正常"}, "answer": "B", "explanation": "羊水栓塞臨床三聯症：①突發低血壓/心臟衰竭、②低血氧（呼吸衰竭）、③凝血功能異常（DIC）。病人常意識改變甚至喪失，死亡率極高。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_advanced_Q61"}, {"id": 62, "question": "5歲，20公斤兒科病人預行開腹手術，其術前之Hct為40%，希望手術進行中能維持Hct 30%以上，此病人之可接受失血量(acceptable blood loss, ABL)，下列何者最適當？", "options": {"A": "250mL", "B": "350mL", "C": "450mL", "D": "550mL"}, "answer": "B", "explanation": "ABL = EBV × (現Hct - 最低可接受Hct) / 現Hct。小兒 EBV ≈ 70–80 mL/kg，取 75 mL/kg × 20 kg = 1500 mL。ABL = 1500 × (40 - 30) / 40 = 1500 × 0.25 = 375 mL ≈ 350 mL（最接近選項）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_advanced_Q62"}, {"id": 63, "question": "有關老化造成的生理改變，下列敘述何者錯誤？", "options": {"A": "血管硬度及收縮壓增加", "B": "功能性肺餘容積(functional residual capacity, FRC)減少", "C": "腎絲球過濾率(glomerular filtration rate)降低", "D": "容易發生低體溫"}, "answer": "B", "explanation": "老年人 FRC 實際上增加（因胸壁彈性回縮力下降），但肺組織彈性降低，閉合容積（closing volume）增加更多，所以功能上的氧合能力下降。注意：FRC 增加，但有效換氣面積減少。", "category": "physiology", "difficulty": "medium", "source": "110_advanced_Q63"}, {"id": 64, "question": "有關術後認知功能異常(postoperative cognitive dysfunction, POCD)的敘述，下列何者最不適當？", "options": {"A": "主要表現為混亂、躁動", "B": "可能在手術後幾個月發生", "C": "與死亡率增加相關", "D": "麻醉方式對POCD的發生率沒有顯著差異"}, "answer": "A", "explanation": "混亂、躁動是術後譫妄（POD）的表現，而非 POCD。POCD 是較隱伏、慢性的認知功能下降（記憶力、注意力、執行功能），可在手術後數週至數月發生，不易立即察覺，需神經心理測驗才能確診。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q64"}, {"id": 65, "question": "當老年病人發生術後譫妄(postoperative delirium)，下列何種治療處置最不適當？", "options": {"A": "做好疼痛控制", "B": "治療可能的病因，如敗血症、電解質異常等", "C": "躁動患者可考慮給予haloperidol治療", "D": "直接轉入加護病房"}, "answer": "D", "explanation": "術後譫妄的處置以非藥物措施（環境定向、疼痛控制、病因治療）為主，藥物（Haloperidol）為輔助。直接轉 ICU 並非標準處置（可能加重譫妄），應在病房維持熟悉環境和作息規律，ICU 環境反而是誘發譫妄的危險因子。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q65"}, {"id": 66, "question": "執行老年病人麻醉需注意的事項，下列敘述何者正確？", "options": {"A": "誤吸(aspiration)風險較高", "B": "執行區域麻醉較全身麻醉安全", "C": "吸入性麻醉藥物需增加濃度", "D": "靜脈誘導藥物不需調整劑量"}, "answer": "A", "explanation": "老年人胃排空延遲、賁門括約肌張力下降，誤吸風險增加。MAC 隨年齡增加而下降（吸入麻醉藥需減量）；靜脈誘導藥物因分佈容積、清除率改變，應減量；區域與全身麻醉對老年人 POCD 等預後無顯著差異。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q66"}, {"id": 67, "question": "有關肥胖病人的呼吸道處置，下列何者最不適當？", "options": {"A": "可能困難面罩通氣，需準備口咽呼吸道(oropharyngeal airway)和鼻咽呼吸道(nasopharyngeal airway)", "B": "可能困難面罩通氣，需準備喉面罩呼吸道(laryngeal mask airway)", "C": "可能困難插管，考慮採取清醒纖維內視鏡氣管插管(awake fiberoptic tracheal intubation)", "D": "可能困難插管，考慮使用氣管擴張藥物(bronchodilator)增加插管成功率"}, "answer": "D", "explanation": "支氣管擴張劑（bronchodilator）是針對支氣管痙攣（如氣喘）的治療，與困難插管無關，無法增加插管成功率。困難插管的處置應考慮視頻喉頭鏡、纖維內視鏡或清醒插管。", "category": "airway", "difficulty": "medium", "source": "110_advanced_Q67"}, {"id": 68, "question": "72歲45公斤病人，罹患慢性腎衰竭多年，接受腹腔鏡手術麻醉，手術約2小時，期間共給予morphine 6mg、cisatracurium 6mg和propofol 180mg。在恢復室又觀察1小時後，病人仍無法喚醒且呼吸速率較慢，瞳孔縮小，受疼痛刺激後會用手撥開，可抬頭十秒，後續如果產生呼吸抑制，最適當的處置為下列何者？", "options": {"A": "naloxone", "B": "flumazenil", "C": "neostigmine", "D": "sugammadex"}, "answer": "A", "explanation": "瞳孔縮小 + 呼吸速率降低 + 腎衰竭病人 + 使用 Morphine（代謝物 M6G 在腎衰竭時蓄積）= 鴉片類藥物蓄積。Naloxone 是鴉片類拮抗劑。病人可抬頭十秒代表肌力尚可（Cisatracurium 已逆轉），無 Benzodiazepine 使用，故不選 Flumazenil。", "category": "pharmacology", "difficulty": "hard", "source": "110_advanced_Q68"}, {"id": 69, "question": "76歲男性，有高血壓病史，施行疝氣修補手術，接受半身麻醉之後兩分鐘血壓78/50mmHg，心跳44次/分鐘，感覺阻斷約T4，下列處置何者最不適當？", "options": {"A": "NaCl 0.9% 200mL", "B": "midazolam 5mg", "C": "ephedrine 8mg", "D": "atropine 0.5mg"}, "answer": "B", "explanation": "高位脊髓麻醉（T4 阻斷心臟加速神經）造成低血壓 + 心搏過緩，應快速給予輸液（NaCl）、Ephedrine（升壓+增加心率）、Atropine（治療心搏過緩）。Midazolam 具有降壓及呼吸抑制作用，此情境下給予會使病情惡化，最不適當。", "category": "regional", "difficulty": "hard", "source": "110_advanced_Q69"}, {"id": 70, "question": "有關治療全身麻醉術後寒顫，下列藥物何者最適合？", "options": {"A": "fentanyl", "B": "morphine", "C": "hydromorphone", "D": "meperidine"}, "answer": "D", "explanation": "Meperidine（Demerol）是治療術後寒顫最有效的鴉片類藥物，機轉與其 κ 受體作用及 NMDA 拮抗效果有關。低劑量（12.5–25 mg IV）即有效。其他鴉片類藥物（Fentanyl、Morphine）對寒顫效果不如 Meperidine 顯著。", "category": "pharmacology", "difficulty": "easy", "source": "110_advanced_Q70"}, {"id": 71, "question": "55歲病人因右側下肺葉巨大惡性腫瘤來進行開胸術(open thoracotomy)，術前咳嗽且痰多，麻醉採double lumen ETT插管全身麻醉，手術採左側躺。麻醉誘導過程有設置左手A-line與右側鎖骨下CVC。手術進入胸腔後十分鐘，發現血氧降低、呼吸器顯示氣道壓力過大、通氣量不足(tidal volume=50mL)。下列鑑別診斷何者較不適當？", "options": {"A": "手術器械操作或腫瘤壓迫病患氣管造成呼吸道堵塞", "B": "CVC打針刺傷右側肺部，進而逐漸造成張力性氣胸", "C": "double lumen氣管內管置放位置不正確或不慎移位", "D": "呼吸器管路彎折(kinking)或有痰塊塞住呼吸管路"}, "answer": "B", "explanation": "CVC 置於右側鎖骨下，右側肺已開胸（右側躺手術側），即使氣胸也不會影響左側通氣；且病人採左側躺，右側已在術野中。氣道壓升高 + 潮氣量降低最可能是管路移位、堵塞或外部壓迫。右側 CVC 造成張力性氣胸在此情境中最不可能。", "category": "crisis", "difficulty": "hard", "source": "110_advanced_Q71"}, {"id": 72, "question": "75歲50公斤膝關節置換病人，使用脊髓麻醉合併midazolam輕度鎮靜，術中誤用肌肉鬆弛劑rocuronium 20mg，有關後續處置下列何者最不適當？", "options": {"A": "趕快準備氣管內管插管工具，可能後續需要呼吸器", "B": "馬上施打neostigmine 4mg來緊急逆轉肌肉鬆弛藥效", "C": "施予面罩通氣，並使用神經肌肉監測儀器監測", "D": "準備sugammadex藥劑在旁，緊急時考慮施打"}, "answer": "B", "explanation": "Neostigmine 逆轉 Rocuronium 需要 TOF count ≥ 2 才能使用，且效果有上限。在誤給肌鬆劑後立即注射 Neostigmine（深度阻斷時）效果差且可能造成心律不整。正確做法是先面罩通氣、監測，必要時給 Sugammadex（可在任何阻斷深度立即完全逆轉 Rocuronium）。", "category": "pharmacology", "difficulty": "hard", "source": "110_advanced_Q72"}, {"id": 73, "question": "65歲病人進行腹腔鏡膽囊切除術，有食道癌治療病史。插管全身麻醉誘導順利，但鼻胃管困難置放，使用空針打氣測試時聽不到胃部回音，但用空針回抽可順暢抽出氣體。外科開始消毒時，發現呼吸器間歇出現警示顯示circuit leak漏氣，加大fresh gas flow至2L/min時可使呼吸器bellow運作順暢。手術中外科囑咐對鼻胃管連續抽吸時，突然發現bellow打不起來，下列敘述何者正確？", "options": {"A": "加大fresh gas flow可解決警報，表示呼吸器管路必無滲漏破洞", "B": "使用空針筒於鼻胃管可抽出氣體，表示鼻胃管位置與深度正確", "C": "術前應從鼻胃管灌大量水，來測試鼻胃管是否正確置放且通暢", "D": "呼吸器無法運作時應停止鼻胃管抽吸，並請醫師用喉頭鏡檢查"}, "answer": "D", "explanation": "Bellow 突然打不起來 + 鼻胃管連續抽吸，高度懷疑鼻胃管誤置於氣管/氣管內管（可抽出氣體 = 氣管的空氣）。抽吸時直接抽取氣管氣體使 bellow 無法充氣。應停止抽吸，用喉頭鏡確認鼻胃管位置。加大 fresh gas flow 只是掩蓋漏氣警報，並非代表管路無破洞。", "category": "crisis", "difficulty": "hard", "source": "110_advanced_Q73"}, {"id": 74, "question": "2歲兒童體重12公斤，使用氣管內管插管合併吸入sevoflurane全身麻醉，出現下列何項生命徵象，需高度懷疑惡性高熱？", "options": {"A": "心跳時快時慢(100次/分鐘～185次/分鐘)，竇性心律", "B": "血壓緩降至65/45mmHg，心跳為145次/分鐘", "C": "通氣正常，EtCO2 90mmHg，體溫36.8℃", "D": "通氣正常，EtCO2 40mmHg，體溫36.5℃升至37.2℃"}, "answer": "C", "explanation": "惡性高熱最早且最敏感的指標是 EtCO₂ 急速升高（代謝亢進，CO₂ 大量產生）。選項 C：通氣正常但 EtCO₂ = 90 mmHg（嚴重高碳酸血症），體溫尚未明顯升高（早期）= 最符合 MH 早期。體溫升高常是晚期表現。", "category": "crisis", "difficulty": "hard", "source": "110_advanced_Q74"}, {"id": 75, "question": "車禍外傷病人進行緊急手術，下列敘述何者最適當？", "options": {"A": "外傷腦壓高時常伴隨血壓變高，手術前需積極降低血壓", "B": "嚴重脊椎損傷病人給予大量類固醇，不一定能改善癱瘓", "C": "頸椎受傷病人於急診插的氣管內管於術後可以立即移除", "D": "年輕外傷病人需輸血至血紅素達正常值(14 g/dL)比較好"}, "answer": "B", "explanation": "嚴重脊椎損傷使用大劑量 Methylprednisolone 的臨床效益仍有爭議，多個研究顯示改善效果有限，且副作用（感染、高血糖）明顯。外傷腦高壓（Cushing reflex）不應積極降血壓（會減少腦灌流）；頸椎損傷拔管需謹慎評估；輸血閾值依臨床狀況而定，不需至 14 g/dL。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q75"}, {"id": 76, "question": "55歲病人車禍來做剖腹探查手術，手術前檢查顯示腹腔內大量出血，手術中使用快速輸血設備已輸注紅血球濃厚液10單位，下列敘述何者錯誤？", "options": {"A": "大量輸血時常造成體溫降低，最好使用輸血加溫設備", "B": "大量輸血會讓電解質不平衡，導致酸血症及血鈣升高", "C": "考慮凝血功能異常，需要輸注血小板與新鮮冷凍血漿", "D": "大管徑周邊靜脈導管與中央靜脈導管，速度效率相近"}, "answer": "B", "explanation": "大量輸血造成：低鈣血症（citrate 螯合 Ca²⁺）而非高鈣、高鉀血症（儲存血釋出 K⁺）、低體溫、稀釋性凝血病、酸中毒。選項 B 說「血鈣升高」是錯誤的，應為低鈣血症。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_advanced_Q76"}, {"id": 77, "question": "65歲病人進行左手韌帶修補手術，麻醉醫師使用0.5% bupivacaine與2% lidocaine各20mL，從腋下進行臂神經叢神經阻斷麻醉(axillary block)，麻醉過程中病人抱怨嘴巴麻麻有怪味道，隨即就發現病人叫不醒，心跳過慢25次/分鐘，下列處置何者最正確？", "options": {"A": "觀察即可，局部麻醉藥物效果衰退大約一分鐘就會好轉", "B": "同一手給予少許點滴輸液，沖淡麻醉藥物就可快速緩解", "C": "呼救並準備進行CPR，也可能需裝ECMO心肺支持", "D": "病人可能發生惡性高熱，治療用的主要藥物是dantrolene"}, "answer": "C", "explanation": "金屬味/嘴巴麻 + 失去意識 + 心搏過緩 = 局麻藥全身毒性（LAST）重症（心血管毒性）。處置：呼救、CPR、20% 脂肪乳劑（Intralipid）靜脈注射；嚴重心血管毒性（特別是 Bupivacaine）可能需要 ECMO。非惡性高熱（無高 EtCO₂、高體溫），也不應觀察等待。", "category": "crisis", "difficulty": "hard", "source": "110_advanced_Q77"}, {"id": 78, "question": "75歲加護病房病人，插管使用呼吸器25天，體重50公斤，曾做過心臟繞道手術、腎衰竭常規透析，痰多黏稠，今日欲進行氣切手術。進入手術室時心電圖顯示sinus bradycardia 35次/分鐘，A-line血壓40/25mmHg，將氣管內管接上麻醉機器，呼吸道壓力很高但潮氣量只能打到150mL，EtCO2 5mmHg。下列敘述何者最不適當？", "options": {"A": "可能是痰塊卡住了氣管內管導致缺氧", "B": "趕快呼救並準備開始ACLS急救程序", "C": "需要趕快拿體外電擊器進行去顫電擊", "D": "開始胸外心臟按摩，並給予腎上腺素"}, "answer": "C", "explanation": "Sinus bradycardia（竇性心搏過緩）是有組織性的心律，不是 VF/pVT，不需要去顫電擊。血壓極低（40/25 mmHg）+ 心搏過緩 + 潮氣量極低（可能氣道阻塞）= 接近心跳停止，應 ACLS 急救（CPR + Epinephrine）。去顫電擊用於 VF/無脈 VT，此情境不適合。", "category": "crisis", "difficulty": "hard", "source": "110_advanced_Q78"}, {"id": 79, "question": "病人接受上呼吸道雷射手術，採氣管內插管全身麻醉。為了避免發生術中氣道內起火燃燒，下列處置何者錯誤？", "options": {"A": "於雷射使用過程時降低呼吸器氧氣FiO2", "B": "使用雷射手術專用的金屬材質氣管內管", "C": "改以水來代替空氣，充滿氣管內管cuff", "D": "起火時改將氣管內管接純氧以防病人缺氧"}, "answer": "D", "explanation": "氣道起火時，應立即停止通氣（停止供氧助燃）、拔除氣管內管，用生理食鹽水澆熄，再重新建立呼吸道。改接純氧（100% O₂）會嚴重加劇火勢，是完全錯誤的處置。", "category": "crisis", "difficulty": "medium", "source": "110_advanced_Q79"}, {"id": 80, "question": "有關硬脊膜穿刺後頭痛(post-dural puncture headache)的敘述，下列何者正確？", "options": {"A": "症狀常與姿勢相關，躺著比較嚴重但如果站著則得到部分緩解", "B": "使用較細的針且避免反覆穿刺可以減少發生的機會", "C": "發生時避免脫水與給予非類固醇類止痛藥物，無助於改善症狀", "D": "常規性的臥床休息，可預防性減少硬脊膜穿刺後頭痛發生率"}, "answer": "B", "explanation": "使用較細的針（25G 以下）且採用鉛筆型針頭（pencil-point，如 Whitacre、Sprotte）可顯著降低 PDPH 發生率。PDPH 姿勢特點：站立/坐起時頭痛加劇，平躺時緩解；充分水分補充和 NSAIDs 有助改善症狀；預防性臥床無效。", "category": "regional", "difficulty": "medium", "source": "110_advanced_Q80"}]};
const DATA_110_GENERAL  = {"meta": {"year": 110, "role": "nurse", "subject": "general", "subject_name": "專科護理通論", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "有關專科護理師設計有效的病人衛教方案，下列步驟順序何者正確？①指出病人的教育需要和病人或家屬的問題 ②給予病人教育問題診斷 ③評估病人的健康照護需求 ④發展教育計畫", "options": {"A": "①②③④", "B": "②③④①", "C": "③①②④", "D": "③④①②"}, "answer": "C", "explanation": "衛教方案設計步驟遵循護理程序：③評估需求 → ①指出問題 → ②診斷 → ④發展計畫，再執行與評值。先評估才能確認問題，再診斷，最後規劃教育計畫。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q1"}, {"id": 2, "question": "依病人自主權利法，病人就診時，醫療機構或醫師應以其所判斷之適當時機及方式，將病人之病情、治療方針、處置、用藥、預後情形及可能之不良反應等相關事項告知本人。下列何者為亦得告知其關係人的要件？", "options": {"A": "關係人要求告知", "B": "不會造成病人傷害", "C": "病人未明示反對", "D": "病情已進展至末期"}, "answer": "C", "explanation": "依病人自主權利法，病人就診時資訊應告知本人；若「病人未明示反對」，才得以同時告知關係人。病人明示反對或有特殊疑慮時，不得告知關係人，以保護病人自主及隱私。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q2"}, {"id": 3, "question": "有關教育方案設計，下列敘述何者錯誤？", "options": {"A": "擬訂教學目標，宜包括知識、態度與行為領域", "B": "講述教學策略與敘事性評值是最有效的教學方式", "C": "反饋(debriefing)是以學生為主模擬情境教案的學習", "D": "安置性評量(placement evaluation)是依個別差異安排教學活動"}, "answer": "B", "explanation": "單一教學策略（如講述）並非最有效的方式；多元教學法（示範、模擬、討論）結合敘事性評值才更全面有效。此外「敘事性評值」本身偏質性描述，並不代表最有效的教學策略。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q3"}, {"id": 4, "question": "有關專業人員執行臨床病人教育，下列敘述何者錯誤？", "options": {"A": "病人對放射治療照護知識不足，直接指導(guidance)是最好的衛教方式", "B": "教育病人如何備餐攝取所需營養素是賦能方式，可讓病人承擔自我照護之責", "C": "剛獲知罹患癌症者，立即提供各項治療副作用的自我照顧衛教可降低病人焦慮", "D": "選用的教育方式與材料，需考量病人的教育背景、經驗與視聽覺感官功能"}, "answer": "C", "explanation": "剛獲知罹癌者通常處於震驚和否認期，此時立即提供大量治療副作用資訊反而會增加焦慮，且訊息接受度極低。應先提供情緒支持，評估病人準備度後，再逐步給予衛教。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q4"}, {"id": 5, "question": "促進持續品質提升，運用實證健康照護5A的五大步驟，下列順序何者正確？①找出最佳證據 ②評估證據，文獻評讀 ③提問 ④應用於臨床解決病人問題 ⑤評估或評值成效與結果", "options": {"A": "①②③④⑤", "B": "③①②④⑤", "C": "①③④②⑤", "D": "③②①④⑤"}, "answer": "B", "explanation": "實證健康照護 5A 步驟：③Ask（提問）→ ①Acquire（找證據）→ ②Appraise（評讀）→ ④Apply（應用）→ ⑤Assess（評值）。先有臨床問題，才能尋找和評讀證據，再應用和評估。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q5"}, {"id": 6, "question": "根據衛生福利部民國106年05月08日專科護理師於醫師監督下執行醫療業務辦法，下列何者不是專科護理師及訓練專科護理師於醫師監督下得執行之醫療業務？", "options": {"A": "代為開立預立特定醫療流程所需表單", "B": "檢驗、檢查之初步綜合判斷", "C": "涉及侵入人體之傷口及管路處置", "D": "擬定醫療方針及相關諮詢"}, "answer": "D", "explanation": "擬定醫療方針屬醫師的核心職權（醫師法），不在專科護理師執業範圍內。專科護理師可執行預立特定醫療流程表單、初步判斷、傷口管路處置等，但不得獨立擬定治療方針。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q6"}, {"id": 7, "question": "有關專科護理師想要發展跌倒的臨床照護指引，下列何者不包括在臨床照護指引的發展重要步驟當中？", "options": {"A": "做好利益衝突聲明", "B": "進行系統文獻查證", "C": "有證據等級及強度", "D": "每年要更新一次"}, "answer": "D", "explanation": "臨床照護指引發展步驟包括：定義問題、系統文獻查證、評估證據強度等級、提出建議、利益衝突聲明、同儕審閱等。更新頻率依實際需要（新證據出現、實務改變）決定，無規定必須「每年」更新。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q7"}, {"id": 8, "question": "家屬反映：「病人開完刀病都沒好、醫師實在是庸醫，護理人員的照顧也實在很糟糕！」。專科護理師回應：「你的主治醫師是本院最好的醫師，也是這種手術的權威！而且，護理人員也都很優秀，有好幾位都曾當選過優良護理師。」前述專科護理師的回應是屬於何種溝通行為？", "options": {"A": "提供資訊(informing)", "B": "提出所觀察到的(making observation)", "C": "輕視忽略個案的感受(belittling feeling that is expressed)", "D": "防衛辯護(defending)"}, "answer": "D", "explanation": "護理師的回應是在為醫師和護理人員辯護，而非傾聽家屬的情緒和擔憂，屬於「防衛辯護（defending）」的非治療性溝通。正確的回應應先承認家屬的感受，再了解情況。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q8"}, {"id": 9, "question": "58歲停經婦女，平時規律服用抗高血壓藥，沒有吸菸、沒有嚼食檳榔習慣，一日到醫院門診就醫取藥時，癌症中心推廣癌症篩檢，可建議該婦女參與國民健康署規劃的哪些癌症篩檢？", "options": {"A": "乳癌、子宮內膜癌與子宮頸癌", "B": "子宮內膜癌、口腔癌與大腸直腸癌", "C": "乳癌、子宮頸癌與大腸直腸癌", "D": "口腔癌、子宮頸癌與大腸直腸癌"}, "answer": "C", "explanation": "國健署四大癌症篩檢：①乳癌（45–69 歲女性、40–44 歲一等親有乳癌史）、②子宮頸癌（30 歲以上女性）、③大腸直腸癌（50–74 歲）、④口腔癌（30 歲以上有吸菸或嚼檳榔）。此婦女 58 歲、無吸菸嚼檳，符合乳癌、子宮頸癌、大腸直腸癌篩檢。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_general_Q9"}, {"id": 10, "question": "有關美國國家科學委員會醫學研究院(Institute of Medicine, IOM)提出21世紀醫療照護品質六大目標，下列何者錯誤？", "options": {"A": "醫療行為效率化", "B": "醫療處置有效化", "C": "醫療照護安全化", "D": "醫療照護差異化"}, "answer": "D", "explanation": "IOM 六大品質目標（STEEEP）：Safety（安全）、Timely（及時）、Effective（有效）、Efficient（效率）、Equitable（公平）、Patient-centered（以病人為中心）。「差異化」不在其中，反而 Equitable（公平，消弭差異）是目標之一。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q10"}, {"id": 11, "question": "良好溝通影響醫療品質極大，ISBAR是增進醫療人員間及醫病間有效溝通的工具，下列要素敘述何者錯誤？", "options": {"A": "S(self introduction)：介紹自己和病人", "B": "B(background)：重要病史、目前用藥及治療情形", "C": "A(assessment)：狀況評估，含vital signs數據、各類檢查檢驗結果", "D": "R(recommendation)：後續處理措施或方向"}, "answer": "A", "explanation": "ISBAR 中的 I = Identify（身份確認，介紹自己及病人），S = Situation（目前情況/問題），不是 self introduction。選項 A 將 S 的定義誤植為「介紹自己和病人」，應為「病人問題與現況」。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q11"}, {"id": 12, "question": "有關衛福部民國109～110年醫院醫療品質及病人安全工作目標，落實感染管制有關的執行策略，下列敘述何者錯誤？", "options": {"A": "定期環境清潔及監控清潔品質", "B": "執行病人用藥整合與管理", "C": "加強抗生素使用管理機制", "D": "落實工作人員之健康管理"}, "answer": "B", "explanation": "「執行病人用藥整合與管理」屬於藥物安全目標，不是感染管制目標。感染管制策略包含環境清潔、手部衛生、抗生素管理、工作人員健康管理、隔離措施等。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q12"}, {"id": 13, "question": "病人往生後，照護該病人的專科護理師想把病人與子女互動的故事寫成「敘事護理」發表。依據現行法律，該專科護理師發表病人的故事必須符合下列何項條件？", "options": {"A": "人體試驗委員會(IRB)審查通過", "B": "病人的法定代理人書面同意", "C": "專科護理師作業小組核准", "D": "發表內容無法識別病人"}, "answer": "B", "explanation": "病人往生後，應由法定代理人（繼承人）代為行使病人隱私權。發表涉及具體可識別的個人資訊，需取得法定代理人書面同意。即使去識別化亦未必足夠（如故事細節仍可能識別）；IRB 適用於研究，非個案報告的必要條件。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q13"}, {"id": 14, "question": "「安寧緩和醫療條例」第7條是針對末期病人不施行心肺復甦術或維生醫療之法律規定，下列敘述何者正確？", "options": {"A": "應由二位具有相關專科醫師資格之醫師診斷確為末期病人", "B": "若病人無法清楚表達意願，須由所有最近親屬同意", "C": "若病人無最近親屬者，照會倫理委員會依病人最大利益作出決定", "D": "若病人已插管並使用呼吸器，須經安寧緩和醫療照會後方可撤除"}, "answer": "A", "explanation": "依安寧緩和醫療條例，末期病人需由二位具相關專科醫師資格醫師診斷確認，且不需全體最近親屬同意（最近親屬中有人同意且無反對即可）；無最近親屬時由醫療機構倫理委員會；已插管者得在家屬同意下撤除。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q14"}, {"id": 15, "question": "下列臨床情境，何者不適合採用醫病共享決策(shared decision making, SDM)？", "options": {"A": "昏厥之健康年輕女性，心跳25次/分鐘擬置入心律調節器前", "B": "擔心以後造成家人的負擔，思索是否應該簽署預立醫療決定", "C": "擔心子宮肌瘤術後狀況，考慮應採局部切除還是全子宮切除方式", "D": "肝癌末期病人，希望可以知道各種治療方式優缺點以及疾病預後"}, "answer": "A", "explanation": "心跳 25 次/分鐘（severe bradycardia）是立即危及生命的緊急情況，需要即時醫療介入（心律調節器），不適合延遲進行 SDM 討論。SDM 適用於有多種合理選擇的非急迫情境。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q15"}, {"id": 16, "question": "台灣最近數年來，醫療糾紛事件層出不窮，其原因不包括下列何者？", "options": {"A": "病人權利意識提高", "B": "病人的期待與現實間的落差", "C": "醫療商業化，民眾將醫療行為視同為商業行為", "D": "醫病關係維持類似父子關係，一切聽從醫師指示行事"}, "answer": "D", "explanation": "傳統父子型醫病關係（家長式）中病人服從醫師，反而不易產生糾紛；現代醫病糾紛增加的原因包括：病人自主意識增加、期待落差、媒體渲染、醫療商業化等。「聽從醫師」的傳統關係不是糾紛增加的原因。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q16"}, {"id": 17, "question": "病人抱怨肚子脹氣的問題都不見好轉，而且已經跟醫師和護理師說過好幾次，都沒有被處理，下列何者為專科護理師最佳的回覆方式？", "options": {"A": "「好的，我等一下提醒主治醫師。」", "B": "「怎麼會呢？我們都一直在處理。」", "C": "「我會交班下去，盡快處理。」", "D": "「可以讓我檢查一下你的肚子嗎？」"}, "answer": "D", "explanation": "最佳回應是立即進行臨床評估（腹部檢查），這展現了主動性、臨床能力和對病人問題的重視。口頭承諾「等一下」或「交班」缺乏即時性；否認病人的感受（選項 B）是非治療性溝通。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q17"}, {"id": 18, "question": "根據史克勞德對於持續性品質改善(CQI)的詮釋，下列敘述何者正確？", "options": {"A": "以領導者及顧客為導向", "B": "注重資料，應用科學性方法進行改善", "C": "強調組織高層決策，避免政策方針錯誤", "D": "重視組織內各階層獨立運作"}, "answer": "B", "explanation": "CQI 的核心理念：以資料（data）為基礎的客觀分析、科學性系統改善方法（PDCA）、全員參與（非獨立運作）、以顧客（病人）為導向、持續不斷的改善。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q18"}, {"id": 19, "question": "有關專科護理師的角色功能，下列何者最不恰當？", "options": {"A": "問候病人及家屬，建立親善關係", "B": "誠實告訴病人你知識上的侷限", "C": "依據病人的檢查結果決定後續治療", "D": "評值及追蹤病人照護過程及治療結果"}, "answer": "C", "explanation": "「決定後續治療」屬醫師職責（需醫師指示）。專科護理師可在醫師監督下執行部分醫療業務，但獨立依據檢查結果決定治療計畫超出其執業範圍。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q19"}, {"id": 20, "question": "預立醫療決定者，醫療機構或醫師得依其預立醫療決定終止、撤除或不施行維持生命治療或人工營養及流體餵養，下列臨床條件何者未符合病人自主權利法的規定？", "options": {"A": "肺癌末期病人", "B": "永久植物人狀態", "C": "不可逆轉之昏迷狀況", "D": "罕見疾病病童"}, "answer": "D", "explanation": "病人自主權利法適用五大臨床條件：①末期病人、②不可逆昏迷、③永久植物人、④極重度失智、⑤其他不可治癒且具嚴重苦痛的疾病。「罕見疾病病童」不一定符合上述條件，且病童的法律能力（自主決定）也需特別考量。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q20"}, {"id": 21, "question": "55歲病人，為貿易公司高階主管，工作忙碌且壓力大。主訴最近吃完飯後胸口常會有灼熱的感覺，感覺食道有酸酸的液體往上湧，有時候晚上睡著後會咳嗽醒來，喉嚨疼痛灼熱。以下建議何者較不適合？", "options": {"A": "吃完東西也不要立即躺平，睡前2～3小時儘量不要吃東西，不暴飲暴食", "B": "不菸不酒，減少食用刺激性食物或飲品(例如：咖啡)", "C": "多攝食高脂、高纖與奶類食品，有效延長胃排空時間", "D": "症狀嚴重且無法調整生活型態得以改善時，可以藥物治療，如制酸劑等"}, "answer": "C", "explanation": "GERD 飲食建議：避免高脂食物（減慢胃排空、鬆弛賁門括約肌）、乳製品（刺激胃酸）。高脂和奶類食品會加重 GERD 症狀，而非改善。高纖維食物本身問題不大，但放在「高脂、奶類」的組合中，整個選項 C 的建議是不適合的。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_general_Q21"}, {"id": 22, "question": "有關醫護基本倫理四大原則（自主原則、行善原則、不傷害原則與公平正義原則）之敘述，下列何者正確？", "options": {"A": "五倫之中長幼有序乃是公平正義原則", "B": "尊重病人做決定的權利乃是自主原則", "C": "禮義廉恥四維之中「禮」乃是行善原則", "D": "考量病人醫療可負擔性乃是不傷害原則"}, "answer": "B", "explanation": "自主原則（Autonomy）的核心是尊重個人做決定的權利，知情同意是其具體體現。醫療可負擔性屬公平正義原則；長幼有序和禮義廉恥是中國倫理觀念，不對應四大醫學倫理原則。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q22"}, {"id": 23, "question": "根據衛生福利部109年2月17日衛部醫字第1091660695號函，下列何者不是「109～110年度醫院醫療品質及病人安全工作目標」？", "options": {"A": "促進醫療人員間及醫病間之有效溝通", "B": "營造病人安全文化及落實病人安全事件管理", "C": "強化醫院火災預防與應變措施", "D": "鼓勵病人及其家屬參與病人安全工作"}, "answer": "C", "explanation": "109–110 年病人安全工作目標包含：有效溝通、用藥安全、感染管制、手術安全、跌倒預防、病人安全文化、病人參與等。「強化醫院火災預防與應變」不是此年度的工作目標（屬於環境安全範疇）。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q23"}, {"id": 24, "question": "下列何項業務已經超出專科護理師及訓練專科護理師之醫療業務範圍？", "options": {"A": "未及於肌肉及肌腱之表層傷口縫合", "B": "周邊動脈導管置入及拔除", "C": "自主開立常規使用之藥物處方醫囑", "D": "石膏固定及拆除"}, "answer": "C", "explanation": "「自主開立」藥物處方屬醫師職權，專科護理師不得自主開立藥物醫囑（可代為開立預立特定醫療流程所需的處方，但非自主）。表層傷口縫合、周邊動脈導管、石膏固定均在授權範圍內。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q24"}, {"id": 25, "question": "下列何者為代謝症候群？", "options": {"A": "陳先生，BMI=30 kg/m2 腰圍87公分，空腹血糖值120mg/dL", "B": "李小姐，腰圍81公分，空腹血糖值95mg/dL，膽固醇220mg/dL", "C": "陳先生，腰圍89公分，空腹血糖值120mg/dL，高密度脂蛋白膽固醇42mg/dL", "D": "李小姐，腰圍75公分，空腹血糖值110mg/dL，血壓136/80mmHg"}, "answer": "D", "explanation": "代謝症候群（台灣標準，符合三項以上）：腰圍男≥90/女≥80 cm、空腹血糖≥100 mg/dL、血壓≥130/85 mmHg、三酸甘油脂≥150 mg/dL、HDL男<40/女<50 mg/dL。選項D：李小姐腰圍75（未超）但血糖110（超）+ 血壓136/80（超），需確認其他指標；選項C：男性腰圍89（未超90）+ 血糖120（超）+ HDL42（未超），不符合三項。選項D最接近符合條件（血糖超 + 血壓略超）。", "category": "clinical_assessment", "difficulty": "hard", "source": "110_general_Q25"}, {"id": 26, "question": "50歲停經婦女，BMI為22 kg/m2，健康檢查發現其HbA1C值為6.7%，醫師建議其先調整生活型態。病人想藉由運動改善其血糖控制，下列敘述何者較不合適？", "options": {"A": "運動過程中應控制心跳勿超過100次/分鐘，以免增加心臟負擔", "B": "適度的重量訓練可以增進肌力與肌耐力，有助於血糖控制", "C": "快走與慢跑等有氧運動是不錯的選擇，可改善心肺能力與身體組成", "D": "這樣的運動策略屬於三段五級中的次級預防，旨在健康促進"}, "answer": "A", "explanation": "糖尿病前期病人運動目標心率應達到最大心率的 60–80%（最大心率≈220-年齡=170，目標 102–136 bpm），限制在 100 bpm 以下運動強度不足，無法有效改善胰島素敏感性。選項 D 中「健康促進」屬初級預防，而次級預防是早期發現治療；但題目問「不合適」，選項 A 的心跳限制建議不正確是最明確的錯誤。", "category": "clinical_assessment", "difficulty": "medium", "source": "110_general_Q26"}, {"id": 27, "question": "下列何者不屬於專科護理師工作之職責？", "options": {"A": "在醫師指示下開立藥物處方與管制口服藥方等用藥", "B": "擬訂護理問題提供護理措施，病人及家屬之護理指導及諮詢", "C": "協助執行緊急救護，可執行心臟整流術(cardioversion)", "D": "代為開立預立特定醫療流程表單，如入院許可單等"}, "answer": "AC", "explanation": "疑義題，官方確認答案為 A 或 C 皆可。(A) 開立藥物處方與管制藥品不屬於職責；(C) 心臟整流術（cardioversion）雖屬職責，但在「協助緊急救護」情境下的界定有爭議，故 A 或 C 皆為正確答案。", "note": "本題為疑義題，官方確認答案為 A 或 C 皆可", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q27"}, {"id": 28, "question": "孫先生罹癌多年，最近一次因為腫瘤轉移入院，家屬偷偷告訴專科護理師病人希望放棄治療，下列何者為專科護理師較恰當之回應？", "options": {"A": "「生病這麼多年，一定要堅持下去。」", "B": "「現在醫藥這麼發達，一定可以找到方法。」", "C": "「你是不是很擔心？你的看法是什麼？」", "D": "「我會跟主治醫師說，再和你們討論。」"}, "answer": "C", "explanation": "治療性溝通應先探索家屬感受和想法（開放性問題），而非給予保證（A、B）或立即轉介（D）。選項C先確認家屬情緒（同理），再了解其想法，是最符合治療性溝通原則的回應。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q28"}, {"id": 29, "question": "專科護理師及訓練期間專科護理師除可執行護理人員之業務，並得於醫師監督下執行醫療業務，下列何者不屬於其範圍及項目？", "options": {"A": "鼻胃管置入", "B": "Nelaton導管更換與灌洗", "C": "中央靜脈導管置入", "D": "陰道擴張器(鴨嘴器)置入"}, "answer": "C", "explanation": "中央靜脈導管置入（含 PICC 除外）通常屬醫師執行的高風險侵入性操作，不在麻醉科專科護理師的標準業務範圍。鼻胃管、Nelaton 導管、陰道擴張器均為護理或 NP 可執行的業務。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q29"}, {"id": 30, "question": "某醫院因COVID-19疫情之故，要求住院與陪病家屬皆須以PCR檢測確認無染疫方可住院。陳太太因陣痛至該院就診待產，接受診療後在等待PCR過程中胎心音下降而緊急剖腹生產。下列敘述何者錯誤？", "options": {"A": "醫院如此規定枉顧病人權益，應處以罰鍰", "B": "等待過程中有醫療人員予以診治，醫院處置得宜", "C": "陳先生不得拒絕PCR檢測，應主動配合採檢", "D": "此案例無違反護理師法，並無拖延救治之事實"}, "answer": "A", "explanation": "醫院在疫情期間制定防疫措施（PCR 篩檢）有其法律依據，且過程中有醫療人員持續監測胎兒狀況，出現緊急狀況立即手術，符合緊急醫療處置規範，不構成違法或應處罰的情況。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q30"}, {"id": 31, "question": "陳先生，55歲，為貿易公司高階主管，工作忙碌且壓力大。健康檢查發現其BMI高達34 kg/m2，總膽固醇395 mg/dL，還有嚴重的脂肪肝。主訴爬樓梯容易喘不過氣來，無法做激烈運動。針對陳先生狀況，下列何者建議較為合適？", "options": {"A": "採用生酮飲食，改善脂肪肝、降低膽固醇", "B": "以高強度有氧運動，如拳擊有氧，快速降低體重與高血脂", "C": "減少熱量，每日熱量攝取控制於1,000大卡，快速達到減重目標", "D": "增加日常生活中的活動量，如每日1萬步、快走"}, "answer": "D", "explanation": "有心肺功能限制（爬樓梯喘）的肥胖病人應從低強度、日常性活動開始（每日步行），循序漸進。高強度運動（拳擊有氧）有心血管風險；過度限制熱量（1000 kcal）可能造成肌肉流失和營養不足；生酮飲食對脂肪肝效果有爭議且高脂肪，不適合高膽固醇者。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_general_Q31"}, {"id": 32, "question": "有關丹佛發展測驗-丹佛II(Denver II)針對0～6歲兒童作評量內容之敘述，下列何者不包含在內？", "options": {"A": "語言", "B": "智商", "C": "粗動作", "D": "精細動作"}, "answer": "B", "explanation": "Denver II 評估四大領域：①個人-社會（Personal-Social）、②精細動作-適應（Fine Motor-Adaptive）、③語言（Language）、④粗動作（Gross Motor）。智商（IQ）評估不在 Denver II 範疇，需使用韋氏智力測驗等工具。", "category": "clinical_assessment", "difficulty": "easy", "source": "110_general_Q32"}, {"id": 33, "question": "醫療品質可從結構、過程與結果指標做評量，下列何者不是病人結果面品質指標？", "options": {"A": "臨床照護指引遵從率", "B": "術後噁心嘔吐發生率", "C": "中心靜脈導管感染率", "D": "出院3日內再入急診率"}, "answer": "A", "explanation": "臨床照護指引遵從率是「過程面」指標（評估醫療行為是否符合標準）。結果面指標反映病人健康狀態的改變：PONV 發生率、CLABSI 感染率、再入急診率均屬結果面。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q33"}, {"id": 34, "question": "有關採用醫療決策共享的臨床情境，下列何者最不適當？", "options": {"A": "目前還未有明確實證結果的處置與用藥", "B": "唯一具有實證基礎的臨床常規照護", "C": "需要長期服用多種藥物", "D": "醫療不確定性高"}, "answer": "B", "explanation": "當只有「唯一」具實證基礎的最佳治療時（如某感染症的標準抗生素），SDM 的意義較低，因為醫學上只有一個正確選擇。SDM 最適用於：有多種合理選項、醫療不確定性高、需長期治療、影響生活品質的決策。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q34"}, {"id": 35, "question": "以健康信念模式為依據，評估婦女對於乳房攝影檢查之意願，下列何者評估結果屬於個人信念？", "options": {"A": "「我不知道飲食型態跟乳癌有關係。」", "B": "60歲女性，白人，有家族乳癌病史", "C": "「我媽媽就是死於乳癌，我很擔心自己會跟她一樣。」", "D": "教育程度為大學畢業，且為執業中之臨床護理師"}, "answer": "C", "explanation": "健康信念模式（HBM）個人信念包含：知覺易感性（「我很擔心自己也會得乳癌」）、知覺嚴重性、知覺利益、知覺障礙。選項C表達了個人的「知覺易感性」（擔心自己會得乳癌），是個人主觀信念。B和D是人口學特徵，A是知識不足。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q35"}, {"id": 36, "question": "醫療品質監測指標包括結構、過程與結果三個面向，下列敘述何者錯誤？", "options": {"A": "醫療照護所需之資材資源，為結構面指標之一", "B": "醫療診斷與處置適當性，為過程面指標之一", "C": "結構面的評估與過程有關，但與結果面不一定直接相關", "D": "相較於過程面，結果面被視為比較具敏感性的品質評估方法"}, "answer": "D", "explanation": "結果面指標雖直觀（可見病人健康改變），但受多種因素影響（病人基礎病況、社會因素），敏感性並不一定優於過程面。過程面指標（如洗手遵從率）往往更敏感、更易測量和改善。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q36"}, {"id": 37, "question": "當醫院發生不良事件，採用「根本原因分析(RCA)」來進行調查時，下列何者屬於釐清事件發生的階段？", "options": {"A": "組織根本原因分析的團隊", "B": "找出近端原因", "C": "確認根本原因", "D": "設計改善的行動方案"}, "answer": "B", "explanation": "RCA 步驟：①組成團隊（準備）→ ②釐清事件（描述事件、找出近端原因/直接原因）→ ③確認根本原因（系統性分析）→ ④設計改善方案 → ⑤執行與評值。「找出近端原因」屬於釐清事件的階段。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q37"}, {"id": 38, "question": "「安寧緩和醫療條例」是為尊重末期病人之醫療意願及保障其權益而制定，患有下列情況的病人都有可能是該條例所稱的末期病人，但何者最能確定為末期狀況？", "options": {"A": "急性心肌梗塞合併心因性休克(cardiogenic shock)", "B": "敗血症合併急性腎衰竭(acute renal failure)", "C": "肝硬化合併自發性細菌性腹膜炎(spontaneous bacterial peritonitis)", "D": "癌症合併難治型惡病質(refractory cachexia)"}, "answer": "D", "explanation": "「末期病人」指經積極治療後，仍無法治癒的疾病末期。癌症合併難治型惡病質（refractory cachexia）表示疾病進入不可治療的終末期，最符合末期病人定義。A、B、C 均可能在積極治療下恢復，不一定是末期。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q38"}, {"id": 39, "question": "專科護理師進行嚴格的評讀臨床照護指引，過程中發現新的骨折超音波檢查偽陰性很高，此為下列何項實證評讀結果？", "options": {"A": "可信度", "B": "可應用性", "C": "臨床重要性", "D": "病人的期望"}, "answer": "A", "explanation": "偽陰性率高代表該診斷工具的敏感性低、可靠性不足，屬於評讀研究「可信度（validity/reliability）」的問題——即研究結果是否真實可靠、工具是否能準確測量它應測的事物。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q39"}, {"id": 40, "question": "AGREE（The Appraisal of Guidelines, Research and Evaluation）是目前國際上公認可有效評價臨床照護指引品質的工具，包括六大領域的評量面向，下列敘述何者正確？", "options": {"A": "評估指引發展所需的經濟效益", "B": "評估指引發展過程的公開透明程度", "C": "評估指引的臨床照護內容適當性", "D": "評估指引推薦內容所使用證據的品質"}, "answer": "BCD", "explanation": "疑義題，官方確認答案為 B、C、D 皆可。AGREE II 六大領域：①範圍與目的、②利害關係人參與、③發展嚴謹性、④呈現清晰性、⑤適用性、⑥編輯獨立性。(B)發展過程透明度、(C)臨床內容適當性、(D)證據品質均屬其評量範疇；(A)「經濟效益」不是 AGREE 評量面向。", "note": "本題為疑義題，官方確認答案為 B、C、D 皆可", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q40"}, {"id": 41, "question": "營造病人安全文化及落實病人安全事件管理，衛福部列入109～110年醫院醫療品質及病人安全工作目標之一，對醫療機構病人安全文化的評量構面，下列何者錯誤？", "options": {"A": "評量工作人員對機構的認同", "B": "評量工作人員對工作的滿意", "C": "評量工作人員對壓力的認知", "D": "評量工作人員對管理的感受"}, "answer": "A", "explanation": "病人安全文化評量構面（如 AHRQ Hospital Survey on Patient Safety Culture）包含：管理支持、溝通開放性、失誤回報、工作壓力認知、整體安全認知等。「對機構的認同」（組織承諾）不是病人安全文化的核心評量面向。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q41"}, {"id": 42, "question": "有關根本原因分析(root cause analysis, RCA)的敘述，下列何者正確？", "options": {"A": "為前瞻性分析，針對流程或步驟進行風險評量，找出適當改進方案", "B": "為回溯性分析，焦點在為事件，針對人員教育加以評估分析", "C": "為回溯性分析，焦點在事件，分析過程，避免未來類似事件再發生", "D": "為前瞻性分析，針對系統與過程進行分析，而非歸咎業務執行者"}, "answer": "C", "explanation": "RCA 是回溯性（retrospective）分析，針對已發生的不良事件，從系統和流程（而非個人過失）角度找出根本原因，目的是防止類似事件再發生。前瞻性分析是 FMEA（失效模式與效應分析）。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q42"}, {"id": 43, "question": "下列何者不建議接種人類乳突病毒(Human Papillomavirus, HPV)疫苗？", "options": {"A": "男性高三學生", "B": "懷孕6週女性", "C": "48歲停經婦女", "D": "女性高三學生"}, "answer": "BC", "explanation": "疑義題，官方確認答案為 B 或 C 皆可。HPV 疫苗禁忌：懷孕婦女（B）。台灣建議接種年齡至 45 歲，故 48 歲停經婦女（C）超出建議年齡範圍，也是正確答案。男性和女性高中生均在建議接種年齡範圍內。", "note": "本題為疑義題，官方確認答案為 B 或 C 皆可", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q43"}, {"id": 44, "question": "針對低健康識能的病人，專科護理師在溝通時可透過下列何項最適當的措施，以協助個案理解衛教的內容？", "options": {"A": "考量資訊落差，應儘量避免使用多媒體", "B": "避免衛教時間太長無法專心，可省去回覆示教", "C": "會談時使用白話文，避免醫療術語", "D": "主要的衛教對象以家屬為主，確保照顧者學會"}, "answer": "C", "explanation": "低健康識能溝通原則：使用簡單白話語言（避免術語）、限制每次傳遞訊息量、確認理解（teach-back）、使用視覺輔助（圖示、多媒體有助理解，非應避免）、回覆示教是確認理解的重要方法（不可省略）。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q44"}, {"id": 45, "question": "應用臨床實證照護，正確解讀與使用實證證據是專科護理師重要的核心能力之一，下列敘述何者不適宜？", "options": {"A": "擬訂病人個別化之臨床照護決策", "B": "建立照護的政策、程序與標準化", "C": "隨時修訂或推翻臨床照護指引", "D": "客觀評值臨床實務的照護成效"}, "answer": "C", "explanation": "臨床照護指引的修訂需要嚴謹的證據評讀過程和系統性更新，不能「隨時」修訂或推翻。指引的修訂需要新的強力證據支持、專家共識和嚴格程序，而非個人主觀判斷隨時更改。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q45"}, {"id": 46, "question": "在新冠肺炎疫情期間，陳先生回南部與家人聚餐，當回到北部工作時身體不適就醫，診斷為新冠肺炎住院治療，疫情調查人員將其個人診斷告知家人、餐廳與公司，該情況是否有不當洩漏病人隱私？而此原因為何？", "options": {"A": "有，陳先生可能因病受他人異樣眼光", "B": "有，餐廳因停業消毒，損失嚴重", "C": "沒有，得了新冠肺炎的病人沒有隱私權", "D": "沒有，對社會負有更高責任，疫情調查以阻斷傳播鏈"}, "answer": "D", "explanation": "傳染病防治法賦予衛生主管機關調查、通報接觸者的法定權力，以防止傳播。在法定傳染病疫情調查中，告知接觸者（家人、餐廳、公司）是阻斷傳播鏈的必要措施，有法律依據，不構成不當洩漏隱私。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q46"}, {"id": 47, "question": "如圖(一)所示，以Mallampati氣道分級，屬於第幾級？", "options": {"A": "class Ⅰ", "B": "class Ⅱ", "C": "class Ⅲ", "D": "class Ⅳ"}, "answer": "C", "explanation": "Mallampati 分級：Ⅰ=可見軟顎、懸雍垂、咽門柱；Ⅱ=可見軟顎、懸雍垂；Ⅲ=僅見軟顎基部（看不到懸雍垂）；Ⅳ=僅見硬顎。本題描述可見硬顎和軟顎基部但看不到懸雍垂 = Mallampati Ⅲ。", "category": "airway", "difficulty": "easy", "source": "110_general_Q47", "image": "110_general_Q47.png"}, {"id": 48, "question": "有關「護理人員法」護理人員執業之敘述，下列何者錯誤？", "options": {"A": "護理人員執業，其登記執業之處所，以一處為限", "B": "護理人員受有關機關詢問時，為保護病人隱私，得為虛偽之陳述或報告", "C": "護理人員執行業務時，遇有病人危急，應立即聯絡醫師，但必要時得先行給予緊急救護處理", "D": "護理人員執行醫療輔助行為，應在醫師之指示下行之"}, "answer": "B", "explanation": "護理人員法明定護理人員受有關機關詢問時，不得為虛偽之陳述或報告（應如實陳述）。隱私保護不能成為虛偽陳述的理由，違反者依法處罰。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q48"}, {"id": 49, "question": "腎上腺分泌多種荷爾蒙在壓力狀態下協助維持生理恆定，分泌過多時，臨床麻醉常須有特殊考量，下列哪一種除外？", "options": {"A": "雄性素(androgen)", "B": "鹽皮質素(mineralocorticoid)", "C": "兒茶酚胺(catecholamine)", "D": "糖皮質素(glucocorticoid)"}, "answer": "A", "explanation": "腎上腺皮質素（醛固酮/鹽皮質素、皮質醇/糖皮質素）和腎上腺髓質素（兒茶酚胺：腎上腺素、正腎上腺素）分泌過多均有重要的麻醉考量。雄性素（DHEA）過多主要影響內分泌系統，對麻醉的直接影響相對較小，是「除外」的選項。", "category": "physiology", "difficulty": "medium", "source": "110_general_Q49"}, {"id": 50, "question": "下列敘述何者錯誤？", "options": {"A": "所有需要麻醉專科護理師協助執行的醫療行為，各院皆須成立麻醉專科護理師作業小組，依其屬性訂立之", "B": "侵入性人體之醫療業務，必須由各院的「麻醉專科護理師作業小組」，訂立標準作業流程，且報備醫院通過後，麻醉專科護理師方可執行", "C": "非侵入人體之醫療業務，例如代為預立醫囑則由各院之「麻醉專科護理師作業小組」訂立「預立特定醫療程序」，且報備醫院通過後，麻醉專科護理師方可執行", "D": "各院自訂的標準作業流程，可依各院需求另立超出現行公告「麻醉專科護理師於麻醉專科醫師監督下執行醫療業務範圍」的業務範疇"}, "answer": "D", "explanation": "各院不得自行擴充超出衛福部公告的麻醉科專科護理師執業範圍。醫療業務範圍由主管機關（衛福部）法定，院內規範只能在法定範圍內制定，不能超出公告範疇。", "category": "general_nursing", "difficulty": "hard", "source": "110_general_Q50"}, {"id": 51, "question": "有關術中心電圖(ECG)，下列敘述何者正確？", "options": {"A": "透過節律監測，診斷心律不整，I導程觀察P波最清楚", "B": "應將電極放置於清潔且乾燥皮膚及固定位置持續的監測", "C": "II導程和V6導程可監測到95%病人的心肌缺血", "D": "有ECG訊號代表心肌收縮功能和心輸出量皆正常"}, "answer": "B", "explanation": "ECG 電極應置於清潔乾燥皮膚上，且位置固定以確保一致性和監測準確性。觀察 P 波最清楚是 II 導程（非 I）；II+V5（非 V6）可監測 95% 心肌缺血；ECG 訊號存在不代表心輸出量正常（PEA：有電氣活動但無脈搏）。", "category": "monitoring", "difficulty": "medium", "source": "110_general_Q51"}, {"id": 52, "question": "以下何者非護理人員可單獨執行之業務？", "options": {"A": "醫療輔助行為", "B": "預防保健的護理措施", "C": "護理指導及諮詢", "D": "健康問題之護理評估"}, "answer": "A", "explanation": "依護理人員法，護理人員可單獨執行：護理評估、護理措施、護理指導及諮詢、預防保健。「醫療輔助行為」需在醫師指示下執行，不得單獨執行。", "category": "general_nursing", "difficulty": "easy", "source": "110_general_Q52"}, {"id": 53, "question": "神經內分泌腫瘤所產生的類癌症候群(carcinoid syndrome)可能造成術中的血壓不穩，術中持續輸注何種藥劑可改善症狀？", "options": {"A": "血清素(serotonin)", "B": "色胺酸(tryptophan)", "C": "體抑素胜肽(octreotide)", "D": "菸鹼酸(niacin)"}, "answer": "C", "explanation": "類癌症候群由腫瘤分泌血清素等介質引起（潮紅、腹瀉、支氣管痙攣、血壓不穩）。Octreotide（體抑素類似物）可抑制這些介質的分泌，是術中血壓不穩的首選治療。", "category": "pharmacology", "difficulty": "medium", "source": "110_general_Q53"}, {"id": 54, "question": "常規手術前的空腹時間指引(NPO)，下列敘述何者錯誤？①清水：2小時 ②運動飲料：3小時 ③固態食物：8小時 ④牛奶：6小時 ⑤母奶：5小時", "options": {"A": "①③", "B": "①④", "C": "②⑤", "D": "③④"}, "answer": "C", "explanation": "ASA NPO 指引：清水 ≥2 小時（①正確）；運動飲料視為清澈液體 ≥2 小時（②錯誤，應為 2 小時非 3 小時）；固體食物 ≥6–8 小時（③偏嚴但可接受）；牛奶 ≥6 小時（④正確）；母奶 ≥4 小時（⑤錯誤，應為 4 小時非 5 小時）。故②和⑤錯誤，選 C。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q54"}, {"id": 55, "question": "潮氣末二氧化碳濃度(EtCO2)數值下降的原因，不包括下列何者？", "options": {"A": "過度換氣", "B": "敗血症", "C": "低體溫", "D": "肺栓塞"}, "answer": "B", "explanation": "EtCO₂ 下降的原因：過度換氣（CO₂ 排出增加）、低心輸出量（肺灌流減少）、肺栓塞（死腔增加）、低體溫（代謝率降低）、食道插管（無肺通氣）。敗血症初期代謝率增加，CO₂ 產生增多，EtCO₂ 反而升高（非下降）。", "category": "monitoring", "difficulty": "medium", "source": "110_general_Q55"}, {"id": 56, "question": "關於手術前麻醉評估，下列敘述何者錯誤？", "options": {"A": "為避免麻醉時與麻醉藥劑交互作用，手術前3天所有用藥都應停止", "B": "安裝節律器病人若術前決定暫停使用，可藉由放置磁鐵使裝置失去活性", "C": "確認病人術前空腹時間是否足夠，心電圖、X-ray、實驗室檢查是否完成", "D": "詢問病人的過去病史、過敏史；了解此次疾病診斷及手術方式"}, "answer": "A", "explanation": "「所有用藥術前 3 天停用」是錯誤的概念。許多藥物（β-blocker、降壓藥等）應持續使用至術前；部分藥物需要較長時間停用（如抗凝血藥 Warfarin 5 天、Clopidogrel 5–7 天）。停藥時機因藥物種類而異，無法一概而論。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q56"}, {"id": 57, "question": "患者全身麻醉後出現高血壓、心搏過速、二氧化碳過高及體溫增加之情況，懷疑發生惡性高熱(malignant hyperthermia)，檢視可能引發之用藥為何？", "options": {"A": "atropine", "B": "propofol", "C": "succinylcholine", "D": "cisatracurium"}, "answer": "C", "explanation": "惡性高熱的誘發藥物：去極化肌鬆劑 Succinylcholine 和揮發性吸入性麻醉藥（Halothane、Isoflurane、Sevoflurane、Desflurane）。Propofol、Cisatracurium、Atropine 均不會誘發 MH，是 MH 易感病人手術的安全用藥。", "category": "crisis", "difficulty": "medium", "source": "110_general_Q57"}, {"id": 58, "question": "一位訓練期間的麻醉專科護理師，在麻醉專科醫師監督下可執行以下何項業務？", "options": {"A": "為一位常規疝氣修補手術病人執行氣管內管插管", "B": "告知病人及家屬麻醉相關風險、知情同意，麻醉同意書的書寫", "C": "為一位脊椎手術病人，術前放置中央靜脈導管及周邊動脈導管", "D": "為一位第三胎經產婦，在生產後移除減痛分娩用的硬脊膜外導管"}, "answer": "D", "explanation": "移除硬脊膜外導管屬於護理業務範圍，訓練期 NP 可在監督下執行。氣管插管、知情同意說明（需醫師執行）、中央靜脈導管置入超出一般訓練 NP 的授權範圍。", "category": "general_nursing", "difficulty": "medium", "source": "110_general_Q58"}, {"id": 59, "question": "以下何者為快速誘導(rapid sequence induction, RSI)的適應症？①孕婦 ②腸阻塞 ③支氣管胸瘻管(bronchopleural fistula) ④頸椎外傷 ⑤食道重建", "options": {"A": "①②③", "B": "①②⑤", "C": "①③④", "D": "③④⑤"}, "answer": "B", "explanation": "RSI 適應症：飽胃/誤吸高風險病人，包括①孕婦（胃排空延遲）、②腸阻塞（胃腸積液）、⑤食道重建（賁門功能異常）、GERD、肥胖、腸胃道出血等。支氣管胸瘻管（③）需謹慎插管但可能不適合正壓誘導；頸椎外傷（④）需頸椎保護，不一定用 RSI。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q59"}, {"id": 60, "question": "使用下列何者會使眼壓(IOP)下降？", "options": {"A": "succinylcholine", "B": "ketamine", "C": "endotracheal intubation", "D": "sevoflurane"}, "answer": "D", "explanation": "吸入性麻醉藥（Sevoflurane 等）可降低眼壓（通過降低眼房水生成及增加流出）。Succinylcholine 使眼壓升高（眼外肌收縮）；Ketamine 使眼壓升高（交感興奮）；氣管插管刺激使眼壓一過性升高。", "category": "pharmacology", "difficulty": "medium", "source": "110_general_Q60"}, {"id": 61, "question": "58歲女性進行子宮切除手術，術前曾接受顯影劑放射檢查，手術後病患發生尿量減少的鑑別診斷和處置，下列敘述何者正確？", "options": {"A": "如果病患排出的少量濃縮尿液中鈉含量高，就代表腎小管功能是正常的", "B": "如果是腎絲球腎炎，多半是缺血或毒素（例如顯影劑或抗生素）造成，尿液中鈉含量是偏低的", "C": "血塊堵塞到輸尿管、膀胱或是手術過程綁到輸尿管，也可能造成寡尿，只要原因去除寡尿多為可逆", "D": "急性間質性腎炎常併有不同程度蛋白尿，但發燒、皮膚疹等發炎反應並不常見"}, "answer": "C", "explanation": "術後輸尿管損傷（結紮、扭折）或膀胱血塊堵塞造成的腎後性寡尿，若能及時解除梗阻，腎功能多可恢復（可逆）。腎小管功能正常時尿鈉低（腎小管保鈉）；ATN（腎小管壞死）時尿鈉高；急性間質性腎炎發燒/皮疹是常見表現（非不常見）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_general_Q61"}, {"id": 62, "question": "嗜鉻細胞瘤切除手術的術前評估，下列敘述何者正確？", "options": {"A": "術前的主要目標在控制血壓到正常值和減少catecholamine對終末器官的損害", "B": "高血壓是最常見症狀，但並非診斷上的必要項目，確定診斷仍需實驗室檢查", "C": "術前術中最理想的第一線降血壓用藥是β腎上腺素受體阻斷劑或利尿劑", "D": "術中可考慮合併使用硬脊膜外麻醉來有效降低副交感神經反應"}, "answer": "B", "explanation": "嗜鉻細胞瘤確診需尿液或血漿兒茶酚胺/代謝物（VMA、metanephrine）測定，高血壓雖常見（約 90%）但非必要診斷項目（少數正常血壓）。術前第一線用藥是 α 阻斷劑（酚妥拉明/Doxazosin），β 阻斷劑只能在 α 阻斷後使用（否則可能升壓）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_general_Q62"}, {"id": 63, "question": "檢視胃食道逆流患者的用藥時，要注意的事項包括下列何者？①有服用metoclopramide可能有運動失調(錐體外症狀)的副作用 ②服用omeprazole不會與midazolam有藥物交互作用 ③有服用組織胺拮抗劑，可能會有混亂、精神異常等中樞神經症狀 ④制酸劑和胃乳等黏膜保護劑的使用會造成吸入性麻醉藥吸收變慢", "options": {"A": "④", "B": "②④", "C": "①③", "D": "①②③"}, "answer": "C", "explanation": "①正確：Metoclopramide（腸胃蠕動藥）可阻斷多巴胺受體，引起錐體外症狀（顫抖、靜坐不能）。③正確：H2 拮抗劑（如 Cimetidine，老年人尤明顯）可引起中樞神經副作用（混亂、譫妄）。②錯誤：Omeprazole 抑制 CYP2C19，會升高 Midazolam 血中濃度。④錯誤：口服制酸劑不影響吸入性麻醉藥的肺泡吸收。", "category": "pharmacology", "difficulty": "hard", "source": "110_general_Q63"}, {"id": 64, "question": "當孕婦有外科適應症，下列何者為麻醉評估時正確的處理方式？", "options": {"A": "任何常規性手術可以在懷孕第二孕期進行", "B": "救命的緊急手術，如重大外傷，手術時機的選擇和一般民眾相同", "C": "產科醫師會診認可後即可進行，圍術期也不用特別監測胎兒狀況", "D": "手術應該儘量延後，以減少致畸胎的可能，越接近預產期越好"}, "answer": "B", "explanation": "危及生命的緊急手術（如大量出血外傷），不論懷孕週數，應立即手術，時機選擇同一般病人。非緊急手術最好延至產後或第二孕期；圍術期需監測胎兒狀況；越接近預產期反而有早產風險。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q64"}, {"id": 65, "question": "關於二氧化碳吸收劑(carbon dioxide absorbents)的敘述，下列何者錯誤？", "options": {"A": "吸收劑的吸收能力是有上限的", "B": "sevoflurane與吸收劑反應，可產生compound A", "C": "呼吸管路中呼出的二氧化碳，藉由吸收劑吸附後排出", "D": "吸收劑的顆粒越大，對氣體的流動產生的阻力越大"}, "answer": "D", "explanation": "吸收劑顆粒越大，氣體流動阻力越小（顆粒間空隙大）；越小則阻力越大但吸收效率越高（表面積大）。CO₂ 吸收是與吸收劑化學結合（非「吸附後排出」，吸收後留在吸收劑中）；選項 C 的描述也略有誤，但選項 D 更明確錯誤。", "category": "monitoring", "difficulty": "medium", "source": "110_general_Q65"}, {"id": 66, "question": "重症肌無力(myasthenia gravis, MG)的病人接受全身麻醉時，下列敘述何者錯誤？", "options": {"A": "術前應停用anticholinesterase治療", "B": "此類病人對去極化神經肌肉阻斷劑不敏感，但對非去極化神經肌肉阻斷劑非常敏感", "C": "train-of-four(TOF)雖然無法保證上呼吸道肌肉的恢復及足夠的自主通氣，仍強烈建議使用神經肌肉阻斷監測", "D": "手術和麻醉可能加重潛在疾病，即使小手術，仍有可能術後需使用呼吸器"}, "answer": "A", "explanation": "MG 病人術前應繼續使用抗膽鹼酯酶藥物（如 Pyridostigmine）至手術當天，突然停藥可能誘發肌無力危象。術中可能因抗膽鹼酯酶和非去極化肌鬆劑的相互作用需調整劑量，但不應術前停藥。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q66"}, {"id": 67, "question": "關於睡眠呼吸中止症(obstructive sleep apnea, OSA)，下列敘述何者正確？①有OSA的病患常合併有心血管相關的疾病 ②OSA不是困難插管的危險因子 ③術後給予嗎啡類藥物較易出現呼吸抑制 ④OSA發生機率女性＞男性", "options": {"A": "①②③", "B": "②③④", "C": "①③", "D": "①④"}, "answer": "C", "explanation": "①正確：OSA 與高血壓、冠心症、心律不整高度相關。③正確：OSA 病人上呼吸道肌肉張力差，鴉片類藥物進一步抑制呼吸中樞，術後呼吸抑制風險高。②錯誤：OSA 是困難插管危險因子（頸圍大、肥胖）。④錯誤：OSA 男性發生率 > 女性（約 2–3 倍）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q67"}, {"id": 68, "question": "接受完血液透析的病人需要一段時間以利身體水分和電解質平衡，因此透析結束距離常規手術的時間至少要多久為宜？", "options": {"A": "24小時", "B": "12小時", "C": "6小時", "D": "4小時"}, "answer": "C", "explanation": "透析後電解質（尤其鉀離子）再分佈需約 4–6 小時達到平衡，建議透析結束後至少 6 小時再進行手術，確保電解質穩定。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "110_general_Q68"}, {"id": 69, "question": "有關bispectral index(BIS)，下列敘述何者錯誤？", "options": {"A": "BIS數值從0（表示深度昏迷或無意識狀態）到100（表示清醒）", "B": "BIS數值低於60則病患處於無法對聲音指令做反應的狀態", "C": "當全身麻醉時，一般將BIS數值維持在40～60的範圍", "D": "BIS的量測與判讀不會受病人低體溫或神經系統生理狀況的影響"}, "answer": "D", "explanation": "BIS 的準確性會受多種因素影響：低體溫（使 BIS 假性降低）、神經系統疾病（癲癇、腦損傷）、肌電干擾、電刀使用、某些藥物（Ketamine 使 BIS 升高）等。BIS 並非在任何情況下都準確可靠。", "category": "monitoring", "difficulty": "medium", "source": "110_general_Q69"}, {"id": 70, "question": "關於區域麻醉的敘述，下列何者正確？", "options": {"A": "接受脊髓麻醉的病人發生低血壓，給予輸液即可改善", "B": "硬膜外麻醉相較於脊髓麻醉血壓變化較小，且可以做為術後疼痛控制之用", "C": "施打脊髓麻醉時最重要的標記(landmark)是兩邊髂骨棘的連線，此連線通過的位置為第二腰椎", "D": "脊髓麻醉所施打的局部麻醉劑可分為低、中、高比重，高比重流向CSF最高位、低比重流向CSF最低位"}, "answer": "B", "explanation": "硬膜外麻醉起效慢（約 15–20 分鐘）、血壓下降較緩和（可預防和處理），且可留置導管用於術後止痛，是其相較脊髓麻醉的優點。兩側髂骨棘連線（Tuffier's line）對應的是 L4（非 L2）；高比重溶液沉降，流向 CSF 最低位（非最高位）；低血壓需輸液加升壓藥合併處理。", "category": "regional", "difficulty": "medium", "source": "110_general_Q70"}, {"id": 71, "question": "具有心血管風險的患者欲接受非心臟手術時，手術週期中所應採取的流程及步驟，下列敘述何者錯誤？", "options": {"A": "首先考慮手術風險", "B": "急診手術的焦點放在手術週期的監測與降低風險", "C": "病患沒有活動性心臟異常時，欲進行低風險手術，不須進一步心臟測試", "D": "無症狀患者，代謝當量(METs)達一般平均心臟功能時，可進行手術"}, "answer": "A", "explanation": "依 AHA/ACC 術前評估流程，首先應評估的是「手術是否緊急」（急診手術直接進行），其次才是手術風險分層。選項 A 說「首先考慮手術風險」，正確的第一步應是確認手術的緊迫性，故 A 描述有誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q71"}, {"id": 72, "question": "下列哪一位病患應該延遲常規性手術？", "options": {"A": "甲狀腺腫，明顯超過五公分大，有氣道壓迫，但甲狀腺功能抽血正常", "B": "三年前有甲狀腺亢進病史，服藥治療後恢復正常，目前未服藥、無症狀也未繼續內科追蹤", "C": "入院前體檢甲狀腺素triiodothyronine(T3)、tetraiodothyronine(T4)均稍偏低，但身體無症狀", "D": "橋本氏病(Hashimoto's thyroiditis)患者，甲狀腺素治療剛開始三天，病患仍有疲累及非凹陷性脛前水腫"}, "answer": "D", "explanation": "橋本氏甲狀腺炎（甲狀腺功能低下）剛開始治療三天，甲狀腺素尚未達到穩定狀態（通常需 4–6 週），仍有甲狀腺功能低下的症狀（疲勞、黏液性水腫），應延遲常規手術至甲狀腺功能穩定。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_general_Q72"}, {"id": 73, "question": "胸腔外科手術，放置左管雙腔氣管內管時，經內視鏡確認位置，下圖何者正確？", "options": {"A": "圖A", "B": "圖B", "C": "圖C", "D": "圖D"}, "answer": "D", "explanation": "左管雙腔氣管內管（left-sided DLT）正確的纖維支氣管鏡確認：從氣管腔（tracheal lumen）端，可看到氣管隆突（carina）和藍色氣囊充於左主支氣管開口，右主支氣管開口清晰可見且通暢。這是標準確認位置的內視鏡影像。", "category": "monitoring", "difficulty": "hard", "source": "110_general_Q73", "image": "110_general_Q73.png"}, {"id": 74, "question": "潮氣末端二氧化碳(EtCO2)監測儀顯示如圖(二)，可能原因為何？", "options": {"A": "慢性阻塞性肺疾", "B": "二氧化碳再吸入", "C": "管子滑脫至食道", "D": "肌肉鬆弛劑恢復"}, "answer": "A", "explanation": "COPD 的 EtCO₂ 波形特徵：上升相（Phase III）斜率延長，呈「鯊魚鰭」狀，因不均勻換氣（部分肺泡排氣延遲）造成。CO₂ 再吸入：基線升高不歸零；食道插管：無 CO₂ 波形；肌鬆恢復：可見規則小切跡（呼吸對抗）。", "category": "monitoring", "difficulty": "medium", "source": "110_general_Q74", "image": "110_general_Q74.png"}, {"id": 75, "question": "麻醉科被通知兒科病房有一位5公斤大的胃部狹窄男嬰，持續性噴射狀嘔吐，要求安排緊急手術，下列何者為正確麻醉前評估？", "options": {"A": "此疾病起因於胃部幽門肥大導致胃部出口狹窄無法進食，需要盡快手術才能重建營養", "B": "病患會因嘔吐產生體重減輕、脫水，因為低鈉、低鉀，而會有高氯的現象", "C": "術前仍應輸液補充到正常的血管內容積和電解質濃度，再進行手術", "D": "因為脫水造成的組織灌流不足，此類病童抽血多呈代謝性酸中毒，需要補充碳酸氫鈉"}, "answer": "C", "explanation": "幽門狹窄手術雖緊急，但不是立即威脅生命的情況；正確做法是先補充輸液、糾正電解質和酸鹼異常後再手術。持續嘔吐導致的代謝失調：低氯性代謝性鹼中毒（非酸中毒）、低鉀、低鈉、低氯（非高氯）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_general_Q75"}, {"id": 76, "question": "肺高壓患者，手術麻醉應注意事項，下列敘述何者正確？", "options": {"A": "心跳維持不宜太慢，應大於每分鐘100下", "B": "避免低血氧及二氧化碳過高", "C": "左心導管檢查，是黃金診斷標準", "D": "嚴重低血氧發生時，可調高PEEP減少胸內壓"}, "answer": "B", "explanation": "肺高壓麻醉原則：避免低血氧和高碳酸血症（均使肺血管收縮，加重右心負擔）、維持竇性心律（心跳 60–90 bpm 為宜，過快縮短充填時間）。肺高壓診斷黃金標準是右心導管（非左心）；PEEP 過高反而增加胸內壓和右心後負荷，加重肺高壓。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "110_general_Q76"}, {"id": 77, "question": "Model for end-stage liver disease(MELD)score被認為是用來評估術前肝臟功能的重要指標，其計算公式中不包含病患血液中的哪一項臨床數值？", "options": {"A": "白蛋白(albumin)", "B": "肌肝酸值(creatinine)", "C": "總膽紅素(total bilirubin)", "D": "凝血酶原時間國際調校比值(prothrombin time INR)"}, "answer": "A", "explanation": "MELD score 計算公式包含：INR（凝血功能）、Bilirubin（膽紅素）、Creatinine（腎功能），並含 Sodium（Na⁺，MELD-Na 版本）。白蛋白（Albumin）是 Child-Pugh score 的評估項目，不在 MELD 公式中。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "110_general_Q77"}, {"id": 78, "question": "62歲男性 162 cm 45 kg，無糖尿病史，十年前得過肺結核，預備接受口腔癌切除手術，於術前麻醉評估門診時突然失去意識，收縮壓僅剩60 mmHg，急救過程心電圖呈現竇性心搏過速，抽血結果血糖60 mg/dL、血清鈉濃度118 mEq/L，給予dextrose 5%點滴輸注1,000 mL後意識逐漸恢復，但仍主訴全身乏力，檢視病患手腳發現有多處色素沉著(hyperpigmentation)，麻醉科後續應提出下列何種建議？", "options": {"A": "病患既已甦醒，明天仍可進行常規手術", "B": "血壓過低多半是心血管因素，會診心臟科急做心導管檢查", "C": "會診新陳代謝科，抽血檢查，考慮補充類固醇製劑後再行安排手術", "D": "病患顯然有營養不良，建議讓病患出院，補足營養即可再入院手術"}, "answer": "C", "explanation": "低血壓 + 低血糖 + 低血鈉 + 色素沉著（皮膚黑色素增加）= 典型腎上腺皮質功能不足（Addison's disease）的表現。確診需抽血檢查皮質醇和 ACTH，補充類固醇（氫化可體松）後血流動力學穩定再安排手術。", "category": "clinical_assessment", "difficulty": "hard", "source": "110_general_Q78"}, {"id": 79, "question": "有關喉痙攣(laryngospasm)，下列敘述何者錯誤？", "options": {"A": "主要是因為喉返神經(recurrent laryngeal nerve)受刺激造成", "B": "可使用100%純氧並且扣面罩持續正壓呼吸(continuous positive airway pressure)", "C": "使用靜脈麻醉藥加深麻醉", "D": "可考慮給予小劑量succinylcholine(0.1～0.5mg/kg)以減緩喉痙攣"}, "answer": "A", "explanation": "喉痙攣的神經反射路徑：喉上神經（superior laryngeal nerve，三叉神經分支）傳入 → 喉返神經（迷走神經分支）傳出，引起聲帶閉合肌痙攣。主要是喉上神經受刺激（非喉返神經）。", "category": "airway", "difficulty": "medium", "source": "110_general_Q79"}, {"id": 80, "question": "下列何種狀況會同時降低冠狀循環血流並增加心肌耗氧量？", "options": {"A": "心跳過慢", "B": "心跳過快", "C": "高血壓", "D": "低血壓"}, "answer": "B", "explanation": "心跳過快（tachycardia）：①縮短舒張期時間，冠狀動脈灌流（主要在舒張期）減少 → 冠狀循環血流降低；②增加心肌做功次數 → 心肌耗氧量增加。這是心跳過快對心臟最危險的雙重影響。", "category": "physiology", "difficulty": "medium", "source": "110_general_Q80"}]};
