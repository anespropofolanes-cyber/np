const DATA_112_ADVANCED = {"meta": {"year": 112, "role": "nurse", "subject": "advanced", "subject_name": "進階專科護理", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "造成高陰離子間隙之代謝性酸中毒（high anion-gap metabolic acidosis）的常見原因，下列何者錯誤？", "options": {"A": "lactic acidosis", "B": "diabetic ketoacidosis", "C": "renal tubular acidosis", "D": "uremia"}, "answer": "C", "explanation": "高陰離子間隙代謝性酸中毒常見原因（MUDPILES）：甲醇、尿毒症、DKA、乳酸酸中毒、水楊酸等。Renal tubular acidosis（RTA）為正常陰離子間隙（hyperchloremic）代謝性酸中毒，C錯誤。", "category": "physiology", "difficulty": "medium", "source": "112_anesthesia_Q1"}, {"id": 2, "question": "體內電解質失衡的處置，下列何者最不適當？", "options": {"A": "低血鈉（hyponatremia）第一線治療應使用靜脈輸注生理食鹽水", "B": "高血鉀（hyperkalemia）應先檢視心電圖是否有相關電氣生理變化", "C": "高血鈣（hypercalcemia）治療應給予足夠水份，並依副甲狀腺素指標作鑑別診斷", "D": "矯正低血鈉（hyponatremia）時，血清鈉濃度每日上升不應快於10-12mEq/L"}, "answer": "A", "explanation": "低血鈉的第一線治療取決於原因與症狀嚴重度；若為SIADH或容量過多型，輸注生理食鹽水反而可能加重低血鈉（張力不足被快速排出），不適當。", "category": "physiology", "difficulty": "medium", "source": "112_anesthesia_Q2"}, {"id": 3, "question": "85歲罹患頭頸癌五年的病人，BUN 30mg/dL、creatinine 2.1mg/dL、TPR 37.5℃、98次/分、24次/分、BP 140/98mmHg，最近表示癌症傷口疼痛，分數為8分，選用下列何種止痛劑最適當？", "options": {"A": "ibuprofen", "B": "meperidine", "C": "acetaminophen", "D": "morphine"}, "answer": "D", "explanation": "重度疼痛（8分）需強效opioid；ibuprofen對腎功能不佳老人有風險；meperidine腎功能不佳時normeperidine累積有神經毒性；acetaminophen止痛力不足；morphine為適當選擇（需調整劑量並監測腎功能）。", "category": "pharmacology", "difficulty": "medium", "source": "112_anesthesia_Q3"}, {"id": 4, "question": "fentanyl止痛劑的敘述，下列何者正確？", "options": {"A": "抑制COX-2阻斷substance P釋放達到止痛效果，無天花板效應", "B": "依morphine靜脈使用劑量推算fentanyl的靜脈使用劑量，轉換比率約為100：1", "C": "止痛效果佳，貼片使用後立即產生藥效，可停止原使用的止痛藥物", "D": "對於手術後急性疼痛可提供穩定的血中濃度，不會出現戒斷症候群"}, "answer": "B", "explanation": "Fentanyl靜脈劑量轉換：morphine IV 10mg ≈ fentanyl IV 0.1mg（100mcg），轉換比率100:1正確。Fentanyl是opioid（非COX-2抑制劑）；貼片需12-17小時才達穩定血中濃度；長期使用停藥同樣可能出現戒斷。", "category": "pharmacology", "difficulty": "medium", "source": "112_anesthesia_Q4"}, {"id": 5, "question": "接受放射線照射的病人，皮膚出現4×5公分濕性脫屑反應，並有淡黃紅色的中量滲出液，應使用下列何種敷料最為適當？", "options": {"A": "親水性凝膠敷料（hydrogel dressing）", "B": "親水膠體敷料（hydrocolloid dressing）", "C": "透明薄膜敷料（transparent film dressing）", "D": "聚氨酯泡棉敷料（polyurethane dressing）"}, "answer": "D", "explanation": "濕性脫屑伴中量滲出液宜使用吸收力強且保濕的泡棉敷料（foam dressing）；hydrogel適合乾燥傷口；hydrocolloid不適合大量滲出；透明薄膜無吸收力。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q5"}, {"id": 6, "question": "病人左足踝出現久未痊癒潰瘍的不規則狀傷口，主訴平躺或站立均會疼痛，微血管填充時間為10秒，上肢血壓140/89mmHg，下肢血壓125/88mmHg，下列判斷何者正確？", "options": {"A": "lower extremity venous ulcers", "B": "diabetic foot ulcers", "C": "lower extremity arterial ulcers", "D": "necrotizing fasciitis"}, "answer": "C", "explanation": "ABI（踝臂指數）= 125/140 ≈ 0.89，輕度偏低；微血管填充時間10秒顯著延長（正常<2秒）；動脈潰瘍特色：平躺與站立均痛（不隨抬腿改善），C正確。", "category": "general_nursing", "difficulty": "hard", "source": "112_anesthesia_Q6"}, {"id": 7, "question": "有關猴痘（mpox）之敘述，下列何者錯誤？", "options": {"A": "臨床表徵常見淋巴結腫大", "B": "臨床症狀持續半年以上", "C": "以tecovirimat干擾病毒表面蛋白質", "D": "食物煮熟食用可降低人畜共通傳播風險"}, "answer": "B", "explanation": "猴痘臨床症狀通常持續2-4週，不會持續半年以上，B錯誤。淋巴結腫大是猴痘特徵性表現；tecovirimat可抑制病毒表面蛋白；煮熟食物可降低動物傳人風險。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q7"}, {"id": 8, "question": "病人因發燒、嘔吐症狀就醫，經通報檢驗確診為李斯特菌症（listeriosis），根據「傳染病防治法」規定，應於多少時間內通報主管機關？", "options": {"A": "72小時", "B": "96小時", "C": "1週", "D": "2週"}, "answer": "A", "explanation": "李斯特菌症屬第二類法定傳染病，應於72小時內通報。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q8"}, {"id": 9, "question": "有關登革熱之敘述，下列何者錯誤？", "options": {"A": "抽血檢查檢驗可能出現白血球減少及血小板減少", "B": "潛伏期為4-7日，以發燒、噁心/嘔吐、關節痛為特徵", "C": "是一種透過蚊子媒介之病毒感染，共有4種血清型", "D": "臺灣登革熱主要由三斑家蚊及環紋家蚊傳播"}, "answer": "D", "explanation": "台灣登革熱主要由埃及斑蚊及白線斑蚊傳播，非三斑家蚊及環紋家蚊（後者為日本腦炎媒介），D錯誤。", "category": "general_nursing", "difficulty": "easy", "source": "112_anesthesia_Q9"}, {"id": 10, "question": "長照機構住民近日發現手指縫、腋下、腹部、大腿內側及會陰發生劇癢性丘疹，於夜晚蓋被時加劇。下列何者為最可能的診斷？", "options": {"A": "蕁麻疹（urticaria）", "B": "蚊蟲咬（insect bite）", "C": "疥瘡（scabies）", "D": "痤瘡（acne）"}, "answer": "C", "explanation": "疥瘡特徵：好發於指縫、腹部、會陰等皮膚皺褶處，夜間加劇，具高度傳染性，機構群聚為常見模式，C正確。", "category": "general_nursing", "difficulty": "easy", "source": "112_anesthesia_Q10"}, {"id": 11, "question": "發燒對人體的影響，下列敘述何者錯誤？", "options": {"A": "發燒可限制病原體複製，助於殺死病原體", "B": "發燒助於細菌分裂的物質（如：鐵、鋅）濃度下降", "C": "發燒有助於中止病毒的生命週期", "D": "發燒時會減少睡眠慢波，以保護腦部"}, "answer": "D", "explanation": "發燒時慢波睡眠（SWS）實際上會增加（非減少），有助於免疫功能和腦部修復，D錯誤。", "category": "physiology", "difficulty": "medium", "source": "112_anesthesia_Q11"}, {"id": 12, "question": "下列何者是治療「腫瘤發燒」最具療效的藥物？", "options": {"A": "naproxen", "B": "celecoxib", "C": "esomeprazole", "D": "acetaminophen"}, "answer": "A", "explanation": "Naproxen（萘普生）是治療腫瘤發燒最具療效的NSAID，被視為診斷性治療指標；acetaminophen效果較差；celecoxib次之；esomeprazole為質子幫浦抑制劑，無退燒效果。", "category": "pharmacology", "difficulty": "medium", "source": "112_anesthesia_Q12"}, {"id": 13, "question": "臨終（瀕死）病人呼吸道出現嘎嘎聲（death rattle），下列照護處置何者較不適當？", "options": {"A": "抬高頭部或採側臥，減少喉頭聲音", "B": "定期抽痰協助移除呼吸道痰液", "C": "使用scopolamine貼片劑，改善口水分泌", "D": "給予鼻導管氧氣3L/min使用"}, "answer": "B", "explanation": "Death rattle為臨終分泌物無力清除所致，定期抽痰對臨終病人造成不適且效果有限，為不適當處置；側臥、scopolamine減少分泌均為適當照護。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q13"}, {"id": 14, "question": "治療譫妄藥物產生的副作用，下列何者錯誤？", "options": {"A": "haloperidol為QT間期縮短", "B": "quetiapine為QT間期延長", "C": "lorazepam為呼吸抑制", "D": "trazodone為過度鎮靜"}, "answer": "A", "explanation": "Haloperidol的副作用包括QT間期延長（非縮短），有引發torsades de pointes的風險，A錯誤。", "category": "pharmacology", "difficulty": "medium", "source": "112_anesthesia_Q14"}, {"id": 15, "question": "評估創傷病人有可能呈現的理學檢查結果，下列何者最不適當？", "options": {"A": "上呼吸道阻塞：呼吸窘迫困難、呼吸出現哮吼音（stridor）", "B": "大量血胸：頸靜脈塌陷、氣管偏移至正常側、患側（血胸側）呼吸音降低或消失、患側叩診呈現叩診實音", "C": "張力性氣胸：頸靜脈怒張、氣管偏移至正常側、患側（氣胸側）呼吸音降低或消失、患側叩診呈現叩診鼓音", "D": "心包膜填塞：頸靜脈怒張、氣管無偏移、雙側肺音對稱乾淨、心音模糊遙遠（distant heart sound）"}, "answer": "B", "explanation": "大量血胸頸靜脈應「怒張」（非塌陷），因靜脈回流受阻；氣管偏移方向為向健側（正常側）；叩診呈實音均正確，但頸靜脈描述錯誤，B最不適當。", "category": "crisis", "difficulty": "medium", "source": "112_anesthesia_Q15"}, {"id": 16, "question": "下列哪些非典型心絞痛症狀常可見於女性病人，並被視為\"anginal equivalents\"（等同心絞痛）？", "options": {"A": "呼吸困難（dyspnea）、上腹部疼痛（epigastric pain）、噁心（nausea）", "B": "呼吸困難（dyspnea）、心悸（palpitation）、上腹部疼痛（epigastric pain）", "C": "心悸（palpitation）、上腹部疼痛（epigastric pain）、嘔吐（vomiting）", "D": "心悸（palpitation）、背痛（backache）、噁心（nausea）"}, "answer": "A", "explanation": "女性心絞痛等同症狀（anginal equivalents）最常見：呼吸困難、噁心/嘔吐、上腹部不適，三者組合以A最符合文獻描述。", "category": "clinical_assessment", "difficulty": "medium", "source": "112_anesthesia_Q16"}, {"id": 17, "question": "缺鐵性貧血的臨床檢驗特色之敘述，下列何者正確？", "options": {"A": "網狀細胞紅血球指標（reticulocyte index）升高", "B": "平均血球大小（mean corpuscular volume）較正常值高", "C": "總鐵結合力（total iron-binding capacity）降低", "D": "鐵蛋白（ferritin）降低"}, "answer": "D", "explanation": "缺鐵性貧血：ferritin降低（最早期敏感指標）、TIBC升高、MCV降低（小球性）、reticulocyte index降低，D正確。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q17"}, {"id": 18, "question": "20歲女性因腹痛、嘔吐和呼吸淺快被家人送來急診，到院時意識清醒，血壓96/50mmHg、脈搏122次/分、SpO2 98%（room air）；抽血發現血糖560mg/dL、血鈉122mEq/L、血鉀4.5mEq/L、動脈血檢驗結果為pH 7.15、pCO2 20mmHg、HCO3- 9mEq/L。下列處置何者最不適當？", "options": {"A": "考慮檢查病人血清酮體（serum ketones）", "B": "若該病人為糖尿病酮酸血症，則其動脈血之anion gap應升高", "C": "對此病人的治療應給予normal saline、regular insulin及NaHCO3", "D": "治療後病人血糖降到250mg/dL以下，應給予含葡萄糖之靜脈輸液"}, "answer": "C", "explanation": "DKA治療：NS補液和胰島素正確；NaHCO3通常不建議（pH>6.9時），可能加重低血鉀和矛盾性腦脊液酸中毒，C最不適當。", "category": "crisis", "difficulty": "hard", "source": "112_anesthesia_Q18"}, {"id": 19, "question": "有關肝功能檢驗的敘述，下列何者錯誤？", "options": {"A": "酒精性肝炎病人GGT常會上升", "B": "有膽管結石時，total bilirubin常會上升", "C": "AST及ALP都是肝炎的檢查，能反映肝細胞損傷的程度", "D": "在肝臟衰竭狀態時，PT越高代表肝臟功能越差"}, "answer": "C", "explanation": "ALP主要反映膽道阻塞（非肝細胞損傷），骨骼疾病也會升高；AST才是肝細胞損傷指標。C將兩者混為一談，錯誤。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q19"}, {"id": 20, "question": "病人因呼吸急促應診，抽血結果顯示Hb 8.1gm/dL、MCV 118fL、reticulocyte 0.5%、白血球3750/μL、血小板115000/μL。下列何者為此病人最可能的診斷？", "options": {"A": "VitB12 deficiency anemia", "B": "iron deficiency anemia", "C": "thalassemia", "D": "autoimmune hemolytic anemia"}, "answer": "A", "explanation": "大球性貧血（MCV 118）+ 低reticulocyte + 全血球減少三系受影響，為巨球性貧血（VitB12或葉酸缺乏）的典型表現，A正確。", "category": "general_nursing", "difficulty": "medium", "source": "112_anesthesia_Q20"}, {"id": 21, "question": "CPR時全程使用EtCO2，有關使用EtCO2之目的，下列何者錯誤？", "options": {"A": "監測CPR品質", "B": "監測是否有過度換氣", "C": "監測插管位置是否正確", "D": "監測是否有自發性心跳回復（ROSC）"}, "answer": "B", "explanation": "CPR中EtCO2用途：確認插管位置、監測CPR品質（胸壓效果）、偵測ROSC（EtCO2突然升高）。監測過度換氣不是CPR中主要目的（且CPR中通氣次數固定），B為相對錯誤選項。", "category": "monitoring", "difficulty": "medium", "source": "112_anesthesia_Q21"}, {"id": 22, "question": "下列哪項檢查不是包含在診斷敗血症的工具qSOFA（quick Sequential Organ Failure Assessment）中？", "options": {"A": "意識不清", "B": "體溫>38℃", "C": "收縮壓≦100mmHg", "D": "呼吸次數≧22次/分"}, "answer": "B", "explanation": "qSOFA三項：意識改變（GCS<15）、收縮壓≦100mmHg、呼吸≧22次/分。體溫不在qSOFA中（體溫是SIRS標準），B不在其中。", "category": "monitoring", "difficulty": "easy", "source": "112_anesthesia_Q22"}, {"id": 23, "question": "圖（一）為心電圖顯示的波形，下列何者為最有可能的心律？", "options": {"A": "第二度第一型AV block", "B": "第二度第二型AV block", "C": "竇性心搏過緩併單型性早期心室收縮", "D": "第三度AV block"}, "answer": "D", "explanation": "第三度AV block：P波與QRS完全解離，各自獨立節律；若為Mobitz II則PR固定但有QRS脫落；題目描述須結合圖形判讀，依公告答案為D（第三度AV block）。", "category": "monitoring", "difficulty": "hard", "source": "112_anesthesia_Q23", "image": "112_anesthesia_Q23.png", "image_caption": "圖（一）：心電圖節律帶（PR 間期與 QRS 脫落情形）"}, {"id": 24, "question": "為無脈搏的病人施行成人基本救命術，下列敘述何者錯誤？", "options": {"A": "每分鐘按壓速度約100次", "B": "按壓與吹氣比，單人雙人皆為30：2", "C": "已放置喉罩呼吸道（LMA）後，每分鐘給氣次數為14-18次", "D": "有插管病人的人工換氣（ventilation），心臟按壓不需依30：2的週期中斷"}, "answer": "C", "explanation": "已建立進階呼吸道（ETT或LMA）後，通氣頻率為每分鐘10次（非14-18次），胸壓連續不中斷，C錯誤。", "category": "crisis", "difficulty": "medium", "source": "112_anesthesia_Q24"}, {"id": 25, "question": "有關腹部手術的輸液方式，下列敘述何者最適當？", "options": {"A": "可常態性給予10-15ml/kg/hr補充液體", "B": "限制型輸液補充（restrictive fluid management）可使用在嚴重低血壓的病人", "C": "腹膜打開後血壓急速下降，可能原因為腹內壓下降、腸繫膜血管充盈且右心回流急速減少", "D": "跟生理食鹽水相比，使用乳酸林格氏液（lactated Ringer's solution）較會導致代謝性酸中毒"}, "answer": "C", "explanation": "腹膜打開時腹內壓驟降，腸繫膜血管床充盈（preload下降），C機制描述正確。限制型輸液不用於低血壓；10-15ml/kg/hr過多；LR比NS更不容易造成高氯性酸中毒。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q25"}, {"id": 26, "question": "有關鼻胃管在手術期間的使用，下列敘述何者較不適當？", "options": {"A": "術前置放可使胃完全排空，不會有誤吸的風險", "B": "麻醉誘導過程中，鼻胃管應開放以便引流", "C": "放置時可用手指在口咽部協助胃管放入食道內", "D": "針對顱底骨折的病人，可改用口胃管取代"}, "answer": "A", "explanation": "鼻胃管無法使胃「完全」排空（胃液持續分泌），仍有誤吸風險，A描述不適當。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_anesthesia_Q26"}, {"id": 27, "question": "70歲男性接受達文西機器手臂輔助前列腺切除手術，手術時採取氣腹頭低腳高的方式，下列敘述何者錯誤？", "options": {"A": "中心靜脈壓增加", "B": "呼吸道壓力增加", "C": "後負荷增加", "D": "功能性肺餘容積量增加"}, "answer": "D", "explanation": "頭低腳高（Trendelenburg）加氣腹：腹腔壓力推擠膈肌，FRC下降（非增加），D錯誤。CVP升高、氣道壓升高、後負荷因CO2吸收而增加均正確。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_anesthesia_Q27"}, {"id": 28, "question": "25歲女性接受婦科腹腔鏡手術，術中給予dexamethasone 5mg，術後抱怨肩膀疼痛且嘔吐數次，想要施打止痛藥物，以下處置何者較不適當？", "options": {"A": "給予dexamethasone 10mg", "B": "給予ondansetron 4mg", "C": "給予diphenhydramine 25mg", "D": "給予propacetamol 1g"}, "answer": "ABC", "explanation": "疑義後答案為ABC。題幹「止痛藥物」描述有誤（A/B/C非止痛藥），propacetamol（D）才是止痛藥。A再給更多dexamethasone、B的ondansetron和C的diphenhydramine均非對症（肩痛）止痛，均不適當。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_anesthesia_Q28"}, {"id": 29, "question": "腹腔鏡手術產生氣體栓塞併發症，下列敘述何者較不適當？", "options": {"A": "可能發生在套管針（trocar）刺入血管或腹腔器官", "B": "可能發生氣體鎖定（gas lock），導致靜脈回流降低", "C": "可能會導致肺部死腔量（dead space）增加", "D": "應調整病人頭高腳低，右側臥位，使氣體排出"}, "answer": "D", "explanation": "氣體栓塞處置：應採頭低腳高（Durant's maneuver）、左側臥位，讓氣體浮到右室頂端，避免阻塞肺動脈，D（頭高腳低、右側臥）不適當。", "category": "crisis", "difficulty": "hard", "source": "112_anesthesia_Q29"}, {"id": 30, "question": "病人接受減肥手術，下列麻醉注意事項何者較不適當？", "options": {"A": "可能患有阻塞性睡眠呼吸中止症", "B": "將病人上半身墊高呈ramp position，以利於插管", "C": "若考慮施打硬膜外麻醉，其麻醉藥物劑量較一般人多", "D": "無其他合併症病人，可採取非侵入性生理監測"}, "answer": "C", "explanation": "肥胖病人硬膜外麻醉藥物劑量應「減少」（脂肪壓縮硬膜外腔、藥物擴散範圍增加），C不適當。", "category": "regional", "difficulty": "hard", "source": "112_anesthesia_Q30"}, {"id": 31, "question": "達文西機器手臂輔助進行膀胱手術，下列敘述何者較不適當？", "options": {"A": "術中採取頭低腳高姿勢及氣腹，全身血管阻力減少", "B": "長時間手術可能造成呼吸道水腫及狹窄，增加術後重插管的風險", "C": "呼吸道壓力過大，可考慮降低潮氣量或調整吸氣吐氣比（I：E ratio）", "D": "術後肩膀疼痛與刺激膈神經相關"}, "answer": "A", "explanation": "Trendelenburg加氣腹下，CO2吸收+交感神經活化，全身血管阻力通常「增加」（非減少），A不適當。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_anesthesia_Q31"}, {"id": 32, "question": "16歲健康病人扁桃腺切除術後約2小時突然咳出鮮血、心跳變快，懷疑術後出血，下列敘述何者正確？", "options": {"A": "通常失血量很少，要嚴格限制給予輸液", "B": "扁桃腺切除術後原發性傷口出血較常發生在三至五天後", "C": "大部分不影響呼吸道，只需鼓勵病人反覆吞嚥以避免吸入性肺炎", "D": "需視同禁食不足病人，麻醉插管可考慮快速誘導插管"}, "answer": "D", "explanation": "術後出血病人胃內有吞入血液，視為非空腹，應行RSI；原發性出血（24小時內）比繼發性（5-10天）少見但嚴重；不應限制輸液；出血影響呼吸道需立即處理。", "category": "crisis", "difficulty": "hard", "source": "112_anesthesia_Q32"}, {"id": 33, "question": "20歲女性無系統性疾病史，有關接受中耳手術的注意事項，下列敘述何者正確？", "options": {"A": "術中麻醉適合以高濃度二氧化氮輔助，以維持血壓穩定", "B": "手術後發生術後噁心嘔吐機會很少，預防性使用一種或以上的止吐藥有害無益", "C": "病人擺位時需頭低腳高並轉向對側，角度愈大愈好", "D": "若病人無氣道問題，平順的於深度麻醉下拔管較有益處"}, "answer": "D", "explanation": "中耳手術病人在深度麻醉下平順拔管可避免咳嗽引起中耳壓力變化和出血；N2O會擴散到中耳腔引起壓力增加，應避免高濃度；PONV發生率高，需預防性止吐。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q33"}, {"id": 34, "question": "40歲女性接受肺部手術時，需置放雙腔氣管內管以利手術進行，下列敘述何者正確？", "options": {"A": "雙腔內管常用的大小範圍為8-10Fr", "B": "可利用纖維支氣管鏡協助判斷置入深度是否適宜", "C": "向外拔出氣管內管時，支氣管氣囊不需放氣", "D": "大部分的肺部手術操作使用右管雙腔內管即可完成"}, "answer": "B", "explanation": "纖維支氣管鏡是確認雙腔管位置的金標準；雙腔管大小以Fr/mm（如35-41Fr）表示；拔管前必須放氣囊；右管雙腔管因右上葉支氣管角度常置入困難，多使用左管。", "category": "airway", "difficulty": "hard", "source": "112_anesthesia_Q34"}, {"id": 35, "question": "單肺通氣（one-lung ventilation）時，有關呼吸器設定下列敘述何者適當？", "options": {"A": "對急性呼吸窘迫症病人設定潮氣量（tidal volume）>10mL/kg", "B": "不可使用肺泡再擴張術（recruitment maneuvers）來解決肺擴張不全問題", "C": "單肺通氣時禁止用100%氧氣", "D": "維持高原期氣道壓<25cmH2O，避免肺過度擴張"}, "answer": "D", "explanation": "單肺通氣保護性通氣策略：pplat<25-30cmH2O；TV 5-6mL/kg（非>10）；可使用recruitment maneuvers；可使用高濃度O2改善低氧血症。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q35"}, {"id": 36, "question": "有關脫離心肺循環（weaning of CPB），下列敘述何者正確？", "options": {"A": "給予protamine應快速輸注", "B": "不須等恢復體溫後才脫離CPB", "C": "須適當評估心臟節律及監測心電圖", "D": "不須矯正嚴重代謝性酸中毒"}, "answer": "C", "explanation": "脫離CPB前需確認：體溫恢復（>36℃）、電解質正常、心律穩定（需ECG監測）、矯正酸中毒。Protamine應緩慢輸注避免過敏反應，C正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q36"}, {"id": 37, "question": "患有嚴重主動脈瓣狹窄病人接受全身麻醉的注意事項，下列敘述何者正確？", "options": {"A": "常合併有頭痛、腳麻或背痛", "B": "需維持心跳速率>100次/分", "C": "手術麻醉中盡量降低血管張力及心收縮力", "D": "需迅速補充失血量以維持血管內適當的液體容積"}, "answer": "D", "explanation": "嚴重AS麻醉原則：維持前負荷（充足容積）、竇性節律（60-80bpm，避免心搏過快/慢）、維持SVR（避免低血壓）、避免心肌抑制。D（補充容積）正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q37"}, {"id": 38, "question": "接受心臟手術順利脫離體外心肺循環後，突然發生低血壓，下列敘述何者較正確？", "options": {"A": "心輸出量增加、心房壓減少，可能為血管收縮，可給予輸液", "B": "心輸出量減少、心房壓減少，可能為低血容，可給予輸液", "C": "心輸出量減少、心房壓增加，可能為左心室功能異常，可給予輸液", "D": "心輸出量減少、心房壓增加，可能為低血容，可給予輸液"}, "answer": "B", "explanation": "CO↓+心房壓↓ = 低血容（前負荷不足），輸液補充正確；CO↓+心房壓↑ = 心室功能異常或心包填塞，不應輸液；B正確。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q38"}, {"id": 39, "question": "有關脊椎手術麻醉照護，下列敘述何者正確？", "options": {"A": "缺血性視神經病變（ischemic optic neuropathy）是術後視力損傷的主要原因", "B": "大部分造成急性脊髓損傷的部位，通常發生在胸椎第六節以下", "C": "趴姿手術擺位過程，容易造成肺部功能肺餘容積量下降", "D": "使用SSEP及MEP神經監測，不易受到低體溫及全身肌肉鬆弛劑影響"}, "answer": "A", "explanation": "脊椎手術後視力喪失最主要原因為缺血性視神經病變（ION），A正確。急性脊髓損傷常見於頸椎和胸腰椎交界；俯臥位FRC實際上增加或不變；MEP受肌肉鬆弛劑和低體溫影響。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q39"}, {"id": 40, "question": "有關頭頸部手術麻醉照護，下列敘述何者正確？", "options": {"A": "頸部擴清手術（neck dissection surgery）經常影響到舌咽神經", "B": "擴清手術中打開的靜脈可能有靜脈氣體栓塞的風險", "C": "手術過程中若壓迫到頸動脈竇（carotid sinus），可能會誘發心搏過速", "D": "epinephrine稀釋濃度須高於1：20000，才能有效降低術中失血量"}, "answer": "B", "explanation": "頸部手術中切開頸靜脈可造成靜脈空氣栓塞風險，B正確。頸部擴清主要影響副神經和迷走神經；頸動脈竇壓迫誘發心搏過緩（非過速）；epinephrine稀釋1:200000-1:100000即有效。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q40"}, {"id": 41, "question": "69歲病人接受右側髖關節手術，下列敘述何者正確？", "options": {"A": "老年人接受髖關節骨折手術風險，選擇半身麻醉會優於全身麻醉", "B": "術中給予多次大劑量的tranexamic acid能有效降低失血量，不用考慮癲癇問題", "C": "若預計執行半身麻醉，enoxaparin需停藥12小時以上才可以執行", "D": "骨水泥（methylmethacrylate cement）造成系統性反應，跟組成分子沒有關係"}, "answer": "C", "explanation": "依ASRA指引，低分子量肝素（enoxaparin）預防劑量需停藥≥12小時才可執行脊髓麻醉，C正確。半身vs全身在老人無明確優劣差異；大劑量TXA有癲癇風險；骨水泥反應與monomer釋放相關。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q41"}, {"id": 42, "question": "70歲病人預計接受total shoulder arthroplasty手術，有關麻醉照護注意事項，下列敘述何者正確？", "options": {"A": "為了有較好的手術視野，坐姿擺位且採低血壓麻醉方式適用於老年病人", "B": "區域麻醉可以提供良好的肌肉鬆弛效果，不需要給予較多的肌肉鬆弛劑", "C": "腋神經阻斷術止痛快速且效果好，適用接受門診手術的病人", "D": "要注意手肘擺位角度，要用軟墊保護且盡量屈曲，避免造成尺神經壓迫"}, "answer": "B", "explanation": "肩部區域麻醉（如brachial plexus block）提供良好止痛與肌肉鬆弛，可減少全身肌肉鬆弛劑用量，B正確。老年病人坐姿低血壓麻醉有腦灌注不足風險；斜角肌間阻斷（非腋神經）用於肩部手術；尺神經壓迫預防應避免過度屈曲。", "category": "regional", "difficulty": "hard", "source": "112_anesthesia_Q42"}, {"id": 43, "question": "針對腦內動脈瘤（intracranial aneurysm）手術麻醉處置，下列敘述何者正確？", "options": {"A": "hypervolemia、hypertension和hemodilution（3H）是目前處理血管痙攣（vasospasm）的原則", "B": "術中應維持過度換氣和低體溫，有助於手術視野及術後恢復", "C": "心電圖變化及心肌酶數值上升的表現，與病人的不良預後沒有一定相關性", "D": "術後盡量要給予病人鎮靜藥物及使用呼吸器，延遲拔管也是必要的處置"}, "answer": "C", "explanation": "蜘蛛網膜下腔出血後ECG變化（ST段、T波）和心肌酶上升是神經性心肌損傷，與預後有一定相關，但程度有爭議，依公告答案C。3H已不再是標準做法；過度換氣長期使用有害；術後盡快拔管評估神經功能為目標。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q43"}, {"id": 44, "question": "21歲病人ASA：I預計接受正顎手術（orthognathic surgery），術前表示不願意接受異體輸血，下列處置何者正確？", "options": {"A": "自體捐贈輸血（preoperative autologous donation）希望在術前三天內捐贈，以確保血品新鮮度", "B": "等體積血液稀釋（normovolemic hemodilution）需要考慮病人心血管、肺部狀況及給予異體輸血的可能性", "C": "術中血液再利用（intraoperative blood salvage）能使紅血球達到Hct 50-70%，同時保有凝血因子及血小板", "D": "術中控制低血壓（controlled hypotension）使用短效降壓藥物，使平均動脈壓降至45mmHg，以減少出血量"}, "answer": "B", "explanation": "Normovolemic hemodilution需評估心肺功能是否能耐受血液稀釋，且需備妥輸血方案，B正確。術前自體捐贈需術前3-5週；blood salvage可達Hct 50-70%但無凝血因子；controlled hypotension的MAP目標通常>50mmHg（不低至45）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q44"}, {"id": 45, "question": "57歲病人欲做腦部腫瘤切除手術，手術全期護理注意事項下列何者正確？", "options": {"A": "術前評估時若意識不清、低血壓及心跳過快，要考慮是否有腦壓過高的問題", "B": "由於腦部代謝產生能量需要糖分，輸液成分應含有dextrose，以避免血糖過低", "C": "若術前已經有在服用抗癲癇藥物，術中可能需要增加肌肉鬆弛劑給予的頻率", "D": "術後發生多尿、高血清、高尿液滲透壓、低血鈉，要考慮是否有尿崩症（diabetes insipidus）"}, "answer": "C", "explanation": "長期服用抗癲癇藥物誘導肝酶，加速肌肉鬆弛劑代謝，需增加劑量或頻率，C正確。腦壓高表現為Cushing triad（高血壓+心搏過緩+呼吸不規則，非低血壓）；神經手術避免含糖輸液；尿崩症為多尿+高血鈉（非低血鈉）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q45"}, {"id": 46, "question": "有關針對神經外科手術麻醉常用靜脈藥物敘述，下列敘述何者正確？", "options": {"A": "dexmedetomidine藉由降低大腦血流而影響腦內壓", "B": "thiopental有不錯的止痛效果，可增加疼痛閾值", "C": "midazolam本身具有很好的retrograde amnestic", "D": "propofol比起高濃度麻醉氣體更能保留大腦自主調節（autoregulation）"}, "answer": "D", "explanation": "Propofol維持腦血管自主調節能力，優於高濃度吸入麻醉氣體（後者劑量依賴性破壞自主調節），D正確。Dexmedetomidine輕度降低CBF但不降ICP；thiopental無止痛效果；midazolam為anterograde（非retrograde）amnesia。", "category": "pharmacology", "difficulty": "hard", "source": "112_anesthesia_Q46"}, {"id": 47, "question": "70歲病人因大腸癌實施結直腸癌手術，有關術後加速康復（enhanced recovery after surgery，ERAS），下列敘述何者正確？", "options": {"A": "常規給予術前鎮靜藥物，避免病人情緒緊張不安", "B": "術後盡量臥床休息，避免走動影響傷口癒合", "C": "術後使用非鴉片類藥物合併神經阻斷術止痛", "D": "術中應給予大量輸液，以維持血液動力學穩定"}, "answer": "C", "explanation": "ERAS核心：多模式非opioid止痛（C正確）、盡早下床活動（非臥床）、目標導向輸液（非大量輸液）、不常規使用術前鎮靜。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_anesthesia_Q47"}, {"id": 48, "question": "病人接受甲狀腺手術，下列敘述何者錯誤？", "options": {"A": "麻醉前評估期間確認甲狀腺功能處於正常狀態", "B": "使用喉返神經監測時，麻醉維持期間應避免使用肌肉鬆弛劑", "C": "未控制甲狀腺功能而發生甲狀腺風暴，術中發生機會高於術後", "D": "ERAS使用superficial cervical plexus blocks尚未顯示有明顯益處"}, "answer": "C", "explanation": "甲狀腺風暴多發生於術後24-48小時（非術中），C錯誤。甲狀腺功能術前應控制正常；RLN監測期間避免肌鬆劑；superficial cervical plexus block的ERAS效益目前證據有限。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q48"}, {"id": 49, "question": "60歲病人，有糖尿病、高血壓病史，此次發生急性缺血性中風，接受血管內取栓治療（endovascular therapy，EVT），下列敘述何者正確？", "options": {"A": "定時測量血糖，將血糖維持在140-180mg/dL之間", "B": "吐氣末二氧化碳監測於中度或深度鎮靜期間不需使用", "C": "為了控制血壓，就算動脈導管放置困難仍需置放後才可手術", "D": "為避免腦部出血，血壓應該控制在收縮壓100-120mmHg內"}, "answer": "A", "explanation": "急性缺血性中風EVT期間血糖目標140-180mg/dL（避免低血糖加重腦損傷），A正確。EtCO2於鎮靜期間應使用監測呼吸；動脈導管放置困難時不應延誤手術；再灌流後血壓目標通常<180mmHg（非過低）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q49"}, {"id": 50, "question": "有關target controlled infusion的敘述，下列敘述何者錯誤？", "options": {"A": "remifentanil可使用Minto model", "B": "propofol可使用Schneider model", "C": "alfentanil可使用Scott model", "D": "dexmedetomidine可使用Marsh model"}, "answer": "D", "explanation": "Marsh model和Schneider model均用於propofol TCI；dexmedetomidine無標準TCI model（非正式臨床應用）；Minto用於remifentanil；alfentanil有Scott model，D錯誤。", "category": "pharmacology", "difficulty": "hard", "source": "112_anesthesia_Q50"}, {"id": 51, "question": "70歲病人接受左手動靜脈廔管手術，麻醉採取axillary block procedure，共施打2% lidocaine 15mL、0.5% bupivacaine 15mL，施打後出現耳鳴、構音障礙、意識喪失，下列敘述何者正確？", "options": {"A": "lidocaine比bupivacaine心臟毒性較高", "B": "如果發生癲癇可以使用propofol代替lipid emulsion治療", "C": "局部麻醉劑的最大劑量應基於淨體重（lean-body weight）", "D": "進展到心臟驟停時，急救超過三十分鐘之後即可停止"}, "answer": "C", "explanation": "局部麻醉劑最大劑量應按lean body weight計算（C正確）。Bupivacaine心臟毒性高於lidocaine；LAST治療以20% lipid emulsion為首選（propofol不足且有心臟抑制）；LAST引起的心臟驟停應持續急救>30分鐘（等待lipid emulsion效果）。", "category": "regional", "difficulty": "hard", "source": "112_anesthesia_Q51"}, {"id": 52, "question": "70歲男性體重80kg因攝護腺肥大接受經尿道攝護腺切除術（TURP），下列敘述何者錯誤？", "options": {"A": "血清鈉降低大於10mEq/L可能會出現神經系統症狀", "B": "如果採取脊髓麻醉，建議麻醉高度在T10", "C": "限制沖洗液輸注壓力和手術時間來減少液體吸收", "D": "雙極電燒手術時不可使用0.9% NaCl沖洗"}, "answer": "D", "explanation": "雙極電燒TURP可使用生理食鹽水（0.9% NaCl）沖洗（不導電不干擾電燒），單極電燒才需用低張沖洗液（如甘露醇水），D錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q52"}, {"id": 53, "question": "麻醉中發現二氧化碳監測波形如圖（二），下列敘述何者最有可能？", "options": {"A": "tension pneumothorax", "B": "malfunction of CO2 absorbent", "C": "one lung ventilation", "D": "chronic obstructive pulmonary disease"}, "answer": "B", "explanation": "CO2 absorbent失效時，呼出CO2再被重新吸入，吸氣基線升高；依公告答案為B。（COPD也可見呼氣末斜坡上升，但CO2吸收劑失效更明確。）", "category": "monitoring", "difficulty": "hard", "source": "112_anesthesia_Q53", "image": "112_anesthesia_Q53.png", "image_caption": "圖（二）：術中即時呼氣末二氧化碳（CO₂）波形"}, {"id": 54, "question": "40歲食道賁門弛緩不能症（achalasia）病人進行peroral endoscopic myotomy（POEM）手術，下列敘述何者錯誤？", "options": {"A": "病人應接受流質飲食至少一到兩天，且仍需預防麻醉誘導期間誤吸", "B": "使用插管全身麻醉時適合使用笑氣麻醉", "C": "高達50%的POEM手術中會出現少量氣腹", "D": "手術刺激相對較低，術後通常不需要嗎啡類止痛藥"}, "answer": "B", "explanation": "POEM手術中使用CO2氣體進行黏膜下層剝離，若使用N2O會擴散進入氣腔（皮下氣腫、氣腹）加重併發症，應避免，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q54"}, {"id": 55, "question": "有關全身麻醉使用肌肉鬆弛劑拮抗劑與神經肌肉監視器的敘述，下列敘述何者錯誤？", "options": {"A": "TOF ratio 0.4-0.9時，給予neostigmine 0.02mg/kg", "B": "TOF count 2-3時，給予neostigmine 0.05mg/kg", "C": "TOF count 1-4時，給予sugammadex 2mg/kg", "D": "TOF count 0-1時，給予neostigmine 0.1mg/kg"}, "answer": "D", "explanation": "TOF count 0-1代表深度阻斷，neostigmine無法有效拮抗，應使用sugammadex 16mg/kg（深度阻斷），D錯誤。", "category": "pharmacology", "difficulty": "hard", "source": "112_anesthesia_Q55"}, {"id": 56, "question": "有關氣道腫瘤使用雷射燒灼手術，下列敘述何者錯誤？", "options": {"A": "盡量把氧氣濃度下降到30%以下，最好合併N2O使用", "B": "若不幸著火，立刻停止雷射跟換氣，關掉氧氣", "C": "如果氣管內管著火，則移除氣管內管丟置於水槽內", "D": "滅火後如果呼吸道有燒燙傷，應考慮再次插管或氣切"}, "answer": "A", "explanation": "雷射手術應盡量降低氧氣濃度（<30%），但N2O為助燃氣體，應避免使用（非合併使用），A錯誤。", "category": "airway", "difficulty": "hard", "source": "112_anesthesia_Q56"}, {"id": 57, "question": "25歲ASA：I病人接受闌尾切除術，麻醉結束施打sugammadex，心跳由60次/分變成130次/分、血壓60/40mmHg、支氣管痙攣、全身紅疹、疑似過敏性休克，下列敘述何者正確？", "options": {"A": "可給予腎上腺素，靜脈推注劑量為10-100mcg，如效果不佳可重複或增加劑量", "B": "sugammadex產生過敏反應機率極低，應優先考慮其他診斷", "C": "心跳快、血壓低時norepinephrine是過敏性休克首選，如效果不佳可重複或增加劑量", "D": "diphenhydramine 50mg靜脈輸注可以阻斷過敏反應，應盡早給予"}, "answer": "A", "explanation": "過敏性休克首選腎上腺素（epinephrine）靜脈推注10-100mcg，必要時重複或持續輸注，A正確。Sugammadex確實可引發過敏；norepinephrine非首選；diphenhydramine為輔助非首選。", "category": "crisis", "difficulty": "hard", "source": "112_anesthesia_Q57"}, {"id": 58, "question": "有關手術全期抗凝血的處理（perioperative management of anticoagulation），下列敘述何者錯誤？", "options": {"A": "金屬裸冠狀動脈支架（BMS）的病人應該至少在六個月後手術", "B": "正在服用dabigatran的病人，停藥的時間受到腎臟功能影響", "C": "病人使用ticlodipine，如遇緊急手術可輸血小板逆轉", "D": "過去三個月內發生栓塞性中風或風險極高者，可以考慮橋接治療"}, "answer": "A", "explanation": "BMS支架後至少4-6週（非6個月）才可手術（DES支架需6個月以上），A描述時間有誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q58"}, {"id": 59, "question": "70歲病人，因下肢骨折進行骨折復位內固定手術，採區域麻醉，下列敘述何者錯誤？", "options": {"A": "脊髓麻醉較全身麻醉有較少的靜脈血栓發生率", "B": "meperidine可用於術後顫抖，也很適合用於老人族群術後止痛", "C": "基礎代謝率降低、產熱較少與年輕人相比較容易低體溫", "D": "硬脊膜穿刺後頭痛（PDPH）發生率較年輕人低"}, "answer": "B", "explanation": "Meperidine（pethidine）在老年人中因normeperidine積累有神經毒性（癲癇、躁動），不適合老人止痛，B錯誤。", "category": "pharmacology", "difficulty": "medium", "source": "112_anesthesia_Q59"}, {"id": 60, "question": "有關硬脊膜外止痛的副作用，下列敘述何者錯誤？", "options": {"A": "噁心、嘔吐、搔癢主要是局部麻醉藥物導致", "B": "持續運動神經阻斷時應停止藥物，觀察是否血腫產生", "C": "發生呼吸抑制時如懷疑嗎啡造成，可以給予naloxone治療", "D": "應隨時評估是否脹尿，尿液滯留時可保留導尿管"}, "answer": "A", "explanation": "硬膜外噁心、嘔吐、搔癢主要是opioid（嗎啡）導致，非局部麻醉藥物，A錯誤。", "category": "regional", "difficulty": "medium", "source": "112_anesthesia_Q60"}, {"id": 61, "question": "王先生40歲、170cm、110kg、BMI 38kg/m2、PBW 66kg，入院進行抽脂手術，下列麻醉呼吸器設定何者較適當？", "options": {"A": "TV 950mL、呼吸次數8次/分、PEEP 10cmH2O", "B": "TV 500mL、呼吸次數16次/分、PEEP 6cmH2O", "C": "TV 660mL、呼吸次數12次/分、PEEP 0cmH2O", "D": "TV 800mL、呼吸次數10次/分、PEEP 10cmH2O"}, "answer": "B", "explanation": "肥胖病人肺保護策略：TV以PBW計算（66kg×6-8mL/kg ≈ 396-528mL，約500mL），呼吸次數適度增加維持分鐘通氣量，PEEP 5-8cmH2O，B最接近。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q61"}, {"id": 62, "question": "有關麻醉藥物的敘述，下列敘述何者錯誤？", "options": {"A": "ketamine不會產生明顯的呼吸抑制，但容易產生口水分泌物", "B": "etomidate可能會抑制腎上腺皮質功能", "C": "dexmedetomidine較不抑制呼吸，但容易產生低血壓與心搏過慢", "D": "propofol配方含有乳化劑，不容易細菌生長"}, "answer": "D", "explanation": "Propofol為脂肪乳劑配方，易於細菌生長（非不容易），開瓶後需在一定時間內使用，D錯誤。", "category": "pharmacology", "difficulty": "medium", "source": "112_anesthesia_Q62"}, {"id": 63, "question": "肥胖病人麻醉藥物使用，下列敘述何者錯誤？", "options": {"A": "嗎啡類劑量應根據LBW計算", "B": "誘導期propofol採用LBW計算藥物劑量", "C": "succinylcholine採用LBW計算藥物劑量", "D": "非去極化肌肉鬆弛劑，採用LBW計算藥物劑量"}, "answer": "ACD", "explanation": "疑義後答案ACD均可。依Miller 9th Ed.：Opioids用LBW（A本應正確，但Miller建議TBW）；succinylcholine用TBW（C錯）；非去極化NMB用IBW/LBW（D有爭議）。答案改為ACD。", "category": "pharmacology", "difficulty": "hard", "source": "112_anesthesia_Q63"}, {"id": 64, "question": "有關新生兒術中體溫維持的敘述，下列敘述何者正確？", "options": {"A": "預先加熱靜脈輸液或提高手術室溫度", "B": "表皮面積與體重比例較低", "C": "表皮真皮層較厚，體溫易流失", "D": "可藉由顫抖來調節代償"}, "answer": "A", "explanation": "新生兒體溫維持：預熱靜脈輸液、提高室溫是有效策略，A正確。新生兒體表面積/體重比高（非低）；皮膚薄；新生兒不能靠顫抖（靠非顫抖性熱生成 - 棕色脂肪）。", "category": "physiology", "difficulty": "medium", "source": "112_anesthesia_Q64"}, {"id": 65, "question": "5歲20kg、110cm男童因右側腹股溝疝氣欲執行腹腔鏡修補手術，有關氣管內管選擇及固定深度，下列敘述何者較適當？", "options": {"A": "I.D.5.0mm有氣囊氣管內管固定18cm", "B": "I.D.4.5mm無氣囊氣管內管固定16cm", "C": "I.D.5.5mm無氣囊氣管內管固定16cm", "D": "I.D.4.5mm有氣囊氣管內管固定12cm"}, "answer": "C", "explanation": "5歲兒童ETT大小：(年齡+16)/4 = 21/4 ≈ 5.5mm（無氣囊）；固定深度：年齡/2+12 = 14cm（嘴角），或ID×3 = 16.5cm。5歲可接受有氣囊（較小size如4.5-5.0），無氣囊5.5mm固定約16cm符合公告答案C。", "category": "airway", "difficulty": "medium", "source": "112_anesthesia_Q65"}, {"id": 66, "question": "1歲3個月體重10kg幼童，因雙側腹股溝疝氣執行手術，預計採插管全身麻醉，術前禁食時間足夠，下列敘述何者較正確？", "options": {"A": "插管遇到阻力時，無需特別處理", "B": "選用喉頭鏡直葉片可提供較佳的插管視野", "C": "誘導時為達常規肌肉鬆弛目的，依體重計算應給cisatracurium 5mg", "D": "插管後的頭部姿勢，無論後仰或屈曲，皆對氣管內管位置無影響"}, "answer": "B", "explanation": "嬰幼兒聲門位置偏前偏上，直葉片（Miller blade）可更直接提起會厭，提供較佳視野。遇到阻力應退管換小號；cisatracurium 5mg劑量過高（0.1-0.15mg/kg×10kg=1-1.5mg）；嬰幼兒氣管短，頭部姿勢影響管位。", "category": "airway", "difficulty": "medium", "source": "112_anesthesia_Q66"}, {"id": 67, "question": "有關懷孕時孕婦產生的生理變化，下列敘述何者錯誤？", "options": {"A": "心輸出上升40-50%", "B": "每分鐘通氣量上升40-50%", "C": "足月時耗氧量增加20-35%", "D": "功能肺餘容積量上升20%"}, "answer": "D", "explanation": "妊娠期FRC因子宮擴大膈肌上移而降低約20%（非上升），D錯誤。CO上升40-50%（A正確）；分鐘通氣量上升40-50%（B正確）；耗氧量增加20-35%（C正確）。", "category": "physiology", "difficulty": "medium", "source": "112_anesthesia_Q67"}, {"id": 68, "question": "32歲產婦進行剖腹產預計施行脊髓麻醉，下列有關產婦脊髓麻醉的敘述何者最不適當？", "options": {"A": "添加morphine可下降術後18-24小時內疼痛", "B": "應確認麻醉高度達T10才進行手術", "C": "ephedrine、phenylephrine可以用來治療麻醉後低血壓", "D": "可預先靜脈給予500-1000mL晶體溶液"}, "answer": "B", "explanation": "剖腹產脊髓麻醉需達T4-T6（非T10）高度，T10僅足夠自然產第一產程止痛，B不適當。", "category": "regional", "difficulty": "medium", "source": "112_anesthesia_Q68"}, {"id": 69, "question": "孕婦妊娠期接受非產科手術的原則，下列敘述何者正確？", "options": {"A": "非必要進行的常規手術應延到產後4週再進行", "B": "必要進行的非急診手術，可安排在第一孕程", "C": "盡可能選擇全身麻醉以維持胎盤的氧氣供應", "D": "合併使用glycopyrrolate與neostigmine，可能引起胎兒心搏過緩"}, "answer": "D", "explanation": "Glycopyrrolate不穿越胎盤，neostigmine穿越胎盤可引起胎兒心搏過緩，兩者合用時拮抗效果不平衡，D正確。常規手術延至產後6週；非急診手術最好在第二孕程；區域麻醉優於全身麻醉。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q69"}, {"id": 70, "question": "病人有阻塞型睡眠呼吸中止症（obstructive sleep apnea，OSA），欲進行懸壅垂顎咽整型術（uvulapalatopharyngoplasty），下列敘述何者正確？", "options": {"A": "術後疼痛控制要盡量減少使用鴉片類藥物，建議以多模式止痛方式和局部麻醉為主", "B": "要完全清醒且恢復肌肉張力才可拔管、術後恢復以平躺姿勢較能維持呼吸道暢通", "C": "困難氣道與上呼吸道解剖結構的變化無關", "D": "STOP-Bang問卷適用在無心血管風險的族群，須由護理人員填寫八個問題"}, "answer": "A", "explanation": "OSA病人應盡量多模式止痛減少opioid，A正確。拔管應在清醒後半坐臥位（非平躺）；OSA與困難氣道高度相關；STOP-Bang可由病人自填或護理人員協助，無心血管風險限制。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_anesthesia_Q70"}, {"id": 71, "question": "足月產、三個月大、體重約6公斤的嬰幼兒預計接受唇裂修補手術，有關麻醉處置下列敘述何者正確？", "options": {"A": "術前若無法建立靜脈滴注，肌肉注射是最常用的麻醉誘導方式", "B": "吸入性麻醉氣體的minimum alveolar concentration（MAC）需要降低", "C": "術中使用麻醉深度貼片（BIS），會發現EEG以alpha oscillations為主", "D": "使用有氣囊的氣管內管，須測量氣囊壓力且維持在20-25cmH2O"}, "answer": "D", "explanation": "現代小兒麻醉使用有氣囊ETT（microcuff），需監測囊壓維持在20-25cmH2O防止氣管壓迫，D正確。嬰幼兒MAC較高（非降低）；吸入誘導最常用（非IM）；嬰幼兒BIS EEG以delta和theta為主。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q71"}, {"id": 72, "question": "36歲健康病人因工作從高處跌落造成頭部外傷，緊急安排開顱手術，有關麻醉照護處置，下列敘述何者正確？", "options": {"A": "增加呼吸次數，維持EtCO2＜28mmHg", "B": "使用高張生理食鹽水（3% NaCl）治療顱內高壓", "C": "須維持腦灌注壓（cerebral perfusion pressure，CPP）＜60mmHg", "D": "給予高濃度氣體麻醉藥物可有效降低顱內壓"}, "answer": "B", "explanation": "高張鹽水（3% NaCl）為顱內高壓的有效治療（osmotherapy），B正確。過度換氣EtCO2目標35-40mmHg（僅急性期短暫用<35）；CPP應維持>60mmHg；高濃度吸入麻醉藥增加CBF和ICP。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q72"}, {"id": 73, "question": "懷孕32週婦女，因車禍造成右手臂開放性骨折，需接受緊急清創及外固定手術，有關麻醉照護考量，下列敘述何者正確？", "options": {"A": "孕婦在運送及檢查過程中，建議右側臥以增加回心血量", "B": "禁食時間若>8小時，無需使用快速誘導麻醉插管", "C": "麻醉全期須監測胎心率（fetal heart rate，FHR）以評估胎兒狀況", "D": "口服NSAID類藥物是孕婦術後止痛首選方式"}, "answer": "C", "explanation": "孕>24週手術應持續監測FHR以評估胎兒灌流，C正確。孕婦應左側臥（非右側）以避免子宮壓迫下腔靜脈；孕婦無論禁食時間均視為胃排空不佳，應RSI；NSAIDs在妊娠晚期禁用（早閉動脈導管）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q73"}, {"id": 74, "question": "有關惡性高熱（malignant hyperthermia）之敘述，下列敘述何者錯誤？", "options": {"A": "吸入性麻醉藥物及succinylcholine可能誘發惡性高熱", "B": "有吐氣末二氧化碳濃度下降、心搏過快、體溫上升之症狀", "C": "立即停止所有可能誘發藥物，給予100%氧氣並使用未加溫或冷的輸液", "D": "dantrolene初始劑量為靜脈注射2.5mg/kg，可重複給藥至總量達10mg/kg"}, "answer": "B", "explanation": "惡性高熱初期最早徵象為EtCO2急遽上升（非下降），伴隨心搏過快、肌肉僵直、體溫上升，B錯誤。", "category": "crisis", "difficulty": "medium", "source": "112_anesthesia_Q74"}, {"id": 75, "question": "有關大量輸血的注意事項，下列敘述何者正確？", "options": {"A": "為避免病人體溫過低，所有血品都須加溫", "B": "輸血相關的急性肺損傷以輸注FFP較為常見", "C": "PRBC：FFP：PL應以2：1：1比例輸注", "D": "肝衰竭病人檸檬酸過量，會引起代謝性酸中毒"}, "answer": "B", "explanation": "TRALI（輸血相關急性肺損傷）最常與FFP相關（含高效價HLA抗體），B正確。並非所有血品均需加溫（血小板不宜過度加溫）；大量輸血比例為PRBC:FFP:PL=1:1:1；檸檬酸中毒引起低血鈣（非酸中毒）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q75"}, {"id": 76, "question": "27歲健康病人，因車禍送至急診，疑似腹部鈍傷出血需緊急手術，禁食時間＜8小時，麻醉醫師計畫執行快速誘導麻醉插管（rapid sequence intubation，RSI），下列敘述何者錯誤？", "options": {"A": "麻醉誘導前，給病人100%氧氣", "B": "主要目的為降低吸入性肺炎風險", "C": "可使用succinylcholine為麻醉肌肉鬆弛劑", "D": "須使用cricoid pressure按壓，以降低胃容物逆流"}, "answer": "D", "explanation": "Cricoid pressure（Sellick maneuver）的實際效益有爭議，現代RSI指引中不再強制推薦；若影響插管視野應移除，D描述不完全正確。", "category": "airway", "difficulty": "medium", "source": "112_anesthesia_Q76"}, {"id": 77, "question": "腹部腔室症候群（abdominal compartment syndrome，ACS），大多發生於直接創傷及大量輸液復甦之後，有關ACS之敘述何者錯誤？", "options": {"A": "因腹部腫脹壓迫膀胱導致多尿現象", "B": "會出現呼吸窘迫或氣道壓力增高", "C": "麻醉誘導前須備妥強心劑及升壓藥", "D": "腹內壓＞20mmHg合併器官受損，應盡速減壓"}, "answer": "A", "explanation": "ACS造成腎臟壓迫導致少尿（非多尿），A錯誤。ACS確實引起呼吸窘迫、低血壓（需備升壓藥）；腹內壓>20mmHg伴器官功能障礙需減壓手術。", "category": "crisis", "difficulty": "medium", "source": "112_anesthesia_Q77"}, {"id": 78, "question": "有關急性燒燙傷病人的麻醉照護，下列敘述何者正確？", "options": {"A": "受傷後24小時內以輸注晶體溶液為主，以0.9% NaCl為首選", "B": "考慮呼吸道的傷害及風險，應選擇比正常外徑小1.5至2mm的氣管內管", "C": "感染是造成後期併發症與死亡的主因，過度輸液亦增加感染風險", "D": "急性燒燙傷的前兩天，會呈現高代謝狀態"}, "answer": "C", "explanation": "大量輸液（fluid creep）確實增加感染（腸道屏障破壞、肺水腫）風險，C正確。燒傷輸液首選乳酸林格氏液（非NS）；氣道水腫應選「較大」（非較小）管徑；急性期（前兩天）為低代謝（高代謝出現在傷後3-5天）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q78"}, {"id": 79, "question": "有關嚴重頭部外傷病人的麻醉照護注意事項，下列敘述何者正確？", "options": {"A": "無論最後進食時間，病人都要當作是空腹時間不足做準備", "B": "cricoid pressure能協助喉頭鏡使用時有較好的聲門視野", "C": "選擇作用快的sodium nitroprusside，針對降腦壓有明顯的效果", "D": "血壓穩定、GCS score評估為E2V3M1，術前不需放置氣管內管"}, "answer": "A", "explanation": "頭部外傷病人均視為飽胃（stress/pain延遲胃排空），應按full stomach處理，A正確。Cricoid pressure可能影響視野（不常規推薦）；SNP降血壓不降腦壓；GCS=6（E2V3M1）意識嚴重受損，需插管保護呼吸道。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q79"}, {"id": 80, "question": "有關急性脊髓損傷（spinal cord injury，SCI）的病人接受手術麻醉，下列敘述何者正確？", "options": {"A": "methylprednisolone在受傷後3小時內給予，能有效改善神經損傷", "B": "平均動脈壓（MAP）應維持在85-90mmHg，以確保脊髓有足夠灌流", "C": "succinylcholine在受傷後48小時內禁止給予，會有發生高血鉀的疑慮", "D": "胸椎第4節以上受傷的急性期，常有高血壓及心跳過快，需積極處置"}, "answer": "B", "explanation": "急性SCI MAP目標85-90mmHg以維持脊髓灌流（B正確）。Methylprednisolone目前不建議常規使用（證據不足）；succinylcholine在受傷後24小時至6個月均應避免（高血鉀風險）；高位SCI急性期常出現神經性休克（低血壓+心搏過緩）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_anesthesia_Q80"}]};
const DATA_112_GENERAL  = {"meta": {"year": 112, "role": "nurse", "subject": "general", "subject_name": "專科護理通論", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "世界衛生組織（WHO）在2010年提出「跨團隊合作照護（interprofessional collaborative practice，IPCP）」的概念，透過跨專業領域者組成照護團隊，提供個別化、連續性的照護服務，以提高照護品質。下列何者不是促進跨團隊合作必要的做法？", "options": {"A": "成員可以包括醫療與非醫療人員", "B": "必須有共同的目標", "C": "團隊的領導者必須是醫師", "D": "應有開放的溝通環境"}, "answer": "C", "explanation": "IPCP強調跨專業平等合作，領導者不限於醫師，其餘三項（多元成員、共同目標、開放溝通）皆為必要條件。", "category": "communication", "difficulty": "easy", "source": "112_general_Q1"}, {"id": 2, "question": "關於臨床照護指引（clinical practice guidelines，CPG），下列敘述何者最不適當？", "options": {"A": "以治療效益為優先考量，其次再考慮成本", "B": "可標準化診療流程，減少變異性以及誤診的產生", "C": "以臨床照護經驗為基礎發展出來的醫療建議", "D": "以系統性文獻回顧與評讀，發展出目前最佳照護建議"}, "answer": "C", "explanation": "CPG應以系統性文獻回顧為基礎，而非單純臨床經驗。選項C描述最不適當。", "category": "nursing_mgmt", "difficulty": "easy", "source": "112_general_Q2"}, {"id": 3, "question": "依據民國111年6月22日公布之「醫療事故預防及爭議處理法」，醫療機構應於醫療事故發生之翌日起多少個工作日內，向病人、家屬或其代理人說明、溝通，並提供協助及關懷服務？", "options": {"A": "三個工作日", "B": "五個工作日", "C": "七個工作日", "D": "十個工作日"}, "answer": "B", "explanation": "依醫療事故預防及爭議處理法，醫療機構應於事故翌日起五個工作日內主動說明溝通。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q3"}, {"id": 4, "question": "與病人溝通的過程中，具體表達請求有助於發現彼此的需求，並同理對方。下列何者為最「具體」表達請求的說法？", "options": {"A": "我希望你每天可以下床走動2次", "B": "出院後你要多休息，不要太緊張要放輕鬆", "C": "我希望你能吃的營養一點", "D": "我希望你下次來看門診時能更有精神"}, "answer": "A", "explanation": "「每天下床走動2次」是具體可執行的指令，其餘選項均為模糊說法。", "category": "communication", "difficulty": "easy", "source": "112_general_Q4"}, {"id": 5, "question": "依據衛生福利部「長期照顧服務申請及給付辦法」之規定，因身心失能，且符合下列資格之一者，得向長期照顧管理中心或直轄市、縣(市)主管機關申請長期照顧服務，下列何者錯誤？", "options": {"A": "50歲以上原住民", "B": "65歲以上老人", "C": "領有身心障礙證明者", "D": "55歲以上失智症者"}, "answer": "A", "explanation": "原住民申請長照服務資格為55歲以上，非50歲，故A錯誤。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q5"}, {"id": 6, "question": "66歲王先生，急性腦中風後家屬想了解其失能程度，及關於「全民健康保險急性後期整合照護計畫」中對於腦中風急性後期照護模式與規範，下列敘述何者錯誤？", "options": {"A": "收案對象為急性腦中風發作滿3個月，且病況穩定之病人", "B": "急性腦中風後治療的黃金期，復健成效最好的時間是發病後3-6個月", "C": "轉到急性後期照護醫院，可以讓失能狀況改善，再住院率與一年內死亡率下降", "D": "急性後期照護團隊，依病人評估結果安排適當之急性後期整合照護模式"}, "answer": "A", "explanation": "急性後期整合照護計畫收案對象為急性腦中風發作「未滿3個月」且病況穩定者，非滿3個月。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q6"}, {"id": 7, "question": "專科護理師教導學妹手術的照護方式，下列教學方式何者最具學習保留效果？", "options": {"A": "學妹回示教及實作", "B": "看視訊及討論", "C": "聽講解及看示意圖", "D": "看技術影片及討論"}, "answer": "A", "explanation": "依學習金字塔理論，實作與教導他人（回示教）的學習保留率最高（約75-90%）。", "category": "communication", "difficulty": "easy", "source": "112_general_Q7"}, {"id": 8, "question": "專科護理師發現病人若有所思地站在窗邊，上前詢問：「早安，我看到你站在這一陣子了，在想什麼呢？」以上是使用何種治療性溝通技巧？", "options": {"A": "拓寬話題", "B": "給予認知", "C": "表達同理", "D": "集中焦點"}, "answer": "A", "explanation": "「在想什麼呢？」是開放性問句，鼓勵病人自由表達，屬拓寬話題（broad opening）技巧。", "category": "communication", "difficulty": "easy", "source": "112_general_Q8"}, {"id": 9, "question": "專科護理師為維護照護品質，進行輸血錯誤的根本原因分析（root cause analysis），應用反應性屏障分析法（reactive barrier analysis）分析錯誤原因，發現為血袋編號貼紙材質容易脫落導致沾黏，此為何種屏障類型？", "options": {"A": "人為屏障", "B": "行政屏障", "C": "物理屏障", "D": "天然屏障"}, "answer": "C", "explanation": "貼紙材質屬於物理性因素，屬物理屏障（physical barrier）。", "category": "nursing_mgmt", "difficulty": "medium", "source": "112_general_Q9"}, {"id": 10, "question": "專科護理師運用SPIKES溝通模式（The six steps of SPIKES），向癌症病人進行病情告知時，詢問病人「關於你的疾病，你想要知道哪些訊息？」屬於何項技巧？", "options": {"A": "評估感受（assessing the patient's Perception）", "B": "病人邀請（obtaining the patient's Invitation）", "C": "提供訊息（giving Knowledge and information）", "D": "同理感受（addressing the patient's Emotions with empathic response）"}, "answer": "B", "explanation": "詢問病人希望知道多少資訊，屬SPIKES中的I步驟（Invitation），即取得病人授權。", "category": "communication", "difficulty": "medium", "source": "112_general_Q10"}, {"id": 11, "question": "面對病人對治療計畫產生疑慮時，專科護理師應如何發揮協調與溝通的角色？", "options": {"A": "強調疾病的嚴重性，讓病人依計畫完成治療", "B": "尊重病人選擇，勿因強迫而造成醫療糾紛", "C": "鼓勵病人對治療抱持樂觀，積極地接受治療", "D": "傾聽及了解病人對治療計畫的疑慮，再給予說明"}, "answer": "D", "explanation": "以病人為中心的照護應先傾聽病人疑慮，再給予說明，兼顧溝通與尊重自主。", "category": "communication", "difficulty": "easy", "source": "112_general_Q11"}, {"id": 12, "question": "醫師緊急放置氣管內管過程中，主責護理師發現血氧飽和度有下降的趨勢，大聲說出：「血氧飽和度偏低，需要先給氧」，醫師專注於手頭工作，未有反應。專科護理師接續說：「對！血氧飽和度下降至94%，我們需要先提供氧氣！」以上行動是運用團隊資源管理的何項概念？", "options": {"A": "重申關切（two-challenge rule）", "B": "相互監測（cross monitoring）", "C": "事前說明（brief）", "D": "重複確認（check back）"}, "answer": "A", "explanation": "Two-challenge rule是指當安全疑慮被忽視時，第二次更明確地重申關切，即此情境所示。", "category": "nursing_mgmt", "difficulty": "medium", "source": "112_general_Q12"}, {"id": 13, "question": "專科護理師發現病人傷口紅腫，以SBAR技巧向醫師說明病況：「病人生命徵象正常，傷口疼痛指數3分，沒有出血、分泌物和特殊氣味」，此為何種類型的資訊傳遞？", "options": {"A": "Situation", "B": "Background", "C": "Assessment", "D": "Recommendation"}, "answer": "C", "explanation": "描述生命徵象、傷口評估等客觀資料與分析，屬SBAR中的Assessment（評估）部分。", "category": "communication", "difficulty": "medium", "source": "112_general_Q13"}, {"id": 14, "question": "專科護理師於腹膜透析管路照護課程中，邀請腹膜透析治療3年的病友分享照護經驗，依據ARCS理論此為運用何項動機技巧？", "options": {"A": "切身相關（relevance）", "B": "引起注意（attention）", "C": "建立信心（confidence）", "D": "感到滿足（satisfaction）"}, "answer": "A", "explanation": "邀請有相同疾病經歷的病友分享，讓學習者感到內容與自身切身相關（relevance）。", "category": "communication", "difficulty": "medium", "source": "112_general_Q14"}, {"id": 15, "question": "專科護理師給予病人低血糖衛教，學習目標是「可說出三項低血糖的徵象」，此為哪一個層次的學習目標？", "options": {"A": "認知", "B": "情意", "C": "技能", "D": "應用"}, "answer": "A", "explanation": "「說出」屬於知識層面的認知目標（Bloom分類法之knowledge/comprehension層次）。", "category": "communication", "difficulty": "easy", "source": "112_general_Q15"}, {"id": 16, "question": "關於專科護理師在臨床照護團隊所展現的合作協調能力，下列敘述何者錯誤？", "options": {"A": "僅需與主責醫師做好密切合作溝通", "B": "所展現的合作能力會反應於病人照護滿意度", "C": "溝通能力是跨領域團隊照護之核心能力之一", "D": "運用的協調能力可減少重複性工作"}, "answer": "A", "explanation": "跨團隊合作不限於主責醫師，應與所有相關醫療團隊成員合作，A選項錯誤。", "category": "communication", "difficulty": "easy", "source": "112_general_Q16"}, {"id": 17, "question": "45歲李女士，因子宮肌瘤大出血，由家人送到急診，當時意識清楚但血壓有持續下降現象，醫師建議輸血，但李太太拒絕輸血，經醫護人員及家人不斷勸導仍不同意輸血，過程中其血壓持續下降，脈搏快而弱，呼吸急促，且意識不清。醫師在李太太心智狀態已不合適做決定的情形下，知會家人後為其輸血。請問醫師所秉持的生物醫學倫理原則為何者？", "options": {"A": "保護原則", "B": "自主原則", "C": "不傷害原則", "D": "正義原則"}, "answer": "C", "explanation": "病人意識不清失去決策能力後，醫師基於不傷害原則（non-maleficence）為其輸血以避免死亡。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q17"}, {"id": 18, "question": "50歲陳女士，目前昏迷住加護病房，家屬帶來草藥粉並要求護理人員為病人灌食，醫師要求家屬寫切結書：「藥物灌入後發生任何病情變化需自行負責」，此時專科護理師最好的處理方式為何？", "options": {"A": "了解藥物的作用，依家屬要求執行給藥", "B": "請家屬自行負責及自行給藥", "C": "協助醫師一定要讓家屬填好切結書", "D": "與醫師及家屬召開會議，討論此議題"}, "answer": "D", "explanation": "面對未知成分藥物的給藥要求，最佳處理是召開溝通會議，充分討論，保護病人安全亦尊重家屬。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q18"}, {"id": 19, "question": "依據「病人自主權利法」，病人符合下列臨床條件之一，且有預立醫療決定者，醫療機構或醫師得依其預立醫療決定終止、撤除或不施行維持生命治療或人工營養及流體餵養之全部或一部，以下何者錯誤？", "options": {"A": "處於不可逆轉之昏迷狀況", "B": "極重度失智", "C": "永久植物人狀態", "D": "無法治癒的罕見疾病"}, "answer": "D", "explanation": "病人自主權利法明訂五種臨床條件（末期病人、不可逆昏迷、永久植物人、極重度失智、其他經公告之重症），「無法治癒的罕見疾病」並非法定條件，故D錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q19"}, {"id": 20, "question": "病人不滿出院手續繁雜，於專科護理師用餐時，至休息室大聲說：「你是笨蛋嗎？真的是廢物一個！」專科護理師起身安撫病人情緒，遭病人揮手推撞至桌角導致瘀傷，同事通知警衛制止。關於病人行為之敘述，下列何者正確？", "options": {"A": "得以醫療法之公然侮辱，妨礙醫療業務執行認之", "B": "休息室不屬公共場所，不能以公然侮辱認之，但構成傷害之要件", "C": "得以刑法之公然侮辱罪和傷害罪認之", "D": "公然侮辱和傷害為非告訴乃論，警察機關應主動將病人檢送偵辦"}, "answer": "C", "explanation": "休息室有他人在場符合「公然」要件，病人言語侮辱構成公然侮辱罪；推撞導致瘀傷構成傷害罪，均屬刑法範疇。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q20"}, {"id": 21, "question": "關於專科護理師執行監督下之醫療業務範圍，下列何者錯誤？", "options": {"A": "開顱手術縫合傷口拆線", "B": "肋膜腔豬尾巴（pig tail）引流管拔除", "C": "氣切導管更換", "D": "橈動脈導管置入"}, "answer": "C", "explanation": "依「專科護理師於醫師監督下執行醫療業務辦法」，氣切導管更換不在專科護理師可執行範圍內，故C錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q21"}, {"id": 22, "question": "病人40歲初次診斷末期腎臟疾病，評估符合接受腎臟移植條件。一年半前與38歲配偶結婚，配偶曾於26歲捐贈部分肝臟給父親，此次知悉丈夫病況，再次提出活體捐贈申請。此時專科護理師可提供何項建議？", "options": {"A": "與受贈者結婚未滿兩年，配偶不符合捐贈條件", "B": "配偶於完成書面同意後，始可安排進入捐贈評估", "C": "受贈者於結婚後一年診斷，配偶符合捐贈條件", "D": "配偶曾捐贈部分肝臟，不符合腎臟捐贈條件"}, "answer": "C", "explanation": "依人體器官移植條例，配偶為合法捐贈者，疾病係婚後一年診斷，符合法定條件；曾捐肝不影響腎臟捐贈資格評估。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q22"}, {"id": 23, "question": "52歲男性診斷為舌癌第二期，接受病灶切除手術後出院。上週在家中被發現突然無呼吸心跳，送往急診急救後恢復呼吸心跳，插管接呼吸器至加護病房治療，但目前仍未恢復意識。家屬告訴醫師病人上次住院時已簽立拒絕維生醫療意願書，認為現在治療已經違背病人意願，希望醫師立即拔除呼吸器讓病人好走。以下處置何者才符合「安寧緩和醫療條例」之規定？", "options": {"A": "此治療已違背病人之意願，可以立即撤除維生醫療", "B": "因病人不符合末期之定義，無法立即撤除維生醫療", "C": "本身為癌症病人且OHCA未恢復意識，預後極差，以立即撤除維生醫療較適當", "D": "尚未召開家庭會議確認其他家屬之意見，無法立即撤除維生醫療"}, "answer": "B", "explanation": "安寧緩和醫療條例適用於「末期病人」，需經兩位醫師確認為末期狀態，方可依意願書撤除維生醫療。此病人目前並未符合末期定義。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q23"}, {"id": 24, "question": "依據民國112年3月22日修訂之「菸害防制法」規定，下列敘述何者正確？", "options": {"A": "全面禁止電子煙之製造、輸入、販賣、供應、展示、廣告及使用，但加熱菸並未在此規範內", "B": "可於老人福利機構所在之室外場所吸菸", "C": "父母、監護人或其他實際為照顧之人，應禁止未成年人吸菸", "D": "菸品不得有促銷或廣告，但贊助公益活動之露出不在此限"}, "answer": "C", "explanation": "112年修訂菸害防制法明確規定父母等照顧者應禁止未成年人吸菸。電子煙與加熱菸均納管；老人福利機構室外不得吸菸；贊助公益活動之廣告亦禁止。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q24"}, {"id": 25, "question": "依據醫療機構已核定之相關預立醫療流程規範，下列何者不屬於專科護理師可代為開立之表單？", "options": {"A": "入院許可單", "B": "放置留置導尿管之處置醫囑", "C": "死亡證明書", "D": "檢驗醫囑（包含實驗室及影像）"}, "answer": "C", "explanation": "死亡證明書依法須由醫師開立，不屬專科護理師可代為開立之範圍。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q25"}, {"id": 26, "question": "專科護理師執行監督下之醫療業務，得由醫師預立特定醫療流程，下列敘述何者正確？", "options": {"A": "執行監督醫師僅以主責主治醫師為限", "B": "醫療機構若要由專科護理師代為開立表單，需先預立特定醫療流程表單項目且核定之", "C": "專科護理師所完成的病歷紀錄，監督醫師應於48小時內完成病歷簽核", "D": "專科護理師執行醫療業務前，須接受特定訓練與考核，該特定訓練內容，由專科護理師學會規範之"}, "answer": "B", "explanation": "依相關辦法，醫療機構由專師代為開立表單，需先預立並核定特定醫療流程，B正確。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q26"}, {"id": 27, "question": "依據專科護理師於醫師監督下執行醫療業務辦法，醫療機構以專師及訓練專師執行監督下之業務者，需成立專科護理師作業小組，下列何者錯誤？", "options": {"A": "僅需核備預立特定醫療流程內容，無需訂定預立醫療流程標準作業程序", "B": "制定專師及訓練專師執行監督下醫療業務之標準作業程序，依據醫療機構定期審視修改", "C": "以副院長以上人員擔任召集人", "D": "醫療及護理部門主管擔任副召集人"}, "answer": "A", "explanation": "依辦法，作業小組除核備流程內容外，亦需訂定標準作業程序，A錯誤。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q27"}, {"id": 28, "question": "一位47歲乳房X光攝影篩檢結果為陰性之女性，詢問多久可以免費做一次乳房X光攝影檢查，依據政府補助癌症篩檢政策，你的建議是？", "options": {"A": "每2年1次，直到69歲", "B": "每2年1次，60歲以後每年1次", "C": "每3年1次，直到69歲", "D": "每3年1次，60歲以後每年1次"}, "answer": "A", "explanation": "台灣國健署補助45-69歲（或40-44歲二等親有乳癌史）女性每2年1次乳房X光攝影篩檢。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q28"}, {"id": 29, "question": "關於維生素D的攝取，以下敘述何者較為適當？", "options": {"A": "病人只要多出去曬太陽即可以改善維生素D缺乏的問題", "B": "維生素D是在肝臟代謝為25-hydroxyvitamin D（25[OH]D）", "C": "攝取維生素D2的補充比D3更能有效提升血清25[OH]D值", "D": "同時給予維生素D和鈣質的補充並不會增加腎結石的風險"}, "answer": "B", "explanation": "維生素D在肝臟代謝為25(OH)D（儲存型），再於腎臟轉為活性型1,25(OH)2D。D3補充效果優於D2；鈣+VitD補充確有增加腎結石風險；單純日曬不足以改善嚴重缺乏。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q29"}, {"id": 30, "question": "關於女性定期抹片檢查的建議，下列何者正確？", "options": {"A": "沒有性生活的年長者不需定期做抹片檢查", "B": "曾患有子宮頸惡性腫瘤且已切除子宮頸者不需定期做抹片檢查", "C": "21歲以下未曾性行為者不需定期做抹片檢查", "D": "已經完整接種HPV疫苗者不需定期做抹片檢查"}, "answer": "C", "explanation": "21歲以下且未曾有性行為者感染HPV風險極低，建議不需常規抹片。曾患子宮頸癌者術後仍需定期追蹤；接種HPV疫苗後仍需定期抹片。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q30"}, {"id": 31, "question": "一位女性受檢者乳房攝影有異常的發現，文獻上已知女性得到乳癌的基礎風險（baseline risk）是1%，乳房攝影的敏感度（sensitivity）是90%，特異性（specificity）是91%，依據乳癌發生率及乳房攝影的結果，其得到乳癌的機率約為？", "options": {"A": "1%", "B": "9%", "C": "30%", "D": "90%"}, "answer": "B", "explanation": "以Bayes定理計算陽性預測值：PPV = (0.9×0.01)/(0.9×0.01 + 0.09×0.99) ≈ 0.009/0.0981 ≈ 9.2%，答案約為9%。", "category": "general_nursing", "difficulty": "hard", "source": "112_general_Q31"}, {"id": 32, "question": "目前國民健康署提供二代戒菸服務之藥物治療建議使用者，下列何者不適當？", "options": {"A": "須年滿18歲", "B": "尼古丁成癮度測試（FTND）得分達4分或以上", "C": "孕婦、哺乳者", "D": "平均1天吸10支菸或以上"}, "answer": "C", "explanation": "孕婦及哺乳者使用藥物戒菸（如伐尼克蘭、bupropion）有安全顧慮，屬禁忌或不建議族群，故C不適當。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q32"}, {"id": 33, "question": "依據「醫院緊急災害應變措施及檢查辦法」，為因應緊急災害事件，醫院應設置緊急災害應變組織與指揮架構，依據實際需要分設各組。關於所應執行事項之敘述，下列何者錯誤？", "options": {"A": "避難管理", "B": "參謀分析", "C": "醫療作業", "D": "財務及行政"}, "answer": "A", "explanation": "依辦法規定應設各組包含：指揮、作戰、後勤、財務、醫療等，「避難管理」並非明訂組別名稱，故A錯誤。", "category": "nursing_mgmt", "difficulty": "hard", "source": "112_general_Q33"}, {"id": 34, "question": "依據亞洲肌少症工作小組（Asian Working Group for Sarcopenia，AWGS）在2019年發表之共識更新版，有關肌少症診斷標準，下列敘述何者錯誤？", "options": {"A": "小腿圍、SARC-F或SARC-CalF問卷為常用的篩檢工具", "B": "肌少症嚴重度分級目前分為：可能肌少症、肌少症、嚴重肌少症三級", "C": "SARC-F是以病人的主觀評量，包含力量、行走、起身、登階、跌倒五個項目", "D": "女性小腿圍小於33cm，男性小於36cm，即代表身體肌肉量不足"}, "answer": "D", "explanation": "AWGS 2019標準：女性小腿圍＜34cm，男性＜34cm為篩檢切點（非女33男36），D錯誤。", "category": "general_nursing", "difficulty": "hard", "source": "112_general_Q34"}, {"id": 35, "question": "依據2022年臺灣高風險病人血脂異常臨床治療指引，對於低密度脂蛋白膽固醇（LDL-C）之測量結果與處置，下列建議何者不適當？", "options": {"A": "冠心症、暫時性腦缺血合併有腦（頸）動脈狹窄者，建議控制LDL-C至70mg/dL以下", "B": "冠心症合併周邊動脈阻塞性疾病時，建議控制LDL-C至55mg/dL以下", "C": "無心血管疾病且具兩個以下危險因子，LDL-C若超過130mg/dL，應開始藥物控制", "D": "高風險冠狀動脈疾病者（12個月內曾心肌梗塞），建議控制LDL-C至55mg/dL以下"}, "answer": "C", "explanation": "低風險族群（無心血管疾病且危險因子≤2個），LDL-C超過160mg/dL才考慮藥物治療，130mg/dL尚未達到藥物治療閾值，C不適當。", "category": "general_nursing", "difficulty": "hard", "source": "112_general_Q35"}, {"id": 36, "question": "依據109年疾病管制署國家預防接種政策對於65歲以上長者之疫苗接種建議，下列何者較不適當？", "options": {"A": "間隔適當時間，至少各接種1劑PPV23與PCV13肺炎鏈球菌疫苗", "B": "每10年追加一劑破傷風、減量白喉混合疫苗（Td）", "C": "無帶狀疱疹病史者，毋需接種帶狀疱疹疫苗", "D": "每年接種一劑流感疫苗"}, "answer": "C", "explanation": "帶狀疱疹疫苗建議60歲（或50歲）以上接種，不論是否曾罹患帶狀疱疹，故C不適當。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q36"}, {"id": 37, "question": "關於跌倒篩檢之評估項目，下列何者最能預測老人日後跌倒之機率？", "options": {"A": "坐姿起立時是否需要用手幫忙撐住", "B": "過去一年是否曾經跌倒過", "C": "在家走路時是否需要扶著家具來維持平衡", "D": "是否有吃安眠藥或讓心情比較好的藥"}, "answer": "B", "explanation": "過去一年有跌倒史是預測未來跌倒的最強獨立危險因子，為臨床指引一致推薦的篩檢重點。", "category": "general_nursing", "difficulty": "medium", "source": "112_general_Q37"}, {"id": 38, "question": "下列何者為「111-112年度【醫院版】醫療品質及病人安全工作目標」新增之目標？", "options": {"A": "提升手術安全", "B": "維護孕產兒安全", "C": "落實感染管制", "D": "提升管路安全"}, "answer": "B", "explanation": "111-112年度病人安全目標新增「維護孕產兒安全」，其餘三項為原有目標。", "category": "nursing_mgmt", "difficulty": "medium", "source": "112_general_Q38"}, {"id": 39, "question": "為提供安全的醫療環境，預防病人跌倒及降低傷害程度，下列何者不適當？", "options": {"A": "將病人可能使用的物品，如：輔具、眼鏡等，置於病人隨手可得之處", "B": "下床時可提供家屬使用移位固定帶", "C": "浴廁加裝止滑設施、扶手及叫人鈴", "D": "移動時使用可滑動的輔具，如：移動式點滴架，以便於病人行走"}, "answer": "D", "explanation": "移動式點滴架重心不穩，會增加跌倒風險，不適合作為步行輔具使用，D不適當。", "category": "nursing_mgmt", "difficulty": "easy", "source": "112_general_Q39"}, {"id": 40, "question": "關於執行正確手部衛生方式之敘述，下列何者正確？", "options": {"A": "執行醫療作業時，若沒有明顯髒污可以酒精性乾洗手維護手部衛生", "B": "當手上有傷口或明顯髒污時，建議先以乾洗手清潔，無法清潔再濕洗手", "C": "對於產孢菌、無套膜的病毒等，酒精性乾洗手效果較差，應以濕洗手後再乾洗手為宜", "D": "戴手套可取代洗手，但移除手套後仍建議進行手部衛生"}, "answer": "A", "explanation": "WHO手部衛生5時機中，無明顯髒污時可使用酒精性乾洗手；有髒污或接觸孢子（如困難梭菌）時需濕洗手；手套不能取代手部衛生。", "category": "nursing_mgmt", "difficulty": "easy", "source": "112_general_Q40"}, {"id": 41, "question": "依據民國97年發布之「緊急傷病患轉診實施辦法」，下列敘述何者正確？", "options": {"A": "後送醫院於傷病患緊急情事消失後，可不經傷病患本人或其親屬同意，協助其轉回原診治醫院，以緩解醫院壅塞", "B": "醫院辦理轉診，應先聯繫後送醫院，後送醫院不得拒絕接受其轉診", "C": "醫院辦理轉診，應將其原因與風險告知傷病患本人或其親屬，並記載於病歷。傷病患意識不清且親屬不在場時，得免載明", "D": "醫院辦理傷病患本人要求轉診時，應由病患自行指定救護運輸工具、救護人員，醫院得提供適當之維生設備及藥品、醫材"}, "answer": "B", "explanation": "依辦法，醫院轉診應先聯繫後送醫院，後送醫院不得拒絕。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q41"}, {"id": 42, "question": "關於「重度級急救責任醫院」須「可於假日及夜間提供緊急外傷手術及緊急血管攝影栓塞」，其法源依據為？", "options": {"A": "全民健康保險法", "B": "緊急醫療救護法", "C": "醫療法", "D": "緊急醫療救護法施行細則"}, "answer": "B", "explanation": "急救責任醫院之分級與責任規定，其法源為「緊急醫療救護法」。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q42"}, {"id": 43, "question": "發生醫療場所暴力事件時，依「醫院發生滋擾醫療秩序或妨礙醫療業務執行案件通報與處置標準流程」規定，應通報下列何者單位？", "options": {"A": "衛生局", "B": "地檢署", "C": "醫策會", "D": "衛生福利部"}, "answer": "A", "explanation": "依流程規定，醫療場所暴力事件應通報當地衛生局。", "category": "nursing_mgmt", "difficulty": "medium", "source": "112_general_Q43"}, {"id": 44, "question": "關於實證健康照護五大步驟（5A）之敘述，下列何者錯誤？", "options": {"A": "第一個A（ask）：形成臨床問題", "B": "第二個A（acquire）：利用查詢文獻資料，直到找到最佳證據，以回答臨床問題", "C": "第三個A（appraise）：評讀實證文獻的效度及可用性", "D": "第五個A（apply）：將經過驗證的實證文獻結果應用於臨床"}, "answer": "D", "explanation": "5A步驟：Ask→Acquire→Appraise→Apply→Audit（評估應用效果）。第五個A是Audit（稽核/評估），非單純apply，D描述不完整或有誤。", "category": "nursing_mgmt", "difficulty": "medium", "source": "112_general_Q44"}, {"id": 45, "question": "關於「以病人為中心」的全面品質管理（total quality management，TQM），下列敘述何者錯誤？", "options": {"A": "若要降低血流感染率，可使用柏拉圖了解問題主因，將累積至80%主要因素進行分析", "B": "經過品管團隊進行問題的確立或分析、方案決策，可以流程圖將想法步驟流程化", "C": "進行品質改善的問題原因分析階段，可以直方圖、散布圖、魚骨圖等收集量性數據", "D": "查核表是利用簡單數據或圖示，針對特定事件的發生次數或頻率，進行資料記錄"}, "answer": "C", "explanation": "魚骨圖（石川圖）是分析原因的質性工具，不是用來「收集量性數據」；直方圖和散布圖才是量性工具，C描述混淆。", "category": "nursing_mgmt", "difficulty": "medium", "source": "112_general_Q45"}, {"id": 46, "question": "關於專科護理師從事醫療照護的業務，下列敘述何者錯誤？", "options": {"A": "執業時需做執業登錄", "B": "依照規定須完成繼續教育積分，並證照更新", "C": "因業務而取得的他人秘密，不得無故洩漏，確保病人隱私權", "D": "執行業務所製作之病歷紀錄，依照醫療法規定應保存7年"}, "answer": "送分", "explanation": "本題送分。D選項原標準答案，但醫療法第70條規定病歷應保存至少七年，未成年者至成年後七年，人體試驗永久保存。因描述不完整，本題送分。", "category": "ethics_law", "difficulty": "medium", "source": "112_general_Q46"}, {"id": 47, "question": "關於圖（一）由肺動脈導管所測得波型，下列敘述何者正確？", "options": {"A": "①段可代表舒張末期壓力（EDP）", "B": "②段可代表肺動脈阻塞壓力（PAOP）", "C": "③段可代表肺動脈壓力（PAP）", "D": "④段可代表舒張末期壓力（EDP）"}, "answer": "C", "explanation": "肺動脈導管波形中，正常肺動脈波（③段）代表PAP；楔形壓（PAOP）出現在充氣球囊阻塞時的平坦波形（②段）；EDP通常由特定波段計算。", "category": "monitoring", "difficulty": "hard", "source": "112_general_Q47", "image": "112_general_Q47.png", "image_caption": "圖（一）：肺動脈導管置入時所測得之四段壓力波形（①②③④）"}, {"id": 48, "question": "關於硬脊膜穿刺後頭痛（post-dural puncture headache，PDPH），下列敘述何者錯誤？", "options": {"A": "大部分發生在硬脊膜穿刺12-48小時後開始，可能持續數月", "B": "鉛筆點針尖的針（pencil-point needles）有較低的發生率", "C": "引起的頭痛主要發生在顳葉，通常被描述為銳痛或抽痛", "D": "與姿勢相關，在坐姿站姿時疼痛加劇，臥姿則可緩解"}, "answer": "C", "explanation": "PDPH的疼痛通常為雙側額頭或枕部的鈍痛、壓迫感，非顳葉的銳痛或抽痛，C敘述錯誤。", "category": "regional", "difficulty": "medium", "source": "112_general_Q48"}, {"id": 49, "question": "關於老年病人術後止痛策略，下列敘述何者錯誤？", "options": {"A": "對鴉片類藥物較敏感，劑量要減少50%", "B": "長時間合併使用NSAID類藥物，須留意腎衰竭及腸胃道出血風險", "C": "因疼痛神經傳導慢且接受器減少，臨床上不需過度在意疼痛照護", "D": "針對失智及無法言語的病人，止痛藥物應規則性給予"}, "answer": "C", "explanation": "老年病人疼痛感知可能下降，但並不代表不需重視疼痛照護；未處理的疼痛導致譫妄、活動力下降等嚴重後果，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_general_Q49"}, {"id": 50, "question": "關於自然產止痛（labor analgesia），下列敘述何者錯誤？", "options": {"A": "第二產程的體感覺疼痛來自陰道及會陰處，經由會陰神經傳至L2-L4", "B": "第一產程的疼痛主因是子宮收縮及子宮頸擴張，由T10-L1處進入脊索", "C": "epidural analgesia為有效的止痛方式，可使用IV remifentanil替代，但須留意呼吸抑制", "D": "施打epidural analgesia不需等待子宮頸擴張3cm以上，並不會讓第一產程延長"}, "answer": "A", "explanation": "第二產程陰道及會陰的體感疼痛經會陰神經傳至S2-S4，非L2-L4，A錯誤。", "category": "regional", "difficulty": "hard", "source": "112_general_Q50"}, {"id": 51, "question": "依據美國心臟學會（American Heart Association）的建議，以下哪些病人不需要在術前先進行心臟功能評估與風險管理，就可進行常規排程手術？", "options": {"A": "第二型之第二度房室傳導阻滯（Mobitz type II）", "B": "心跳每分鐘高於100下的心房顫動（atrial fibrillation）", "C": "嚴重的主動脈瓣狹窄（aortic valve stenosis）", "D": "METs≧4且沒有心臟疾病症狀"}, "answer": "D", "explanation": "AHA指引：METs≧4且無心臟症狀者可直接排程手術；其餘三項（Mobitz II、快速AFib、嚴重AS）均屬需先評估的嚴重心臟疾病。", "category": "clinical_assessment", "difficulty": "medium", "source": "112_general_Q51"}, {"id": 52, "question": "關於麻醉後恢復室的照護，下列敘述何者錯誤？", "options": {"A": "術後噁心嘔吐的危險因子有：女性、未抽菸、易暈車暈船及術後使用opioids", "B": "麻醉後恢復室發生最嚴重的併發症是低體溫與發抖", "C": "已拔管病人，門牙可咬壓舌板相當於外展拇指肌train-of-four ratio（TOFR）已達0.85", "D": "全身麻醉術後發抖（shivering）的比率可達到60%，治療可給予meperidine IV 25mg"}, "answer": "BC", "explanation": "B錯誤：低體溫與發抖是最常見並非最嚴重的併發症。C錯誤：該描述中「外展拇指肌」翻譯有爭議（正確應為adductor pollicis），疑義後BC均列為可選答案。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_general_Q52"}, {"id": 53, "question": "當病人可被叫醒、可聽從命令移動四肢、可正常深呼吸咳嗽、血壓比手術前降低25%、給氧後血氧飽和濃度才可達到91%。試問其modified Aldrete score分數為幾分？", "options": {"A": "6", "B": "7", "C": "8", "D": "9"}, "answer": "B", "explanation": "Modified Aldrete計分：意識（可叫醒）=1，活動（四肢）=2，呼吸（深呼吸）=2，循環（BP降低25%）=1，血氧（給氧才達91%）=1，合計=7分。", "category": "monitoring", "difficulty": "hard", "source": "112_general_Q53"}, {"id": 54, "question": "關於麻醉後恢復室的照護，下列敘述何者錯誤？", "options": {"A": "肺擴張不全（atelectasis）和肺泡通氣不足（alveolar hypoventilation）是恢復室常見低血氧（hypoxemia）的原因", "B": "男性且術中有使用propofol，手術結束後在恢復室較容易有shivering的情形發生", "C": "依據discharge score達8分，便可將病人由恢復室送回病房", "D": "噁心嘔吐的嚴重程度是評估門診手術病人離開恢復室的標準之一"}, "answer": "C", "explanation": "Modified Aldrete score滿分10分，通常需達9分以上才能出恢復室，8分標準不足，C錯誤。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "112_general_Q54"}, {"id": 55, "question": "關於動脈收縮壓變異（pulse pressure variation，PPV），下列敘述何者正確？", "options": {"A": "不會被病人的自主呼吸干擾", "B": "可用於嚴重心律不整病人的輸液評估", "C": "PPV為8%代表可能適合輸液", "D": "在正確的應用下，輸液會使PPV降低"}, "answer": "D", "explanation": "PPV在正確應用條件下（正壓通氣、竇性節律、無自主呼吸），輸液有反應時PPV會下降。PPV>13%才提示液體反應性；自主呼吸會干擾PPV；心律不整時不適用。", "category": "monitoring", "difficulty": "hard", "source": "112_general_Q55"}, {"id": 56, "question": "關於大量輸血（massive blood transfusion），下列敘述何者正確？", "options": {"A": "最常引起的非外科性出血為稀釋性血小板過低（dilutional thrombocytopenia）", "B": "快速大量輸血可能引起檸檬酸鹽中毒（citrate toxicity），導致高血鈣", "C": "大量輸血讓病人體溫低至35℃，可能會引起心室顫動", "D": "大量輸血時，儘量使用採血48小時內的血品，以避免血鉀過高"}, "answer": "A", "explanation": "大量輸血最常見的非外科出血原因為稀釋性血小板低下。citrate中毒導致低血鈣（非高血鈣）；心室顫動通常發生在體溫<30℃；舊血含鉀高（非新血）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_general_Q56"}, {"id": 57, "question": "下列敘述何者正確？", "options": {"A": "環狀軟骨位於第四頸椎高度，經環狀氣管膜與氣管相連", "B": "左支氣管以約25度角與主支氣管分開，右支氣管以約45度角與主支氣管分開", "C": "右肺分為右上葉、右中葉、右下葉，左肺分為左上葉與左下葉", "D": "成年病人仰臥時，吸入的異物或液體較可能進入左上葉"}, "answer": "C", "explanation": "右肺三葉，左肺兩葉，C正確。環狀軟骨位於C6高度；右支氣管角度較小（約25度），左支氣管角度較大（約45度）；仰臥時異物較易進入右下葉。", "category": "airway", "difficulty": "medium", "source": "112_general_Q57"}, {"id": 58, "question": "關於麻醉中呼吸道評估，下列敘述何者正確？", "options": {"A": "健康病人經由呼吸器換氣期間，應保持最高氣道壓力（PIP或ppeak）小於40mmHg", "B": "氣管內管扭折可能導致最高氣道壓力（PIP）上升，但高原期壓力（pplat）沒有變化", "C": "高原期壓力應盡量保持在30mmHg以下，以防止肺部容積損傷和肺泡過度膨脹", "D": "支氣管痙攣和細支氣管堵塞，會影響靜態肺順應性和高原期壓力"}, "answer": "B", "explanation": "氣管內管扭折屬於氣道阻力增加，PIP上升但pplat不變（肺本身未過度充氣）；支氣管痙攣影響動態不影響靜態順應性；pplat應<30 cmH2O（非mmHg）。", "category": "monitoring", "difficulty": "hard", "source": "112_general_Q58"}, {"id": 59, "question": "關於動脈導管，下列敘述何者正確？", "options": {"A": "最常由ulnar artery置入，因其最表淺，且較直", "B": "全身麻醉後，常以傳統式Allen test評估側枝循環", "C": "超音波或脈衝式血氧分析儀可評估側枝循環的血流", "D": "Allen test的判讀標準，是恢復血色的時間不能高於15秒"}, "answer": "C", "explanation": "超音波或pulse oximetry（光體積積描法）可評估側枝循環，C正確。動脈導管最常由橈動脈置入；全麻後無法配合傳統Allen test；Allen test正常值為<7秒（非15秒）。", "category": "monitoring", "difficulty": "medium", "source": "112_general_Q59"}, {"id": 60, "question": "關於非侵入性血壓監測的判讀，下列敘述何者正確？", "options": {"A": "壓脈帶綁太鬆，可能會導致血壓值假性偏低", "B": "壓脈帶置放的位置低於心臟高度，可能會導致血壓值假性偏低", "C": "使用過小的壓脈帶，可能會導致血壓值假性偏低", "D": "採坐姿時由前臂測量，可能會導致血壓值假性偏低"}, "answer": "送分", "explanation": "本題送分。B/C/D均為假性偏高；A描述過於簡短。全題無明確正確答案，送分。", "category": "monitoring", "difficulty": "medium", "source": "112_general_Q60"}, {"id": 61, "question": "圖（二）為評估動脈導管所測之壓力，下列何者正確？", "options": {"A": "①處稱為過沖（overshoot）", "B": "②處稱為減弱（dampened）", "C": "③處的收縮壓比較正確", "D": "②處的收縮壓須以波形校正數值"}, "answer": "D", "explanation": "減弱（dampened）波形所測得的收縮壓偏低，需用Fast Flush Test或波形校正係數加以校正，D正確。", "category": "monitoring", "difficulty": "hard", "source": "112_general_Q61", "image": "112_general_Q61.png", "image_caption": "圖（二）：動脈導管壓力波形（含 Dicrotic notch 標示之三處 ①②③）"}, {"id": 62, "question": "術中病人血壓突然降低，圖（三）心電圖出現以下波型，下列何者正確？", "options": {"A": "atrial fibrillation，可能需要以β-blocker治療", "B": "supraventricular tachycardia，可能需要以adenosine治療", "C": "atrial flutter，可能需要同步心臟整流", "D": "ventricular fibrillation，可能需要CPR"}, "answer": "C", "explanation": "規則鋸齒狀（F波）、P波消失、心室率約150次/分（心房率300/分以2:1傳導）為atrial flutter特徵，血流動力學不穩時需同步整流。", "category": "monitoring", "difficulty": "hard", "source": "112_general_Q62", "image": "112_general_Q62.png", "image_caption": "圖（三）：術中心電圖節律帶"}, {"id": 63, "question": "依據美國麻醉醫學會的生理狀態分級（ASA-PS classification）評估，下列敘述何者正確？", "options": {"A": "健康22歲女性，BMI為22kg/m2，抽菸，應為等級I", "B": "健康30歲男性，BMI為23kg/m2，經常應酬喝酒都不會喝醉，應為等級I", "C": "28歲孕婦，沒有任何疾病，而且產前檢查都正常，應為等級I", "D": "30歲女性，只患有輕微的睡眠呼吸中止症候群，應為等級II"}, "answer": "D", "explanation": "輕微OSA屬輕微系統性疾病，ASA II；抽菸者至少ASA II；孕婦至少ASA II；無症狀飲酒不足以分類但需評估；D正確。", "category": "clinical_assessment", "difficulty": "medium", "source": "112_general_Q63"}, {"id": 64, "question": "依據106年5月8日修正之現行「專科護理師於醫師監督下執行醫療業務辦法」，關於涉及侵入性人體之醫療業務範圍及項目，下列何者屬於專科護理師於醫師監督下執行之醫療業務？", "options": {"A": "非初次胸管更換", "B": "非初次腸造瘻管更換", "C": "非初次penrose導管更換", "D": "非初次nelaton導管更換"}, "answer": "BD", "explanation": "疑義後答案更正為BD。非初次腸造瘻管更換（B）及nelaton導管更換（初次或非初次均可，D）屬可執行範圍；胸管及penrose導管更換不在範圍內。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q64"}, {"id": 65, "question": "依據106年5月8日修正之現行「專科護理師於醫師監督下執行醫療業務辦法」，關於涉及侵入性人體之醫療業務範圍及項目，下列何者屬於專科護理師於醫師監督下執行之醫療業務？", "options": {"A": "經皮心律調節（TCP）", "B": "肌肉組織傷口清創", "C": "陰道擴張器置入採集檢體", "D": "及於肌肉及肌腱之傷口縫合"}, "answer": "C", "explanation": "陰道擴張器置入採集檢體屬專科護理師可執行範圍；TCP、肌肉清創、肌腱縫合均不在範圍內。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q65"}, {"id": 66, "question": "依據111年度台灣麻醉醫學會與台灣麻醉專科護理學會二會共識之「麻醉專科護理師於麻醉專科醫師監督下執行醫療業務範圍」，訓練中麻醉專科護理師在麻醉專科醫師監督下可執行下列哪項醫療業務？", "options": {"A": "為產後的媽媽移除減痛分娩後的硬脊膜外導管", "B": "為常規膽囊切除手術的病人執行氣管內管插管及移除", "C": "告知病人及家屬麻醉效益與風險，完成麻醉同意書簽署", "D": "為一位緊急剖腹探查的病人置放中央靜脈導管和周邊動脈導管"}, "answer": "A", "explanation": "移除硬脊膜外導管屬相對低風險、訓練中專師可執行項目；插管/告知同意/緊急置管均需資深麻醉專師或醫師執行。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q66"}, {"id": 67, "question": "依據111年度台灣麻醉醫學會與台灣麻醉專科護理學會二會共識之「麻醉專科護理師於麻醉專科醫師監督下執行醫療業務範圍」規範，對於麻醉專科護理師協助的「非侵入人體之醫療業務，例如代為預立醫囑」，須由何者訂立「預立特定醫療流程」，且報備醫院通過後，麻醉專科護理師方可執行？", "options": {"A": "台灣麻醉專科護理學會", "B": "各院麻醉科（部）務會議", "C": "各院專科護理師作業小組", "D": "衛生福利部護理及健康照護司"}, "answer": "C", "explanation": "依規範，預立特定醫療流程須由各院專科護理師作業小組訂立，經醫院核備後方可執行。", "category": "ethics_law", "difficulty": "hard", "source": "112_general_Q67"}, {"id": 68, "question": "關於肝臟移植在手術全期的麻醉照護，下列敘述何者正確？", "options": {"A": "切肝期大量輸注血液製品，易導致高血鈣、低血鉀", "B": "無肝期有高血糖、代謝性鹼中毒、低體溫的風險", "C": "新肝期出現高血鉀、代謝性酸中毒、全身血管阻力減少", "D": "再灌流期是血液動力學最穩定的階段"}, "answer": "C", "explanation": "新肝再灌流期（reperfusion）：儲存液釋出高鉀、代謝性酸中毒、血管擴張（SVR下降）；這是血流動力學最不穩定的階段。無肝期特色是低血糖（非高血糖）、代謝性酸中毒、低體溫。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_general_Q68"}, {"id": 69, "question": "關於經尿道前列腺切除術（TURP），於手術全期麻醉照護時，下列敘述何者正確？", "options": {"A": "膀胱的痛覺神經傳導由L1-L3，脊髓麻醉建議麻醉高度到達L1以上", "B": "TURP syndrome包括躁動、高血鈉、心律不整、肺水腫、腦水腫等症狀", "C": "TURP syndrome治療需快速給予靜脈輸液、低張鹽水、利尿劑", "D": "術中病人抱怨上腹部疼痛及肩部牽扯痛，應懷疑發生膀胱穿孔"}, "answer": "D", "explanation": "上腹痛及肩部牽扯痛（膈肌刺激）是膀胱穿孔的徵象；TURP syndrome為低血鈉（非高血鈉）；治療低血鈉應給予高張（非低張）鹽水；脊麻高度需到T10。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_general_Q69"}, {"id": 70, "question": "關於肝臟切除於手術全期需注意的事項，下列敘述何者錯誤？", "options": {"A": "低血壓、出血和使用升壓劑都會危及肝臟氧氣供應，影響術後肝功能不全", "B": "正壓通氣和調升呼氣末正壓（PEEP）可增加心輸出量和總肝臟血流量", "C": "低碳酸血症會造成肝臟血流減少，應避免過度換氣", "D": "病人有大量腹水、胃排空延遲，麻醉誘導可考慮使用快速誘導"}, "answer": "B", "explanation": "正壓通氣和PEEP增加胸腔壓力，反而會減少靜脈回流和心輸出量，降低肝臟血流，B錯誤。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_general_Q70"}, {"id": 71, "question": "關於孕婦在正常妊娠期間生理變化，下列敘述何者錯誤？", "options": {"A": "呼吸系統：母體透過增加潮氣容積（TV），使每分鐘通氣量增加", "B": "心血管系統：心搏出量增加、心率增快、妊娠期間心輸出量增加", "C": "血液系統：血容量增加，妊娠期間大都處於低凝血狀態", "D": "神經系統：吸入性麻醉劑的最小肺泡分壓（MAC）值下降"}, "answer": "C", "explanation": "妊娠期間凝血因子（VII、VIII、X、纖維蛋白原）增加，處於高凝血狀態（非低凝血），C錯誤。", "category": "physiology", "difficulty": "medium", "source": "112_general_Q71"}, {"id": 72, "question": "關於子癇前症（preeclampsia）的孕產婦使用magnesium sulfate治療時，下列敘述何者錯誤？", "options": {"A": "可預防發生子癇抽搐，應在分娩全程及產後24-48小時持續使用", "B": "對平滑肌有鬆弛作用，需注意低血壓、產後子宮收縮無力和出血", "C": "肝功能不佳，需特別小心其所造成的毒性，因為是由肝臟代謝", "D": "臨床可透過深部肌腱反射、呼吸抑制、神經學狀況變差來評估其毒性"}, "answer": "C", "explanation": "硫酸鎂主要由腎臟排泄（非肝臟代謝），腎功能不佳才需特別小心毒性，C錯誤。", "category": "pharmacology", "difficulty": "hard", "source": "112_general_Q72"}, {"id": 73, "question": "關於麻醉前常規用藥的評估，下列敘述何者錯誤？", "options": {"A": "ACEIs、ARBs，手術當日停用", "B": "口服降血糖藥物、胰島素致敏劑，手術當日停用", "C": "控制停經症狀的雌激素、威爾剛等藥物，手術當日停用", "D": "抗憂鬱劑、單胺氧化酶抑制劑（MAOIs），手術當日停用"}, "answer": "D", "explanation": "MAOIs應於術前2週停用（非手術當日），因其與opioids、vasopressors交互作用危及生命，D錯誤。抗憂鬱劑一般繼續服用。", "category": "pharmacology", "difficulty": "hard", "source": "112_general_Q73"}, {"id": 74, "question": "關於青光眼病人用藥Diamox®（acetazolamide），下列敘述何者正確？", "options": {"A": "長期使用會造成高血鈉和低血鉀", "B": "可做成眼藥水製劑，快速減少房水分泌，有效降低眼壓", "C": "是一種利尿劑，會因脫水造成代謝性鹼中毒", "D": "是一種碳酸酐酶（carbonic anhydrase）抑制劑，減少二氧化碳水合及碳酸水解反應"}, "answer": "D", "explanation": "Acetazolamide是碳酸酐酶抑制劑，D正確。長期使用造成低血鈉和低血鉀；不能做成眼藥水；是利尿劑但造成代謝性酸中毒（非鹼中毒）。", "category": "pharmacology", "difficulty": "hard", "source": "112_general_Q74"}, {"id": 75, "question": "麻醉前用來評估肝臟功能異常嚴重度的系統有：model for end-stage liver disease（MELD）與Child-Turcotte-Pugh（CTP），試問何者為兩套評估系統共有的項目？", "options": {"A": "血清肌酸酐（creatinine）", "B": "血漿膽紅素（bilirubin）", "C": "血中白蛋白（albumin）", "D": "肝性腦病變（encephalopathy）"}, "answer": "B", "explanation": "Bilirubin同時出現在MELD（bilirubin、creatinine、INR、sodium）和CTP（bilirubin、albumin、PT、腹水、encephalopathy）兩系統中。", "category": "clinical_assessment", "difficulty": "hard", "source": "112_general_Q75"}, {"id": 76, "question": "關於急性會厭炎麻醉前評估及處置，下列敘述何者正確？", "options": {"A": "是A型流感嗜血桿菌（haemophilus influenzae type A）造成，好發於2-7歲兒童", "B": "麻醉宜採自發性呼吸合併麻醉氣體誘導，可確保氣道通暢，同時也不會造成氣道刺激", "C": "使用較大口徑的氣管內管可解決氣道阻塞，若處理有困難，要立刻以外科方式建立氣道", "D": "病人多已產生嚴重氣道阻塞症狀，要盡快在清醒下嘗試使用喉頭鏡檢查會厭並且插管"}, "answer": "B", "explanation": "急性會厭炎應採保留自發呼吸的吸入誘導（避免喉痙攣）；是b型流感嗜血桿菌（HiB，type B）；應用較小口徑氣管內管；避免清醒下喉頭鏡（會誘發完全阻塞）。", "category": "airway", "difficulty": "hard", "source": "112_general_Q76"}, {"id": 77, "question": "STOP-Bang評分是有效評估阻塞性睡眠呼吸中止症（obstructive sleep apnea，OSA）病人的好方法，STOP-Bang包含四項問題和四項客觀測量，下列哪個選項不在此問卷內？", "options": {"A": "您晚上睡覺打鼾聲音（snore）很大嗎？", "B": "您白天會覺得很疲憊（tired）嗎？", "C": "您常覺得呼吸困難，有阻塞感（obstruction）嗎？", "D": "您曾有高血壓或正在接受高血壓（high blood pressure）治療嗎？"}, "answer": "C", "explanation": "STOP-Bang：S（snore）、T（tired）、O（observed apnea）、P（pressure/高血壓）、B（BMI）、A（age）、N（neck）、G（gender）。「O」是「observed apnea（被觀察到有呼吸中止）」，不是「obstruction感」，C不在問卷內。", "category": "clinical_assessment", "difficulty": "medium", "source": "112_general_Q77"}, {"id": 78, "question": "圖（四）為同一名病人的頸椎X光攝影，左側是頸椎屈曲，右側是頸椎伸展，圖（五）則是由圖（四）轉化而來的卡通簡圖，顯示麻醉前評估病人的頸椎狀況，最有可能的問題是：", "options": {"A": "第三第四頸椎椎間盤突出（C3-C4 HIVD）", "B": "第五第六頸椎（下頸椎）半脫位（C5-C6 subluxation）", "C": "寰樞椎半脫臼（atlantoaxial subluxation）", "D": "齒狀突向上移位（superior migration of the odontoid）"}, "answer": "C", "explanation": "ADI增加且隨屈伸變化、SAC減少，代表寰樞椎不穩定（atlantoaxial subluxation），常見於類風濕性關節炎等。", "category": "clinical_assessment", "difficulty": "hard", "source": "112_general_Q78", "image": "112_general_Q78.png", "image_caption": "圖（四）：頸椎屈曲／伸展 X 光；圖（五）：示意圖標示 ADI 與 SAC"}, {"id": 79, "question": "承上題，可由病人頸椎的屈曲伸展X光攝影去量測病人的ADI（atlas-dens interval），當ADI增加時，脊椎的安全空間（safe area for cord，SAC）就減少，試問ADI在哪一個數值以上，代表頸椎不穩定？", "options": {"A": "4mm", "B": "1cm", "C": "5mm", "D": "2.5mm"}, "answer": "AC", "explanation": "疑義後答案為AC。成人ADI>4mm（Miller教科書標準）代表不穩定；小兒標準為>5mm，兩者均給分。", "category": "clinical_assessment", "difficulty": "hard", "source": "112_general_Q79"}, {"id": 80, "question": "燒傷面積90%的病人，緊急至手術室進行清創，應執行哪些麻醉準備和評估？", "options": {"A": "病人常劇烈疼痛，若是呼吸仍順暢，不須先進行氣管內管置放", "B": "含聚氯酯的物質燃燒會釋放氰酸（hydrogen cyanide），若吸入要給予sodium nitrite", "C": "可能合併有一氧化碳中毒，若持續使用脈衝式血氧分析儀監測24小時正常，即可排除", "D": "succinylcholine在燒傷發生12小時內使用，仍會產生危及性命的高血鉀"}, "answer": "送分", "explanation": "本題送分。B選項原為正確答案（聚氨酯燃燒釋放氰酸），但試卷誤植為「聚氯酯」，造成全題無正確選項，送分。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "112_general_Q80"}]};
