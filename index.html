ophen機轉不同。", "category": "pain_management", "difficulty": "medium", "source": "114_anesthesia_Q30"}, {"id": 31, "question": "下列何者最不適合使用propofol作為鎮靜或麻醉誘導？", "options": {"A": "對大豆、花生過敏之病人", "B": "長期服用苯二氮平類藥物的癲癇病人", "C": "BMI 40 kg/m²的病人需接受胃鏡檢查", "D": "腎功能不全（CKD stage 3）的病人"}, "answer": "A", "explanation": "Propofol使用大豆油及卵磷脂（來自蛋）的乳劑配方。對大豆或花生嚴重過敏的病人有交叉過敏的疑慮，需謹慎評估或改用其他藥物。腎功能不全、肥胖、癲癇病人並非絕對禁忌。", "category": "pharmacology", "difficulty": "medium", "source": "114_anesthesia_Q31"}, {"id": 32, "question": "肝癌合併凝血功能異常的病人，在手術中大量出血，除了緊急輸注濃縮紅血球（PRBC）以外，下列輸注處方何者為最優先？", "options": {"A": "冷凍沉澱品（cryoprecipitate）與抗利尿激素（desmopressin，DDAVP）", "B": "抗利尿激素與纖維蛋白濃厚液（fibrinogen concentrate，FC）", "C": "新鮮冷凍血漿（fresh frozen plasma，FFP）與抗利尿激素", "D": "凝血酶原複合物（prothrombin complex concentrate，PCC）與冷凍沉澱品"}, "answer": "D", "explanation": "肝癌合併肝功能不全，凝血因子（II、VII、IX、X）生成不足，首選PCC快速補充凝血因子。若同時存在纖維蛋白原不足（Fbg<1.5g/L），加用cryoprecipitate。FFP量大需時，不如PCC迅速有效。", "category": "hematology", "difficulty": "hard", "source": "114_anesthesia_Q32"}, {"id": 33, "question": "腹腔鏡膽囊切除手術置放trocar後，機械式呼吸10次/分、SpO₂ 99%、心跳106次/分、血壓180/103mmHg、EtCO₂ 45mmHg。有關麻醉照護，下列敘述何者最適當？", "options": {"A": "TOF（train-of-four）有1 count，可以先給予rocuronium 10mg", "B": "調整PEEP為0，增加呼吸次數，I/E ratio 1:1", "C": "根據麻醉深度監測（BIS）數值為40，每2分鐘給予靜脈推注remifentanil 5-10mcg/kg", "D": "根據麻醉深度監測（BIS）數值為70，調整麻醉氣體sevoflurane<0.3MAC"}, "answer": "A", "explanation": "TOF只有1/4代表肌肉鬆弛不完全，腹腔鏡手術需要良好的肌肉鬆弛以利操作，給予額外rocuronium適當。BIS 70偏淺，需增加麻醉深度；BIS 40偏深，應減少而非增加藥物。腹腔鏡手術應維持適當PEEP防止肺塌陷，不應設為0。", "category": "intraoperative_management", "difficulty": "hard", "source": "114_anesthesia_Q33"}, {"id": 34, "question": "有關長期接受血液透析治療病人的術前麻醉評估，下列敘述何者最適當？", "options": {"A": "電解質監測，確認高血鈣與低血磷狀態已矯正", "B": "電解質監測，確認高血鈉與低血鉀狀態已矯正", "C": "長期服用imipramine，會提高心律不整的風險", "D": "長期服用fluoxetine，會提高非典型性尿毒溶血症候群風險"}, "answer": "C", "explanation": "長期透析病人常有各種藥物治療。三環抗憂鬱劑（如imipramine）有抗膽鹼及心臟毒性，加上透析病人本身心血管風險高，確實增加心律不整風險。透析病人電解質問題通常是高鉀、低鈣（非高鈣）、高磷（非低磷）。", "category": "renal", "difficulty": "hard", "source": "114_anesthesia_Q34"}, {"id": 35, "question": "有關甲狀腺全切除術中使用的神經功能監測，下列敘述何者最適當？", "options": {"A": "監測神經為recurrent laryngeal nerve", "B": "監測神經為superior laryngeal nerve", "C": "神經功能監測與術後聲帶水腫相關", "D": "肌肉鬆弛劑的劑量與肌電圖（electromyography）訊號無關"}, "answer": "A", "explanation": "甲狀腺手術術中神經監測（IONM）的目標為保護喉返神經（recurrent laryngeal nerve，RLN），因其損傷會造成聲帶麻痺。監測方式為持續EMG監測聲帶肌（甲杓肌），因此肌肉鬆弛劑會影響EMG訊號，監測時應避免或謹慎使用。", "category": "thyroid_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q35"}, {"id": 36, "question": "病人常規用藥對於術中合併症的影響，下列敘述何者最適當？", "options": {"A": "captopril與嚴重低體溫有關", "B": "furosemide與發生低血鉀有關", "C": "propanolol與發生寡尿有關", "D": "clopidogrel與發生高血鉀有關"}, "answer": "B", "explanation": "Furosemide為排鉀利尿劑，長期使用可造成低血鉀，術中需注意。Captopril（ACE抑制劑）與術中低血壓相關，非低體溫。Propranolol（β阻斷劑）可能掩蓋低血糖症狀，與寡尿無直接關係。Clopidogrel為抗血小板藥，與高血鉀無關。", "category": "pharmacology", "difficulty": "medium", "source": "114_anesthesia_Q36"}, {"id": 37, "question": "有關達文西前列腺全切除手術之照護，下列敘述何者最適當？", "options": {"A": "氣腹中使用的氣體成分，可能引起電燒火花", "B": "頭低腳高姿位，可能增加心臟血流量", "C": "機械手臂的移動，可能引起氣管內徑變小", "D": "氣腹流量增加，可能降低麻醉氣體最小肺泡濃度（MAC）"}, "answer": "B", "explanation": "達文西攝護腺切除術採steep Trendelenburg（頭低腳高）位置，靜脈回流增加，心臟前負荷增加，短期可能增加心輸出量。氣腹使用CO₂，不引起電燒火花。機械手臂移動可能使氣管內管移位（可能進入單支氣管），非內徑縮小。CO₂氣腹可增加PaCO₂，MAC受溫度影響而非氣腹流量。", "category": "robotic_surgery", "difficulty": "hard", "source": "114_anesthesia_Q37"}, {"id": 38, "question": "病人接受甲狀腺全切除手術前的胸腔X光片如圖(五)，下列敘述何者最適當？", "options": {"A": "氣管位置向右偏移", "B": "氣管與甲狀腺間有沾黏", "C": "氣管與血管間有廔管", "D": "氣管發育不全"}, "answer": "A", "explanation": "圖示右側標記顯示氣管向右偏移（圖中標示「右」），表示左側有腫塊（甲狀腺腫大或其他佔位病變）壓迫氣管向右偏移。此資訊對麻醉師評估插管難度、選擇插管器具有重要意義。", "category": "thyroid_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q38", "image": "114_anesthesia_Q38.png", "image_caption": "甲狀腺全切除術前胸部 X 光（圖五）"}, {"id": 39, "question": "有關70公斤成人執行腹腔鏡切除術的多模式止痛，下列敘述何者最不適當？", "options": {"A": "術中靜脈滴注remifentanil 0.1mcg/kg/mL", "B": "靜脈注射Dynastat® 40mg", "C": "口服給予acetaminophen 500mg", "D": "靜脈注射Naldebain® 150mg"}, "answer": "D", "explanation": "Naldebain®（dinalbuphine sebacate）為長效型皮下注射劑型（非靜脈注射），正確使用方式為術前或術後皮下注射，劑量通常為150mg（皮下）。靜脈注射給藥方式不適當，可能引起嚴重副作用。", "category": "pain_management", "difficulty": "hard", "source": "114_anesthesia_Q39"}, {"id": 40, "question": "有關severe aortic stenosis的麻醉照護，下列敘述何者錯誤？", "options": {"A": "可能有heart failure、angina及syncope等症狀", "B": "術中應降低systemic vascular resistance", "C": "術中應維持normal sinus rhythm", "D": "低血壓時可考慮給予norepinephrine"}, "answer": "B", "explanation": "嚴重主動脈瓣狹窄的麻醉原則：維持較高的SVR（降低SVR會使主動脈瓣前後壓差更不利、加重低血壓）、維持竇性心律（避免心房顫動）、維持前負荷、避免心跳過快。低血壓時可用norepinephrine維持SVR。", "category": "cardiac_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q40"}, {"id": 41, "question": "執行單肺通氣時，血氧自99%下降至85%，下列處理方式何者最不適當？", "options": {"A": "將FiO₂調高為1.0", "B": "建議外科醫師夾閉肺靜脈以減少shunt", "C": "使用fiberoptic bronchoscope檢查double lumen tube的位置", "D": "在ventilated lung使用recruitment maneuvers以改善肺塌陷"}, "answer": "B", "explanation": "單肺通氣低血氧的處置：先確認DLT位置（bronchoscope）、提高FiO₂、CPAP於非通氣肺、recruitment maneuver於通氣肺。夾閉肺靜脈是胸腔外科手術的切除步驟，不是改善低血氧的正確處置，且夾閉肺靜脈會增加肺動脈壓，可能惡化情況。", "category": "thoracic_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q41"}, {"id": 42, "question": "下列何者無法抑制hypoxic pulmonary vasoconstriction？", "options": {"A": "calcium channel blocker", "B": "beta blocker", "C": "nitroglycerin", "D": "milrinone"}, "answer": "B", "explanation": "低氧性肺血管收縮（HPV）是肺臟將血流導離低氧區域的保護機制，可被多種血管擴張劑抑制。能抑制HPV的藥物：calcium channel blocker、nitroglycerin（硝酸鹽類）、milrinone（PDE III抑制劑）。Beta blocker主要作用於腎上腺素受體，對HPV影響極小，無法抑制HPV。", "category": "thoracic_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q42"}, {"id": 43, "question": "有關眼心反射（oculocardiac reflex，OCR）的發生原因與處置，下列敘述何者錯誤？", "options": {"A": "應先立即停止手術刺激", "B": "可能需要使用atropine治療", "C": "反射路徑由迷走神經傳入、三叉神經傳出", "D": "球後神經阻斷（retrobulbar block），可能導致OCR發生"}, "answer": "C", "explanation": "眼心反射的傳入路徑為三叉神經（第五對顱神經，眼支），傳出路徑為迷走神經（心臟抑制）。因此(C)描述相反，應為「三叉神經傳入、迷走神經傳出」。球後阻斷可減少OCR，但注射本身刺激也可能誘發OCR。", "category": "ophthalmology", "difficulty": "hard", "source": "114_anesthesia_Q43"}, {"id": 44, "question": "下列有關甲狀腺風暴（thyroid storm）的敘述何者錯誤？", "options": {"A": "可能由嚴重感染、分娩、手術所誘發", "B": "一旦發生，其死亡率可達80%以上", "C": "常發生於手術後6-24小時之間", "D": "治療甲狀腺亢進藥物如propylthiouracil，術前不需停藥"}, "answer": "B", "explanation": "現代醫療下甲狀腺風暴的死亡率約10-30%，並非80%以上（此為早期未治療的歷史數據）。甲狀腺風暴確實可由感染、手術、分娩誘發，術後6-24小時為高風險期，PTU術前應持續使用（不需停藥）。", "category": "endocrine", "difficulty": "medium", "source": "114_anesthesia_Q44"}, {"id": 45, "question": "有關法洛氏四重症（tetralogy of Fallot）的特徵，下列敘述何者錯誤？", "options": {"A": "為發紺型先天性心臟病", "B": "常有心室中膈缺損異常", "C": "常有肺動脈狹窄", "D": "常有左心室出口狹窄"}, "answer": "D", "explanation": "法洛氏四重症（TOF）的四個特徵：①右心室出口狹窄（肺動脈狹窄）、②心室中膈缺損（VSD）、③主動脈騎跨（aorta overriding）、④右心室肥厚。是「右心室出口狹窄」而非左心室出口狹窄。", "category": "pediatric_cardiac", "difficulty": "medium", "source": "114_anesthesia_Q45"}, {"id": 46, "question": "有關左管雙腔氣管內管（double lumen endotracheal tube）的臨床使用，下列敘述何者錯誤？", "options": {"A": "插管後先打飽氣管端氣囊", "B": "讓支氣管氣囊上緣剛好在氣管隆凸", "C": "氣管端有1個開口、支氣管端有2個開口", "D": "遇困難插管可考慮一般氣管內管與支氣管閉鎖導管（bronchial blocker）"}, "answer": "C", "explanation": "左側雙腔管：氣管端（tracheal lumen）有多個開口，支氣管端（bronchial lumen）只有1個開口（開口朝向左主支氣管）。因此(C)描述相反。插管後先充氣的是氣管端氣囊，再充氣支氣管端氣囊並確認位置。", "category": "thoracic_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q46"}, {"id": 47, "question": "有關post-tonsillectomy bleeding的臨床症狀與照護，下列敘述何者最不適當？", "options": {"A": "可能有躁動、心跳快、低血壓的臨床表現", "B": "出血情形通常發生在術後2週之後", "C": "病人小於3歲，通常建議常規住院觀察", "D": "若需再次手術，則建議執行rapid sequence intubation"}, "answer": "B", "explanation": "扁桃腺切除後出血的高峰期：一次出血為術後24小時內（原發性），二次出血為術後5-10天（繼發性，傷口癒合期），並非「2週之後」。病史小於3歲需住院觀察。再次手術因胃部可能有血液，需RSI。", "category": "ent_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q47"}, {"id": 48, "question": "手術病人有使用植入式心臟復律去顫器（implantable cardioverter defibrillator，ICD），下列敘述何者錯誤？", "options": {"A": "單極電燒比雙極電燒更容易引起電磁干擾", "B": "需連絡廠商調整去顫器，並將經皮去顫器貼上", "C": "連續心電圖與動脈壓波形是重要的監測", "D": "使用磁鐵調整去顫器設定，移除後都會恢復去顫設定"}, "answer": "D", "explanation": "磁鐵放置在ICD上可暫時關閉去顫功能，但不同廠牌的反應不同：部分品牌移除磁鐵後可自動恢復，但並非「所有」都如此，部分需要重新程式設定。因此「都會恢復」是錯誤的說法。術前應聯絡廠商確認設定。", "category": "cardiac_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q48"}, {"id": 49, "question": "有關體外循環（cardiopulmonary bypass，CPB）之麻醉處置，下列敘述何者錯誤？", "options": {"A": "CPB低溫可能導致神經肌肉阻斷增強", "B": "CPB靜脈管置入時期降低潮氣量通氣可減少肺擴張遮蔽手術視野", "C": "protamine靜脈推注（IV push）能迅速恢復凝血功能，提早脫離CPB", "D": "protamine可能引起肺動脈高壓，需嚴密監測生命徵象及心收縮功能"}, "answer": "C", "explanation": "Protamine用於中和heparin，恢復凝血功能，是脫離CPB後給予，而非「提早脫離CPB」用。Protamine應緩慢給予（非IV push）以減少副作用（低血壓、肺動脈高壓）。低溫確實可增強肌肉鬆弛劑效果。", "category": "cardiac_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q49"}, {"id": 50, "question": "出生5周的幼兒，因幽門狹窄預計接受幽門環肌切開術，下列敘述何者錯誤？", "options": {"A": "餵母乳禁食時間為4小時", "B": "應注意代謝性鹼中毒和脫水", "C": "麻醉前使用口胃管排空胃", "D": "建議使用有氣囊的氣管內管"}, "answer": "A", "explanation": "幽門狹窄的嬰兒因長期嘔吐應視為「飽胃」，與一般禁食時間規則無關——標準母乳禁食4小時的NPO規定不適用，必須以快速誘導(RSI)處理。(A)是錯誤敘述。(B)正確：典型表現為低氯、低鉀代謝性鹼中毒與脫水，須先矯正。(C)正確：誘導前以口胃管減壓排空胃內容物。(D)依現代麻醉觀念（含Microcuff低壓氣囊管），新生兒/嬰兒亦可使用有氣囊管，並非錯誤敘述。", "category": "pediatric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q50"}, {"id": 51, "question": "有關剖腹產術後加速康復的照護，下列敘述何者錯誤？", "options": {"A": "術前禁食應8小時，以避免術後嘔吐", "B": "給予適當平衡性晶體溶液，維持等體液容積", "C": "預防手術中低體溫，可使用主動式充氣保溫裝置", "D": "術後血管栓塞預防，可使用下肢間歇性充氣加壓襪"}, "answer": "A", "explanation": "剖腹產ERAS建議：允許術前2小時飲用清澈液體（非禁食8小時）；術前碳水化合物飲料可減少術後噁心嘔吐。其他選項均為ERAS建議的組成要素。過長禁食反而對產婦不利。", "category": "obstetric_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q51"}, {"id": 52, "question": "體重12公斤的兒童接受輸尿管重建手術（ureteral reimplantation），術前禁食已給予足夠靜脈輸液，從麻醉開始到手術1小時，出血量極少，此時應給予多少輸液（maintenance + replacement of ongoing losses）？", "options": {"A": "44mL", "B": "50mL", "C": "70mL", "D": "110mL"}, "answer": "C", "explanation": "12公斤兒童每小時輸液 = maintenance + 第三間隙喪失。Maintenance（4-2-1法則）：4×10+2×2 = 44 mL/hr。輸尿管重建為中度腹腔手術，第三間隙喪失約2-3 mL/kg/hr，12 kg × ~2.2 mL/kg/hr ≈ 26 mL/hr。合計 44 + 26 ≈ 70 mL。出血量極少不需另補。故答案為(C)。題幹中(A)44 mL僅計入maintenance，遺漏第三間隙喪失。", "category": "pediatric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q52"}, {"id": 53, "question": "有關子癇前症合併使用MgSO₄之麻醉處置，下列敘述何者錯誤？", "options": {"A": "MgSO₄如果停藥可能增加術後癲癇機會", "B": "MgSO₄會延長rocuronium的持續時間", "C": "使用TOF可較精準確定肌肉鬆弛劑使用量", "D": "使用succinylcholine時，需要因MgSO₄減量"}, "answer": "D", "explanation": "MgSO₄與非去極化肌鬆劑（如rocuronium）有協同作用，使其作用延長，所以需減量。但對succinylcholine（去極化肌鬆劑）的效果：MgSO₄可能延長succinylcholine作用（非縮短），因此臨床上succinylcholine劑量不需因MgSO₄而減量，反而要注意延長效果。題目說「需要減量」是錯誤的說法。", "category": "obstetric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q53"}, {"id": 54, "question": "有關產後大出血之麻醉處置，下列敘述何者錯誤？", "options": {"A": "如預期子宮頸或陰道撕裂傷需要T10脊髓阻斷；如預期子宮手術則需要T4阻斷", "B": "因為輸液可能造成氣道水腫惡化，應準備短柄喉鏡與小號的氣管內管", "C": "如果出血原因為子宮收縮無力，可以給予MgSO₄幫助收縮", "D": "使用血栓彈力圖（TEG®）或旋轉血栓彈力圖（ROTEM®），有助於輸血治療"}, "answer": "C", "explanation": "MgSO₄為子宮鬆弛劑（tocolytic），會抑制子宮收縮，絕對不能用於子宮收縮無力（uterine atony）的治療，反而會加重出血。子宮收縮無力應使用oxytocin、ergometrine、misoprostol、carboprost等促宮縮藥物。", "category": "obstetric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q54"}, {"id": 55, "question": "有關硬脊膜穿刺後頭痛（PDPH）的照護，下列敘述何者錯誤？", "options": {"A": "危險因子包括女性、懷孕、多次硬膜穿刺以及曾有頭痛病史", "B": "仍應考慮原發性頭痛、子癇前症、哺乳期頭痛等鑑別診斷", "C": "意外穿刺後立刻預防性施打硬腦膜外血液補片，可大幅降低PDPH發生率", "D": "使用鉛筆尖脊椎針如Whitacre針和Sprotte針與較小的針頭發生機會較低"}, "answer": "C", "explanation": "預防性硬膜外血液補片（prophylactic blood patch）在意外硬膜穿刺後「立刻」給予效果不如等待症狀發生後再給。目前證據不支持常規立即預防性血液補片可大幅降低PDPH發生率；治療性血液補片（symptoms已出現後）才有較好的效果。", "category": "obstetric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q55"}, {"id": 56, "question": "有關無法配合且無靜脈導管的特殊需求牙科病人照護，下列處置何者最不適當？", "options": {"A": "intranasal midazolam", "B": "intramuscular ketamine", "C": "inhalation nitrous oxide", "D": "intramuscular pentobarbital"}, "answer": "D", "explanation": "無法配合且無靜脈通路的牙科病人（如智能障礙兒童），可選擇：鼻內midazolam（快速吸收、抗焦慮）、肌肉注射ketamine（可靠鎮靜）、吸入笑氣（安全、無創）。Pentobarbital為巴比妥類，肌肉注射安全性差、作用不可預期、恢復慢，不適合門診牙科使用。", "category": "dental_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q56"}, {"id": 57, "question": "出生4周的幼兒接受PDA ligation，下列敘述何者正確？", "options": {"A": "為了足夠的氧氣供應，最好把FiO₂調高到1.0", "B": "給予Prostaglandin E1可以關閉PDA", "C": "非侵入式血壓計或動脈導管盡量都在右手", "D": "可使用fentanyl和cisatracurium進行麻醉"}, "answer": "D", "explanation": "PDA ligation麻醉：fentanyl（高劑量opioid）+ cisatracurium（非去極化肌鬆劑）是可行的組合。高FiO₂對早產兒有視網膜病變風險，不應常規調至1.0。Prostaglandin E1維持PDA開放（非關閉），用於某些先天心臟病；Indomethacin/ibuprofen才能促進PDA關閉。右手血壓計監測導管前血壓（pre-ductal），應放右手（非改為左手）；但此題選項說「都在右手」（血壓計和動脈導管）邏輯正確。", "category": "pediatric_cardiac", "difficulty": "hard", "source": "114_anesthesia_Q57"}, {"id": 58, "question": "有關兒童氣道的解剖和生理特徵，下列敘述何者錯誤？", "options": {"A": "扁桃體和腺樣體肥大，可能阻塞上呼吸道", "B": "聲門最狹窄，經常需要比較細的氣管內管", "C": "長且軟的Ω型會厭，容易阻礙聲門視野", "D": "枕骨比較突出，仰臥時會導致呼吸道阻塞"}, "answer": "B", "explanation": "傳統觀點認為嬰兒氣道最狹窄處在環狀軟骨（cricoid cartilage）。現代研究顯示聲門下（subglottis）為最窄處，但並非「聲門」本身。更重要的是，此概念影響ETT選擇，應選擇有適當漏氣的管子。嬰兒枕骨突出確實使頭部屈曲，仰臥時可能阻塞氣道，需墊高肩膀。", "category": "pediatric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q58"}, {"id": 59, "question": "有關carbetocin（Duratocin®）的臨床使用，下列敘述何者錯誤？", "options": {"A": "只能靜脈注射，以超過1分鐘的速度，慢慢施打", "B": "相較於oxytocin，carbetocin維持時間較短", "C": "2小時內如子宮持續收縮不良，不應重複給予", "D": "如有子癇前症時要監測血壓的變化"}, "answer": "B", "explanation": "Carbetocin（Duratocin）為長效合成oxytocin類似物，作用時間顯著長於oxytocin（半衰期約40分鐘，vs oxytocin僅數分鐘），是其主要優點。因此「維持時間較短」是錯誤說法，應為「維持時間較長」。", "category": "obstetric_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q59"}, {"id": 60, "question": "懷孕36週孕婦因頭痛、上腹痛與噁心入院，住院血壓160/110mmHg、心跳80次/分，檢查數值：血紅素9.1g/dL，且血液抹片出現溶血、血小板68000/μL、AST 210U/L、ALT 220U/L、LDH 740U/L、24小時尿蛋白2+。下列何者為最可能的診斷？", "options": {"A": "急性脂肪肝", "B": "妊娠高血壓", "C": "HELLP syndrome", "D": "胰臟炎"}, "answer": "C", "explanation": "HELLP syndrome診斷標準：Hemolysis（溶血：血液抹片異常、LDH升高）+ Elevated Liver enzymes（AST/ALT升高）+ Low Platelets（血小板<100,000/μL）。本案例完全符合，且合併子癇前症（血壓>160/110、蛋白尿）。", "category": "obstetric_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q60"}, {"id": 61, "question": "一位8歲兒童，診斷為Duchenne肌肉營養不良症（DMD），術前心電圖顯示有輕微左心室肥厚，肌酸激酶（CK）顯著上升。有關麻醉的處置，下列敘述何者最適當？", "options": {"A": "採用全靜脈麻醉並避免使用吸入性麻醉劑", "B": "不需要1年內的心臟超音波與肺功能檢查報告", "C": "可使用succinylcholine做為快速氣管插管的肌肉鬆弛劑", "D": "主要是阻塞性通氣障礙，麻醉時降低呼吸頻率防止氣體滯留"}, "answer": "A", "explanation": "DMD禁用succinylcholine（可能引起高血鉀性心跳停止）及吸入性麻醉劑（可能誘發橫紋肌溶解症）。應採用TIVA。術前需要心臟超音波和肺功能評估（因心肌病變和限制性通氣障礙）。DMD主要是限制性通氣障礙，非阻塞性。", "category": "neuromuscular_disease", "difficulty": "hard", "source": "114_anesthesia_Q61"}, {"id": 62, "question": "有關老化對於呼吸系統的影響與改變，下列敘述何者正確？", "options": {"A": "閉合容量（closing capacity）下降", "B": "總肺容量（total lung capacity）不變", "C": "功能肺餘容量（functional residual capacity）下降", "D": "呼氣儲備容積（expiratory reserve volume）增加"}, "answer": "B", "explanation": "老化對呼吸系統的影響：總肺容量（TLC）基本不變；閉合容量（CC）隨年齡增加；FRC輕微增加（胸壁彈力減少所致）；ERV減少（腹部脂肪增加、膈肌功能下降）。因此(B)總肺容量不變是正確的。", "category": "geriatric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q62"}, {"id": 63, "question": "有關老年人的生理變化，下列敘述何者正確？", "options": {"A": "左心室後負荷增加", "B": "腦血流量增加", "C": "肺順應力減少且胸壁順應力增加", "D": "腎絲球過濾率增加"}, "answer": "A", "explanation": "老年人生理變化：主動脈硬化→左心室後負荷增加（正確）；腦血管硬化、腦萎縮→腦血流量下降；肺順應力增加（肺氣腫樣變化）、胸壁順應力減少（胸壁鈣化僵硬）；GFR隨年齡下降（約每10年降低1%）。", "category": "geriatric_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q63"}, {"id": 64, "question": "老年病人通常服用多種藥物，麻醉中容易導致藥物交互作用，下列敘述何者正確？", "options": {"A": "β受體阻斷劑增加麻醉藥物需求", "B": "長期使用酒精會降低麻醉藥物需求", "C": "三環抗憂鬱藥物具有抗膽鹼性作用", "D": "抗心律不整藥物降低神經肌肉阻斷作用"}, "answer": "C", "explanation": "三環抗憂鬱劑（TCA，如amitriptyline）具有強烈抗膽鹼（anticholinergic）效應，可能引起術後譫妄、尿瀦留等。β阻斷劑可降低MAC（非增加）。長期酒精使用者對麻醉藥物有交叉耐受性，需求通常增加。抗心律不整藥物（如quinidine、procainamide）可增強神經肌肉阻斷作用（非降低）。", "category": "geriatric_anesthesia", "difficulty": "medium", "source": "114_anesthesia_Q64"}, {"id": 65, "question": "有關肥胖病人麻醉中呼吸器設定的建議，下列敘述何者正確？", "options": {"A": "使用肺保護性通氣策略容易導致肺擴張不全", "B": "將潮氣量（TV）設定為6至8mL×實際總體重（TBW）", "C": "可予呼氣末正壓（PEEP）≥5cm H₂O以防止肺泡塌陷", "D": "recruitment maneuvers可改善低血壓及低血氧情形"}, "answer": "C", "explanation": "肥胖病人呼吸器建議：PEEP≥5（甚至更高）以防止肺泡塌陷（正確）；TV應依理想體重（IBW）計算6-8mL/kg（非TBW，否則TV過大）；肺保護策略有助預防肺損傷（非導致肺不張）；recruitment maneuvers可改善低血氧，但可能引起血壓下降（非改善低血壓）。", "category": "obesity_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q65"}, {"id": 66, "question": "有關肥胖病人進行手術，姿勢擺位對其呼吸系統的影響，下列敘述何者正確？", "options": {"A": "截石位會使腹腔內容物移向膈肌，減少肺容量導致通氣不足", "B": "側臥可減輕腹部對橫膈膜的重量，並降低咽部氣道的直徑", "C": "肥胖病人在全身麻醉時，採取俯臥位降低功能性肺餘容積（FRC）", "D": "頭低腳高可減輕胸壁和膈肌的壓力，改善肥胖病人的呼吸功能"}, "answer": "A", "explanation": "截石位時腿部抬高，腹腔內容物向頭側推移，壓迫膈肌，減少FRC、肺容量，可能導致通氣不足（正確）。俯臥位可改善FRC（非降低）。側臥可改善依側肺通氣血流比，但對咽部氣道的影響非「降低直徑」。頭低腳高（Trendelenburg）使腹腔臟器壓迫膈肌，惡化呼吸功能（非改善）。", "category": "obesity_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q66"}, {"id": 67, "question": "有關術後加速康復療程的麻醉照護，下列敘述何者錯誤？", "options": {"A": "使用短效麻醉藥及止痛藥", "B": "建議使用長效神經肌肉阻斷劑（NMBA）", "C": "採用精準水分控制（zero-balance）維持血液容積正常", "D": "減少鴉片類藥物總劑量"}, "answer": "B", "explanation": "ERAS（Enhanced Recovery After Surgery）原則：使用短效麻醉藥、短效肌鬆劑（非長效，以利術後快速恢復）、精準輸液管理、多模式止痛減少opioid用量、避免長效藥物延遲恢復。", "category": "eras", "difficulty": "easy", "source": "114_anesthesia_Q67"}, {"id": 68, "question": "有關手術病人的感染管制，下列敘述何者錯誤？", "options": {"A": "手術前60分鐘內給予抗生素，才能達到適當的血液及組織濃度", "B": "cefazolin是手術期間最常見抗生素，僅能預防革蘭氏陽性菌", "C": "病人嗜中性白血球<500μL，應延遲常規手術", "D": "若因抗生素過敏引起休克反應，應立即停藥"}, "answer": "B", "explanation": "Cefazolin（第一代頭孢菌素）的抗菌範圍包括大多數革蘭氏陽性菌及部分革蘭氏陰性菌（如大腸桿菌、克雷伯氏菌）。說「僅能預防革蘭氏陽性菌」不正確，其對部分陰性菌也有效，這也是它作為手術預防抗生素的優點。", "category": "infection_control", "difficulty": "medium", "source": "114_anesthesia_Q68"}, {"id": 69, "question": "一位2歲兒童進行常規疝氣修補手術，依據美國麻醉醫學會（American society of anesthesiologists）禁食指南，下列敘述何者正確？", "options": {"A": "固體食物8小時，清澈液體4小時", "B": "配方牛奶6小時，清澈液體2小時", "C": "母奶4小時，清澈液體4小時", "D": "母奶6小時，清澈液體2小時"}, "answer": "B", "explanation": "依ASA最新禁食指引：清澈液體2小時、母乳4小時、配方奶/非人乳6小時、輕食6小時、油膩或固體食物8小時。逐項檢視：(A)清液應為2小時、非4小時；(C)清液應為2小時、非4小時；(D)母乳應為4小時、非6小時；只有(B)「配方奶6小時、清液2小時」完全符合指引，故答案為(B)。", "category": "pediatric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q69"}, {"id": 70, "question": "腹膜炎病人明顯嗜睡、血壓85/55 mmHg、心跳140次/分、SpO₂ 92%、體溫39.2℃，禁食時間不足4小時，下列敘述何者錯誤？", "options": {"A": "應考慮septic shock，systemic vascular resistance偏低", "B": "可考慮使用etomidate進行rapid sequence intubation", "C": "給予足夠的輸液，並考慮使用升壓劑，以維持平均動脈壓", "D": "升壓劑首選dopamine以增加內臟血流、減少腸壞死機率"}, "answer": "D", "explanation": "敗血性休克的第一線升壓劑為norepinephrine，非dopamine。Dopamine因心律不整副作用較多、且研究顯示死亡率無優於norepinephrine，現已不再是首選。Etomidate適合血流動力學不穩定的快速誘導，是正確選擇。", "category": "critical_care", "difficulty": "medium", "source": "114_anesthesia_Q70"}, {"id": 71, "question": "體重100公斤病人，麻醉誘導時給予rocuronium 80mg，面罩通氣困難，使用傳統喉頭鏡插管失敗後，下列處置何者錯誤？", "options": {"A": "求救，並尋找影像輔助插管", "B": "置放laryngeal mask airway（LMA）", "C": "置放oral airway/nasal airway，再次嘗試扣mask", "D": "盡快給予sugammadex 200mg，恢復病人自呼的力氣"}, "answer": "D", "explanation": "Rocuronium 80mg（0.8mg/kg於100kg病人）是一般插管劑量。Sugammadex的逆轉劑量：一般逆轉2mg/kg=200mg，深層阻斷逆轉需16mg/kg=1600mg。在CICO（cannot intubate, cannot oxygenate）情況下，應優先建立緊急氣道（如LMA、外科氣道），200mg的sugammadex不足以快速逆轉深層阻斷，且等待逆轉需時間，延誤處置。", "category": "airway_management", "difficulty": "hard", "source": "114_anesthesia_Q71"}, {"id": 72, "question": "足月剖腹產婦接受硬脊膜外麻醉，累積給予bupivacaine 200mg，5分鐘後抱怨耳鳴、看不清楚、癲癇發作、ventricular fibrillation（VF），下列處置何者錯誤？", "options": {"A": "CPR時應把子宮推向左側以避免壓迫下腔靜脈", "B": "如果沒有amiodarone，可用lidocaine治療VF", "C": "使用雙向120-200焦耳進行電擊器去顫", "D": "盡速給予20% lipid emulsion（脂肪乳劑）"}, "answer": "B", "explanation": "局部麻醉藥全身毒性（LAST）導致的VF：治療包括CPR、子宮左移、立即給予20% lipid emulsion。Lidocaine本身也是局部麻醉藥，在bupivacaine中毒的情況下禁用（會加重毒性），即使沒有amiodarone也不能用lidocaine治療。Amiodarone是LAST的抗心律不整首選。", "category": "obstetric_anesthesia", "difficulty": "hard", "source": "114_anesthesia_Q72"}, {"id": 73, "question": "有關術中擺位的注意事項，下列敘述何者錯誤？", "options": {"A": "正躺時雙手需將掌心轉向朝地面，避免尺神經受損", "B": "側躺時，腋下墊應與腋下間隔一段空間，避免臂神經受損", "C": "泌尿碎石手術的截石位，應避免壓迫腓骨頭造成腓神經受損", "D": "趴臥的腰椎手術時，雙手外展不能超過90度，避免臂神經受損"}, "answer": "A", "explanation": "正躺（仰臥）時，上肢保護姿勢應為掌心朝上（supination）或中立位，避免尺神經受壓。掌心朝下（pronation）反而可能增加尺神經在肘部的壓力。(A)說「掌心轉向朝地面」是錯誤的，應朝上或中立位。", "category": "positioning", "difficulty": "hard", "source": "114_anesthesia_Q73"}, {"id": 74, "question": "有關laryngospasm的緊急處理，下列敘述何者錯誤？", "options": {"A": "以下顎推舉法（jaw thrust），給予持續正壓呼吸", "B": "虛弱的老年人更容易因laryngospasm產生負壓性肺水腫", "C": "給予小劑量propofol或succinylcholine以緩解肌肉痙攣", "D": "拔管前看不出臨床症狀，都是拔管後才會發現"}, "answer": "B", "explanation": "負壓性肺水腫（negative pressure pulmonary edema）在laryngospasm後最常見於年輕、肌肉強壯的病人，因其試圖用力吸氣對抗阻塞，產生強大的負壓。虛弱的老年人呼吸力量不足，反而較少產生嚴重負壓性肺水腫。", "category": "airway_management", "difficulty": "hard", "source": "114_anesthesia_Q74"}, {"id": 75, "question": "下列何者不屬於重大創傷的致命三角（lethal triad）？", "options": {"A": "低體溫", "B": "低血氧", "C": "代謝性酸中毒", "D": "凝血功能異常"}, "answer": "B", "explanation": "創傷的致命三角（lethal triad of trauma）：①低體溫（hypothermia）、②代謝性酸中毒（acidosis）、③凝血功能異常（coagulopathy）。低血氧（hypoxia）雖是創傷重要問題，但不是傳統致命三角的組成要素。", "category": "trauma", "difficulty": "easy", "source": "114_anesthesia_Q75"}, {"id": 76, "question": "有關燒燙傷的麻醉照護，下列敘述何者錯誤？", "options": {"A": "嚴重燒燙傷的48小時以內，禁用succinylcholine，以免產生致命性高血鉀", "B": "嚴重燒燙傷定義是2度或3度燒傷範圍超過全身體表面積（TBSA）的20%以上", "C": "根據Parkland formula：成人燒傷的點滴建議在24小時內給予4mL/kg/%TBSA", "D": "輸液偏好使用balanced crystalloid，而不是normal saline或colloid"}, "answer": "A", "explanation": "嚴重燒傷（>24小時後，最長至2年）禁用succinylcholine，因為大量上調的乙醯膽鹼受體去極化後會釋放大量鉀離子。燒傷後「48小時內」反而是相對安全的時機（受體還未大量上調）。此後數天至數月才是高危期。(A)說「48小時內禁用」時機描述錯誤。", "category": "trauma", "difficulty": "hard", "source": "114_anesthesia_Q76"}, {"id": 77, "question": "有關惡性高熱（malignant hyperthermia）的特徵與處置，下列敘述何者錯誤？", "options": {"A": "誘發因子有：succinylcholine、所有吸入性麻醉藥（包含笑氣N₂O）", "B": "最早出現的症狀是：心跳加快、肌肉僵硬、EtCO₂上升", "C": "體溫上升，接著高血鉀、代謝性酸中毒，最後引發器官衰竭", "D": "dantrolene為粉末狀，需用無菌蒸餾水（distilled water）配製"}, "answer": "A", "explanation": "惡性高熱的誘發因子：succinylcholine及揮發性吸入麻醉劑（halothane、sevoflurane、isoflurane等）。笑氣（N₂O）不是MH的誘發因子，是相對安全的藥物。因此(A)「包含笑氣」是錯誤的。", "category": "malignant_hyperthermia", "difficulty": "medium", "source": "114_anesthesia_Q77"}, {"id": 78, "question": "有關術後噁心嘔吐（PONV）的發生機率，下列敘述何者錯誤？", "options": {"A": "年輕人>老年人", "B": "男性>女性", "C": "不抽菸>抽菸", "D": "sevoflurane>propofol"}, "answer": "B", "explanation": "PONV的Apfel風險評分因子：女性（非男性）、不抽菸、PONV或動暈症病史、術後opioid使用。年齡越小（年輕）風險越高；不抽菸者風險高於抽菸者；吸入性麻醉劑（sevoflurane等）比propofol（TIVA）PONV發生率高。因此(B)男性>女性是錯誤的，應為女性>男性。", "category": "ponv", "difficulty": "easy", "source": "114_anesthesia_Q78"}, {"id": 79, "question": "肝臟移植手術進入新肝期再灌流（reperfusion）時，較不會出現下列何者現象？", "options": {"A": "腹腔器官血液大量回流，造成肺水腫", "B": "器官保存液和再灌流，造成高血鉀", "C": "冰冷保存後再灌流，造成低體溫", "D": "代謝廢物累積回流，造成酸中毒"}, "answer": "A", "explanation": "新肝期再灌流（reperfusion syndrome）常見現象：高血鉀（器官保存液含高鉀）、低體溫（冷藏器官）、代謝性酸中毒（代謝廢物回流）、低血壓、心律不整。肺水腫並非典型的再灌流期直接現象（大量血液回流主要造成血流動力學變化，而非立即肺水腫）。", "category": "liver_transplant", "difficulty": "hard", "source": "114_anesthesia_Q79"}, {"id": 80, "question": "有關腦死的病人進行器官捐贈，下列敘述何者錯誤？", "options": {"A": "術中輕度低體溫（34-35°C）也是可接受的範圍", "B": "類固醇可減少捐贈的器官發炎反應、改善肺功能", "C": "如有捐腎，應避免使用Voluven®（hydroxyethyl starch，HES）", "D": "腦死病人應補充含糖溶液，血糖在250mg/dL以內是可接受的"}, "answer": "D", "explanation": "腦死器官捐贈的血糖目標：維持正常血糖（140-180mg/dL），高血糖（>180mg/dL）對器官有害，250mg/dL是過高的目標。腦死病人常見血糖失調，需積極控制。輕度低體溫（34-35°C）在某些捐贈協議中可接受。類固醇確實可改善肺功能、減少發炎。HES可能造成腎臟損傷，捐腎時應避免。", "category": "organ_donation", "difficulty": "hard", "source": "114_anesthesia_Q80"}]};
const DATA_114_GENERAL  = {"meta": {"year": 114, "role": "nurse", "subject": "general", "subject_name": "專科護理通論", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "對於專科護理師職責之敘述，下列何者錯誤？", "options": {"A": "協調擬定內外科病人住院相關檢查與治療計畫", "B": "協助安寧緩和病人的家屬面對失落與哀傷歷程", "C": "開立安養機構病人的治療計畫與用藥醫囑", "D": "提供個人、家庭或團體在社區心理衛生照護"}, "answer": "C", "explanation": "專科護理師依法在醫師監督下執行醫療業務，無法獨立開立安養機構病人的治療計畫與用藥醫囑，此屬醫師職責範疇。", "category": "ethics_law", "difficulty": "medium", "source": "114_general_Q1"}, {"id": 2, "question": "依據衛生福利部對「專科護理師」的角色定位，下列何者最適當？", "options": {"A": "接受完整訓練後，可獨立執行醫療業務", "B": "與醫師共同提供連續性護理與醫療照護", "C": "實質工作內容主要在取代住院醫師角色", "D": "核心目標是成為醫療輔助性專業人力"}, "answer": "B", "explanation": "衛福部定位專科護理師為與醫師協同合作，提供連續性、全人的護理與醫療照護，並非取代醫師或純粹輔助角色，也非獨立執業。", "category": "ethics_law", "difficulty": "easy", "source": "114_general_Q2"}, {"id": 3, "question": "目前處於資訊科技主導之際，護理專業對「聰明工作」的描述，下列何者錯誤？", "options": {"A": "所有措施皆具理論或實證依據", "B": "追求高品質且省時之護理成效", "C": "包含護理行政與技術層面創新", "D": "以人工智慧作為照顧決策核心"}, "answer": "D", "explanation": "「聰明工作」強調以實證為基礎、效率與品質並重、善用科技工具，但照護決策核心應為以人為本的專業判斷，而非以AI取代臨床決策。", "category": "professional_development", "difficulty": "easy", "source": "114_general_Q3"}, {"id": 4, "question": "下列何者較不屬於臨床照護實證護理知識之應用？", "options": {"A": "臨床照護指引（clinical practice guidelines，CPG）", "B": "醫病共享決策（shared decision-making，SDM）", "C": "臨床路徑（clinical pathway）", "D": "護理資訊系統（nursing information system，NIS）"}, "answer": "D", "explanation": "護理資訊系統（NIS）屬於資訊管理工具，雖然可以輔助護理工作，但主要功能是資料收集與管理，並非直接應用實證護理知識的媒介。CPG、SDM、臨床路徑都是實證知識應用的具體形式。", "category": "evidence_based_practice", "difficulty": "medium", "source": "114_general_Q4"}, {"id": 5, "question": "專科護理師執行溝通協調之原則，下列敘述何者最不適當？", "options": {"A": "有效的溝通可促進跨專業團隊間訊息的傳達與共享", "B": "運用安撫技巧雖能減輕衝突情緒，但難以解決根本問題", "C": "面對不想解決的警覺性衝突，擴大衝突點是必要方式", "D": "協力合作（collaboration）是一種正向的合作途徑"}, "answer": "C", "explanation": "面對衝突，應尋求解決方案而非擴大衝突點。擴大衝突只會使情況惡化，無助於問題解決。正確的衝突管理策略包括協商、調解、協力合作等。", "category": "communication", "difficulty": "medium", "source": "114_general_Q5"}, {"id": 6, "question": "有關「善用沉默」的治療性溝通技巧，下列敘述何者最不適當？", "options": {"A": "沉默時雖沒有語言內容，卻有非語言訊息在進行", "B": "不想說話時可以沉默溝通方式來進行", "C": "可應用於試圖重整溝通對象的想法時", "D": "可安靜、關心地陪伴在病人身旁"}, "answer": "B", "explanation": "治療性沉默是有目的、有意識地使用沉默，讓病人有空間思考整理想法，並非護理師「不想說話時」可以使用的方式。沉默的使用必須以病人需求為中心，而非照護者的個人偏好。", "category": "communication", "difficulty": "medium", "source": "114_general_Q6"}, {"id": 7, "question": "對84歲肺癌第三期病人與家屬進行預立醫療指示（advance care planning，ACP）諮詢，下列執行過程何者較不適當？", "options": {"A": "除病人外，需有三親等內親屬（至少1人）參加", "B": "協助病人與家屬釐清資訊不清、焦慮與治療抉擇困難", "C": "與病人討論感受與目標，提供緩和醫療資源資訊", "D": "ACP的立法目的是為了尊重病人醫療自主意願"}, "answer": "A", "explanation": "依《病人自主權利法》，預立醫療照護諮商（ACP）時，除病人本人外，醫療委任代理人必須在場，但並未規定「三親等內親屬至少1人」，且三親等內親屬並非強制出席者。法規強調病人自主，而非家屬參與。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q7"}, {"id": 8, "question": "專科護理師對中風後病人進行出院準備服務諮商，下列何者較不適當？", "options": {"A": "應事先評估病人與家屬對疾病歷程了解程度", "B": "需考慮病人特殊文化背景、對需求的表達方式", "C": "應直接轉介腦中風個案管理師接手後續規劃", "D": "需觀察病人與家屬所表現之非語言行為背後意涵"}, "answer": "C", "explanation": "出院準備服務是連續性照護的一部分，專科護理師應主動參與評估、溝通與協調，而非「直接」轉介他人接手，這樣會失去連續性和責任感。轉介可以是其中一個步驟，但不應是唯一的動作。", "category": "discharge_planning", "difficulty": "medium", "source": "114_general_Q8"}, {"id": 9, "question": "某社區活動中心邀請專科護理師至社區進行高血壓健康教育講座，下列何者為設計課程的第一步？", "options": {"A": "與活動中心負責人確認講座的學習成效評量指標", "B": "分析居民基本資料、文化背景及健康識能程度", "C": "安排教學環境、準備教材，並設計講座舉辦方式", "D": "與心血管專科醫師討論高血壓的最新治療指引"}, "answer": "B", "explanation": "課程設計的第一步是需求評估（needs assessment），分析學習者的特性（基本資料、文化背景、健康識能），才能設計適合的課程內容和教學策略。「了解對象」優先於其他準備工作。", "category": "health_education", "difficulty": "easy", "source": "114_general_Q9"}, {"id": 10, "question": "有關問題導向學習（problem based learning，PBL）的說明及應用，下列何者較不適當？", "options": {"A": "由教師主導學習流程，帶領學習者解決真實情境的問題", "B": "學習者透過團隊互動及腦力激盪，確認學習主題與目標", "C": "學習者獲得的知識較為片段，學習動機為成敗的重要關鍵", "D": "需耗費大量的教學資源與師資人力，具有執行的挑戰性"}, "answer": "A", "explanation": "PBL的核心精神是「以學習者為中心」，教師扮演引導者（facilitator）而非主導者角色。學習者自主發現問題、設定學習目標、尋找資源解決問題，非由教師主導流程。", "category": "education", "difficulty": "medium", "source": "114_general_Q10"}, {"id": 11, "question": "下列何者屬於學習者認知領域的「應用」層級教學目標？", "options": {"A": "能舉例說明胰島素於人體的功能", "B": "能依據血糖數值，正確計算應施打的胰島素劑量", "C": "可辨別三項胰島素休克與高血糖昏迷的徵象", "D": "能說出自己目前使用兩種胰島素的不同之處"}, "answer": "B", "explanation": "Bloom認知領域六層級：知識→理解→應用→分析→評鑑→創造。「應用」是將學到的知識用於新情境解決問題。「依據血糖數值計算胰島素劑量」屬於應用層次。舉例說明屬於理解，辨別和說出不同屬於分析。", "category": "education", "difficulty": "medium", "source": "114_general_Q11"}, {"id": 12, "question": "專科護理師設計3個月「過重成人改變錯誤飲食行為」的介入團體，目標為改變學習者的飲食行為。下列何者最適合做為第一個月參與者行為改變的評量指標？", "options": {"A": "體脂肪降低2%", "B": "低密度脂蛋白降低5%", "C": "完成20天每日飲食紀錄", "D": "每日步行步數達7000步"}, "answer": "C", "explanation": "第一個月應評量「行為改變」的過程指標，而非結果指標。「完成飲食紀錄」是直接的行為改變指標，體脂肪、LDL需較長時間才能反映，且屬於生理結果指標。步行步數與飲食行為改變目標不直接相關。", "category": "education", "difficulty": "medium", "source": "114_general_Q12"}, {"id": 13, "question": "下列何者最能展現專科護理師角色的獨立性專業價值？", "options": {"A": "依據醫師的指示完成交辦任務", "B": "舉辦健康講座提高病人滿意度", "C": "協助疾病診斷並提出個人意見", "D": "以實證為基礎提供照護與決策"}, "answer": "D", "explanation": "專科護理師的獨立性專業價值在於以實證為基礎進行臨床判斷、照護計畫與決策，這體現了其高階臨床能力和自主性。依醫囑執行是基本護理職責，提出個人意見太主觀，滿意度不等於專業獨立性。", "category": "professional_development", "difficulty": "easy", "source": "114_general_Q13"}, {"id": 14, "question": "高齡臥床病人有多處嚴重壓力性損傷，此次因肺炎入院做進一步處理，下列何者最能促進醫療團隊共識及完成整體照顧計畫？", "options": {"A": "安排召開多科團隊個案討論會議", "B": "將訊息電話告知醫師後等待評估結果", "C": "先完成外科手術再通知其他科部", "D": "完成相關病歷紀錄並開立照會單"}, "answer": "A", "explanation": "複雜個案（多處壓力性損傷合併肺炎）需要跨科團隊合作，多科團隊個案討論（MDT）是最有效的方式，可讓各科同時交流、形成共識、制定整體計畫，效果優於單一照會或電話告知。", "category": "interprofessional_collaboration", "difficulty": "easy", "source": "114_general_Q14"}, {"id": 15, "question": "當專科護理師與主治醫師在病人處置意見上有分歧，下列何者溝通方式最符合正向、尊重與雙向溝通的原則？", "options": {"A": "以醫師決策為標準以免衝突", "B": "面對面討論並尋求照顧共識", "C": "在病歷上紀錄表達不同意見", "D": "請該科部主任出面主持公道"}, "answer": "B", "explanation": "面對面直接溝通、表達臨床判斷、尋求照顧共識，體現正向、尊重與雙向溝通的原則。病歷記錄不同意見是被動的，僅迴避衝突不解決問題，找主任干預可能造成對立關係。", "category": "communication", "difficulty": "easy", "source": "114_general_Q15"}, {"id": 16, "question": "當與患有失智症的病人進行溝通時，下列何者最不適當？", "options": {"A": "保持耐心與同理心，避免催促病人", "B": "使用圖片、手勢來輔助溝通，協助病人理解", "C": "支持病人說出想法與困難，並給予鼓勵", "D": "當病人表達錯誤時，須及時給予指正"}, "answer": "D", "explanation": "失智症病人認知功能受損，糾正其錯誤表達往往無效，且會讓病人感到挫折、焦慮或羞愧，破壞治療性關係。與失智症病人溝通的原則包括：耐心、接受、使用簡單語言和視覺輔助、驗證療法（validation）等。", "category": "communication", "difficulty": "easy", "source": "114_general_Q16"}, {"id": 17, "question": "到職剛滿3個月的護理師，擬進行一位長期臥床且意識不清女性病人之尿液培養採檢，陪病家屬強烈表示希望由專科護理師來執行採檢。您是該病房的專科護理師，下列處理方式何者較適當？", "options": {"A": "陪同護理師進行尿液培養採檢並給予協助，保持無菌技術", "B": "告知護理師尿液採檢是護理師的工作職責之一，讓護理師執行", "C": "為安撫家屬情緒由專科護理師進行尿液採檢，好讓家屬安心", "D": "請住院醫師告知家屬說明須於期限內採集檢體，以免延誤治療"}, "answer": "A", "explanation": "最適當的處理是「陪同並協助」新護理師執行採檢，這樣既能確保技術品質（保持無菌）、滿足家屬需求，又能發揮教育指導的功能，促進新護理師能力成長，符合專科護理師的教育角色。", "category": "professional_development", "difficulty": "medium", "source": "114_general_Q17"}, {"id": 18, "question": "下列何者是臨床指引之評析工具？", "options": {"A": "Cochrane Rob 2.0", "B": "Oxford systematic reviews-critical appraisal sheet", "C": "AGREE II", "D": "JBI checklist for quasi-experimental studies"}, "answer": "C", "explanation": "AGREE II（Appraisal of Guidelines for Research and Evaluation）是評估臨床實踐指引品質的標準化工具，涵蓋範圍目的、利害關係人涉入、發展嚴謹度、呈現清晰度、應用性、編輯獨立性六個領域。其他選項用於評估研究文獻品質，非臨床指引。", "category": "evidence_based_practice", "difficulty": "medium", "source": "114_general_Q18"}, {"id": 19, "question": "25歲病人術後第2天，傍晚開始持續腹痛，專科護理師評估後懷疑有腸阻塞現象，建議值班住院醫師開立腹部X光檢查與禁食。但住院醫師表示：「不急，先試著進食看看再說。」專科護理師擔心延誤處理可能影響病人安全，請問此時最符合專業倫理與團隊合作原則的應對為何？", "options": {"A": "立即代替醫師開立腹部X光檢查與禁食醫囑，避免延誤", "B": "應尊重醫師判斷，雖不同意也不應過度干預", "C": "基於臨床經驗，向病人說明應禁食並先暫停飲食", "D": "與醫師詳細討論病況並提出建議，必要時通報主治醫師"}, "answer": "D", "explanation": "在病人安全疑慮下，專科護理師應主動與醫師溝通、提供臨床資訊，必要時採用升級（escalation）機制通報主治醫師，這符合病人安全文化和團隊合作原則。不應私自開立醫囑（超出權限），也不應過度順從而忽視病安風險。", "category": "ethics_law", "difficulty": "medium", "source": "114_general_Q19"}, {"id": 20, "question": "病人突發意識喪失與呼吸停止，現場僅有專科護理師與病房護理師，當下聯繫主治醫師無法即時趕到，團隊啟動緊急應變機制。專科護理師立即實施心肺復甦術，並協助正壓面罩給氣（bag-valve-mask ventilation）、給予高濃度氧氣。下列何者最符合現行法規規範？", "options": {"A": "得於緊急時依預立醫療授權執行基本急救措施，並於事後向醫師報告", "B": "可於緊急情況下依臨床判斷逕行執行所有必要處置，不須向醫師報告", "C": "不得執行任何急救相關動作，應等待醫師到場處理", "D": "可因緊急狀況，執行插管或藥物注射等侵入性處置"}, "answer": "A", "explanation": "依「專科護理師於醫師監督下執行醫療業務辦法」，緊急情況下專科護理師可依預立醫療流程執行緊急急救處置，事後向醫師報告。基本急救（CPR、BVM）在緊急情況下可執行，但插管等高侵入性處置仍需依規定程序，且事後必須向醫師報告，非不須報告。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q20"}, {"id": 21, "question": "照護失智症病人時，下列何者不是友善溝通與維護尊嚴的表現？", "options": {"A": "面帶微笑自我介紹", "B": "避免眼神直接注視", "C": "避免糾正不合時宜的話語", "D": "耐心傾聽並放慢速度回覆"}, "answer": "B", "explanation": "友善溝通應包括適當的眼神接觸，以表示尊重、關注和建立關係。「避免眼神直接注視」反而讓病人感到被忽視或迴避。其他選項均為對失智症病人友善溝通的正確態度。", "category": "communication", "difficulty": "easy", "source": "114_general_Q21"}, {"id": 22, "question": "病人於1PM術後返回病房，專科護理師依指示開立Primperan® 10mg/2mL IV push stat，預防術後腸胃不適。5PM專科護理師瀏覽病歷，發現護理師尚未依醫囑完成該藥物注射。依護理倫理規範，專科護理師下列做法何者最適當？", "options": {"A": "提醒護理師，請其立即依醫囑完成藥物注射", "B": "將藥物自醫囑中刪除", "C": "告知護理師其疏失，並主動通報給藥異常事件", "D": "修改藥物開立時間，請護理師立即完成給藥"}, "answer": "C", "explanation": "依倫理規範和病人安全原則：首先評估病人是否因此受影響，然後應通報給藥異常事件（near miss或事件報告），以利系統改善。同時告知護理師並協助補救，必要時評估是否需補給藥。修改時間或直接刪除是不誠實且不正確的行為。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q22"}, {"id": 23, "question": "衛生福利部規劃的「護理輔佐人力制度」中，對於「照護輔佐（nurse aide）」與「護理助理（nursing associate）」這兩種人員的職能角色與工作內容之敘述，下列何者錯誤？", "options": {"A": "「照護輔佐」的職能角色定位為生活照護導向，主要提供住院病人身體清潔、進食等輔助照護", "B": "「照護輔佐」的工作內容涵蓋協助管灌食與體溫量測，但這些項目需經醫院教育訓練並通過技術評核後方可執行", "C": "「護理助理」的職能角色定位為護理輔助導向，可與護理師合作執行輔助護理業務", "D": "「護理助理」在護理師指導下，可執行簡單傷口換藥等侵入性與風險較高之照護技術"}, "answer": "D", "explanation": "護理助理（nursing associate）雖可協助護理業務，但執行侵入性且風險較高的技術（如傷口換藥）並不符合其定位。傷口換藥屬於需要專業判斷的護理技術，不在護理助理的執行範圍內。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q23"}, {"id": 24, "question": "王護理師已領有護理師證書並從事臨床護理工作3年。她計畫開設「居家護理所」，並希望自己能擔任該機構的負責資深護理人員。也考慮在未來進修成為專科護理師，以擴大服務範圍。依現行法規，下列何者最為正確？", "options": {"A": "目前王護理師已領有護理師證書並完成執業登記，即可擔任居家護理所的負責資深護理人員", "B": "王護理師若要取得專科護理師證書，必須先完成專科護理師訓練，並經中央主管機關甄審合格", "C": "居家護理所設立後，若其負責資深護理人員因故不能執行業務超過1個月，需內部指定代理人，代理期間最長可達2年", "D": "服務對象有醫療需求，該所專科護理師在監督醫師未親自在場的情況下，可直接執行所有侵入性醫療業務，無需醫師當面指示"}, "answer": "B", "explanation": "取得專科護理師證書的法定程序：完成衛福部認定的訓練機構訓練→取得完訓證明→通過衛福部甄審→取得證書。(A)擔任居家護理所負責人需有3年以上臨床工作經驗，但還需符合其他資格。(C)代理期間規定非2年。(D)即使醫師不在場，也需依預立醫療流程，且有範圍限制。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q24"}, {"id": 25, "question": "急救責任醫院（A醫院）目前因設備維護，無法提供嚴重外傷病人之必要處置，A醫院的後送醫院（B醫院）能提供該項服務。依據民國102年「緊急醫療救護法」及「緊急傷病患轉診實施辦法」規定，下列何者最適當？", "options": {"A": "A醫院應立即將病人轉診至B醫院，無需事先告知病人家屬轉診原因或取得其書面同意，以爭取黃金救命時間", "B": "A醫院應先對病人進行必要之穩定處置，說明原因並取得書面轉診同意，聯繫B醫院進行轉診", "C": "A醫院因設備故障及人力不足，可以直接拒絕收治該病人，並要求救護車將病人直接送往B醫院", "D": "A醫院可直接將病人轉診至B醫院，但B醫院有權視自身病人負荷量或人力狀況，決定是否接受此轉診"}, "answer": "B", "explanation": "依緊急醫療救護法：急救責任醫院不得拒絕急診病人，應先提供穩定處置；轉診時應說明原因、取得書面同意，並事先聯繫接收醫院確認可接收。後送醫院不得拒絕接收符合後送條件的病人。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q25"}, {"id": 26, "question": "王小華護理師於114年8月10日在台中醫學中心完成專科護理師訓練，並獲得醫院核發完訓證明。未取得執照前，因故欲南下至具專科護理師訓練醫院資格的高雄醫院擔任專科護理師，下列敘述何者正確？", "options": {"A": "高雄醫院可安排其接受專科護理師補充訓練", "B": "其可於高雄醫院執行「專科護理師於醫師監督下執行醫療業務辦法」之醫療業務", "C": "台中醫學中心可視其狀況，安排每週1日補充訓練至115年6月30日", "D": "其可報名參加114年8月30日舉辦之專科護理師甄審考試"}, "answer": "C", "explanation": "完成訓練但尚未考取執照前，原訓練機構可安排補充訓練，維持其訓練資格，通常延長至下一次甄審前。未取得執照前不得以專科護理師名義執行醫療業務。報名甄審的資格及時程需符合規定程序。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q26"}, {"id": 27, "question": "依據民國112年修訂「專科護理師分科及甄審辦法」，下列敘述何者正確？", "options": {"A": "證書效期屆期未更新，即喪失專科護理師資格，需重新接受訓練並通過甄審，始得恢復專科護理師身份", "B": "如有特殊原因，無法在證書效期屆滿前完成6年120點繼續教育積分，可向地方衛生主管機關申請延期更新", "C": "經核准證書延期更新者，應自效期屆至日起6個月內檢具6年120點繼續教育積分申請證書更新，屆期未更新，專科護理師證書自動失效", "D": "於中央主管機關認定之醫療資源不足地區執業或因公派駐國外從事外交有關國際醫療之專科護理師，其繼續教育課程積分，得加倍採計"}, "answer": "D", "explanation": "依修訂辦法，於偏遠醫療資源不足地區執業或因公派駐國外從事國際醫療的專科護理師，其繼續教育積分得加倍採計，以鼓勵服務弱勢地區。延期更新申請對象為中央主管機關（非地方），且有特定條件限制。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q27"}, {"id": 28, "question": "病人家屬在病房情緒失控並推倒工作中之專科護理師，雖然專科護理師表示體諒家屬情緒不希望追究，此時醫療機構採取何種處置最適當？", "options": {"A": "應將加害人姓名、特徵公布大廳明顯處，以防止其他人被傷害", "B": "應邀集倫理小組會議，徵詢當事人意願後再決定是否通報", "C": "應尊重該醫護人員不提告之意願，決定不通報", "D": "應立即通報警察機關，並啟動保護與關懷機制"}, "answer": "D", "explanation": "依《醫療法》及《醫院管理》相關規定，醫療機構有義務保護醫事人員安全，發生醫療暴力事件應立即通報警察機關，並啟動內部保護機制。此義務不因當事人不願追究而免除，機構有主動保護義務。", "category": "ethics_law", "difficulty": "medium", "source": "114_general_Q28"}, {"id": 29, "question": "有關專科護理師執業規範之敘述，下列何者錯誤？", "options": {"A": "執業範圍包括：健康問題之護理評估、預防保健之護理措施、護理指導及諮詢、醫療輔助行為及專科護理師於醫師監督下執行醫療業務辦法之醫療業務", "B": "113年新增家庭科專科護理師，係為拓展在社區以人口群為基礎之健康照護角色功能，其執業場域限於社區，不得於醫院執業", "C": "取得美國專科護理師證書並在美國實際執業多年，返國後仍需重新考取我國專科護理師證書，才能執行專科護理師業務", "D": "進階藥理、病理及生理為基礎之分析判斷、臨床推理及醫療照護之能力是專科護理師執業應具備核心能力"}, "answer": "B", "explanation": "家庭科專科護理師雖以社區照護為重點，但其執業場域並非「限於社區，不得於醫院執業」，此描述過於絕對且錯誤。專科護理師的執業場域依執照種類和登記而定，非強制排除醫院。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q29"}, {"id": 30, "question": "證據品質評估以GRADE系統評核隨機對照研究，下列何者不是降級因素？", "options": {"A": "偏差風險", "B": "不一致性", "C": "結果不顯著", "D": "出版偏差"}, "answer": "C", "explanation": "GRADE系統降低隨機對照研究證據品質的因素：①偏差風險（risk of bias）、②不一致性（inconsistency）、③間接性（indirectness）、④不精確性（imprecision）、⑤出版偏差（publication bias）。「結果不顯著」（non-significant results）不是降級因素，研究設計和執行品質才是評估重點。", "category": "evidence_based_practice", "difficulty": "hard", "source": "114_general_Q30"}, {"id": 31, "question": "末期病人表達疼痛與不適時，下列何者最能展現專科護理師之臨床倫理與專業角色？", "options": {"A": "面對病人疼痛主訴時，可建議儘量忍耐以避免過度使用藥物而產生依賴", "B": "主動對病人表示安慰，並建議使用坊間草藥與輔助療法作為止痛選項之一", "C": "協助病人與家屬了解病情與安寧療護選項，並依醫療團隊討論擬定止痛計畫", "D": "為了立即減輕病人痛苦，可先調整鎮痛藥劑量，再跟醫師報備"}, "answer": "C", "explanation": "末期病人的疼痛管理體現了臨床倫理的核心。正確做法是與醫療團隊共同擬定止痛計畫、協助病人了解選項，兼顧疼痛控制和安寧療護目標。不應鼓勵忍耐（不人道）、推薦未經驗證的草藥、或私自調整藥物劑量（超出職責範圍）。", "category": "palliative_care", "difficulty": "medium", "source": "114_general_Q31"}, {"id": 32, "question": "有關專科護理師於長期照顧體系中的角色，下列敘述何者較不適當？", "options": {"A": "參與出院準備服務，協助病人銜接社區照護資源", "B": "評估高齡與失能個案之身心功能，擬定照護計畫", "C": "於社區據點提供衛教、健康促進與慢性病追蹤服務", "D": "只能擔任行政管理職務，但不提供直接照護"}, "answer": "D", "explanation": "專科護理師在長照體系中同時具有直接照護、評估、衛教、協調等多重角色，「只能擔任行政職務」的說法完全錯誤，與專科護理師的角色定位相違背。", "category": "professional_development", "difficulty": "easy", "source": "114_general_Q32"}, {"id": 33, "question": "根據2025年美國糖尿病學會照護指引，下列何者最不符合該指引對糖尿病病人之整體飲食建議？", "options": {"A": "不鼓勵以市售營養飲料來維持主要的能量與營養", "B": "鼓勵以動物性優質蛋白來取代植物性蛋白質，如豆腐、黃豆等", "C": "建議病人以代糖飲品如無糖可樂取代含糖飲料以降低碳水攝取", "D": "強調均衡飲食與代謝目標並重，避免採用特殊飲食，如生酮飲食"}, "answer": "B", "explanation": "ADA 2025指引鼓勵增加植物性蛋白質的攝取（豆類、堅果等），而非鼓勵以動物性蛋白取代植物性蛋白。植物性蛋白有助於降低心血管風險，對糖尿病病人更有益。(B)的描述與指引方向相反。", "category": "general_nursing", "difficulty": "hard", "source": "114_general_Q33"}, {"id": 34, "question": "李小姐BMI為29kg/m²，想減重但常因工作忙碌無法持續運動。她表示：「我已經下載健身App，每天早上做個15分鐘，但週末常懶得動」。依據跨理論模式（transtheoretical model，TTM），下列哪一階段最符合她目前的狀態？", "options": {"A": "前預備期（precontemplation stage）", "B": "預備期（contemplation stage）", "C": "行動期（action stage）", "D": "維持期（maintenance stage）"}, "answer": "C", "explanation": "TTM的行動期（action stage）：個案已開始進行行為改變（已下載App、每天運動15分鐘），但尚未達到持續6個月的穩定狀態（週末常懶得動，尚未穩定維持）。前預備期=沒有打算改變；預備期=打算但尚未行動；維持期=持續>6個月。", "category": "health_promotion", "difficulty": "medium", "source": "114_general_Q34"}, {"id": 35, "question": "專科護理師想用實證手法回答「新生兒注射維生素K1，是否會增加兒童期罹患白血病的風險」，在實證問題的提問類型中是屬於下列何種？", "options": {"A": "介入型（intervention）", "B": "病因型（etiology）", "C": "診斷型（diagnosis）", "D": "預後型（prediction/prognosis）"}, "answer": "B", "explanation": "「某因素（維生素K1注射）是否造成某結果（白血病）」是探討暴露與疾病的因果關係，屬於病因型（etiology/harm）問題。介入型探討治療效果；診斷型探討篩檢工具準確性；預後型探討疾病的結局預測。", "category": "evidence_based_practice", "difficulty": "medium", "source": "114_general_Q35"}, {"id": 36, "question": "專科護理師想探討苦瓜製劑/萃取物能否降低第二型糖尿病成人之血糖，有關此臨床問題形成的P：population、I：intervention、C：comparison、O：outcome之敘述，下列何者錯誤？", "options": {"A": "P：第二型糖尿病成人", "B": "I：苦瓜製劑/萃取物", "C": "C：口服降血糖藥物", "D": "O：飯後血糖值、糖化血色素"}, "answer": "C", "explanation": "PICO中的C（comparison）應是與苦瓜製劑比較的對照條件，應為「安慰劑」或「標準治療」，而非直接指定「口服降血糖藥物」（這樣的比較會混淆藥物效果，且許多研究的comparison可能是安慰劑）。若研究目的是比較苦瓜vs口服藥物，比較組才是口服降血糖藥，但此為研究設計選擇，不必然是PICO的固定答案。本題判斷(C)的描述過於限定，應更廣泛。", "category": "evidence_based_practice", "difficulty": "hard", "source": "114_general_Q36"}, {"id": 37, "question": "有關臨床照護指引發展準則的敘述，下列何者錯誤？", "options": {"A": "指引發展成員的組成不建議納入病人與家屬，避免影響指引發展的客觀性", "B": "指定指引和指引發展經費來源必須詳細說明，並向大眾公開", "C": "指引發展成員應使用系統性文獻回顧的標準格式及評價", "D": "建議內容應以標準化格式呈現，詳細說明建議的措施是什麼，以及在什麼情況下執行"}, "answer": "A", "explanation": "現代臨床指引發展強調以病人為中心，必須納入病人/家屬代表，以確保指引能反映病人的價值觀和偏好。AGREE II等標準均要求利害關係人（含病人）的參與，而非排除，「不建議納入病人」是錯誤的說法。", "category": "evidence_based_practice", "difficulty": "medium", "source": "114_general_Q37"}, {"id": 38, "question": "Irvine等學者於1998年提出「護理角色有效模式概念架構」，分為結構面、過程面、結果面，下列何者不屬於「結果面」的指標？", "options": {"A": "中心靜脈導管相關血流感染率", "B": "非計畫性氣管內管滑脫發生率", "C": "護理人員離職率", "D": "一般病房住院跌倒發生率"}, "answer": "C", "explanation": "Irvine護理角色有效模式：結果面指標是反映護理照護品質對病人的直接影響，包括：感染率（CLABSI）、意外事件（非計畫性拔管、跌倒）、病人滿意度等。護理人員離職率屬於結構面（人力資源/組織）指標，非結果面。", "category": "quality_improvement", "difficulty": "medium", "source": "114_general_Q38"}, {"id": 39, "question": "某內科病房住院病人一般壓力性損傷發生率超過閾值，單位品質改善小組要監測「住院病人預防壓力性損傷照護執行完整率」過程的資料來源應包括：①皮膚觀察 ②訪談病人家屬 ③護理紀錄 ④病人滿意度 ⑤異常事件報告", "options": {"A": "①②⑤", "B": "①③④", "C": "①③⑤", "D": "②④⑤"}, "answer": "C", "explanation": "監測「預防壓力性損傷照護執行完整率」屬過程指標評估，資料來源應為：①皮膚觀察（直接評估皮膚狀況執行情形）、③護理紀錄（照護執行的文件紀錄）、⑤異常事件報告（與壓力性損傷相關的通報）。訪談家屬和滿意度調查不是評估照護執行完整性的直接資料來源。", "category": "quality_improvement", "difficulty": "hard", "source": "114_general_Q39"}, {"id": 40, "question": "臨床護理品質關鍵性指標包括顧客、內部流程、學習成長及財務四大構面，下列何者不屬於內部流程指標？", "options": {"A": "臨床警示之反應", "B": "意外事件導致傷害事件", "C": "血流管路照護", "D": "呼吸道照護"}, "answer": "B", "explanation": "平衡計分卡（BSC）四構面：顧客（病人滿意度、抱怨率）、內部流程（照護流程品質：臨床警示反應、管路照護、呼吸道照護等）、學習成長（員工訓練）、財務（成本效益）。「意外事件導致傷害事件」屬於顧客構面或結果面指標，而非純粹的內部流程指標。", "category": "quality_improvement", "difficulty": "hard", "source": "114_general_Q40"}, {"id": 41, "question": "管制圖係由修華特（Shewhart）所發明，其利用統計方法將所蒐集的資料算出管制界限，以管制及判斷是否有變異發生。管制界限通常為平均值加減（＋/－）幾個標準差？", "options": {"A": "1個", "B": "2個", "C": "3個", "D": "4個"}, "answer": "C", "explanation": "Shewhart管制圖的管制界限（control limits）為平均值±3個標準差（3σ），此範圍涵蓋99.73%的正常變異。超出此範圍視為「特殊原因變異（special cause variation）」，需要調查處理。", "category": "quality_improvement", "difficulty": "easy", "source": "114_general_Q41"}, {"id": 42, "question": "判斷臨床護理品質管理指標四大準則，分別為高危險活動（high risk activities）、高等量活動（high volume activities）、高成本活動（high cost activities）及具有問題傾向的活動（problem prone activities），下列各項護理活動所對應的準則，何者正確？", "options": {"A": "護理人員執行化學治療-高危險活動", "B": "輸血-高等量活動", "C": "靜脈注射給藥-高成本活動", "D": "病人皮膚照護-具有問題傾向的活動"}, "answer": "A", "explanation": "化學治療（化療）藥物毒性強、劑量計算複雜、外滲風險高，屬於「高危險活動」。輸血有風險但量並非最高；靜脈給藥屬高等量而非高成本；皮膚照護易發生壓力性損傷問題，屬「具問題傾向」，但化療-高危險的對應是最明確正確的答案。", "category": "quality_improvement", "difficulty": "medium", "source": "114_general_Q42"}, {"id": 43, "question": "醫院參與各項指標計畫，為增加指標管控效率而設定品質合格標準，下列何者不是實務操作上用來判定指標異常的數值？", "options": {"A": "閾值", "B": "平均值", "C": "管制圖", "D": "外部同儕值"}, "answer": "B", "explanation": "判定指標異常的標準包括：閾值（threshold，預設的合格/警戒標準）、管制圖（統計製程管制工具）、外部同儕值（benchmarking，與其他醫院比較）。「平均值」本身只是描述性統計，不是判定異常的標準，需要配合標準差、閾值等才能判定異常。", "category": "quality_improvement", "difficulty": "medium", "source": "114_general_Q43"}, {"id": 44, "question": "2024年成立的「健康台灣推動委員會」，旨在打造台灣成為健康幸福的國家，所提出的建言不包含下列何者？", "options": {"A": "改善醫療人員工作環境", "B": "長照3.0", "C": "多元財務管道，控制健保總額", "D": "倡議-健康台灣深耕計畫"}, "answer": "C", "explanation": "健康台灣推動委員會的主要建言包括：改善醫療人員工作環境、長照3.0、健康台灣深耕計畫、癌症防治等。「多元財務管道，控制健保總額」不在其建言範圍內，健保財務議題屬健保署管轄，非此委員會主要倡議方向。", "category": "health_policy", "difficulty": "hard", "source": "114_general_Q44"}, {"id": 45, "question": "有關「三高防治888計畫」之內容，不包含下列何者？", "options": {"A": "全國80%成年人接受個人生活習慣諮詢，提升自我管理能力", "B": "目標是達成2030年降低三高相關慢性病標準化死亡率1/3", "C": "若為三高之高風險者，納入「代謝症候群防治計畫」", "D": "若為三高的病友，納入慢性病相關照護網"}, "answer": "A", "explanation": "三高防治888計畫內容包括：8成篩檢、8成知病、8成控制（治療達標），以及高風險者納入代謝症候群計畫、病友納入慢性病照護網、目標2030年降低死亡率1/3。「全國80%成年人接受生活習慣諮詢」的說法不符合888計畫的核心目標描述。", "category": "health_policy", "difficulty": "hard", "source": "114_general_Q45"}, {"id": 46, "question": "2024年國家希望工程「健康台灣」政策中，強化國家癌症防治計畫的目標，為2030年癌症標準化死亡率可以降低多少？", "options": {"A": "1/2", "B": "1/3", "C": "1/4", "D": "1/5"}, "answer": "B", "explanation": "「健康台灣」政策中，癌症防治目標為2030年將癌症標準化死亡率降低1/3（約33%），此為政府設定的重要健康指標。", "category": "health_policy", "difficulty": "medium", "source": "114_general_Q46"}, {"id": 47, "question": "有關高血壓病人的麻醉處置，下列何者錯誤？", "options": {"A": "術前應考慮停用ACE inhibitor或angiotensin II receptor blocker", "B": "從未使用過β-blocker的病人，應於手術當天開始使用", "C": "長期服用β-blocker的病人，應在手術前持續使用該藥物", "D": "若病人血壓高於180/110mmHg，可考慮延後選擇性手術"}, "answer": "B", "explanation": "β-blocker不應在手術當天才開始使用，因急性給藥可能增加術中心搏過緩和低血壓風險。POISE試驗顯示未經訓練的高劑量β-blocker可增加死亡率和腦中風風險。長期使用者應繼續（(C)正確），從未使用者術前急性給予是不適當的。", "category": "preoperative_assessment", "difficulty": "medium", "source": "114_general_Q47"}, {"id": 48, "question": "病人3個月前因心肌梗塞置放藥物塗層支架，若欲行選擇性非心臟手術，下列何者最適當？", "options": {"A": "直接手術並繼續使用所有抗血小板藥物", "B": "若尚未完成6個月的雙重抗血小板治療，應考慮延後手術", "C": "置放支架滿3個月即可停用所有抗血小板藥物進行手術", "D": "置放支架滿1個月即可停用所有抗血小板藥物進行手術"}, "answer": "B", "explanation": "藥物塗層支架（DES）置放後，雙重抗血小板治療（DAPT）建議至少6個月，以防支架血栓。若未完成6個月療程即行選擇性手術，支架血栓風險極高，應考慮延後手術。置放滿3或1個月均不足，停用所有抗血板藥物更不適當。", "category": "preoperative_assessment", "difficulty": "medium", "source": "114_general_Q48"}, {"id": 49, "question": "有關心輸出量（cardiac output）的敘述，下列何者正確？", "options": {"A": "心率越慢，心室充盈時間愈長，因此心率愈慢愈能提高心輸出量", "B": "心房收縮對前負荷的影響甚微，心房顫動不會明顯影響心輸出量", "C": "在老年病人中，心房收縮與適當心率對維持心輸出量至關重要", "D": "心輸出量=心搏出量（stroke volume）×心率，所以不受心律（rhythm）影響"}, "answer": "C", "explanation": "老年人心室順應性降低，依賴心房收縮（atrial kick）提供額外前負荷；心率也需維持在適當範圍。心率過慢確實影響CO（CO=SV×HR），但有限度，極慢時CO反而下降。心房顫動失去atrial kick，對老年人影響顯著。心律（rhythm）影響心率和充盈效率，絕對影響CO。", "category": "cardiology", "difficulty": "medium", "source": "114_general_Q49"}, {"id": 50, "question": "有關前負荷不足對血流動力學的影響，下列何者正確？", "options": {"A": "中心靜脈壓正常即代表心臟充盈壓足夠，可排除心包填塞", "B": "脈壓變異在低潮氣容積通氣下仍能準確預測輸液反應性", "C": "張力性氣胸與心包填塞會阻礙心室充盈，造成前負荷相對性下降", "D": "小動脈為全身血流阻力的主要來源，因此其擴張是前負荷下降的主因"}, "answer": "C", "explanation": "張力性氣胸和心包填塞均為阻塞性休克，直接阻礙靜脈回流和心室充盈，造成前負荷相對不足。CVP正常不能排除心包填塞（如填塞早期CVP可能假性正常）。脈壓變異（PPV）在低潮氣容積（<8mL/kg）下準確性下降。小動脈為後負荷來源，非前負荷。", "category": "hemodynamics", "difficulty": "hard", "source": "114_general_Q50"}, {"id": 51, "question": "有關氧氣攝取與肺部死腔的敘述，下列何者正確？", "options": {"A": "肺泡性死腔是指無通氣但有灌流的肺部區域", "B": "生理性死腔是指血紅素結合氧氣的能力不足", "C": "氧氣主要溶解在血漿中運送至全身組織", "D": "靜息狀態的一般人每分鐘大約攝取250mL的氧氣"}, "answer": "D", "explanation": "靜息狀態的成人VO₂約250mL/min是正確的。肺泡性死腔（alveolar dead space）是指有通氣但無灌流的區域（非無通氣有灌流；那是分流shunt）。生理性死腔=解剖死腔+肺泡死腔，與血紅素無關。氧氣主要（97-98%）與血紅素結合運輸，僅少量（約1.5%）溶解在血漿中。", "category": "pulmonary", "difficulty": "medium", "source": "114_general_Q51"}, {"id": 52, "question": "有關氧合血紅素解離曲線的敘述，下列何者錯誤？", "options": {"A": "溫度降低時，常見曲線右移", "B": "pH上升時，常見曲線左移", "C": "曲線左移表示血紅素與氧氣親和力增加", "D": "曲線右移有利於血紅素將氧氣釋放"}, "answer": "A", "explanation": "溫度降低使氧合血紅素解離曲線「左移」（血紅素與氧的親和力增加，不易釋放氧給組織）。右移因素：體溫升高、pH下降、PaCO₂升高、2,3-DPG增加。左移因素：低溫、高pH、低PaCO₂、低2,3-DPG、胎兒血紅素。", "category": "pulmonary", "difficulty": "medium", "source": "114_general_Q52"}, {"id": 53, "question": "有關常見的氣道評估方式，下列何者錯誤？", "options": {"A": "Mallampati分級：病人臥姿，張口吐舌，發出啊聲", "B": "下顎突出測試可評估下顎活動度與上下門牙相對位置", "C": "上下門牙間隙（張口距離）小於兩指幅提示可能張口受限", "D": "Cormack-Lehane分級是喉頭鏡下評估聲門可見程度的分級方式"}, "answer": "A", "explanation": "Mallampati分級的標準姿勢為：病人端坐（非臥姿）、頭部中立位、張口伸舌（不發聲）。發聲或躺臥會影響評估結果。其他選項的描述均正確。", "category": "airway_management", "difficulty": "medium", "source": "114_general_Q53"}, {"id": 54, "question": "有關麻醉機中二氧化碳吸收劑的使用，下列何者正確？", "options": {"A": "吸收劑的主要功能是吸收新鮮氣體中的二氧化碳", "B": "若麻醉機型號為雙罐系統，則應同時更換兩個吸收罐", "C": "當二氧化碳吸收劑恢復為原色時，即代表完全恢復吸收能力", "D": "若麻醉機長時間未使用，仍應維持微量氣流通過避免吸收劑乾燥"}, "answer": "B", "explanation": "雙罐系統的更換原則：應同時更換兩罐，確保吸收效果完整。吸收劑吸收的是呼出的CO₂（非新鮮氣體中的CO₂）。恢復原色不一定代表恢復吸收能力（顏色變化是指示劑，並非完全可靠）。長時間未使用的麻醉機應關閉氣流，避免吸收劑乾燥反而需要在使用前確認狀態。", "category": "anesthesia_equipment", "difficulty": "hard", "source": "114_general_Q54"}, {"id": 55, "question": "有關功能肺餘量（functional residual capacity，FRC）和閉合容量（closing capacity，CC）的敘述，下列何者正確？", "options": {"A": "仰臥位與麻醉會使FRC增加，改善氧合情形", "B": "懷孕會使CC減少，因此更容易導致小氣道閉合", "C": "當CC大於FRC時，小氣道會在正常呼吸周期中提早關閉", "D": "FRC與CC均隨年齡下降，因此高齡病人較不易發生氣道閉合"}, "answer": "C", "explanation": "當CC>FRC時，在正常呼氣過程中（FRC以上的範圍）就會發生小氣道關閉，導致氣體滯留和通氣血流比失衡。仰臥位和麻醉使FRC下降（非增加）。懷孕使FRC下降而CC不變，更易達到CC>FRC的狀態（非CC減少）。年齡增長使CC增加（非下降），高齡者更易發生氣道閉合。", "category": "pulmonary", "difficulty": "hard", "source": "114_general_Q55"}, {"id": 56, "question": "有關慢性阻塞性肺病的術前評估，下列何者錯誤？", "options": {"A": "術前應常規安排肺功能檢查以評估疾病嚴重程度", "B": "術前應鼓勵病人戒菸使肺功能達到最佳化", "C": "懷疑感染或氣胸時應安排胸部X光片檢查", "D": "病人若缺氧或需要使用氧氣治療則建議進行動脈血液氣體分析"}, "answer": "A", "explanation": "COPD病人術前並非「常規」需要肺功能檢查（PFT）。PFT在術前評估中有其適應症，但不是所有COPD病人的必要常規檢查，特別是輕度COPD且臨床穩定的病人，臨床評估可能就已足夠。戒菸、胸部X光（有指徵時）、ABG（低血氧時）均為正確的術前處置。", "category": "preoperative_assessment", "difficulty": "hard", "source": "114_general_Q56"}, {"id": 57, "question": "有關疾病對射出分率（ejection fraction，EF）的影響，下列何者錯誤？", "options": {"A": "敗血症的病人通常表現為高EF", "B": "心衰竭的病人可表現為正常EF", "C": "二尖瓣逆流的病人通常表現為低EF", "D": "肝硬化的病人通常表現為高EF"}, "answer": "C", "explanation": "二尖瓣逆流（MR）的早期和代償期，EF常表現為正常甚至偏高（因為左心室向低阻力的左心房射血），後期失代償才下降。因此「通常表現為低EF」是錯誤的。敗血症（高動力循環）和肝硬化（高CO狀態）確實常見高EF；HFpEF（射出分率保留型心衰竭）表現為正常EF。", "category": "cardiology", "difficulty": "hard", "source": "114_general_Q57"}, {"id": 58, "question": "下列何者為缺血性腦損傷之新生兒的體溫調控原則？", "options": {"A": "術中應維持高體溫以促進代謝", "B": "高體溫對於缺血後腦部具保護作用", "C": "無需特別注意新生兒體溫", "D": "輕度低體溫對缺血性損傷具保護效益"}, "answer": "D", "explanation": "缺血缺氧性腦病變（HIE）新生兒的標準治療為目標體溫管理（therapeutic hypothermia），維持核心溫度33-34°C，持續72小時，已有大量研究證實可改善神經預後。高體溫反而加重腦損傷。", "category": "neurology", "difficulty": "medium", "source": "114_general_Q58"}, {"id": 59, "question": "在術中持續低二氧化碳血症的病人，術後照護應注意下列哪一項神經學表現？", "options": {"A": "高血糖引起的酮酸中毒", "B": "血氧過高造成的癲癇發作", "C": "高腦壓導致的嗜睡與瞳孔擴大", "D": "因腦血管收縮導致的神經功能障礙"}, "answer": "D", "explanation": "低二氧化碳血症（低PaCO₂）→腦血管收縮→腦血流量下降→可能造成腦缺血和神經功能障礙。術後需監測神經學症狀，如局部神經缺損、意識改變等。這不直接導致高腦壓，也與血糖和血氧高低無關。", "category": "neurology", "difficulty": "medium", "source": "114_general_Q59"}, {"id": 60, "question": "下列何者最可能發生腦盜血現象（cerebral steal phenomenon）？", "options": {"A": "慢性阻塞性肺病病史者", "B": "腦血管狹窄或動脈粥樣硬化病史者", "C": "心室早期收縮（PVCs）病史者", "D": "肝硬化與門脈高壓病史者"}, "answer": "B", "explanation": "腦盜血現象（cerebral steal）發生在腦血管狹窄或阻塞的病人：當血管擴張劑（如吸入性麻醉劑）使正常血管擴張，血流被「偷走」至正常血管，而使原本缺血區域的血流更加減少。這種現象最常見於腦血管狹窄或動脈粥樣硬化的病人。", "category": "neurology", "difficulty": "medium", "source": "114_general_Q60"}, {"id": 61, "question": "下列何者最可能發生腦部低灌流？（MAP：mean arterial pressure；ICP：intracranial pressure）", "options": {"A": "MAP=95mmHg，ICP=20mmHg", "B": "MAP=70mmHg，ICP=10mmHg", "C": "MAP=85mmHg，ICP=20mmHg", "D": "MAP=60mmHg，ICP=10mmHg"}, "answer": "D", "explanation": "腦灌流壓（CPP）= MAP - ICP。各選項計算：(A)CPP=75、(B)CPP=60、(C)CPP=65、(D)CPP=50mmHg。正常CPP目標≥60mmHg，CPP=50mmHg是最低的，最可能發生腦低灌流。", "category": "neurology", "difficulty": "medium", "source": "114_general_Q61"}, {"id": 62, "question": "有關腦代謝率（cerebral metabolic rate of oxygen consumption，CMRO₂）和腦血流量（cerebral blood flow，CBF）的敘述，下列何者正確？", "options": {"A": "CBF與CMRO₂變化無關", "B": "降低CMRO₂會導致CBF上升", "C": "低體溫會降低CMRO₂，進而降低CBF", "D": "當CMRO₂增加時，CBF會下降以保護腦組織"}, "answer": "C", "explanation": "腦血流的代謝耦合（flow-metabolism coupling）：CBF與CMRO₂緊密相關，CMRO₂增加→CBF增加；CMRO₂下降（如低體溫）→CBF下降。低體溫降低腦代謝率，進而降低腦血流，這是低體溫腦保護的機制之一。", "category": "neurology", "difficulty": "medium", "source": "114_general_Q62"}, {"id": 63, "question": "下列何者最符合Cushing's triad？", "options": {"A": "高血壓、頻脈、潮式呼吸", "B": "低血壓、心搏過速、呼吸急促", "C": "高血壓、心搏過緩、不規則呼吸", "D": "低血壓、心律不整、呼吸急促"}, "answer": "C", "explanation": "Cushing's triad（庫欣三徵）是顱內壓急劇升高的晚期徵象：①高血壓（Kocher-Cushing reflex：血壓升高以克服高顱壓）、②心搏過緩（迷走神經反應）、③不規則呼吸（呼吸中樞受壓）。出現此三徵象提示腦幹即將受壓，為神經急症。", "category": "neurology", "difficulty": "easy", "source": "114_general_Q63"}, {"id": 64, "question": "車禍病人麻醉前評估如下：發出無意義聲音、因疼痛刺激睜眼、對疼痛刺激伸展四肢。請問此病人的GCS（glasgow coma scale）總分為何？", "options": {"A": "6", "B": "8", "C": "10", "D": "12"}, "answer": "A", "explanation": "GCS評估：眼睛（E）：因疼痛刺激睜眼=2分；語言（V）：發出無意義聲音=2分；運動（M）：對疼痛刺激伸展（去大腦姿勢，屈曲為3，伸展為2）=2分。總分=2+2+2=6分。", "category": "neurology", "difficulty": "medium", "source": "114_general_Q64"}, {"id": 65, "question": "重症肌無力穩定控制的病人即將接受甲狀腺切除術，下列何者為最適當的處置？", "options": {"A": "停用所有抗膽鹼酯酶藥物", "B": "如使用succinylcholine應考慮加大劑量", "C": "改採局部麻醉以避免症狀加重", "D": "長效型肌肉鬆弛劑優於短效型肌肉鬆弛劑"}, "answer": "B", "explanation": "重症肌無力病人對succinylcholine（去極化肌鬆劑）可能有抵抗（resistance），因為乙醯膽鹼受體數量減少，可能需要加大劑量。抗膽鹼酯酶藥物（如pyridostigmine）術前通常維持使用（非停用）。應盡量使用短效型非去極化肌鬆劑，並密切監測TOF。局部麻醉並非必須，全身麻醉在適當處置下是安全的。", "category": "neuromuscular_disease", "difficulty": "hard", "source": "114_general_Q65"}, {"id": 66, "question": "有關手術後慢性疼痛的機轉，下列何者最有可能？", "options": {"A": "抑制自主神經活動造成交感神經過度興奮", "B": "神經再生過度活化造成腦內啡耗竭", "C": "周邊及中樞神經系統的敏化反應", "D": "疼痛傳導阻斷導致反彈性疼痛加劇"}, "answer": "C", "explanation": "術後慢性疼痛（chronic post-surgical pain，CPSP）的主要機轉為中樞和周邊神經敏化（sensitization）：手術創傷→持續傷害性刺激→神經可塑性改變→痛覺過敏和異痛症。這是目前最廣泛接受的解釋，也是多模式超前鎮痛（preemptive analgesia）的理論基礎。", "category": "pain_management", "difficulty": "medium", "source": "114_general_Q66"}, {"id": 67, "question": "下列何者與胃食道逆流較不相關？", "options": {"A": "肥胖", "B": "高血壓", "C": "懷孕", "D": "食道裂孔疝氣"}, "answer": "B", "explanation": "胃食道逆流（GERD）的相關危險因素：肥胖（腹壓增加）、懷孕（荷爾蒙影響LES+腹壓）、食道裂孔疝氣（解剖結構異常）、吸菸、飲酒、某些藥物等。高血壓本身不是GERD的危險因素（雖然某些降壓藥如鈣離子阻斷劑可能降低LES張力，但高血壓疾病本身與GERD無直接相關）。", "category": "preoperative_assessment", "difficulty": "easy", "source": "114_general_Q67"}, {"id": 68, "question": "有關糖尿病的術前評估，下列何者最不適當？", "options": {"A": "評估是否存在腎臟病變，甚至腎衰竭", "B": "評估甲狀腺功能是否正常，影響藥物代謝", "C": "評估關節活動性受限，影響氣道處置", "D": "考慮是否存在胃輕癱，增加胃內容物吸入的風險"}, "answer": "B", "explanation": "糖尿病術前評估重點：心血管（自律神經病變）、腎功能、血糖控制、周邊神經病變、胃輕癱（增加吸入風險）、關節活動受限（可能影響頸椎活動，影響插管）。評估甲狀腺功能並非糖尿病術前評估的重點項目，兩者無必然關聯。", "category": "preoperative_assessment", "difficulty": "medium", "source": "114_general_Q68"}, {"id": 69, "question": "有關嗜鉻細胞瘤和副神經節瘤的術前評估，下列何者錯誤？", "options": {"A": "主要目標是盡量減少兒茶酚胺激增並評估終末器官損傷", "B": "術前應進行心電圖和超音波心臟檢查以評估心血管功能", "C": "術前應至少進行7至14天的α腎上腺素受體阻斷劑治療", "D": "建議病人在手術前應攝取低鈉飲食和限制液體攝取"}, "answer": "D", "explanation": "嗜鉻細胞瘤術前準備：α阻斷劑（phenoxybenzamine或選擇性α₁阻斷劑）至少7-14天；補充「高鹽飲食和充足液體」（非低鈉限液），以防止血管擴張後相對性血容不足；評估心血管功能（ECG、心臟超音波）。低鈉限液會加重術中血壓不穩定，是錯誤的建議。", "category": "preoperative_assessment", "difficulty": "hard", "source": "114_general_Q69"}, {"id": 70, "question": "有關腎功能的術前評估，下列何者正確？（血清肌酸酐：serum creatinine；BUN：blood urea nitrogen；GFR：腎絲球過濾率）", "options": {"A": "血清肌酸酐濃度能夠可靠地偵測出輕微的腎功能障礙", "B": "相較於血清肌酸酐或BUN，肌酸酐清除率是衡量GFR更可靠的指標", "C": "BUN濃度主要受腎功能影響，不受飲食或水合狀態的影響", "D": "血清肌酸酐濃度無法反映肌肉生產肌酸酐與腎臟排泄之間的平衡"}, "answer": "B", "explanation": "肌酸酐清除率（Ccr，由24小時尿液收集計算）是比血清肌酸酐或BUN更直接反映GFR的指標。血清肌酸酐受肌肉量影響，輕度腎功能下降時可能在正常範圍（腎臟代償）。BUN受蛋白質攝入、肌肉分解、水合狀態影響。血清肌酸酐確實反映生產與排泄的平衡（非無法反映）。", "category": "preoperative_assessment", "difficulty": "medium", "source": "114_general_Q70"}, {"id": 71, "question": "有關sugammadex（Bridion®）的敘述，下列何者錯誤？", "options": {"A": "sugammadex可安全使用於氣道敏感的病人", "B": "sugammadex 80%主要經由肝臟代謝排除", "C": "即使深層的阻斷也能依適當劑量來恢復", "D": "sugammadex對cisatracurium無效"}, "answer": "B", "explanation": "Sugammadex主要以原型經由腎臟排除（約>80%腎排泄），而非肝臟代謝。這使得腎功能不全病人需謹慎使用（藥物累積風險）。Sugammadex對rocuronium和vecuronium有效，對cisatracurium（苯磺順阿曲庫銨）確實無效（因為sugammadex只包裹氨基甾體類肌鬆劑）。", "category": "pharmacology", "difficulty": "medium", "source": "114_general_Q71"}, {"id": 72, "question": "有關惡性高熱的敘述，下列何者錯誤？", "options": {"A": "會被succinylcholine及揮發性麻醉藥誘發", "B": "體溫升高是最敏感且具特異性的早期症狀", "C": "一旦發生後應立即給予dantrolene治療", "D": "是因為肌漿質網上的鈣離子通道出現問題"}, "answer": "B", "explanation": "惡性高熱（MH）的最早期症狀為EtCO₂升高（CO₂產生增加）和心跳加快，體溫升高相對較晚出現，且不具特異性。因此「體溫升高是最敏感且具特異性的早期症狀」是錯誤的說法。MH由ryanodine受體（RYR1）突變導致鈣離子持續釋放引起。", "category": "malignant_hyperthermia", "difficulty": "medium", "source": "114_general_Q72"}, {"id": 73, "question": "有關重症肌無力的敘述，下列何者錯誤？", "options": {"A": "屬於自體免疫疾病，主要影響骨骼肌", "B": "會在活動時越動越無力，休息時緩解", "C": "麻醉處置應考慮肺誤吸的風險", "D": "惡化的誘發因子有壓力、感染、高血鉀"}, "answer": "D", "explanation": "重症肌無力（MG）惡化的誘發因子包括：感染（尤其上呼吸道感染）、手術/麻醉、壓力、某些藥物（抗生素、神經肌肉阻斷劑等）、月經、懷孕等。「高血鉀」並非MG惡化的典型誘發因子（高血鉀是影響肌肉電氣的問題，與MG自體免疫病程不同）。", "category": "neuromuscular_disease", "difficulty": "medium", "source": "114_general_Q73"}, {"id": 74, "question": "有關睡眠呼吸中止症中STOP-Bang的各項風險因子，下列何者錯誤？", "options": {"A": "打呼", "B": "年齡<50歲", "C": "BMI>35 kg/m²", "D": "頸圍>40公分"}, "answer": "B", "explanation": "STOP-Bang問卷：S=Snoring（打呼）、T=Tired（疲倦）、O=Observed（被觀察到呼吸停止）、P=Pressure（高血壓）、B=BMI>35、A=Age>50歲（非<50歲）、N=Neck circumference>40cm、G=Gender=male。年齡風險因子為「>50歲」，而非「<50歲」，故(B)是錯誤的。", "category": "preoperative_assessment", "difficulty": "easy", "source": "114_general_Q74"}, {"id": 75, "question": "有關術中呼吸道著火的風險評估，下列何者錯誤？", "options": {"A": "有火源，例如電燒或雷射", "B": "有燃料，例如棉花或氣管內管", "C": "有氧化劑，例如氧氣、笑氣或空氣", "D": "僅發生於插管全身麻醉"}, "answer": "D", "explanation": "呼吸道著火（airway fire）需要三要素同時存在：火源（電燒、雷射）、燃料（氣管內管、棉墊）、氧化劑（高濃度O₂、笑氣）。呼吸道著火「不限於插管麻醉」，也可發生於面罩給氧時（頭頸部手術+電燒），甚至局部麻醉加上鎮靜（sedation with supplemental O₂）的情況。", "category": "patient_safety", "difficulty": "medium", "source": "114_general_Q75"}, {"id": 76, "question": "下列哪個疾病發生困難氣道的風險較低？", "options": {"A": "Pierre Robin syndrome", "B": "重症肌無力", "C": "舌癌", "D": "僵直性脊椎炎"}, "answer": "B", "explanation": "困難氣道的高風險疾病：Pierre Robin syndrome（小下顎、舌後墜、腭裂）、舌癌（腫瘤阻塞氣道）、僵直性脊椎炎（頸椎固定）、肢端肥大症、燒傷等。重症肌無力（MG）本身不會造成解剖上的困難氣道，其麻醉風險主要在於肌肉無力和術後通氣問題，而非插管困難。", "category": "airway_management", "difficulty": "medium", "source": "114_general_Q76"}, {"id": 77, "question": "某地區醫院為確保其專科護理師在醫師監督下執行醫療業務時，能符合法規要求並維持高品質的病人照護，下列何者最能展現其精神？", "options": {"A": "醫院可授權資深專科護理師在緊急情況下，自行決定其可之醫療業務範圍，並於事後24小時內口頭向監督醫師回報", "B": "醫院應成立專科護理師執行醫療業務委員會，負責核定專科護理師預立醫療流程內容及標準作業程序", "C": "為確保病人安全，所有侵入性醫療業務必須由醫師親自在場監督，專科護理師方能執行", "D": "監督醫師對於專科護理師執行之所有醫療業務，僅需在病人出院前完成紙本或電子醫囑記錄"}, "answer": "B", "explanation": "依「專科護理師於醫師監督下執行醫療業務辦法」，醫療機構應成立委員會，核定預立醫療流程（standard operating procedure）和標準作業程序，這是確保合法性和品質的核心機制。監督不必然需要醫師親自在場，但需有SOP基礎和事後回報機制。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q77"}, {"id": 78, "question": "依據民國113年修訂之「專科護理師於醫師監督下執行醫療業務辦法」中，醫師監督下的定義與內涵，是確保專科護理師在執行醫療業務時具備法定授權依據與臨床安全保障的關鍵，下列敘述何者錯誤？", "options": {"A": "醫師需事先參與並核定預立醫療流程內容", "B": "醫療機構需定期審查流程內容及執行現況", "C": "急救時各種侵入性處置不受此規範", "D": "所謂醫師之監督不以醫師親自在場為必要"}, "answer": "C", "explanation": "急救時的處置並非「不受規範」，仍需依照預立醫療流程執行，只是在緊急情況下可以先執行、事後報告。說「不受此規範」是錯誤的，緊急情況有其特殊處理程序，但仍在法規框架內。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q78"}, {"id": 79, "question": "依據民國113年修訂之「專科護理師於醫師監督下執行醫療業務辦法」規範，下列哪一項侵入性檢查處置，專科護理師在醫師監督下可以執行？", "options": {"A": "執行超音波導引抽吸採集檢體", "B": "操作支氣管鏡檢查採樣及判讀", "C": "執行陰道擴張器置入採集檢體", "D": "操作膀胱鏡以生理食鹽水沖洗"}, "answer": "C", "explanation": "依照113年修訂的辦法，陰道擴張器置入採集檢體（如子宮頸抹片採集相關操作）在醫師監督下可由專科護理師執行。支氣管鏡操作及判讀、膀胱鏡操作通常屬醫師職責，超音波導引抽吸在不同情境下有不同規範。依公告答案為C。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q79"}, {"id": 80, "question": "專科護理師執業登記於居家護理所，其執行「專科護理師於醫師監督下執行醫療業務辦法」之醫療業務，下列敘述何者正確？", "options": {"A": "居家護理所應成立專科護理師執行醫療業務委員會，並由醫師背景的委員擔任召集人", "B": "執行預立醫療流程後，監督醫師不需要到居家護理所，可以傳真方式簽署", "C": "所執行之醫療業務經監督醫師同意後即可執行，不需居家護理所核定", "D": "執登之居家護理所負責人必需為專科護理師，始能針對其所執行業務進行督導"}, "answer": "B", "explanation": "居家護理所環境特殊，監督醫師不需親自到場，可以遠距或傳真等方式完成簽署確認，這符合辦法中「監督不以親自在場為必要」的精神，同時維持法定程序。其他選項的描述均有違規或不符法規的問題。", "category": "ethics_law", "difficulty": "hard", "source": "114_general_Q80"}]};
DATA_REGISTRY.nurse[114] = { advanced: DATA_114_ADVANCED, general: DATA_114_GENERAL };

// ══════════════════════════════════════════════
//  LOCALSTORAGE: 錯題
// ══════════════════════════════════════════════
const WRONG_KEY = 'anesthesia_wrong_v1';

// ── Image Lightbox ──
function openLightbox(src) {
  const lb = document.getElementById('img-lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('show');
}
function closeLightbox() {
  document.getElementById('img-lightbox').classList.remove('show');
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});

function loadWrongData() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY)) || {}; }
  catch { return {}; }
}
function saveWrongData(d) {
  localStorage.setItem(WRONG_KEY, JSON.stringify(d));
}
function addWrong(q, userAns) {
  const d = loadWrongData();
  const key = `${state.year}_${state.subject}_${q.id}`;
  d[key] = {
    year: state.year,
    subject: state.subject,
    subject_name: getSubjectName(state.subject),
    id: q.id,
    question: q.question,
    image: q.image || null,
    options: q.options,
    answer: q.answer,
    userAns: userAns,
    explanation: q.explanation,
    ts: Date.now()
  };
  saveWrongData(d);
}
function removeWrong(key) {
  const d = loadWrongData();
  delete d[key];
  saveWrongData(d);
}
function getWrongCount() {
  return Object.keys(loadWrongData()).length;
}

function getSubjectName(s) {
  return s === 'advanced' ? '進階專科護理' : '專科護理通論';
}

// ══════════════════════════════════════════════
//  HOME SELECTORS
// ══════════════════════════════════════════════
function selectRole(el, role) {
  document.querySelectorAll('#screen-home .selector-grid:nth-of-type(1) .sel-btn')
    .forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.role = role;
}
function selectYear(el, year) {
  if (el.classList.contains('disabled')) return;
  document.querySelectorAll('#year-grid .sel-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.year = year;
}
function selectSubject(el, subject) {
  el.closest('.selector-grid').querySelectorAll('.sel-btn')
    .forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.subject = subject;
}
function selectMode(el, mode) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.mode = mode;
}

function toggleChip(el, type, value) {
  el.classList.toggle('active');
  const arr = type === 'cat' ? state.filterCat : state.filterDiff;
  const idx = arr.indexOf(value);
  if (idx === -1) arr.push(value);
  else arr.splice(idx, 1);
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
function startQuiz() {
  const data = DATA_REGISTRY[state.role]?.[state.year]?.[state.subject];
  if (!data) { alert('此年份/科目題庫尚未加入，敬請期待！'); return; }

  let qs = data.questions;
  if (state.filterCat.length > 0)  qs = qs.filter(q => state.filterCat.includes(q.category));
  if (state.filterDiff.length > 0) qs = qs.filter(q => state.filterDiff.includes(q.difficulty));
  if (qs.length === 0) { alert('目前篩選條件無符合題目，請調整篩選。'); return; }
  state.questions = qs;
  state.current = 0;
  state.answers = {};
  state.sessionWrong = [];

  showScreen('quiz');
  renderQuestion();

  if (state.mode === 'exam') {
    document.getElementById('exam-nav-wrap').style.display = 'block';
    renderExamDots();
  } else {
    document.getElementById('exam-nav-wrap').style.display = 'none';
  }
}

// ══════════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════════
function renderQuestion() {
  const q = state.questions[state.current];
  const total = state.questions.length;
  const answered = Object.keys(state.answers).length;
  const correct = Object.values(state.answers).filter((v,i) => {
    const qi = state.questions[parseInt(Object.keys(state.answers)[i])];
    return qi && isCorrect(qi, v);
  }).length;

  // progress
  const pct = ((state.current + 1) / total * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent =
    `第 ${state.current + 1} 題 / 共 ${total} 題`;
  if (state.mode === 'practice') {
    document.getElementById('progress-score').textContent =
      `已答 ${answered} 題`;
  }

  // meta
  document.getElementById('q-meta-year').textContent = state.year + ' 年';
  document.getElementById('q-meta-subject').textContent = getSubjectName(state.subject);
  document.getElementById('q-meta-num').textContent = `第 ${q.id} 題`;
  const catEl = document.getElementById('q-meta-cat');
  const diffEl = document.getElementById('q-meta-diff');
  const catLabels = {"pharmacology": "藥理", "physiology": "生理", "airway": "呼吸道", "regional": "區域麻醉", "monitoring": "監測", "anesthetic_mgmt": "麻醉照護", "crisis": "緊急處置", "clinical_assessment": "術前評估", "general_nursing": "通論護理"};
  const diffLabels = {"easy": "初級", "medium": "中級", "hard": "高級"};
  catEl.textContent = catLabels[q.category] || q.category || '';
  catEl.style.display = q.category ? '' : 'none';
  diffEl.textContent = diffLabels[q.difficulty] || '';
  diffEl.className = 'tag q-tag-diff-' + (q.difficulty || '');

  // note
  document.getElementById('q-note').style.display = q.note ? 'inline-block' : 'none';

  // text
  document.getElementById('q-text').textContent = q.question;

  // image
  const imgWrap = document.getElementById('q-image-wrap');
  const imgEl = document.getElementById('q-image');
  const imgCap = document.getElementById('q-image-caption');
  if (q.image) {
    imgEl.src = 'images/' + q.image;
    imgEl.onclick = () => openLightbox(imgEl.src);
    imgEl.onerror = () => {
      imgWrap.style.display = 'none';
      console.warn('題目圖片載入失敗：' + q.image);
    };
    imgCap.textContent = q.image_caption || '';
    imgCap.style.display = q.image_caption ? '' : 'none';
    imgWrap.style.display = '';
  } else {
    imgWrap.style.display = 'none';
    imgEl.removeAttribute('src');
  }

  // options
  const ol = document.getElementById('options-list');
  ol.innerHTML = '';
  const answered_this = state.answers[state.current];

  Object.entries(q.options).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';

    // in exam mode: show selection but no correct/wrong until finish
    if (answered_this) {
      if (state.mode === 'practice') {
        const correct_keys = q.answer.split('');
        if (correct_keys.includes(key)) btn.classList.add('correct');
        else if (key === answered_this) btn.classList.add('wrong');
        btn.disabled = true;
      } else {
        if (key === answered_this) btn.style.borderColor = 'var(--accent)';
      }
    }

    btn.innerHTML = `<span class="option-label">${key}</span><span>${val}</span>`;
    if (!answered_this || state.mode === 'exam') {
      btn.onclick = () => selectAnswer(key);
    } else {
      btn.disabled = true;
    }
    ol.appendChild(btn);
  });

  // explanation (practice mode only, after answer)
  const expBox = document.getElementById('explanation-box');
  if (state.mode === 'practice' && answered_this) {
    document.getElementById('explanation-text').textContent = q.explanation;
    expBox.classList.add('show');
  } else {
    expBox.classList.remove('show');
  }

  // nav buttons
  document.getElementById('btn-prev').disabled = state.current === 0;
  const isLast = state.current === total - 1;
  if (state.mode === 'exam') {
    document.getElementById('btn-next').style.display = isLast ? 'none' : 'block';
    document.getElementById('btn-finish').style.display = isLast ? 'block' : 'none';
  } else {
    document.getElementById('btn-next').style.display = 'block';
    document.getElementById('btn-next').textContent = isLast ? '完成' : '下一題 →';
    document.getElementById('btn-finish').style.display = 'none';
  }

  if (state.mode === 'exam') renderExamDots();
}

function isCorrect(q, ans) {
  return q.answer.split('').includes(ans);
}

function selectAnswer(key) {
  const q = state.questions[state.current];
  state.answers[state.current] = key;

  if (state.mode === 'practice') {
    if (!isCorrect(q, key)) {
      addWrong(q, key);
    }
    renderQuestion();
  } else {
    // exam mode: just highlight selected
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.style.borderColor = '';
    });
    document.querySelectorAll('.option-btn')[
      Object.keys(q.options).indexOf(key)
    ].style.borderColor = 'var(--accent)';
    renderExamDots();
  }
}

function nextQ() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    renderQuestion();
  } else if (state.mode === 'practice') {
    showResult();
  }
}
function prevQ() {
  if (state.current > 0) {
    state.current--;
    renderQuestion();
  }
}
function finishExam() {
  // show correct/wrong for exam mode
  examGrade();
  showResult();
}

function examGrade() {
  // for exam mode: add wrongs to localStorage
  state.questions.forEach((q, i) => {
    const ans = state.answers[i];
    if (ans && !isCorrect(q, ans)) {
      addWrong(q, ans);
    }
  });
}

// ══════════════════════════════════════════════
//  EXAM DOTS
// ══════════════════════════════════════════════
function renderExamDots() {
  const grid = document.getElementById('exam-dots');
  grid.innerHTML = '';
  state.questions.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'exam-dot';
    if (state.answers[i]) dot.classList.add('answered');
    if (i === state.current) dot.classList.add('current');
    dot.textContent = i + 1;
    dot.onclick = () => { state.current = i; renderQuestion(); };
    grid.appendChild(dot);
  });
}

// ══════════════════════════════════════════════
//  RESULT
// ══════════════════════════════════════════════
function showResult() {
  const total = state.questions.length;
  let correctCount = 0, wrongCount = 0, skipCount = 0;

  state.questions.forEach((q, i) => {
    const ans = state.answers[i];
    if (!ans) { skipCount++; return; }
    if (isCorrect(q, ans)) correctCount++;
    else wrongCount++;
  });

  const score = (correctCount / total * 100).toFixed(1);
  const pct = Math.round(correctCount / total * 360);

  document.getElementById('score-ring').style.setProperty('--pct', pct + 'deg');
  document.getElementById('score-num').textContent = score + '%';
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;
  document.getElementById('stat-skip').textContent = skipCount;

  const pass = parseFloat(score) >= 60;
  document.getElementById('result-title').textContent = pass ? '答題完成' : '繼續加油！';
  document.getElementById('result-sub').textContent =
    `${state.year} 年 ${getSubjectName(state.subject)} ・ 共 ${total} 題`;

  // wrong summary
  const wrongData = loadWrongData();
  const thisSessWrong = state.questions
    .map((q, i) => ({q, ans: state.answers[i], i}))
    .filter(({q, ans}) => ans && !isCorrect(q, ans));

  if (thisSessWrong.length > 0) {
    const summary = `【本次練習錯題摘要】\n年份：${state.year}年 科目：${getSubjectName(state.subject)}\n共答錯 ${thisSessWrong.length} 題\n\n` +
      thisSessWrong.map(({q, ans}) =>
        `Q${q.id}. ${q.question}\n我的答案：${ans}（${q.options[ans]}）\n正確答案：${q.answer}（${q.options[q.answer.split('')[0]]}）`
      ).join('\n\n');
    document.getElementById('wrong-copy-text').textContent = summary;
    document.getElementById('wrong-copy-box').style.display = 'block';
  } else {
    document.getElementById('wrong-copy-box').style.display = 'none';
  }

  showScreen('result');
}

function reviewWrong() {
  showWrongList();
}

function copyWrongSummary() {
  const text = document.getElementById('wrong-copy-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '已複製！';
    setTimeout(() => btn.textContent = '複製摘要', 1500);
  });
}

// ══════════════════════════════════════════════
//  WRONG LIST
// ══════════════════════════════════════════════
function showWrongList() {
  const d = loadWrongData();
  const entries = Object.entries(d).sort((a,b) => b[1].ts - a[1].ts);
  const el = document.getElementById('wronglist-content');

  if (entries.length === 0) {
    el.innerHTML = '<div style="text-align:center; color:var(--text3); padding:40px">目前沒有錯題記錄</div>';
  } else {
    el.innerHTML = entries.map(([key, v]) => `
      <div class="wrong-item">
        <div class="wrong-item-header">
          <span class="wrong-item-num">${v.year}年 ${v.subject_name} Q${v.id}</span>
        </div>
        <div class="wrong-item-q">${v.question}</div>
        ${v.image ? `<div style="text-align:center; margin:10px 0; padding:8px; background:var(--surface2); border-radius:6px"><img src="images/${v.image}" alt="題目附圖" style="max-width:100%; border-radius:4px; cursor:zoom-in" onclick="openLightbox(this.src)" onerror="this.parentElement.style.display='none'"/></div>` : ''}
        <div class="wrong-item-ans">
          <span class="your">我的答案：${v.userAns}（${v.options[v.userAns] || '—'}）</span>
          <span class="correct">正解：${v.answer}（${v.options[v.answer.split('')[0]] || '—'}）</span>
        </div>
        <div style="margin-top:10px; font-size:12px; color:var(--text3); line-height:1.7">${v.explanation}</div>
        <button class="btn-sm" style="margin-top:10px; color:var(--wrong); border-color:rgba(248,113,113,.3)"
          onclick="removeWrong('${key}'); showWrongList()">移除此題</button>
      </div>
    `).join('');
  }

  showScreen('wronglist');
  document.getElementById('btn-home').style.display = 'block';
  document.getElementById('btn-wronglist').style.display = 'none';
}

function clearWrongList() {
  if (!confirm('確定要清除所有錯題記錄？')) return;
  localStorage.removeItem(WRONG_KEY);
  showWrongList();
}

function copyWrongSummaryFromList() {
  const d = loadWrongData();
  const entries = Object.entries(d);
  if (entries.length === 0) { alert('沒有錯題記錄'); return; }
  const text = '【錯題記錄摘要】\n共 ' + entries.length + ' 題\n\n' +
    entries.map(([k, v]) =>
      `Q${v.id}（${v.year}年 ${v.subject_name}）\n${v.question}\n正確答案：${v.answer}（${v.options[v.answer.split('')[0]]}）`
    ).join('\n\n');
  navigator.clipboard.writeText(text).then(() => alert('已複製！可貼給 AI 請求解析'));
}

// ══════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ══════════════════════════════════════════════
function showScreen(name) {
  ['home','quiz','result','wronglist'].forEach(s => {
    document.getElementById('screen-'+s).style.display = 'none';
  });
  document.getElementById('screen-'+name).style.display = 'block';
  document.getElementById('btn-home').style.display = name !== 'home' ? 'block' : 'none';
  document.getElementById('btn-wronglist').style.display = name !== 'wronglist' ? 'block' : 'none';
  window.scrollTo(0, 0);
}

function goHome() {
  updateWrongEntry();
  showScreen('home');
}

function updateWrongEntry() {
  const n = getWrongCount();
  const entry = document.getElementById('wrong-entry');
  entry.style.display = n > 0 ? 'flex' : 'none';
  document.getElementById('wrong-total-count').textContent = n;
}

// ══════════════════════════════════════════════
//  PASSWORD
// ══════════════════════════════════════════════
const PW_HASH = 'c23a6705bdff0a98b105711dc4b9964f5d82f3a5d5c4afe13a2795ef4155cabe';
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (!val) return;
  const hash = await sha256(val);
  if (hash === PW_HASH) {
    document.getElementById('pw-screen').classList.add('hidden');
    try { sessionStorage.setItem('anesthesia_auth','1'); } catch(e) {}
  } else {
    const err = document.getElementById('pw-error');
    err.classList.remove('hidden');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => err.classList.add('hidden'), 3000);
  }
}
function togglePwVis() {
  const input = document.getElementById('pw-input');
  const btn = document.getElementById('pw-vis-btn');
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '顯示' : '隱藏';
}
try {
  if (sessionStorage.getItem('anesthesia_auth') === '1')
    document.getElementById('pw-screen').classList.add('hidden');
} catch(e) {}

// ══════════════════════════════════════════════
//  FONT SIZE TOGGLE
// ══════════════════════════════════════════════
function toggleFontSize() {
  const isLarge = document.body.classList.toggle('large-font');
  const btn = document.getElementById('btn-fontsize');
  btn.textContent = isLarge ? '字︎ A−' : '字︎ A';
  try { localStorage.setItem('anesthesia_fontsize', isLarge ? 'large' : 'normal'); } catch(e) {}
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
try {
  if (localStorage.getItem('anesthesia_fontsize') === 'large') {
    document.body.classList.add('large-font');
    const btn = document.getElementById('btn-fontsize');
    if (btn) btn.textContent = '字︎ A−';
  }
} catch(e) {}
updateWrongEntry();
</script>
