<!DOCTYPE html>
<html lang="zh-TW" style="background:#f2f5f8!important">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻醉專科護理師題庫練習系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f2f5f8;
    --surface: #ffffff;
    --surface2: #edf2f7;
    --border: #cdd6e0;
    --border2: #b0c0cf;
    --accent: #5b6e82;
    --accent2: #7a90a8;
    --correct: #2e7d4f;
    --wrong: #c0392b;
    --warn: #b5660f;
    --text: #1e2a35;
    --text2: #445060;
    --text3: #7a8fa0;
    --text4: #b0c0cf;
    --surface-input: #e8edf2;
    --step-bg: #d8e2ec;
    --warn-bg: #fef6ec;
    --warn-bd: #f0c87a;
    --correct-bg: #f0faf4;
    --correct-bd: #a8d5b5;
    --wrong-bg: #fdf1f0;
    --wrong-bd: #f7d6d3;
    --header-bg: #445668;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: var(--header-bg);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .header-logo {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.18);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ffffff;
  }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 1px; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  .btn-sm {
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: transparent;
    color: rgba(255,255,255,0.85);
    transition: all .2s;
  }
  .btn-sm:hover { border-color: rgba(255,255,255,0.7); color: #fff; }
  .btn-sm.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); }

  /* ── MAIN LAYOUT ── */
  .container { max-width: 820px; margin: 0 auto; padding: 28px 20px 60px; }

  /* ── SCREEN: HOME ── */
  #screen-home { display: block; }
  #screen-quiz, #screen-result, #screen-wronglist { display: none; }

  .home-hero {
    text-align: center;
    padding: 40px 0 32px;
  }
  .home-hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .home-hero p { font-size: 14px; color: var(--text2); }

  .selector-section { margin-bottom: 28px; }
  .selector-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .selector-grid {
    display: grid;
    gap: 10px;
  }
  .selector-grid.col2 { grid-template-columns: 1fr 1fr; }
  .selector-grid.col3 { grid-template-columns: repeat(3, 1fr); }
  .selector-grid.col5 { grid-template-columns: repeat(5, 1fr); }
  .selector-grid.col6 { grid-template-columns: repeat(6, 1fr); }

  .sel-btn {
    padding: 14px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text2);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .sel-btn:hover { border-color: var(--accent); color: var(--text); }
  .sel-btn.selected {
    border-color: var(--accent);
    background: var(--step-bg);
    color: var(--accent);
    font-weight: 500;
  }
  .sel-btn .badge {
    display: block;
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
  }
  .sel-btn.disabled { opacity: 0.35; pointer-events: none; }

  .mode-card {
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    cursor: pointer;
    transition: all .2s;
  }
  .mode-card:hover { border-color: var(--accent); }
  .mode-card.selected { border-color: var(--accent); background: var(--surface2); }
  .mode-card-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .mode-card-desc { font-size: 12px; color: var(--text3); }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 8px;
  }
  .start-btn:hover { opacity: 0.88; }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── STATS BAR ── */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text2);
  }
  .stat-chip span { color: var(--text); font-weight: 600; }

  /* ── WRONG LIST ENTRY POINT ── */
  .wrong-entry {
    margin-top: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wrong-entry-info { font-size: 13px; }
  .wrong-entry-count { color: var(--warn); font-weight: 600; font-size: 15px; }

  /* ── QUIZ SCREEN ── */
  .quiz-progress-wrap { margin-bottom: 20px; }
  .quiz-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .3s ease;
  }
  .quiz-progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px;
    margin-bottom: 16px;
  }
  .question-meta {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex;
    gap: 10px;
  }
  .question-meta .tag {
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .question-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 20px;
  }
  .note-badge {
    display: inline-block;
    background: var(--warn-bg);
    border: 1px solid var(--warn-bd);
    color: var(--warn);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  .question-image-wrap {
    margin: 0 0 20px;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
  }
  .question-image {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    background: #fff;
    cursor: zoom-in;
    transition: transform .15s;
  }
  .question-image:hover { transform: scale(1.01); }
  .question-image-caption {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text3);
    font-family: 'Noto Serif TC', serif;
  }
  /* lightbox 點圖放大 */
  .img-lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    align-items: center; justify-content: center;
    cursor: zoom-out;
    padding: 20px;
  }
  .img-lightbox.show { display: flex; }
  .img-lightbox img {
    max-width: 95vw; max-height: 95vh;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all .15s;
    line-height: 1.6;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(91,127,255,.07); }
  .option-label {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 1px;
    transition: all .15s;
  }
  .option-btn.correct { border-color: var(--correct-bd); background: var(--correct-bg); }
  .option-btn.correct .option-label { background: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong-bd); background: var(--wrong-bg); }
  .option-btn.wrong .option-label { background: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: default; }

  .explanation-box {
    margin-top: 16px;
    padding: 16px 18px;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.8;
    display: none;
  }
  .explanation-box.show { display: block; }
  .explanation-box strong { color: var(--accent); }

  .quiz-nav {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .nav-btn.primary:hover { opacity: 0.85; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── EXAM MODE ── */
  .exam-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }
  .exam-dot {
    aspect-ratio: 1;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
  }
  .exam-dot:hover { border-color: var(--accent); }
  .exam-dot.answered { background: var(--accent); border-color: var(--accent); color: #fff; }
  .exam-dot.current { border-color: var(--warn); }

  /* ── RESULT SCREEN ── */
  .result-hero {
    text-align: center;
    padding: 36px 0 28px;
  }
  .result-score-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) var(--pct), var(--surface2) 0);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }
  .result-score-ring::before {
    content: '';
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--bg);
  }
  .result-score-num {
    position: relative;
    z-index: 1;
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .result-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    margin-bottom: 8px;
  }
  .result-sub { font-size: 13px; color: var(--text2); }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .result-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .result-stat-num { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .result-stat-label { font-size: 11px; color: var(--text3); }
  .result-stat.correct .result-stat-num { color: var(--correct); }
  .result-stat.wrong .result-stat-num { color: var(--wrong); }

  .result-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .result-actions .nav-btn { flex: 1; min-width: 140px; text-align: center; }

  .wrong-copy-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-top: 20px;
  }
  .wrong-copy-box h3 { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .wrong-copy-text {
    font-size: 12px;
    color: var(--text3);
    white-space: pre-wrap;
    max-height: 120px;
    overflow-y: auto;
    margin-bottom: 10px;
  }

  /* ── WRONG LIST SCREEN ── */
  .wrong-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .wrong-item-header {
    display: flex;
    gap: 10px;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .wrong-item-num { font-size: 12px; color: var(--text3); }
  .wrong-item-q { font-size: 13px; line-height: 1.6; }
  .wrong-item-ans {
    margin-top: 10px;
    font-size: 12px;
    display: flex;
    gap: 14px;
  }
  .wrong-item-ans .your { color: var(--wrong); }
  .wrong-item-ans .correct { color: var(--correct); }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .selector-grid.col5 { grid-template-columns: repeat(3, 1fr); }
    .selector-grid.col6 { grid-template-columns: repeat(3, 1fr); }
    .selector-grid.col3 { grid-template-columns: repeat(2, 1fr); }
    .exam-grid { grid-template-columns: repeat(8, 1fr); }
    .result-stats { grid-template-columns: 1fr 1fr; }
  }

  /* ── FILTER CHIPS ── */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .chip {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text3);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 0.3px;
  }
  .chip:hover { border-color: var(--accent-h); color: var(--text2); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip.diff-easy.active   { background: var(--correct); border-color: var(--correct); }
  .chip.diff-medium.active { background: var(--warn); border-color: var(--warn); }
  .chip.diff-hard.active   { background: var(--wrong); border-color: var(--wrong); }

  /* ── QUESTION META TAGS ── */
  .q-tag-cat  { background: var(--step-bg); color: var(--accent); }
  .q-tag-diff-easy   { background: var(--correct-bg); color: var(--correct); border-color: var(--correct-bd); }
  .q-tag-diff-medium { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-bd); }
  .q-tag-diff-hard   { background: var(--wrong-bg); color: var(--wrong); border-color: var(--wrong-bd); }

  /* ── FONT SIZE TOGGLE ── */
  body.large-font .question-text { font-size: 17px; }
  body.large-font .option-btn { font-size: 16px; padding: 16px 18px; }
  body.large-font .explanation-box { font-size: 15px; }
  body.large-font .home-hero h1 { font-size: 30px; }
  body.large-font .sel-btn { font-size: 15px; }
  body.large-font .wrong-item-q { font-size: 15px; }


  /* ── PASSWORD SCREEN ── */
  #pw-screen {
    position: fixed; inset: 0;
    background: #f2f5f8;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 24px;
  }
  #pw-screen.hidden { display: none; }
  .pw-card {
    background: #ffffff; border: 1.5px solid #cdd6e0;
    border-radius: 16px; padding: 40px 36px;
    width: 100%; max-width: 360px;
    box-shadow: 0 4px 20px rgba(91,110,130,0.12); text-align: center;
  }
  .pw-logo {
    width: 44px; height: 44px; background: #445668;
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; margin: 0 auto 20px; color: #fff;
  }
  .pw-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; color: #1e2a35; margin-bottom: 6px; }
  .pw-sub { font-size: 12px; color: #7a8fa0; margin-bottom: 28px; }
  .pw-input-wrap { position: relative; margin-bottom: 14px; }
  .pw-input {
    width: 100%; padding: 12px 44px 12px 14px;
    border: 1.5px solid #cdd6e0; border-radius: 10px;
    background: #e8edf2; font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif; color: #1e2a35;
    outline: none; transition: border-color .2s;
    letter-spacing: 2px; text-align: center;
  }
  .pw-input:focus { border-color: #5b6e82; background: #fff; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #7a8fa0; font-size: 13px; padding: 4px;
  }
  .pw-btn {
    width: 100%; padding: 13px; background: #445668; border: none;
    border-radius: 10px; color: #fff; font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; margin-top: 4px;
  }
  .pw-btn:hover { opacity: 0.88; }
  .pw-error { font-size: 12px; color: #c0392b; margin-top: 10px; min-height: 18px; }
  .pw-error.hidden { opacity: 0; }

</style>
</head>
<body style="background:#f2f5f8!important;color:#1e2a35!important">

<div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#445668;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans TC',sans-serif;">
  <div style="background:#fff;padding:36px 40px;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.25);min-width:300px;text-align:center;">
    <div style="font-size:38px;color:#5b6e82;margin-bottom:8px;">&#x2695;</div>
    <div style="font-size:18px;font-weight:600;color:#1e2a35;margin-bottom:4px;">麻醉專科護理師題庫</div>
    <div style="font-size:12px;color:#7a8fa0;letter-spacing:1px;margin-bottom:24px;">請輸入密碼</div>
    <input id="pw-input" type="password" inputmode="numeric" autocomplete="off"
      style="width:100%;padding:10px 12px;font-size:16px;text-align:center;letter-spacing:6px;border:1px solid #cdd6e0;border-radius:6px;background:#e8edf2;color:#1e2a35;margin-bottom:12px;">
    <div id="pw-error" style="font-size:12px;color:#c0392b;min-height:16px;margin-bottom:8px;">&nbsp;</div>
    <button id="pw-submit" style="width:100%;padding:10px;font-size:14px;background:#445668;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;">進入</button>
  </div>
</div>
<script>
(function(){
  var PW = '4108';
  var gate = document.getElementById('pw-gate');
  var input = document.getElementById('pw-input');
  var err = document.getElementById('pw-error');
  var btn = document.getElementById('pw-submit');
  document.body.style.overflow = 'hidden';
  try {
    if (sessionStorage.getItem('quiz_unlocked') === '1') {
      gate.remove(); document.body.style.overflow = '';
      return;
    }
  } catch(e){}
  setTimeout(function(){ input.focus(); }, 50);
  function unlock(){
    if (input.value === PW) {
      try { sessionStorage.setItem('quiz_unlocked','1'); } catch(e){}
      gate.remove();
      document.body.style.overflow = '';
    } else {
      err.textContent = '密碼錯誤';
      input.value = '';
      input.focus();
    }
  }
  btn.addEventListener('click', unlock);
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); unlock(); }
  });
})();
</script>

<div class="header">
  <div class="header-logo">&#x2695;</div>
  <div>

// ══════════════════════════════════════════════

const DATA_REGISTRY = {

};

const DATA_109_ADVANCED = {"meta": {"year": 109, "role": "nurse", "subject": "advanced", "subject_name": "進階專科護理", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "關於喉頭痙攣(laryngospasm)，以下敘述何者為非？", "options": {"A": "最常見的原因是淺層麻醉時刺激氣道", "B": "在輕度時可表現為哮喘(wheezing)呼吸", "C": "可給予低劑量succinylcholine(成人10-20 mg IV)鬆弛喉頭肌", "D": "可使用抬高下頜(jaw thrust)面罩持續正壓通氣"}, "answer": "B", "explanation": "輕度喉頭痙攣表現為高音調的喘鳴聲(stridor)，而非哮喘(wheezing)。Wheezing 是下呼吸道阻塞（如支氣管痙攣）的聲音。", "category": "airway", "difficulty": "medium", "source": "109_advanced_Q1"}, {"id": 2, "question": "目前臨床麻醉上常用「最小有效肺泡濃度值(MAC)」來描述吸入性麻醉藥的效力，請問MAC的正確單位是甚麼？", "options": {"A": "ml/min", "B": "mmHg", "C": "cmH2O", "D": "%"}, "answer": "D", "explanation": "MAC（Minimum Alveolar Concentration）是使50%病人在手術切皮時不產生體動反應所需的肺泡吸入麻醉藥濃度，單位為體積百分比（%）。", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q2"}, {"id": 3, "question": "關於硬脊膜穿刺後頭痛(post-dural puncture headache, PDPH)之敘述，下列何者正確？", "options": {"A": "通常在脊髓麻醉後3天內發生", "B": "典型症狀為顳部的疼痛", "C": "站立時頭痛減輕，仰卧時頭痛加劇", "D": "使用較粗的穿刺針(21G)可降低發生率"}, "answer": "A", "explanation": "PDPH 通常在穿刺後 12–48 小時內發生（多數在 24 小時內），典型表現為枕部/額部的姿勢性頭痛：站立時加劇，平躺時緩解。使用較細的鉛筆型針頭可降低發生率。", "category": "physiology", "difficulty": "easy", "source": "109_advanced_Q3"}, {"id": 4, "question": "關於手術中低體溫，會出現下列何者的生理變化？", "options": {"A": "新陳代謝率增加", "B": "系統血管阻力(systemic vascular resistance, SVR)下降", "C": "凝血功能異常", "D": "血紅素解離曲線右移"}, "answer": "C", "explanation": "低體溫會抑制凝血因子活性及血小板功能，導致凝血功能異常。低體溫會使新陳代謝率下降、SVR 上升、血紅素解離曲線左移（氧氣不易釋放給組織）。", "category": "physiology", "difficulty": "medium", "source": "109_advanced_Q4"}, {"id": 5, "question": "在輸液的處置上，晶體溶液(crystalloid)或膠體溶液(colloid)的選擇尚未有標準答案。但理想的輸液策略考量依據為何？", "options": {"A": "每小時尿量", "B": "中央靜脈壓變化", "C": "血色素變化", "D": "完整的臨床判斷"}, "answer": "D", "explanation": "目前無單一指標可完全代表輸液需求，理想的輸液策略需結合血壓、心跳、尿量、CVP、動態指標（如 PPV/SVV）及臨床狀況做整體判斷。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q5"}, {"id": 6, "question": "70歲病人接受膝關節置換手術，手術中使用止血帶(tourniquets)，術後鬆開止血帶時，會出現下列何者變化？", "options": {"A": "潮氣末二氧化碳下降", "B": "短暫性鹼中毒", "C": "血壓下降", "D": "短暫性核心體溫上升"}, "answer": "C", "explanation": "鬆開止血帶後，肢體缺血代謝產物（乳酸、CO₂、鉀離子）大量回流，會造成血壓下降、EtCO₂上升、短暫性酸中毒及核心體溫下降。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q6"}, {"id": 7, "question": "有關單肺換氣發生低血氧時的處置，下列敘述何者為非？", "options": {"A": "提高吸入氧氣濃度FiO2接近100%", "B": "可對通氣肺，使用5-10 cmH2O 呼氣末正壓(PEEP)", "C": "可對非通氣肺，使用12-15 cmH2O 呼吸道連續正壓(CPAP)", "D": "若低血氧仍無法改善，則要考慮改以雙肺通氣"}, "answer": "C", "explanation": "對非通氣肺施以 CPAP 的建議壓力為 5–10 cmH2O，而非 12–15 cmH2O，壓力過高反而會干擾手術視野。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q7"}, {"id": 8, "question": "75歲男性有青光眼病史，使用下列何種藥物，會引起眼壓暫時性升高？", "options": {"A": "Succinylcholine", "B": "Cisatracurium", "C": "Nicardipine", "D": "Acetazolamide(Diamox)"}, "answer": "A", "explanation": "Succinylcholine 引起全身骨骼肌震顫，包括眼外肌，可使眼壓暫時上升約 6–12 mmHg，持續約 5–10 分鐘。青光眼或開放性眼球損傷病人應謹慎使用。", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q8"}, {"id": 9, "question": "58歲女性病人預計接受大腸直腸腫瘤切除手術，根據術後加速康復(enhanced recovery after surgery, ERAS)的概念，圍術期處置建議下列敘述何者正確？", "options": {"A": "常規使用鼻胃管，減少術後腹脹造成噁心嘔吐", "B": "腹橫肌平面阻斷(TAP blocks)做為止痛選項之一", "C": "手術期間大量給予輸液，避免脫水或是營養不良", "D": "無論飲食特性，病人仍需空腹8小時"}, "answer": "B", "explanation": "ERAS 原則：不常規使用鼻胃管、目標導向輸液（非大量輸液）、術前 2 小時可飲清澈液體、多模式止痛包含 TAP block 等區域阻斷。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q9"}, {"id": 10, "question": "30歲女性接受甲狀腺手術，移除氣管內管後發現病人說話聲音非常沙啞且有喘鳴聲，此時應懷疑病人有可能是哪條神經受損？", "options": {"A": "喉返神經", "B": "喉上神經", "C": "喉下神經", "D": "迷走神經"}, "answer": "A", "explanation": "喉返神經（recurrent laryngeal nerve）支配聲帶運動，損傷後出現聲音沙啞、喘鳴，甚至雙側損傷可導致呼吸道阻塞。甲狀腺手術是喉返神經損傷最常見的原因。", "category": "airway", "difficulty": "easy", "source": "109_advanced_Q10"}, {"id": 11, "question": "下列何者是目前臨床上用來偵測心輸出量的黃金標準(gold standard)？", "options": {"A": "肺動脈導管(pulmonary artery catheter, PAC)熱稀釋法", "B": "脈膊波形分析(pulse contour analysis)", "C": "經食道心臟超音波 (transesophageal echocardiography, TEE)", "D": "經肺熱稀釋法 (transpulmonary thermodilution)"}, "answer": "A", "explanation": "PAC 熱稀釋法（Swan-Ganz catheter）是測量心輸出量的臨床黃金標準，雖具侵入性，但提供最直接的心輸出量數值。", "category": "monitoring", "difficulty": "medium", "source": "109_advanced_Q11"}, {"id": 12, "question": "採用截石術式(lithotomy)行攝護腺手術時，最常發生的神經損傷？", "options": {"A": "總腓神經 (Common peroneal nerve)", "B": "坐骨神經 (Sciatic nerve)", "C": "股神經 (Femoral nerve)", "D": "閉孔神經 (Obturator nerve)"}, "answer": "A", "explanation": "截石位時，總腓神經（繞行腓骨頭處）最易因腿架壓迫或不當固定而受損，表現為足下垂（foot drop）及小腿外側感覺異常。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "109_advanced_Q12"}, {"id": 13, "question": "鴉片類藥物會藉由哪一個鴉片類受體產生呼吸抑制的副作用？", "options": {"A": "Kappa", "B": "Delta", "C": "Mu", "D": "ORL1"}, "answer": "C", "explanation": "Mu（μ）受體是鴉片類藥物最主要的作用受體，負責鎮痛、呼吸抑制、欣快感、便秘、瞳孔縮小等效應。", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q13"}, {"id": 14, "question": "35歲男性車禍受傷，胸部X光僅發現左側第六及第七根肋骨輕微斷裂，全身麻醉下接受左橈骨復位手術，麻醉誘導順利完成，生命徵象穩定。術中血壓突然下降到60/35 mmHg、心跳130次/分，SpO2降到80%，氣道壓力急遽升高，麻醉機顯示潮氣容積(tidal volume)越來越小，最可能的原因？", "options": {"A": "心包膜填塞(Cardiac tamponade)", "B": "肺動脈栓塞(Pulmonary embolism)", "C": "張力性氣胸(Tension Pneumothorax)", "D": "支氣管痙攣(Bronchospasm)"}, "answer": "C", "explanation": "肋骨骨折病人正壓通氣後出現氣道壓升高、潮氣量下降、低血壓、低血氧，高度懷疑張力性氣胸。需立即胸腔減壓（針刺或胸管）。", "category": "crisis", "difficulty": "hard", "source": "109_advanced_Q14"}, {"id": 15, "question": "骨科手術常用骨水泥固定人工關節，當發生骨水泥置入症候群(bone cement implantation syndrome)的生理變化為何？", "options": {"A": "支氣管擴張", "B": "高血氧", "C": "低血壓", "D": "肺部壓力降低"}, "answer": "C", "explanation": "骨水泥置入症候群（BCIS）：骨髓脂肪栓塞和骨水泥單體吸收引起低血壓、低血氧、心律不整，嚴重可導致心跳停止。肺動脈壓升高（非降低）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q15"}, {"id": 16, "question": "妊娠高血壓是產科危象之一，因而產生的HELLP症候群，不包含？", "options": {"A": "溶血", "B": "肝酶增加", "C": "血小板減少", "D": "橫紋肌溶解"}, "answer": "D", "explanation": "HELLP = Hemolysis（溶血）+ Elevated Liver enzymes（肝酶升高）+ Low Platelets（血小板減少）。橫紋肌溶解不是 HELLP 的組成要素。", "category": "clinical_assessment", "difficulty": "medium", "source": "109_advanced_Q16"}, {"id": 17, "question": "造成術後譫妄(Delirium)的危險因素，下列何者為非？", "options": {"A": "長期服用精神藥物", "B": "慢性氣喘", "C": "髖關節骨折", "D": "電解質不平衡"}, "answer": "B", "explanation": "術後譫妄危險因子：高齡、認知功能障礙、長期服用精神藥物、電解質異常、骨折（尤其髖關節）、疼痛、睡眠剝奪等。慢性氣喘本身不是術後譫妄的獨立危險因子。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "109_advanced_Q17"}, {"id": 18, "question": "一位接受無痛胃鏡檢查的健康病人還未清醒，因其血氧較低 (SpO2 92%)，麻醉醫師決定經由鼻導管(nasal cannula)給予氧氣，並開立醫囑使用 FiO2 44%，請問每分鐘流速應設在多少？", "options": {"A": "2 liters", "B": "4 liters", "C": "6 liters", "D": "8 liters"}, "answer": "C", "explanation": "鼻導管 FiO2 估算：室內空氣 FiO2 = 21%，每增加 1 L/min 約增加 4%。FiO2 44% ≈ 21% + (4% × 6) = 45%，故選 6 L/min。", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q18"}, {"id": 19, "question": "麻醉藥物對老年人的影響，何者為非？", "options": {"A": "吸入性麻醉劑的「最小有效肺泡濃度值(MAC)」減少", "B": "因為藥物動力學改變，Fentanyl劑量應減少50%", "C": "Etomidate對於血液動力學影響較小，老年人使用劑量不需減少", "D": "Cisatracurium代謝利用Hoffman排除，不受年紀、肝腎功能影響"}, "answer": "C", "explanation": "老年人對幾乎所有靜脈麻醉藥物的需求量均降低，包含 Etomidate。雖然其血液動力學影響相對小，但老年人的分佈容積和清除率改變，仍需減量。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q19"}, {"id": 20, "question": "老年人的生理變化，下列何者正確？", "options": {"A": "腎絲球過濾率(GFR)上升", "B": "肺餘容積(FRC)減少", "C": "Baroreflex反射性降低", "D": "血清白蛋白含量增加"}, "answer": "C", "explanation": "老年人生理變化：GFR 下降、FRC 增加（胸壁彈性下降）、血清白蛋白下降（影響蛋白結合型藥物）、Baroreflex 敏感度降低（易發生直立性低血壓）。", "category": "physiology", "difficulty": "medium", "source": "109_advanced_Q20"}, {"id": 21, "question": "身高170公分體重60公斤的健康成人，因下肢骨折來進行手術，術前檢驗血紅素15.4g/dL，手術進行中計算失血量500 ml，若要補充血管內容積，選用下列何者輸注最適當？", "options": {"A": "濃縮紅血球(PRBC) 2U", "B": "0.9%生理食鹽水500ml", "C": "膠體溶液(hydroxyethyl starch；HES) 1000ml", "D": "乳酸林格氏液(Lactated Ringer's solution) 1500ml"}, "answer": "D", "explanation": "Hb 15.4 g/dL，失血 500 ml，尚未達輸血閾值（成人通常 Hb < 7–8 g/dL）。晶體液補充失血量以 3:1 原則，需 1500 ml 乳酸林格氏液。HES 有腎毒性疑慮；生理食鹽水大量給予可能造成高氯性酸中毒。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q21"}, {"id": 22, "question": "車禍導致多重創傷的病人，因左下肢開放性骨折欲施行緊急手術，至手術室時，須用力拍打叫喚病人才會睜開眼睛，問其姓名只會發出呻吟聲音，予疼痛刺激時會縮回肢體，請問其昏迷指數(Glasgow coma scale, GCS)為幾分？", "options": {"A": "E3V3M5", "B": "E3V3M4", "C": "E2V2M3", "D": "E2V2M4"}, "answer": "D", "explanation": "E2（用力刺激才睜眼）+ V2（發出呻吟聲）+ M4（疼痛刺激縮回肢體）= GCS 8分。E2V2M4。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_advanced_Q22"}, {"id": 23, "question": "4歲男童採插管全身麻醉下拔牙，用sevoflurane誘導，succinylcholine使用後插管，手術進行1小時後開始有心律不整，HR 145 bpm、BP 118/65 mmHg、SpO2 97%、EtCO2 68 mmHg、腋溫38.8℃，最可能的鑑別診斷為何？", "options": {"A": "過敏性休克", "B": "肺栓塞", "C": "惡性高溫", "D": "急性心肌梗塞"}, "answer": "C", "explanation": "惡性高溫（MH）的早期徵象：EtCO₂ 急速升高（最敏感指標）、心律不整、體溫上升、肌肉僵硬。誘發因子包括吸入性麻醉藥（sevoflurane）及 succinylcholine，小兒尤其需警覺。立即停用誘發藥物並給予 Dantrolene。", "category": "crisis", "difficulty": "hard", "source": "109_advanced_Q23"}, {"id": 24, "question": "嬰兒麻醉誘導時，比成人還容易快速發生低血氧(fast desaturation)的原因，下列何者為是？", "options": {"A": "小兒每分鐘每公斤耗氧量為成人2~3倍", "B": "新生兒每分鐘每公斤通氣量較小", "C": "嬰幼兒死腔較成人低", "D": "嬰兒FRC為成人之1/2"}, "answer": "A", "explanation": "嬰兒代謝率高，耗氧量約為成人的 2–3 倍/kg，而 FRC（功能殘氣量）相對小，氧氣儲備不足，因此呼吸暫停時去飽和速度極快。", "category": "physiology", "difficulty": "medium", "source": "109_advanced_Q24"}, {"id": 25, "question": "吸入性麻醉藥在麻醉期間的使用會影響循環系統，以下描述何者正確？", "options": {"A": "吸入性藥物是有效且安全的降血壓藥物，應使用作為第一線術中降壓藥物", "B": "地氟醚(desflurane)造成的心率增加與其使用濃度無關", "C": "吸入性藥物降低血壓的作用主要是抑制心肌收縮和降低周邊血管阻力", "D": "吸入性麻醉藥物所産生的降低血壓作用與病人的年齡無關"}, "answer": "C", "explanation": "吸入性麻醉藥降壓機制：抑制心肌收縮力 + 擴張周邊血管（降低 SVR）。Desflurane 快速增濃時會交感激活導致心率增加（與濃度相關）。老年人對降壓作用更敏感。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q25"}, {"id": 26, "question": "接受全身麻醉行腹腔鏡子宮肌瘤切除術的病人，術中體溫偏高，潮氣末二氧化碳偏高，請問此病人體內的氧合血紅蛋白解離曲線 (oxyhemoglobin dissociation curve) 會如何移動？", "options": {"A": "向左", "B": "向右", "C": "向上", "D": "向下"}, "answer": "B", "explanation": "Bohr effect：溫度升高、CO₂ 升高（pH 降低）、2,3-DPG 升高均使解離曲線右移，代表氧氣親和力下降，更容易釋出氧氣給組織。", "category": "physiology", "difficulty": "easy", "source": "109_advanced_Q26"}, {"id": 27, "question": "在局部麻醉劑添加腎上腺素(epinephrine)可監測血管內注射與延長阻斷持續時間。但在下列哪種區域麻醉方式禁用腎上腺素？", "options": {"A": "腋下阻斷(axillary block)", "B": "靜脈區域阻斷(intravenous regional block)", "C": "硬膜外腔阻斷(epidural block)", "D": "脊髓腔阻斷(intrathecal block)"}, "answer": "B", "explanation": "Bier's block（靜脈區域阻斷）時，腎上腺素若隨止血帶釋放大量進入循環，可能造成嚴重心血管毒性。此外也不用於末梢血管（手指、腳趾、陰莖）注射。", "category": "regional", "difficulty": "medium", "source": "109_advanced_Q27"}, {"id": 28, "question": "關於局部麻醉劑全身毒性反應與治療，下列敘述何者正確？", "options": {"A": "心血管系統毒性是因為鉀離子通道被阻斷", "B": "心臟抑制毒性：Lidocaine > Bupivacaine > Chloroprocaine", "C": "肌肉抽搐之症狀會比耳鳴、口周麻木、金屬味較早出現", "D": "治療第一優先是呼吸道處置"}, "answer": "D", "explanation": "LAST（局麻藥全身毒性）處置首要是維持呼吸道及氧合，其次給予 20% 脂肪乳劑（Intralipid）。局麻藥阻斷鈉通道（非鉀通道）；毒性順序 Bupivacaine > Lidocaine；CNS 症狀（耳鳴、口麻）先於肌肉抽搐。", "category": "regional", "difficulty": "medium", "source": "109_advanced_Q28"}, {"id": 29, "question": "關於周邊神經阻斷術，下列敘述何者正確？", "options": {"A": "不需術前禁食", "B": "建議在深度鎮靜或全身麻醉下進行", "C": "應監測血壓、心電圖、脈搏、血氧飽和度等", "D": "不需先放置靜脈導管"}, "answer": "C", "explanation": "周邊神經阻斷須符合標準麻醉監測（血壓、ECG、SpO₂）；應建立靜脈通路以備緊急給藥；通常在清醒或輕度鎮靜下進行（可讓病人反映異感）；仍需術前禁食以防萬一需轉全身麻醉。", "category": "regional", "difficulty": "easy", "source": "109_advanced_Q29"}, {"id": 30, "question": "針對蓄意性低血壓麻醉，下列敘述何者正確？", "options": {"A": "可接受平均動脈壓(MAP)基礎值降低30％", "B": "可以使用長效型的鴉片止痛藥來加強效果", "C": "可適用在心、腦、腎、血管功能不全的病人", "D": "該技術已行之有年，臨床運用上並沒有爭議"}, "answer": "A", "explanation": "蓄意性低血壓麻醉目標通常為 MAP 降低不超過基礎值 30% 或 MAP 維持在 50–65 mmHg 以上，以減少失血。禁忌：心腦腎血管功能不全者，具爭議性。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q30"}, {"id": 31, "question": "開瓶抽取後尚未使用的propofol最長可保存多久？", "options": {"A": "2小時", "B": "6小時", "C": "12小時", "D": "24小時"}, "answer": "BC", "explanation": "疑義題，確認答案為 B 或 C。未稀釋的 Propofol 開瓶後器具需在 12 小時內更換（仿單）；但若已稀釋，不得超過 6 小時。題目未明確說明是否稀釋，故兩者均接受。", "note": "本題為疑義題，官方確認答案為 B、C 均可", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q31"}, {"id": 32, "question": "82歲男性懷疑胃穿孔破裂，需立即接受緊急手術，麻醉醫師建議以全身麻醉進行手術。病人入手術室後之血壓 82/50 mmHg、心跳120次/分、血色素10 g/dL，請問最適當之靜脈麻醉誘導劑為？", "options": {"A": "Propofol", "B": "Ketamine", "C": "Etomidate", "D": "Thiopental"}, "answer": "BC", "explanation": "血流動力學不穩定病人：Etomidate 對心血管影響最小；Ketamine 透過交感神經釋放 catecholamines 可維持血壓。兩者均適用。Propofol 和 Thiopental 均有顯著降壓效果，不宜使用。", "note": "本題為疑義題，官方確認答案為 B、C 均可", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q32"}, {"id": 33, "question": "老人族群要避免因藥物副作用所產生的併發症，下列何者為是？", "options": {"A": "Meperidine可用於術後顫抖，也很適合用於老人族群術後止痛", "B": "中樞抗乙醯膽鹼藥容易造成認知功能下降及譫妄", "C": "手術當天早上持續服用高血壓藥ACE inhibitor，有助於手術過程血壓穩定", "D": "為減少手術出血，術前應例行停用抗血小板與抗凝血藥"}, "answer": "B", "explanation": "中樞性抗膽鹼藥（如 Atropine 進入 CNS）易造成老年人術後認知障礙及譫妄。Meperidine 代謝物 normeperidine 有神經毒性，老年人禁用於常規止痛。ACE inhibitor 術前是否停用應個別評估。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q33"}, {"id": 34, "question": "關於老人術後疼痛照護，何者為非？", "options": {"A": "老人神經傳導及接受器減少，使病人術後較不疼痛", "B": "失智及無法言語的老人，應需要時才給藥，避免規則性給藥方式投予", "C": "NSAIDs藥物如Ketorolac可能導致腎衰竭與腸胃道出血，應小心使用", "D": "胸腔手術用硬脊膜外止痛可以改善術後肺部預後"}, "answer": "B", "explanation": "失智或無法言語的老人疼痛常被低估，應主動評估（使用行為疼痛量表）並規律給予止痛，而非等到病人表達才給藥（PRN 模式）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q34"}, {"id": 35, "question": "若要加快輸血速度，常會用點滴稀釋濃縮紅血球(PRBC)，不建議使用乳酸林格氏液(Lactated Ringer's solution)稀釋的原因是？", "options": {"A": "含鈉離子", "B": "含鉀離子", "C": "含鈣離子", "D": "含鎂離子"}, "answer": "C", "explanation": "乳酸林格氏液含有鈣離子，可能與血袋中的抗凝劑（citrate）競爭，理論上有促進血液凝集的疑慮。稀釋血品建議使用 0.9% 生理食鹽水。", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q35"}, {"id": 36, "question": "關於惡性高熱的敘述，何者正確？", "options": {"A": "屬於自體免疫疾病，不具家族史", "B": "誘發物質只有吸入性麻醉氣體", "C": "會導致低血鉀以及橫紋肌溶解症", "D": "以Dantrolene來治療"}, "answer": "D", "explanation": "惡性高熱（MH）是骨骼肌鈣離子調控異常的遺傳疾病（常染色體顯性），誘發因子包括吸入性麻醉藥及 Succinylcholine，表現為高代謝、高鉀血症、橫紋肌溶解，治療為 Dantrolene。", "category": "crisis", "difficulty": "medium", "source": "109_advanced_Q36"}, {"id": 37, "question": "關於肥胖病人的圍術期考量何者為非？", "options": {"A": "增加困難插管的風險", "B": "發生低血氧的機率上升", "C": "若上臂無法用壓脈帶測量血壓，可以考慮以前臂測量", "D": "頭低腳高的姿勢可降低肺下葉擴張不全(atelectasis)"}, "answer": "D", "explanation": "肥胖病人應採頭高腳低（reverse Trendelenburg）或坡型體位（ramp position），有助改善氧合及插管視野。頭低腳高（Trendelenburg）反而因腹部臟器壓迫膈肌而加重低血氧及肺不張。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q37"}, {"id": 38, "question": "對於肥胖病人使用麻醉藥物的敘述，下列何者為非？", "options": {"A": "揮發性麻醉藥物誘導較常人快速", "B": "脂溶性藥物須更大劑量才能達到血中濃度", "C": "鴉片類藥物要小心使用，以減少低血氧及高碳酸血症的發生", "D": "使用H2拮抗劑可以降低吸入性肺炎的風險"}, "answer": "A", "explanation": "肥胖病人因肺泡通氣量/功能殘氣量比例改變，吸入性麻醉藥誘導速度並不比正常人快，甚至可能較慢。脂溶性藥物在肥胖者分佈容積增大，初始需要更大劑量。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q38"}, {"id": 39, "question": "一位男士酒後車禍，送至急診發現右側氣胸，血中酒測值高達1.0 mg/L，血壓180/100 mmHg，須緊急手術，採插管全身麻醉，其吸入性麻醉藥物劑量應如何調整？", "options": {"A": "增加", "B": "減少", "C": "不需要調整", "D": "不適合使用吸入性麻醉藥，應改採全靜脈麻醉"}, "answer": "B", "explanation": "急性酒精中毒有 CNS 抑制作用（類似靜脈麻醉藥），會加成麻醉藥物效果，因此吸入性麻醉藥劑量應減少。慢性酗酒者則相反（耐受性增加，需增加劑量）。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q39"}, {"id": 40, "question": "麻醉結束拔管後，可能因嚴重上呼吸道阻塞，導致阻塞後肺水腫(postobstructive pulmonary edema)，相關敘述何者為非？", "options": {"A": "因病人用力吸氣，使胸腔內產生巨大負壓導致", "B": "上呼吸道阻塞皆可能導致，喉頭痙攣是最常見的原因", "C": "以肌肉力量較弱的高齡者最容易發生", "D": "治療方式為提供氧氣及使用利尿劑"}, "answer": "C", "explanation": "阻塞後肺水腫（負壓性肺水腫）最常見於年輕、肌肉力量強的病人（如年輕男性），因為他們能產生更大的胸腔負壓。高齡肌力弱者反而不易產生足夠負壓。", "category": "airway", "difficulty": "medium", "source": "109_advanced_Q40"}, {"id": 41, "question": "下列何者為產婦進行椎管內麻醉(neuraxial anesthesia)的禁忌症？①病患拒絕 ②低血容性休克 ③肝炎 ④人類免疫缺乏病毒(HIV)感染", "options": {"A": "①+②", "B": "③+④", "C": "①+④", "D": "②+④"}, "answer": "A", "explanation": "椎管內麻醉絕對禁忌：病患拒絕、穿刺部位感染、嚴重凝血異常、顱內壓升高、嚴重低血容積。肝炎和 HIV 感染本身不是禁忌症。", "category": "regional", "difficulty": "easy", "source": "109_advanced_Q41"}, {"id": 42, "question": "下列對靜脈空氣栓塞偵測之方法，何者敏感度最高？", "options": {"A": "潮氣末端二氧化碳濃度", "B": "胸前都卜勒超音波", "C": "血氧濃度", "D": "經食道心臟超音波"}, "answer": "D", "explanation": "敏感度排序：TEE > 胸前都卜勒超音波 > EtCO₂ > SpO₂。TEE 可偵測極少量氣泡，是最敏感的方法，但為侵入性。實際臨床常用胸前都卜勒因其非侵入性。", "category": "monitoring", "difficulty": "medium", "source": "109_advanced_Q42"}, {"id": 43, "question": "肝臟切除手術的麻醉處置，下列何者為非？", "options": {"A": "預期大量失血，應放置動脈導管和大口徑的輸液管路", "B": "術中維持CVP 10-12 mmHg，證實可減少血液流失，並提高存活率", "C": "應限制術中輸液量或使用藥物使CVP值下降", "D": "減少從肝靜脈和肝下腔靜脈流出的血量，有助於手術進行"}, "answer": "B", "explanation": "肝切除術中建議維持低 CVP（< 5 mmHg），以減少肝靜脈出血，改善手術視野。高 CVP 反而增加術中出血。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "109_advanced_Q43"}, {"id": 44, "question": "運動功能級數代謝當量(metabolic equivalents, METs)常用來評估病人的心肺功能。病人可以爬三層樓去陽台曬衣服的運動功能級數約為多少代謝當量？", "options": {"A": "無法評估", "B": "小於1", "C": "等於3", "D": "大於4"}, "answer": "D", "explanation": "爬三層樓（約 10–12 公尺高）相當於 > 4 METs，表示心肺功能尚可。< 4 METs（如緩步走、自我照顧）為低功能狀態，圍術期風險較高。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_advanced_Q44"}, {"id": 45, "question": "當心臟填塞(cardiac tamponade)病人欲接受麻醉時，下列何者是較不適當的措施？", "options": {"A": "麻醉誘導前，建議先建立動脈導管監測", "B": "應在麻醉誘導執行前，外科醫師已完成皮膚消毒準備及舖單工作", "C": "控制呼吸造成胸內壓上升，促使靜脈回流", "D": "麻醉誘導藥物可給予Etomidate和Ketamine"}, "answer": "C", "explanation": "心臟填塞病人依賴靜脈回流維持心輸出量，正壓通氣會增加胸腔內壓，減少靜脈回流，使病情惡化。應儘量維持自主呼吸或極低壓力通氣。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q45"}, {"id": 46, "question": "50歲男性接受右下葉肺切除，翻身側躺後進行單肺通氣，術中發現氧飽和度下降，下列何種措施不適當？", "options": {"A": "立即通知麻醉醫師，協助使用纖維支氣管鏡重新確認氣管內管位置", "B": "經由支氣管腔抽吸清除分泌物", "C": "考慮改採全靜脈麻醉(TIVA)技術，能有效降低缺氧和抑制發炎的作用", "D": "若仍持續低血氧，則通知外科醫師，進行雙肺通氣至情況好轉"}, "answer": "C", "explanation": "改用 TIVA 在單肺通氣低血氧的立即處置中並非優先選項；優先措施為確認管路位置、增加 FiO₂、對通氣肺給 PEEP、必要時回復雙肺通氣。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q46"}, {"id": 47, "question": "關於利尿劑的敘述，以下何者為非？", "options": {"A": "Thiazide利尿劑治療本態性高血壓，抑制遠端腎小管對鈉及氯的再吸收", "B": "Mannitol經由腎絲球過濾後，經腎小管再吸收", "C": "Spironolactone可以阻斷Aldosterone對腎小管作用", "D": "Loop類利尿劑抑制亨利氏環對鈉及氯的再吸收"}, "answer": "B", "explanation": "Mannitol 是滲透性利尿劑，由腎絲球過濾後不被腎小管再吸收，維持管腔滲透壓，帶走水分。這正是其利尿作用的機制。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q47"}, {"id": 48, "question": "關於嚴重燒傷合併有呼吸道水腫的病人照護應注意事項，下列何者為非？", "options": {"A": "該類病人如需進行氣管插管，愈早愈好", "B": "當一氧化碳與血紅素結合，會使氧合血紅素曲線右移", "C": "必須置入大口徑的靜脈導管補充大量輸液", "D": "在燒傷24小時後避免使用succinylcholine"}, "answer": "B", "explanation": "CO 與 Hb 結合形成 COHb，使氧合血紅素解離曲線左移（氧氣不易釋放給組織），而非右移。燒傷後 24 小時起（至康復）應避免 Succinylcholine，因為肌肉去神經化導致大量鉀離子釋放風險。", "category": "physiology", "difficulty": "medium", "source": "109_advanced_Q48"}, {"id": 49, "question": "病人接受上呼吸道雷射手術，採氣管內插管全身麻醉。若發生術中氣道內起火燃燒，立即處置為何？", "options": {"A": "關閉氧氣，用空氣進行通氣", "B": "用生理食鹽水灌洗上呼吸道", "C": "停止通氣，並立即拔除氣管內管", "D": "用支氣管鏡檢查呼吸道"}, "answer": "C", "explanation": "氣道火災處置（RACE 流程）：立即停止通氣氣體→拔除氣管內管→用生理食鹽水澆熄→重建呼吸道→評估損傷。首要是切斷燃料（氣體）並移除燃燒物（氣管內管）。", "category": "crisis", "difficulty": "medium", "source": "109_advanced_Q49"}, {"id": 50, "question": "以下對「最小有效肺泡濃度值(MAC)」的臨床定義，何者描述正確？", "options": {"A": "在1.0 MAC下百分之50的病人在手術下刀時沒有移動及疼痛反射", "B": "MAC會因病人性別不同而有差別", "C": "在1.3 MAC時代表百分之95的病人在手術下刀時沒有移動", "D": "麻醉時間長短不影響MAC"}, "answer": "D", "explanation": "MAC 定義：50% 病人對切皮刺激不產生體動反應的肺泡濃度（與疼痛反射無關）。MAC 不受性別影響；1.3 MAC 約可抑制 95% 病人（MAC95）；長時間麻醉不影響 MAC 值。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q50"}, {"id": 51, "question": "脊椎手術後發生術後視覺喪失的主要原因為何？", "options": {"A": "自發性視網膜動脈栓塞", "B": "突發性視網膜靜脈栓塞", "C": "缺血性視神經病變", "D": "直接壓迫眼球"}, "answer": "C", "explanation": "俯臥位脊椎手術後視覺喪失最常見的原因是後部缺血性視神經病變（PION），危險因素包括低血壓、貧血、長時間俯臥、頭低腳高、大量失血。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q51"}, {"id": 52, "question": "輸血時使用之血液製品何者必須要ABO血型相容性？①濃縮紅血球(PRBC) ②血小板(Platelet) ③新鮮冷凍血漿(FFP) ④冷凍沉澱品(Cryoprecipitate)", "options": {"A": "①+②", "B": "②+③", "C": "①+③", "D": "①+④"}, "answer": "C", "explanation": "PRBC 和 FFP 嚴格需要 ABO 相容；血小板和冷凍沉澱品建議但非絕對要求 ABO 相容（緊急時可使用不同血型）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q52"}, {"id": 53, "question": "關於腦死後器官捐贈的麻醉處置，下列敘述何者正確？", "options": {"A": "為維持重要器官的血流灌注，心臟必須最後摘除，術中須維持心輸出量", "B": "為保護重要器官的氧氣供應，應調高FiO2，使術中PaO2大於200 mmHg", "C": "為避免肺擴張不全而導致低血氧，建議使用較高的呼氣末端正壓(PEEP)", "D": "面對低血容量，必要時輸血治療，血球比容(hematocrit)應維持大於30%"}, "answer": "D", "explanation": "腦死捐贈麻醉目標：維持器官灌注，Hct > 30%（或 Hb > 10 g/dL）；適當 PEEP 保護肺臟；PaO₂ 目標 80–100 mmHg（過高氧氣有氧化毒性）；心臟確實最後摘除。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q53"}, {"id": 54, "question": "病人在全身麻醉下接受經腹部全子宮切除手術，術後使用病患自控式硬脊膜外止痛(patient-controlled epidural analgesia, PCEA)。隔日術後訪視，病人抱怨劇烈背痛，並伴隨持續性下肢無力，報告麻醉醫師後，此時最優先處置？", "options": {"A": "立即拔除硬脊膜外導管，減少刺激降低背痛", "B": "衛教病人可能是手術姿勢擺位造成，建議持續觀察即可", "C": "常規會診神經外科醫師，24小時內完成會診即可", "D": "緊急實施核磁共振造影(MRI)，排除硬脊膜外血腫之可能"}, "answer": "D", "explanation": "硬膜外血腫是罕見但嚴重的急症，表現為劇烈背痛及下肢無力/麻痺。需緊急 MRI 確診，並在 6–8 小時內手術減壓以保留神經功能。不可延誤。", "category": "crisis", "difficulty": "hard", "source": "109_advanced_Q54"}, {"id": 55, "question": "採集動脈血液檢查時，若管內有氣泡及過多的肝素(heparin)，對血液氣體分析(ABGs)結果有何影響？", "options": {"A": "pH升高，不會影響PaCO2", "B": "pH降低，會影響PaCO2", "C": "pH無變化，不會影響PaO2", "D": "pH會變化，會影響PaO2"}, "answer": "B", "explanation": "過多肝素（液態，pH 偏酸）會稀釋血液使 pH 降低、PaCO₂ 下降（稀釋效應）。氣泡會使 PaO₂ 趨向室內空氣（約 159 mmHg），但主要答案聚焦在肝素對酸鹼的影響。", "category": "monitoring", "difficulty": "medium", "source": "109_advanced_Q55"}, {"id": 56, "question": "有關取卵手術的麻醉，以下何者為是？", "options": {"A": "若是全身麻醉，可使用吸入性麻醉氣體或全靜脈式麻醉", "B": "應避免使用笑氣，可能會干擾RNA合成", "C": "病人在麻醉狀態下是否保持不動和取卵的品質無關", "D": "使用脊髓麻醉，恢復時間通常比全身麻醉來得短"}, "answer": "A", "explanation": "取卵手術可使用吸入性麻醉或 TIVA（丙泊酚 TIVA 常用）。笑氣會干擾 DNA 合成（非 RNA），但爭議較大，有些機構仍避免使用。病人不動對卵泡抽取精準度有影響。", "category": "pharmacology", "difficulty": "easy", "source": "109_advanced_Q56"}, {"id": 57, "question": "57歲男性多處骨折，接受右股骨開放性復位固定手術，採插管全身麻醉，術中突然心電圖呈現寬的QRS波，心跳112次/分，同時A-line及SpO2波型也消失，請問下列處置何者為非？", "options": {"A": "立即通知麻醉醫師並準備急救用物", "B": "盡快以雙向電擊器120焦耳施行去顫術", "C": "急救用藥epinephrine 1mg每3-5分鐘靜脈給予", "D": "肺栓塞是可能的鑑別診斷"}, "answer": "B", "explanation": "A-line 及 SpO₂ 波型消失代表無脈搏，應立即執行 CPR。寬 QRS + 無脈搏可能是無脈搏室速（pVT）或心室顫動（VF）→ 需去顫，但標準能量為 200J（雙相）而非 120J；120J 可能不足。實際上去顫應越快越好，但能量應足夠。", "category": "crisis", "difficulty": "hard", "source": "109_advanced_Q57"}, {"id": 58, "question": "關於創傷病人緊急手術的呼吸道處置，下列敘述何者為非？", "options": {"A": "如病人意識模糊，應立即以壓額抬下巴法維持呼吸道暢通", "B": "插管時，可於環狀軟骨加壓(cricoid pressure)，避免吸入性肺炎", "C": "常有呼吸道出血或腫脹，需準備影像式插管系統及傳統喉頭鏡", "D": "氣管插管失敗，可考慮施以環甲膜切開術(cricothyrotomy)"}, "answer": "A", "explanation": "創傷病人（尤其頸椎受傷未排除）禁用壓額抬下巴（head tilt-chin lift），應使用下頷推移法（jaw thrust）維持呼吸道同時保護頸椎。", "category": "monitoring", "difficulty": "easy", "source": "109_advanced_Q58"}, {"id": 59, "question": "下列何者非腸胃鏡檢查時施打Buscopan之禁忌症？", "options": {"A": "青光眼", "B": "腸阻塞", "C": "紅斑性狼瘡", "D": "攝護腺肥大"}, "answer": "C", "explanation": "Buscopan（Hyoscine butylbromide）屬抗膽鹼藥，禁忌包括：青光眼（升眼壓）、攝護腺肥大（排尿困難）、腸阻塞、重症肌無力、心跳過速等。紅斑性狼瘡不是禁忌症。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "109_advanced_Q59"}, {"id": 60, "question": "過量給予0.9%生理食鹽水，可能造成何種現象？", "options": {"A": "高氯型代謝性酸中毒", "B": "高氯型代謝性鹼中毒", "C": "高鈉型代謝性酸中毒", "D": "低鈉型代謝性鹼中毒"}, "answer": "A", "explanation": "大量生理食鹽水（含 154 mEq/L Cl⁻，高於血漿正常值 103 mEq/L）會造成高氯血症，稀釋碳酸氫根，導致高氯性代謝性酸中毒（非陰離子間隙型）。", "category": "physiology", "difficulty": "easy", "source": "109_advanced_Q60"}, {"id": 61, "question": "60歲女性病人因下腹痛就醫，在急診時體溫38.5℃，心跳100次/分，血壓75/40 mmHg，抽血檢測WBC 18,000 cells/L，CRP 239 mg/L，懷疑是腹部急症，安排緊急手術，請問最可能造成此病人休克的原因為何？", "options": {"A": "低血容性休克", "B": "心因性休克", "C": "過敏性休克", "D": "敗血性休克"}, "answer": "D", "explanation": "發燒、心跳快、低血壓 + 白血球及 CRP 顯著升高，符合敗血性休克（分佈性休克）的表現，最可能來源為腹腔感染。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_advanced_Q61"}, {"id": 62, "question": "使用達文西機器手臂輔助手術，需於體腔灌注二氧化碳，有可能造成人體的何種影響？", "options": {"A": "腹腔內灌氣，造成腹內壓增加，會造成交感神經反應，心跳增加", "B": "二氧化碳吸收，造成高碳酸血症(hypercapnia)，引起肺血管舒張", "C": "高碳酸血症會引起腦血管舒張和腦壓增高", "D": "當腹腔內灌注二氧化碳時，因二氧化碳有高的擴散係數，所以不會有空氣栓塞的發生"}, "answer": "C", "explanation": "高碳酸血症使腦血管擴張，增加腦血流量和顱內壓。CO₂ 氣腹造成腹內壓升高引發迷走神經（非交感）反應可能心跳減慢；高碳酸血症使肺血管收縮（非舒張）；CO₂ 栓塞仍可能發生（溶解快但大量可致命）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q62"}, {"id": 63, "question": "2歲體重15公斤病人之輸液處置下列何者最正確？①推估循環血液量1000ml ②推估循環血液量1500ml ③每小時基本輸液量 50ml ④每小時基本輸液量 25ml", "options": {"A": "①+③", "B": "②+③", "C": "②+④", "D": "①+④"}, "answer": "A", "explanation": "小兒循環血量：約 70–80 ml/kg，15 kg × 70 = 1050 ml ≈ 1000 ml（選①）。Holliday-Segar 法：前 10 kg × 4 + 次 10 kg × 2 = 40 + 10 = 50 ml/hr（選③）。故選①+③。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q63"}, {"id": 64, "question": "關於動脈導管持續開通(patent ductus arteriosus, PDA)，何者正確？", "options": {"A": "常見於一歲以上的幼兒", "B": "需給予高濃度氧氣，不必擔心產生新生兒視網膜病變", "C": "無其他心臟異常時，不可給予Indomethacin治療，只能手術處理", "D": "合併有肺動脈狹窄的幼兒，不可以給予Indomethacin"}, "answer": "D", "explanation": "PDA 合併肺動脈狹窄或其他需要 PDA 維持肺循環的病變（如肺動脈閉鎖），不可使用 Indomethacin（會關閉動脈導管導致肺循環更差，此時應反而給 PGE1 維持開通）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "109_advanced_Q64"}, {"id": 65, "question": "下列何種常規手術病人較適合深度拔管？", "options": {"A": "40歲男性接受氣管內肉芽組織切除手術", "B": "50歲女性BMI 45接受減重手術", "C": "60歲青光眼病人接受小樑切除手術", "D": "75歲高血壓控制良好病人接受盲腸炎手術"}, "answer": "C", "explanation": "青光眼病人（小樑切除術）需避免拔管時嗆咳造成眼壓驟升，適合深度拔管。氣道手術（肉芽切除）、病態肥胖（氣道保護不易）、老年高風險者均不適合深度拔管。", "category": "airway", "difficulty": "medium", "source": "109_advanced_Q65"}, {"id": 66, "question": "42歲70公斤男性，接受門診無痛胃腸鏡檢查，檢查約1小時，期間共給予midazolam 7 mg、remifentanil 200 mcg和propofol 180 mg。在恢復室又觀察1小時後，病人仍無法喚醒且呼吸速率較慢，請問最適當之處置為給予何種解毒劑？", "options": {"A": "naloxone", "B": "flumazenil", "C": "neostigmine", "D": "不須給予"}, "answer": "B", "explanation": "Midazolam 7 mg（劑量偏高）是最可能造成延遲甦醒的原因，給予 Flumazenil（苯二氮平類拮抗劑）。Remifentanil 半衰期極短（3–5 分鐘），Propofol 180 mg 在 2 小時後應已代謝。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q66"}, {"id": 67, "question": "關於手術中造成靜脈空氣栓塞的原因與處置，以下何者正確？", "options": {"A": "下肢股骨骨折手術較容易造成", "B": "只存在右心與肺循環，不會造成腦中風", "C": "馬上用生理食鹽水覆蓋手術傷口", "D": "將病人擺置成頭高腳低的姿勢"}, "answer": "C", "explanation": "靜脈空氣栓塞處置：立即用生理食鹽水覆蓋傷口（阻止更多空氣進入）、停止 N₂O、左側躺頭低腳高（Durant's maneuver）、抽吸中央靜脈導管內氣體。可透過卵圓孔未閉造成矛盾性栓塞（腦中風）。", "category": "crisis", "difficulty": "medium", "source": "109_advanced_Q67"}, {"id": 68, "question": "46歲男性曾接受心臟移植，因急性膽囊炎行腹腔鏡膽囊切除手術，以下藥物何者可用於處置術中心跳變慢？", "options": {"A": "Atropine", "B": "Glycopyrrolate", "C": "Norepinephrine", "D": "Isoproterenol"}, "answer": "D", "explanation": "心臟移植後心臟為去神經狀態，Atropine 和 Glycopyrrolate（透過阻斷迷走神經作用）對去神經心臟無效。應使用直接作用於心臟的藥物如 Isoproterenol（β₁激動劑）或 Epinephrine。", "category": "pharmacology", "difficulty": "hard", "source": "109_advanced_Q68"}, {"id": 69, "question": "手術病人在給完預防性抗生素後，全身起紅疹，血壓下降至55/31mmHg，懷疑為過敏性休克，以下何種升壓劑治療反應最好？", "options": {"A": "Ephedrine", "B": "Epinephrine", "C": "Milrinone", "D": "Dobutamine"}, "answer": "B", "explanation": "過敏性休克第一線治療為 Epinephrine（腎上腺素）：α₁作用收縮血管升壓 + β₁作用增加心輸出量 + β₂作用擴張支氣管。劑量：成人 0.3–0.5 mg IM（大腿外側），嚴重者靜脈給予。", "category": "crisis", "difficulty": "easy", "source": "109_advanced_Q69"}, {"id": 70, "question": "學齡前期兒童之呼吸道與成人相比，何者正確？", "options": {"A": "聲門的位置較高，位在頸椎第三到四節處；成人則在頸椎第五到六節處", "B": "會厭軟骨呈U型且較成年人硬，插管時不易挑起", "C": "氣道最狹窄處為聲門，成人則位於環狀軟骨處", "D": "舌頭比例相對較小，插管難度比成人高"}, "answer": "A", "explanation": "小兒呼吸道特點：聲門位置高（C3–4，成人 C5–6）、會厭軟骨呈Ω型且較軟、氣道最窄處在環狀軟骨（非聲門，成人則在聲門）、舌頭相對較大、頭大頸短。", "category": "airway", "difficulty": "medium", "source": "109_advanced_Q70"}, {"id": 71, "question": "有關主動脈瓣膜狹窄的病人，下列麻醉的考量何者正確？", "options": {"A": "避免全身血管阻力突然下降", "B": "術中不需置放動脈導管", "C": "維持心跳速度大於每分鐘100下為宜", "D": "區域麻醉會比全身麻醉來得優先選擇"}, "answer": "A", "explanation": "主動脈瓣狹窄麻醉原則：維持 SVR（避免突然下降）、維持竇性心律（避免心搏過快或過慢）、避免低血容積、常規放置動脈導管監測。心跳以 60–90 bpm 為宜（過快縮短舒張期充填時間）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q71"}, {"id": 72, "question": "心臟病病人欲接受心臟手術，請問下列何種藥物通常會在術前24小時停用？", "options": {"A": "Nitroglycerin", "B": "Clopidogrel", "C": "Digoxin", "D": "Warfarin"}, "answer": "C", "explanation": "心臟手術前：Warfarin 通常術前 5 天停用；Clopidogrel 術前 5–7 天；Digoxin 因半衰期長（36小時），術前 24 小時停用以避免毒性；Nitroglycerin 多半持續使用至術前。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q72"}, {"id": 73, "question": "58歲男性因顱內出血接受腦室外引流及顱內壓監測手術，術前血壓為189/102 mmHg，下列何項處置可降低顱內壓？", "options": {"A": "減少通氣量使PaCO2維持在40~45 mmHg", "B": "小心給予ketamine來維持術中的麻醉", "C": "調整吸入性麻醉氣體濃度大於1.2 MAC", "D": "小心使用propofol來維持術中的麻醉"}, "answer": "D", "explanation": "Propofol 可降低腦代謝率和顱內壓，適合顱內高壓病人。Ketamine 會增加顱內壓（禁用）；過度換氣（PaCO₂ 30–35 mmHg）可暫時降低 ICP；吸入性麻醉藥濃度 > 1 MAC 會擴張腦血管增加 ICP。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_advanced_Q73"}, {"id": 74, "question": "有高血壓、糖尿病及暫時性腦缺血(transient ischemic attack，TIA)病史病人，以海灘椅坐姿(如圖)擺位進行低壓麻醉手術，術中置放動脈導管監測，為顧及腦部血流及灌流足夠，壓力傳感器(transducer)零點應置放何處？", "options": {"A": "心臟高度", "B": "胸骨高度", "C": "肩關節高度", "D": "外耳道高度"}, "answer": "D", "explanation": "海灘椅坐姿時，腦部（外耳道高度≈Willis 環高度）與心臟有高度差，若傳感器歸零在心臟，腦部實際灌流壓會被高估（約每 2.5 cm 高度差 = 1.9 mmHg）。TIA 病史病人更需準確評估腦灌流，故歸零點應置於外耳道。", "category": "monitoring", "difficulty": "hard", "source": "109_advanced_Q74", "image": "109_advanced_Q74.png", "image_caption": "海灘椅坐姿擺位（含手術台與牽引裝置）"}, {"id": 75, "question": "58歲病人要接受換肝手術，有氣喘及非類固醇抗發炎藥物過敏史，請問下列何種神經肌肉阻斷劑為最適當之選擇？", "options": {"A": "Rocuronium", "B": "Atracurium", "C": "Cisatracurium", "D": "Pancuronium"}, "answer": "C", "explanation": "Cisatracurium 經 Hofmann 消除（不依賴肝腎），適合換肝手術。Atracurium 雖也是 Hofmann 消除，但其代謝物 laudanosine 有癲癇誘發風險，且 Atracurium 組織胺釋放可能加重氣喘。Cisatracurium 組織胺釋放極少，更適合。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q75"}, {"id": 76, "question": "有關肝臟移植手術麻醉，其重新灌流後會產生的生理變化，下列敘述何者為是？", "options": {"A": "低血鉀", "B": "鹼中毒", "C": "系統血管阻力(SVR)降低", "D": "體溫升高"}, "answer": "C", "explanation": "再灌流症候群（Post-reperfusion syndrome）：缺血肝臟代謝產物（鉀離子、乳酸、炎性介質）大量入血，造成嚴重低血壓（SVR 降低）、高血鉀、酸中毒、低體溫、心律不整。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "109_advanced_Q76"}, {"id": 77, "question": "心臟手術中採用深低溫循環中止(deep hypothermic circulatory arrest, DHCA)的麻醉臨床考量，下列敘述何者正確？", "options": {"A": "可以提高新陳代謝率，以降低腦部和其他器官缺血的風險", "B": "用於升主動脈遠端或主動脈弓的手術，讓手術視野更清楚", "C": "大多數病人無法耐受30分鐘，經常造成明顯的神經功能異常", "D": "DHCA期間血糖大致能維持穩定，大於180 mg/dL也不需處理"}, "answer": "B", "explanation": "DHCA 降低體溫至 15–20℃ 以降低代謝率（保護器官），用於主動脈弓手術提供無血手術視野。在 18℃ 時約可耐受 30–45 分鐘的循環停止；期間應嚴格控制血糖（< 180 mg/dL）。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "109_advanced_Q77"}, {"id": 78, "question": "200 mg的Dopamine稀釋成250 ml的溶液，以幫浦輸注給60 kg的病人，現需求劑量為5 mcg/kg/min，請問輸注速率約為多少？", "options": {"A": "11 ml/hr", "B": "22 ml/hr", "C": "33 ml/hr", "D": "44 ml/hr"}, "answer": "B", "explanation": "計算：濃度 = 200 mg / 250 ml = 0.8 mg/ml = 800 mcg/ml。需求量 = 5 mcg/kg/min × 60 kg = 300 mcg/min。速率 = 300 mcg/min ÷ 800 mcg/ml = 0.375 ml/min × 60 = 22.5 ml/hr ≈ 22 ml/hr。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q78"}, {"id": 79, "question": "下列敘述何者不是非去極化神經肌肉阻斷劑的特點？", "options": {"A": "可被抗膽鹼酯酶藥物(如Neostigmine)逆轉", "B": "其肌肉神經阻斷作用，可被吸入性麻醉藥物增強", "C": "不會產生肌肉震顫(fasciculations)", "D": "大劑量時會產生第二階段阻斷(phase II block)"}, "answer": "D", "explanation": "Phase II block（去敏感化阻斷）是去極化肌肉鬆弛劑（Succinylcholine）大劑量或持續使用後的特有現象，非去極化肌鬆劑不會產生 phase II block。", "category": "pharmacology", "difficulty": "medium", "source": "109_advanced_Q79"}, {"id": 80, "question": "麻醉醫師置放硬脊膜外導管後，由導管給予測試劑量(test dose：3毫升1.5% lidocaine與1：200,000的腎上腺素)，若3分鐘後偵測到心律增快20%~30%，表示導管位置可能在？", "options": {"A": "血管內", "B": "黃韌帶外", "C": "蛛網膜下腔", "D": "硬脊膜外間隙"}, "answer": "A", "explanation": "硬膜外測試劑量中腎上腺素的目的：若導管誤入血管內，腎上腺素吸收後 45–60 秒內心率增加 ≥ 20 bpm（陽性）。若誤入蛛網膜下腔，則表現為快速廣泛的脊髓阻斷。", "category": "regional", "difficulty": "medium", "source": "109_advanced_Q80"}]};
const DATA_109_GENERAL  = {"meta": {"year": 109, "role": "nurse", "subject": "general", "subject_name": "專科護理通論", "total": 80, "score_per_question": 1.25}, "questions": [{"id": 1, "question": "65歲女性預行人工膝關節置換術，術前麻醉訪視發現病人有下列何種情況，應立即延遲手術，做進一步內科評估？", "options": {"A": "糖尿病併高血脂", "B": "穩定型心絞痛", "C": "第三度房室傳導阻斷", "D": "血壓160/90 mmHg"}, "answer": "C", "explanation": "第三度（完全性）房室傳導阻斷（complete heart block）是需要永久性心臟節律器的嚴重心律不整，未處理前進行手術麻醉風險極高，應延遲手術。穩定型心絞痛、輕度高血壓、糖尿病高血脂等不需立即延遲。", "category": "clinical_assessment", "difficulty": "medium", "source": "109_general_Q1"}, {"id": 2, "question": "對於進行麻醉衛教說明前，先確認個案之教育知識、背景、經驗及認知能力、需求、接收資訊之適切性及家屬等因素，此乃教學過程中之何項步驟？", "options": {"A": "評估(Assessment)", "B": "計畫(Plan)", "C": "執行(Do)", "D": "評價(Evaluation)"}, "answer": "A", "explanation": "ADPIE 護理程序：評估（Assessment）→ 診斷 → 計畫 → 執行 → 評價。在衛教前確認病人的背景、知識、需求屬於「評估」階段。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q2"}, {"id": 3, "question": "下列何種教學方式可以快速地針對單位內數十位護理人員傳遞大量訊息？", "options": {"A": "指導者監督下直接照護病人", "B": "舉辦特定主題的系列演講", "C": "小組討論", "D": "模擬訓練"}, "answer": "B", "explanation": "演講（lecture）是大規模知識傳遞最有效率的方式，可同時對數十至數百人傳遞標準化訊息。小組討論和模擬訓練效果佳但人數受限；直接照護指導為一對一。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q3"}, {"id": 4, "question": "手術前檢測β-hCG是因為病人可能有何種情況？", "options": {"A": "控制不良的糖尿病", "B": "近日內暴露於肝炎病毒", "C": "近日內有使用毛地黃", "D": "懷孕"}, "answer": "D", "explanation": "β-hCG（人類絨毛膜促性腺激素）是懷孕的標記物，育齡女性術前常規檢測以確認是否懷孕，避免麻醉藥物對胎兒的潛在危害。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_general_Q4"}, {"id": 5, "question": "運用ISBAR為交班溝通工具，其定義何者為非：", "options": {"A": "S(Situation)：病人問題與狀況", "B": "B(Background)：與狀況相關的背景資訊", "C": "A(Assistant)：病人需要的協助", "D": "R(Recommendation)：可改善狀況的方法"}, "answer": "C", "explanation": "ISBAR：I=Identify（身份確認）、S=Situation（現況）、B=Background（背景）、A=Assessment（評估），R=Recommendation（建議）。A 代表 Assessment（評估）而非 Assistant（協助）。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q5"}, {"id": 6, "question": "依據「專科護理師於醫師監督下執行醫療業務辦法」，麻醉科專科護理師可執行以下何種導管置入？", "options": {"A": "周邊動脈導管", "B": "中心靜脈導管", "C": "肺動脈導管", "D": "硬膜外導管"}, "answer": "A", "explanation": "依據台灣法規，麻醉科專科護理師在醫師監督下可執行周邊動脈導管置入等特定技術操作。中心靜脈、肺動脈及硬膜外導管通常由醫師執行。", "category": "general_nursing", "difficulty": "medium", "source": "109_general_Q6"}, {"id": 7, "question": "麻醉同意書應由病人親自簽名，但病人因故無法為同意之表示時，得由關係人簽名。所謂「關係人」不包括：", "options": {"A": "外科主治醫師", "B": "警察", "C": "肇事駕駛", "D": "同性伴侶"}, "answer": "A", "explanation": "依醫療法，代理同意的關係人順序：法定代理人、配偶、親屬、關係人（如警察、社工）。外科主治醫師本身是手術執行者，存在利益衝突，不得擔任關係人代為簽署同意書。", "category": "general_nursing", "difficulty": "medium", "source": "109_general_Q7"}, {"id": 8, "question": "在健康照護上，構成臨床照護三角，何者為非？", "options": {"A": "病人安全", "B": "改善結果", "C": "病人滿意度", "D": "教學研究"}, "answer": "D", "explanation": "臨床照護三角（Clinical Care Triangle）由病人安全（Patient Safety）、改善結果（Improved Outcomes）、病人滿意度（Patient Satisfaction）構成。教學研究不是三角的構成要素。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q8"}, {"id": 9, "question": "以下何者不是病人自控式止痛 (patient controlled analgesia, PCA)機器的設定項目：", "options": {"A": "起始劑量 (loading dose)", "B": "自控劑量 (bolus dose)", "C": "鎖定間隔時間 (lockout interval)", "D": "病人使用的給予/需求次數 (bolus/demand)"}, "answer": "D", "explanation": "PCA 設定項目包含：起始劑量、自控劑量（bolus dose）、鎖定間隔時間、持續輸注速率（basal rate）、每小時最大劑量限制。病人使用的給予/需求比值（demands/deliveries）是記錄資料，不是預先設定項目。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q9"}, {"id": 10, "question": "主動脈狹窄的病人，術前評估事項何者為是？", "options": {"A": "嚴重主動脈狹窄為主動脈壓力差大於20 mmHg 或瓣膜開口小於2 cm2", "B": "心搏出量減少導致右心室肥厚，不可給予過多輸液", "C": "臨床上可能沒有症狀，但有時會有突然昏厥的情況", "D": "臨床上心絞痛的症狀較少見"}, "answer": "C", "explanation": "主動脈瓣狹窄：嚴重定義為壓差 > 40 mmHg 或瓣膜面積 < 1 cm²；導致左心室肥厚（非右心室）；三大症狀：心絞痛、暈厥（昏厥）、心衰竭，可無症狀期長達多年後突然發病。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q10"}, {"id": 11, "question": "高血鉀症病人的處置下列何者為非？", "options": {"A": "使用氯化鈣(CaCl2)", "B": "使用NaHCO3", "C": "使用胰島素", "D": "減低換氣速率"}, "answer": "D", "explanation": "高血鉀處置：CaCl₂（穩定心肌）、NaHCO₃（鹼化促K⁺進入細胞）、Insulin+glucose（促K⁺進入細胞）、沙丁胺醇、透析、離子交換樹脂。應增加換氣（過度換氣造成鹼中毒促K⁺內移），減低換氣會加重高血鉀。", "category": "physiology", "difficulty": "medium", "source": "109_general_Q11"}, {"id": 12, "question": "心肌缺氧導致的心絞痛可能出現下列何種心電圖變化？", "options": {"A": "P波變平甚至消失", "B": "QT間段延長", "C": "PR間段縮短", "D": "ST-T改變"}, "answer": "D", "explanation": "心肌缺血最典型的 ECG 表現為 ST 段壓低（subendocardial ischemia）或 ST 段上升（transmural ischemia/STEMI）及 T 波改變。P 波消失見於心房顫動；QT 延長見於低血鉀/藥物；PR 縮短見於預激症候群。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q12"}, {"id": 13, "question": "下列何者不是術後噁心嘔吐(PONV)的危險因子？", "options": {"A": "吸菸者", "B": "暈動症病史", "C": "女性", "D": "腹腔鏡手術"}, "answer": "A", "explanation": "PONV 危險因子（Apfel score）：女性、非吸菸者、暈動症/PONV 病史、術後鴉片類藥物使用。吸菸者反而 PONV 風險較低（保護因子）。腹腔鏡手術是手術相關危險因子。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q13"}, {"id": 14, "question": "有關麻醉專科護理師的角色功能，下列敘述何者不適合由其單獨執行？", "options": {"A": "針對某一急診危急病患，立即跟家屬說明麻醉緊急處置及後續醫療處置", "B": "針對使用PCA的病患給予相關諮詢衛教與指導", "C": "使用品管工具持續性的監測臨床狀況，用以提升照護品質", "D": "與麻醉醫師是橫向合作關係，共同提供連續性及整合性的護理與醫療照護"}, "answer": "A", "explanation": "向家屬說明緊急麻醉處置及後續醫療決策屬於醫師職責，專科護理師在醫師監督下協助，不得單獨向家屬說明醫療處置決定，避免逾越執業範疇。", "category": "general_nursing", "difficulty": "medium", "source": "109_general_Q14"}, {"id": 15, "question": "下列何者不是困難插管的理學檢查特徵？", "options": {"A": "張口受限", "B": "頷退縮(receding jaw)", "C": "門牙突出", "D": "沒有牙齒"}, "answer": "D", "explanation": "困難插管預測指標：Mallampati 分級高、張口受限（< 3 cm）、頷退縮（小下巴/micrognathia）、門牙突出（buck teeth）、頸部活動受限、甲頦距離短等。沒有牙齒不是困難插管的預測因子（反而可能更好看到聲門）。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q15"}, {"id": 16, "question": "45歲陳先生膽囊結石發炎，接受腹腔鏡膽囊切除，沾黏嚴重手術時間較長，術後在恢復室抱怨右上腹有悶痛、絞痛、轉移痛，但是很難界定在哪個區域，請問這種痛是屬於？", "options": {"A": "神經病變痛(neuropathic pain)", "B": "肌筋膜疼痛(myofascial pain)", "C": "內臟型疼痛(visceral pain)", "D": "神經篏入性症候群(nerve entrapment syndrome)"}, "answer": "C", "explanation": "內臟型疼痛（visceral pain）特徵：位置不明確、悶痛/絞痛、常有轉移痛（如膽囊痛轉移至右肩）、伴隨自律神經症狀（噁心嘔吐）。體壁型疼痛（somatic pain）則定位清楚且尖銳。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_general_Q16"}, {"id": 17, "question": "何種吸入性麻醉劑的揮發器(vaporizer)使用時需要加熱加壓？", "options": {"A": "Halothane", "B": "Isoflurane", "C": "Sevoflurane", "D": "Desflurane"}, "answer": "D", "explanation": "Desflurane 沸點極低（23.5°C，接近室溫），在常溫下易蒸發，需要使用特殊加熱加壓揮發器（Tec 6 vaporizer）維持在 39°C、1.5 atm 以精確控制濃度。其他吸入藥物使用傳統可變旁路揮發器。", "category": "pharmacology", "difficulty": "easy", "source": "109_general_Q17"}, {"id": 18, "question": "台灣現行手術室中各種醫療氣體，有其代表的顏色，黃色是代表？", "options": {"A": "氧氣", "B": "笑氣", "C": "空氣", "D": "二氧化碳"}, "answer": "C", "explanation": "台灣手術室醫療氣體顏色：氧氣=綠色、笑氣=藍色、空氣=黃色、二氧化碳=灰色、氮氣=黑色、負壓=白色。各國標準可能不同，台灣以此為準。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q18"}, {"id": 19, "question": "對於二氧化碳吸收劑使用的安全建議何者為非？", "options": {"A": "機器不使用時關閉所有氣體流量", "B": "吸收劑變色就應更換", "C": "雙罐系統每次更換一罐即可", "D": "小型吸收劑罐應更常更換"}, "answer": "C", "explanation": "雙罐（two-canister）系統應兩罐同時更換，若只換一罐，殘餘的舊罐可能混入再生的舊吸收劑（指示劑顏色回退），造成誤判。吸收劑變色時即應更換。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q19"}, {"id": 20, "question": "下列何者監測器無法協助偵測食道插管？", "options": {"A": "脈搏血氧機", "B": "潮氣末二氧化碳監測器", "C": "聽診器", "D": "體溫計"}, "answer": "D", "explanation": "食道插管偵測：EtCO₂（無波形=未插入氣管）最可靠；聽診器（胃部聽到氣過水聲）；SpO₂ 下降（但有延遲）。體溫計無法協助偵測插管位置。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q20"}, {"id": 21, "question": "以下有關喉頭鏡之準備與使用提醒，何者正確？", "options": {"A": "彎曲型葉片(Macintosh)前端有活動關節可以觸發彎曲", "B": "直型葉片（Miller）向前至舌根和會厭軟骨咽面之間以利插管", "C": "麻醉醫師插管時，可適時提醒喉頭鏡上提時應避免施壓於牙齒和牙齦", "D": "Macintosh葉片於成人多為2或3號，Miller葉片於成人多為3或4號"}, "answer": "C", "explanation": "插管時施力應向前上方提起（非槓桿式以牙齒為支點），避免損傷牙齒牙齦。Miller（直型）葉片置於會厭軟骨下方直接挑起（非放在舌谷）；Macintosh 成人常用 3 號，Miller 成人常用 2 號。", "category": "airway", "difficulty": "medium", "source": "109_general_Q21"}, {"id": 22, "question": "以下血品成分的敘述，何者正確？", "options": {"A": "新鮮冷凍血漿(Fresh Frozen Plasma)比冷凍沉澱品(Cryoprecipitate)含有更多的纖維質蛋白原(fibrinogen)", "B": "血小板(Platelets)須以4℃保存，因此細菌生長率較低", "C": "新鮮冷凍血漿(Fresh Frozen Plasma)內含血小板與所有凝血因子", "D": "術中失血時，輸紅血球濃縮液(Packed Red Blood Cells)可增加血液攜氧能力"}, "answer": "D", "explanation": "PRBC 確實可增加血液攜氧能力（增加 Hb 濃度）。FFP 含所有凝血因子但不含血小板；Cryoprecipitate 纖維蛋白原含量高於 FFP；血小板應保存於 20–24°C（室溫搖動），細菌生長率反而較 4°C 高。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "109_general_Q22"}, {"id": 23, "question": "70歲男性病人，長期服用warfarin，預計接受常規疝氣手術，手術前未停用藥物，病人的驗血報告最有可能呈現下列何項結果？", "options": {"A": "血小板(Pl)低下", "B": "凝血酶原時間(PT)異常", "C": "部份凝血酶原時間(aPTT)異常", "D": "凝血時間(CT)過低"}, "answer": "B", "explanation": "Warfarin 抑制維生素K依賴凝血因子（II, VII, IX, X），主要延長 PT/INR（外因性凝血路徑）。aPTT 延長見於 Heparin、VIII/IX因子缺乏；血小板數量不受影響。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_general_Q23"}, {"id": 24, "question": "關於術後肺部併發症(postoperative pulmonary complications, POPCs)，下列敘述何者正確？", "options": {"A": "相關危險因子：老年(>60歲)、第一型及第二型糖尿病", "B": "吸菸史、惡性腫瘤及慢性阻塞性肺疾病(COPD)與POPCs的風險成反比", "C": "只有低血清白蛋白(hypoalbuminemia；< 3.0 g/dL)是顯示POPCs準確的實驗室指標", "D": "手術相關危險因子包括區域麻醉"}, "answer": "C", "explanation": "低白蛋白血症（< 3 g/dL）是 POPCs 最有力的實驗室預測指標，反映營養狀態差。老年、COPD、吸菸、惡性腫瘤均是危險因子（非反比）；區域麻醉反而降低 POPCs 風險。", "category": "clinical_assessment", "difficulty": "medium", "source": "109_general_Q24"}, {"id": 25, "question": "關於術後認知功能障礙(postoperative cognitive dysfunction, POCD)，下列敘述何者正確？", "options": {"A": "僅進行術後的心理測驗就能診斷POCD", "B": "危險因子包括教育程度高及術前有中風病史", "C": "目前臨床數據顯示，麻醉方式對POCD的發生率並沒有顯著差異", "D": "老年人發生持續性POCD的比率相當於年輕人和中年人"}, "answer": "C", "explanation": "目前研究顯示全身麻醉與區域麻醉在 POCD 發生率上無顯著差異。POCD 診斷需術前基準測驗對照（非僅術後）；低教育程度和術前中風是危險因子；老年人持續性 POCD 比率高於年輕人。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q25"}, {"id": 26, "question": "在手術麻醉前，麻醉醫護人員儘量以病人所能瞭解之方式，解釋本次手術涉及之麻醉問題及相關資訊，並徵得病人的同意。這樣的做法最能代表以下何種倫理原則？", "options": {"A": "不傷害原則", "B": "公平正義原則", "C": "行善施益原則", "D": "尊重自主原則"}, "answer": "D", "explanation": "尊重自主原則（Autonomy）：知情同意（informed consent）是其核心體現，確保病人在充分了解資訊後自主決定是否接受治療。四大倫理原則：自主、不傷害、行善、公平正義。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q26"}, {"id": 27, "question": "手術須接受全身麻醉的病人，對於呼吸系統之評估何者為非？", "options": {"A": "全身麻醉會使功能殘氣量(functional residual capacity)下降，易發生肺擴張不全", "B": "Desflurane會刺激氣道引起咳嗽，不是氣道敏感病人的最佳選擇", "C": "喉鳴(stridor)可能是下呼吸道狹窄的症狀", "D": "喘鳴(wheezing)可能是阻塞性氣道疾病的症狀"}, "answer": "C", "explanation": "Stridor（喘鳴/喉鳴）是上呼吸道阻塞（如聲門下狹窄、喉頭水腫、異物）的典型聲音，而非下呼吸道。Wheezing（哮鳴）才是下呼吸道阻塞（如氣喘、COPD）的典型聲音。", "category": "airway", "difficulty": "easy", "source": "109_general_Q27"}, {"id": 28, "question": "關於喉罩(laryngeal mask airway, LMA)的使用時機，下列何項情況最適當？", "options": {"A": "嚴重胎兒窘迫需進行緊急剖腹產的孕婦", "B": "插管失敗且困難面罩通氣的病人", "C": "病態肥胖要進行腹腔鏡胃繞道術的病人", "D": "腸阻塞要進行剖腹探查的病人"}, "answer": "B", "explanation": "LMA 在困難插管且困難面罩通氣（CICV）時是救命的呼吸道輔助工具。禁忌或不適合：胃內容物反流風險高（孕婦、腸阻塞）、需要高氣道壓（肥胖腹腔鏡）。", "category": "airway", "difficulty": "medium", "source": "109_general_Q28"}, {"id": 29, "question": "有關潮氣末二氧化碳(EtCO2)監測儀器的數值影響因素，下列敘述何者為非？", "options": {"A": "惡性高熱造成數值下降", "B": "給予重碳酸鈉造成數值上升", "C": "低心輸出量造成數值下降", "D": "換氣不足造成數值上升"}, "answer": "A", "explanation": "惡性高熱（MH）代謝急劇增加，CO₂ 產生大幅升高，EtCO₂ 急速上升（是 MH 最早最敏感的指標）。NaHCO₃ 分解釋放 CO₂ 使 EtCO₂ 上升；低心輸出量使肺灌流減少，EtCO₂ 下降；換氣不足使 CO₂ 排出減少，EtCO₂ 上升。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q29"}, {"id": 30, "question": "下列對於呼吸道的評估何者為非？", "options": {"A": "頸部軟組織損傷可能會影響上呼吸道解剖構造扭曲改變，造成呼吸道阻塞", "B": "頭頸部做過放射線治療的病人，可能會造成纖維化，導致氣道處置及插管困難", "C": "頭部受傷造成顱底骨折的病人，可嘗試鼻插管做呼吸道的處置", "D": "甲狀腺腫大的病人，甲狀腺結節可能造成呼吸道外部壓迫或氣管偏離"}, "answer": "C", "explanation": "顱底骨折（basilar skull fracture）是鼻插管的絕對禁忌，因為鼻胃管或鼻插管可能誤入顱腔。應選擇口腔插管或緊急氣切。", "category": "airway", "difficulty": "medium", "source": "109_general_Q30"}, {"id": 31, "question": "關於頸部根治手術，下列敘述何者為非？", "options": {"A": "若有吸菸喝酒、營養不良病史者，術前評估應注意心、肺、肝、腎等功能", "B": "此類病人最常見的問題是困難氣道處理，應準備影像輔助工具", "C": "術前是否進行放射線治療，並不會影響麻醉計畫與準備物品", "D": "頸部手術發生心律不整(心搏過緩)，常與頸動脈竇的刺激有關"}, "answer": "C", "explanation": "放射線治療後頸部纖維化、皮膚攣縮、氣道變形，顯著增加困難插管風險，必然影響麻醉計畫（需準備清醒纖維支鏡插管等）。術前放射線治療史是重要的麻醉評估項目。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q31"}, {"id": 32, "question": "下列何者鴉片類藥物(Opioids)會因高劑量使用時，其活性代謝產物會累積而導致中樞神經興奮和癲癇發作？", "options": {"A": "Meperidine", "B": "Morphine", "C": "Hydromorphone", "D": "Fentanyl"}, "answer": "A", "explanation": "Meperidine（Pethidine）代謝為 Normeperidine，具有神經興奮性，大劑量或腎功能不全時累積可導致焦慮、震顫、肌肉陣攣、癲癇發作。老年人及腎功能不全者禁用於長期止痛。", "category": "pharmacology", "difficulty": "medium", "source": "109_general_Q32"}, {"id": 33, "question": "下列何者為術後疼痛對生理所造成的不良影響？", "options": {"A": "免疫功能降低", "B": "低血糖", "C": "低凝血症", "D": "頻尿"}, "answer": "A", "explanation": "術後疼痛引發交感神經及應激反應，造成：高血糖（非低血糖）、高凝血狀態（非低凝血）、免疫功能降低（增加感染風險）、心肺負擔增加、尿滯留（非頻尿）。", "category": "physiology", "difficulty": "easy", "source": "109_general_Q33"}, {"id": 34, "question": "關於甲狀腺機能亢進(thyrotoxicosis)病人的麻醉前評估，下列敘述何者正確？", "options": {"A": "術前甲狀腺機能高於正常值，但心率每分鐘低於120次，仍可進行常規手術", "B": "術中應持續使用抗甲狀腺藥物、治療性藥物碘及β-受體阻斷劑", "C": "進行緊急手術前不需給予降心率藥物調整心率", "D": "選用全身麻醉比區域麻醉更適合甲狀腺機能亢進病人"}, "answer": "B", "explanation": "甲亢病人術前應使用抗甲狀腺藥物（PTU/Methimazole）、碘劑（術前 10 天）、β-blocker 控制心率，術中繼續使用。常規手術應在甲狀腺功能恢復正常後進行（心率 < 90 bpm）。", "category": "clinical_assessment", "difficulty": "medium", "source": "109_general_Q34"}, {"id": 35, "question": "圍術期，心電圖突然出現心房顫動(Atrial fibrillation)，下列何者正確？", "options": {"A": "呼叫醫師，備妥第一線治療用藥毛地黃(digitalis)", "B": "合併血壓穩定，可優先考慮同步心臟電擊(cardioversion)", "C": "合併血壓不穩定，可考慮非同步心臟電擊(defibrillation)", "D": "若需Amiodarone治療，需靜脈注射超過10分鐘"}, "answer": "D", "explanation": "Amiodarone 靜脈負荷劑量應緩慢給予（> 10 分鐘，通常 10–20 分鐘），快速給予會造成嚴重低血壓。血壓穩定的 AF 優先藥物控制心率；血壓不穩定需同步電擊（非非同步，非同步是 VF）。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q35"}, {"id": 36, "question": "動脈血液氣體分析結果：pH 7.30, PaO2 106 mmHg, PaCO2 32 mmHg, HCO3¯ 16 mEq/L, Na+ 138 mEq/L, K+ 3.5 mEq/L，此結果判讀為何？", "options": {"A": "呼吸性酸中毒 (respiratory acidosis)", "B": "呼吸性鹼中毒 (respiratory alkalosis)", "C": "代謝性酸中毒 (metabolic acidosis)", "D": "代謝性鹼中毒 (metabolic alkalosis)"}, "answer": "C", "explanation": "判讀：pH 7.30（酸中毒）→ PaCO₂ 32（偏低，非原因）→ HCO₃⁻ 16（偏低，是原因）→ 代謝性酸中毒。PaCO₂ 下降是對代謝性酸中毒的代償性過度換氣（Kussmaul breathing）。", "category": "physiology", "difficulty": "medium", "source": "109_general_Q36"}, {"id": 37, "question": "接受肺葉切除手術病人，建議至少應在手術前多久停止抽菸？", "options": {"A": "2小時前", "B": "4-6小時", "C": "8-10小時", "D": "12-24小時"}, "answer": "D", "explanation": "停菸 12–24 小時：CO 半衰期約 4–6 小時，12 小時後 COHb 恢復正常，氧合改善。理想停菸時間為 4–8 週（纖毛功能恢復、痰液減少、肺功能改善）。但即使術前 24 小時停菸仍有益。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_general_Q37"}, {"id": 38, "question": "關於準備麻醉機的標準安全檢核步驟，以下何者正確？", "options": {"A": "開啟麻醉機前，先確認氧氣管路是黃色，空氣是紫色", "B": "雖然已經使用中央氣體管路系統，但仍需檢查備用氧氣小鋼瓶的壓力，是否有達到750 psi", "C": "麻醉機開機後，必須先通過一次低壓漏氣檢查，並校正氧氣濃度監視器，因為這是麻醉機檢測中最容易影響病人安全的部分", "D": "必須完成一次呼吸系統的正壓漏氣檢查，將環狀麻醉系統的出口堵住，在壓力表達到20 cmH2O壓力下，觀察十秒鐘"}, "answer": "C", "explanation": "低壓漏氣檢查（vaporizer 下游至呼吸回路之間）是最重要的安全檢查步驟，可防止麻醉藥洩漏。備用氧氣鋼瓶滿瓶壓力約 1800–2000 psi；台灣氧氣管路為綠色、空氣為黃色。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q38"}, {"id": 39, "question": "根據Aldrete recovery score病人可以離開恢復室的評分項目，不包括下列何者？", "options": {"A": "疼痛評估", "B": "呼吸型態", "C": "活動能力", "D": "意識狀況"}, "answer": "A", "explanation": "Aldrete score（改良版）評估五項：活動能力、呼吸、循環（血壓）、意識、氧合（SpO₂）。疼痛評估不在原始 Aldrete score 中（疼痛評分屬於 PADSS 或其他出院標準）。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q39"}, {"id": 40, "question": "病人於3週前曾接受經皮冠狀動脈介入術，置放一個塗藥型支架(drug eluting stents, DES)，術後恢復良好。現因無發炎症狀的膽結石需進行腹腔鏡膽囊切除常規手術，下列處置建議何者最適當？", "options": {"A": "可立即安排全身麻醉進行手術", "B": "手術延後至支架置放1個月後", "C": "手術延後至支架置放1年後", "D": "可立即安排區域性阻斷麻醉進行手術"}, "answer": "C", "explanation": "DES（塗藥型支架）需使用雙重抗血小板藥物（DAPT）至少 12 個月，此期間停藥進行手術支架血栓風險極高。非緊急手術應延後至 DES 置放後 12 個月（1年）再考慮。BMS 則延後 1 個月。", "category": "anesthetic_mgmt", "difficulty": "hard", "source": "109_general_Q40"}, {"id": 41, "question": "以脊髓麻醉行剖腹產的孕婦，麻醉後通常會讓孕婦採取何種擺位，以減少子宮壓迫下腔靜脈？", "options": {"A": "平躺", "B": "右側躺", "C": "左側躺", "D": "半坐臥"}, "answer": "C", "explanation": "仰臥位低血壓症候群（supine hypotensive syndrome）：妊娠子宮壓迫下腔靜脈，減少靜脈回流。處置：左側傾斜 15°（左側躺方向）使子宮移開下腔靜脈，改善靜脈回流。", "category": "regional", "difficulty": "easy", "source": "109_general_Q41"}, {"id": 42, "question": "下列關於顱內壓(intracranial pressure, ICP)之描述何者為非？", "options": {"A": "正常值介於5-15mmHg", "B": "高血壓或PaCO2上升也會使其數值增加", "C": "當數值過高，臨床表徵會有頭痛、噁心、嘔吐及視力模糊等症狀出現", "D": "若將病人頭部降低，可有利於靜脈回流，並改善ICP過高情形"}, "answer": "D", "explanation": "降低頭部（頭低腳高）會增加腦靜脈壓，加重顱內壓升高。應將頭部抬高 30°，促進靜脈回流，有助降低 ICP。PaCO₂ 升高（腦血管擴張）確實增加 ICP。", "category": "physiology", "difficulty": "medium", "source": "109_general_Q42"}, {"id": 43, "question": "在置入動脈導管時，何項臨床考量是正確的？", "options": {"A": "尺動脈是手部血流的主要來源", "B": "由足背動脈測得的收縮壓會較低", "C": "尺動脈是最常選擇的部位", "D": "足背動脈靠近正中神經"}, "answer": "A", "explanation": "手部血流：橈動脈和尺動脈各提供約50%（尺動脈通常為主要供應），兩者在掌弓相連。最常選擇橈動脈（非尺動脈）。足背動脈測得的收縮壓比橈動脈高（非低）。足背動脈靠近腓深神經（非正中神經）。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q43"}, {"id": 44, "question": "針對封閉式麻醉呼吸系統優於半封閉式系統的敘述，何者正確？", "options": {"A": "麻醉氣體造成的大氣汙染較少", "B": "可快速改變麻醉藥的濃度", "C": "吸入的氣體無法提供保濕保溫的作用", "D": "所需要的O2及麻醉氣體的量較多"}, "answer": "A", "explanation": "封閉式（closed system）：氣體完全再循環，環境污染最少、節省麻醉藥物、提供保濕保溫效果。缺點：難以快速改變濃度（需較長時間平衡）。所需新鮮氣體量最少。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q44"}, {"id": 45, "question": "有關經由氣管內管吸入乾燥的醫療性氣體易造成的傷害，下列何者為非？", "options": {"A": "會造成支氣管黏膜的負擔", "B": "造成病人水分及熱能的散失", "C": "導致黏膜脫水，分泌物變黏稠及肺擴張不全", "D": "肺泡-動脈氧分壓梯度下降"}, "answer": "D", "explanation": "吸入乾燥氣體會使黏膜脫水、分泌物黏稠、纖毛功能受損，導致肺擴張不全，肺泡-動脈氧分壓梯度（A-a gradient）應上升（氧合變差），而非下降。", "category": "physiology", "difficulty": "easy", "source": "109_general_Q45"}, {"id": 46, "question": "以下何處為最佳的核心體溫監測部位？", "options": {"A": "鼓膜", "B": "直腸", "C": "腋下", "D": "皮膚"}, "answer": "A", "explanation": "核心體溫最準確部位：肺動脈（黃金標準）> 食道遠端 ≈ 鼻咽 ≈ 鼓膜 > 膀胱 > 直腸。腋下和皮膚屬於周邊體溫，準確性較低。鼓膜接近下視丘（體溫調節中樞），是臨床實用的良好核心體溫替代部位。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q46"}, {"id": 47, "question": "以下關於手術前空腹指引之敘述，何者正確？", "options": {"A": "嬰兒手術前兩小時可以攝取配方奶", "B": "嬰兒手術前兩小時可以攝取母奶", "C": "成人手術前兩小時可以飲用清澈液體", "D": "成人病態性肥胖，術前空腹時間可縮短"}, "answer": "C", "explanation": "ASA 術前禁食指引：清澈液體（水、黑咖啡）禁食 2 小時；母乳 4 小時；配方奶/非母乳 6 小時；固體食物 6–8 小時。病態肥胖屬反流高風險，空腹時間應延長（非縮短）。", "category": "anesthetic_mgmt", "difficulty": "easy", "source": "109_general_Q47"}, {"id": 48, "question": "有關低血鉀症(hypokalemia)在麻醉評估及計畫時，下列敘述何者正確？", "options": {"A": "長期使用利尿劑病人，術前需停用口服鉀製劑", "B": "即使是輕度低血鉀，常規手術也須延期", "C": "術中低血鉀須快速靜脈補充，以避免心搏停止", "D": "口服Digoxin伴隨嚴重低血鉀症者，須延遲常規手術"}, "answer": "D", "explanation": "Digoxin 毒性在低血鉀時顯著增加（低血鉀增加心肌對 Digoxin 敏感性），嚴重低血鉀 + Digoxin 使用者須先糾正電解質才能手術。輕度低血鉀（3.0–3.5 mEq/L）一般不需延期；術中補鉀應緩慢（≤ 10–20 mEq/hr）。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q48"}, {"id": 49, "question": "血液透析的病人術前應進行透析，透析距離手術時間要足夠，才能維持身體水、電解質平衡，一般是在透析後多久可達成平衡？", "options": {"A": "2小時", "B": "6小時", "C": "12小時", "D": "24小時"}, "answer": "B", "explanation": "透析後電解質（尤其鉀離子）需約 4–6 小時達到再分佈平衡，因此建議透析結束後 6 小時才安排手術，以確保電解質穩定。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q49"}, {"id": 50, "question": "根據快速誘導麻醉(rapid-sequence induction of anesthesia, RSI)的麻醉照護準則，下列何者為非？", "options": {"A": "可給予鴉片類藥物以減緩插管造成的刺激", "B": "快速誘導前建議要給予病人前氧合(preoxygenation)", "C": "給予甲狀軟骨(thyroid cartilage)施壓", "D": "以潮氣末二氧化碳(EtCO2)確認氣管插管位置"}, "answer": "C", "explanation": "RSI 中壓迫環狀軟骨（cricoid pressure，Sellick's maneuver），而非甲狀軟骨（thyroid cartilage）。目的是壓迫食道減少反流。甲狀軟骨壓迫無此效果。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q50"}, {"id": 51, "question": "以下關於鹼石灰(soda lime)的敘述，何者正確？", "options": {"A": "與Desflurane發生反應，可產生化合物A (compound A)", "B": "與Sevoflurane發生反應，可能產生一氧化碳", "C": "與笑氣(Nitrous Oxide)發生反應，易導致麻醉機的呼吸系統內著火", "D": "吸收二氧化碳之後的主要終產物為碳酸鈣、熱量、水"}, "answer": "D", "explanation": "鹼石灰（NaOH + Ca(OH)₂）吸收 CO₂ 的反應：CO₂ + Ca(OH)₂ → CaCO₃（碳酸鈣）+ H₂O + 熱。Compound A 由 Sevoflurane 與鹼石灰反應產生；CO 由 Desflurane/Isoflurane 與乾燥的鹼石灰反應產生。", "category": "pharmacology", "difficulty": "medium", "source": "109_general_Q51"}, {"id": 52, "question": "手術室是發生火災的高危險區域，辨識火災安全三角，以下敘述何者為非？", "options": {"A": "電燒是火源", "B": "雷射不是火源", "C": "紗布、敷料、氣管內管等都是易燃物", "D": "麻醉機常用的氧氣、笑氣都是助燃劑"}, "answer": "B", "explanation": "手術室火災三要素：火源（電燒、雷射、光纖）、助燃劑（O₂、N₂O）、可燃物（氣管內管、紗布、毛髮、皮膚準備液含酒精）。雷射是重要的手術室火災火源。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q52"}, {"id": 53, "question": "現有一名長期洗腎病人，請問造成其術前心電圖(如下圖)最可能原因為何？", "options": {"A": "急性心肌梗塞", "B": "左心室肥大", "C": "低血鈉", "D": "高血鉀"}, "answer": "D", "explanation": "高血鉀（hyperkalemia）心電圖特徵：早期出現高峻T波（peaked T wave），進展可出現PR延長、QRS增寬、波形融合（sine wave）、最終心室顫動。長期洗腎病人因尿毒症常有高血鉀。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q53", "image": "109_general_Q53.png", "image_caption": "心電圖：高峻 T 波（peaked T wave）"}, {"id": 54, "question": "手術病人經麻醉後，於劃刀前由手術與麻醉團隊共同再次確認病人、術式、手術部位等項目，此階段屬於病人安全-手術查檢的哪一個階段？", "options": {"A": "Sign in", "B": "Sign out", "C": "Time in", "D": "Time out"}, "answer": "D", "explanation": "WHO 手術安全查核表（Surgical Safety Checklist）三階段：Sign in（麻醉誘導前）、Time out（切皮前，全團隊暫停確認）、Sign out（離開手術室前）。劃刀前確認為 Time out。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q54"}, {"id": 55, "question": "Opioids類止痛劑的副作用包括：", "options": {"A": "瞳孔放大", "B": "腹瀉", "C": "噁心嘔吐", "D": "心搏過速"}, "answer": "C", "explanation": "Opioids 副作用：縮瞳（非放大）、便秘（非腹瀉）、噁心嘔吐、呼吸抑制、瘙癢、尿滯留、心搏過緩（非過速，Morphine 組織胺釋放可引起）。噁心嘔吐是最常見副作用之一。", "category": "pharmacology", "difficulty": "easy", "source": "109_general_Q55"}, {"id": 56, "question": "依Mallampati氣道分級，請病人盡可能張口，且最大限度伸出舌頭，此時可見硬顎、但看不到軟顎(如圖)，此分級為第幾級？", "options": {"A": "II級", "B": "III級", "C": "IV級", "D": "V級"}, "answer": "C", "explanation": "Mallampati分級：I級=可見軟顎、懸雍垂、咽門柱；II級=可見軟顎、懸雍垂；III級=僅見軟顎；IV級=僅見硬顎（看不到軟顎）。題目描述可見硬顎但看不到軟顎=IV級。", "category": "airway", "difficulty": "medium", "source": "109_general_Q56", "image": "109_general_Q56.png", "image_caption": "Mallampati 氣道分級評估圖"}, {"id": 57, "question": "52歲末期肝病病人欲接受換肝手術，前來訪視門診評估，下列何者為非？", "options": {"A": "Child-Pugh分期C級代表圍術期發生併發症和致死率會相當高", "B": "常因血管收縮以致臨床表現為高血壓及心輸出量減少", "C": "需注意有無門脈高壓、肝腎症候群、肝性腦病變及凝血功能異常", "D": "Model for End-Stage Liver Disease (MELD score) >14代表圍術期發生併發症和致死率相當高"}, "answer": "B", "explanation": "末期肝病的心血管特點：高動力循環（high output）→ 心輸出量增加、全身血管阻力降低（血管擴張），而非血管收縮高血壓。常有低血壓和心動過速。", "category": "anesthetic_mgmt", "difficulty": "medium", "source": "109_general_Q57"}, {"id": 58, "question": "關於慢性阻塞性肺病(COPD)術前評估的敘述，下列何者最不適當？", "options": {"A": "術前胸部X光顯示肺過度擴張和血管顯影減弱", "B": "常見症狀：噘嘴呼吸、聳肩、呼氣費力", "C": "聽診呼吸音可聽見喘鳴音(wheezing)", "D": "肺功能測驗常見第一秒用力呼氣量(FEV1)大於80%預測值(predicted value)"}, "answer": "D", "explanation": "COPD 定義為 FEV₁/FVC < 70%，且 FEV₁ 通常 < 80% 預測值（依嚴重度分級）。FEV₁ > 80% 代表肺功能正常，與 COPD 診斷矛盾。其他選項均符合 COPD 特徵。", "category": "clinical_assessment", "difficulty": "medium", "source": "109_general_Q58"}, {"id": 59, "question": "關於神經肌肉監測(neuromuscular monitor, NMT)中最常使用四串連刺激(train of four, TOF)，有關TOF的敘述，以下何者正確？", "options": {"A": "通常監測橈神經側", "B": "在選擇監測的肌肉上，拇收肌(adductor pollicis muscle)最常使用", "C": "TOF中第三根搐動高度(T3)和第一根搐動高度(T1)比值為TOF比例，作為神經肌肉阻斷程度的參考", "D": "TOF中搐動反應應完全消失，才能達到足夠的肌肉鬆弛，以利手術進行"}, "answer": "B", "explanation": "TOF 監測：刺激尺神經（非橈神經），監測拇收肌（adductor pollicis）的拇指內收反應。TOF 比值為 T4/T1（非 T3/T1）。TOF 計數 = 0 或 1 代表深度阻斷；一般手術只需 T1 抑制 > 90% 即可。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q59"}, {"id": 60, "question": "手術穩定進行中，外科醫師要求將手術台升高，隨即發現螢幕上侵入性測量的橈動脈壓由原先的110/65 mmHg上升到145/95 mmHg，心跳沒有變化，這時的血壓上升最可能的原因是？", "options": {"A": "麻醉深度不夠", "B": "自發性高血壓", "C": "壓力傳感器零點不正確", "D": "外科手術刺激增加"}, "answer": "C", "explanation": "手術台升高時，若傳感器位置固定（隨台升高），零點相對降低，測量值會假性升高。外科刺激或麻醉深度不足通常伴隨心跳改變；本題心跳無變化但血壓上升，高度提示傳感器歸零問題。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q60"}, {"id": 61, "question": "患有心臟疾病的病人進行非心臟手術的術前評估，何者不適當？", "options": {"A": "病人有急性冠狀動脈症候群應延遲常規手術，建議做進一步心臟檢查及評估", "B": "心導管檢查是評估冠狀動脈疾病的黃金標準，可了解心臟功能", "C": "若病人長期服用β-阻斷劑，應持續使用至手術當日", "D": "曾置放心臟支架的病人，若使用Aspirin須於手術前一週停藥"}, "answer": "D", "explanation": "心臟支架病人術前停用 Aspirin 有支架血栓的風險。目前指引建議：若出血風險可接受，裸金屬支架（BMS）置放後應繼續 Aspirin；一般手術 Aspirin 可繼續使用（除非出血風險極高）。不應常規術前一週停藥。", "category": "general_nursing", "difficulty": "medium", "source": "109_general_Q61"}, {"id": 62, "question": "下列護理人員相關執業規定，何者為是？", "options": {"A": "護理人員登記執業之處所，以二處為限", "B": "護理人員將證照租借予不具護理人員資格者使用，多以罰鍰為主，最重不會廢止其護理人員證書", "C": "未取得護理人員資格，執行護理人員業務者，本人及雇主處新台幣15,000元以上150,000元以下罰鍰", "D": "在護理人員指導下實習之護理職業學校學生，因尚未有執照，執行護理業務會受罰"}, "answer": "C", "explanation": "依護理人員法：未取得資格執業者處 15,000–150,000 元罰鍰；執業處所以一處為限（非二處）；出租證照最嚴重可廢止執照；在合格護理人員指導下實習的學生有法律保護不受罰。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q62"}, {"id": 63, "question": "關於眼科手術中的眼心反射(oculocardiac reflex, OCR)下列何者為非？", "options": {"A": "為心跳變快後，使眼內壓上升之反射", "B": "應先立即停止手術刺激", "C": "有可能誘發心跳停止", "D": "可能需要使用atropine改善"}, "answer": "A", "explanation": "眼心反射（OCR）是牽拉眼外肌（三叉神經→迷走神經）引起心跳減慢（心搏過緩），而非心跳加快。嚴重時可致心跳停止。處置：停止刺激、Atropine、必要時 CPR。", "category": "general_nursing", "difficulty": "easy", "source": "109_general_Q63"}, {"id": 64, "question": "下列為肺動脈導管(PAC)從右內頸靜脈放置到嵌入肺小動脈過程中，可能出現的壓力波形圖，請選出由右心房→右心室→肺動脈→肺微血管楔壓的順序。", "options": {"A": "1 → 3 → 2 → 4", "B": "3 → 1 → 4 → 2", "C": "2 → 4 → 3 → 1", "D": "4 → 2 → 1 → 3"}, "answer": "B", "explanation": "PAC 壓力波形特徵：右心房（低、a/c/v波）→ 右心室（高收縮壓/低舒張壓）→ 肺動脈（高收縮壓/高舒張壓，有明確切跡）→ PCWP（低、平滑波形）。圖三（低平波）=RA，圖一（寬幅高峰）=RV，圖四（高頻波）=PA，圖二（低平細波）=PCWP。", "category": "monitoring", "difficulty": "hard", "source": "109_general_Q64", "image": "109_general_Q64.png", "image_caption": "PAC 放置過程之四種壓力波形（圖一～圖四）"}, {"id": 65, "question": "肺高壓病人的術前評估，下列何者為非？", "options": {"A": "肺高壓的定義為平均肺動脈壓高於25 mmHg，或運動狀態下高於30 mmHg", "B": "大多為原因不明的原發性肺高壓", "C": "肺高壓會造成右心室收縮壓增加、肥大、擴張進而衰竭", "D": "右心室擴張會導致心室中膈偏左，進而減少心輸出量"}, "answer": "B", "explanation": "肺高壓大多為繼發性（secondary PH），最常見原因為左心疾病（Group 2）、肺部疾病（Group 3）、慢性血栓栓塞（Group 4）。特發性（原發性）PAH 僅佔少數。", "category": "clinical_assessment", "difficulty": "medium", "source": "109_general_Q65"}, {"id": 66, "question": "關於阻塞性睡眠呼吸中止症(obstructive sleep apnea, OSA)，下列敘述何者為非？", "options": {"A": "STOP-bang問卷可用於麻醉門診術前評估", "B": "這類病人發生糖尿病、高血壓、冠心症的機率較高", "C": "女性、肥胖、打鼾、日間嗜睡等，為此類病人的危險因子", "D": "若居家需使用正壓呼吸器裝置(CPAP)，手術麻醉當日應帶至醫院使用"}, "answer": "C", "explanation": "OSA 危險因子：男性（非女性）、肥胖、打鼾、日間嗜睡、頸圍大、老年。女性在停經後風險增加，但整體仍以男性為主要高危族群。", "category": "clinical_assessment", "difficulty": "easy", "source": "109_general_Q66"}, {"id": 67, "question": "在麻醉機上使用二氧化碳吸收劑(carbon dioxide absorbents)，下列何者為是？", "options": {"A": "鈣石灰(amsorb plus)的指示劑變紫色後，會還原為白色", "B": "觸摸二氧化碳吸收劑盒時，如果沒有感受到熱度，應提高警覺監測二氧化碳濃度", "C": "二氧化碳吸收劑的顆粒越小，吸收效率越低", "D": "鹼石灰(soda lime)的指示劑變紫色後，不會還原為白色"}, "answer": "B", "explanation": "CO₂ 吸收是放熱反應，正常運作的吸收劑摸起來是溫熱的。若沒有熱度，代表吸收劑可能已耗盡或失效，應監測 EtCO₂。顆粒越小吸收效率越高；鹼石灰指示劑（通常乙基紫）從紫色可能還原為白色（已知缺點），鈣石灰（Amsorb）則不會還原。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q67"}, {"id": 68, "question": "下列針對麻醉呼吸系統(breathing system)特性描述，何者為是？", "options": {"A": "半封閉式環狀不可使呼出氣體再吸入", "B": "封閉式環狀可使呼出氣體全部再吸入", "C": "半封閉式環狀的新鮮氣體流入速率為0.3至0.5公升/分鐘", "D": "封閉式環狀的新鮮氣體流入速率為3至6公升/分鐘"}, "answer": "B", "explanation": "封閉式環狀（closed circuit）：呼出氣體全部再吸入，新鮮氣體量僅補充代謝耗用量（約 250 ml/min O₂）。半封閉式允許部分再吸入，新鮮氣體流量 1–6 L/min。完全無再吸入的半開放式（Mapleson）需高流量 > 6 L/min。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q68"}, {"id": 69, "question": "關於二氧化碳監測儀的波形判讀，下列何者正確？", "options": {"A": "阻塞性肺部疾病", "B": "心因性波動", "C": "呼吸迴路漏氣", "D": "二氧化碳再吸入"}, "answer": "D", "explanation": "EtCO₂ 波形判讀：阻塞性疾病=上升斜坡延長（鯊魚鰭型）；心因性波動=規則小切跡（心跳造成）；迴路漏氣=波形不完整或突然消失；CO₂ 再吸入=基線高於零（吸收劑耗盡）。題目選項D（基線 > 0 = CO₂ 再吸入）為正確。", "category": "monitoring", "difficulty": "medium", "source": "109_general_Q69", "image": "109_general_Q69.png", "image_caption": "EtCO₂ 監測儀四種波形（A–D）"}, {"id": 70, "question": "心電圖第II導程與下列何種導程合併監測可以涵蓋最大部分心肌，偵測到95%病人的心肌缺血事件？", "options": {"A": "V3", "B": "V4", "C": "V5", "D": "V6"}, "answer": "C", "explanation": "II + V5 組合是術中心肌缺血監測的黃金標準：II 導程偵測下壁缺血及心律不整；V5 偵測前外側壁缺血（最常見的冠狀動脈灌流區域）。合併使用可偵測約 95% 的缺血事件。", "category": "monitoring", "difficulty": "easy", "source": "109_general_Q70"}, {"id": 71, "question": "下列何者不會影響血氧飽和度(SpO2)量測的正確性？", "options": {"A": "一氧化碳中毒", "B": "高鐵血紅素(methemoglobin)", "C": "甲基藍(methylene blue)", "D": "甲狀腺亢進"}, "answer": "D", "explanat
